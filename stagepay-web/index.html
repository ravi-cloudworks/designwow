<title>StagePay — Get Paid Every Stage. Never Work for Free.</title>
<style>
  :root {
    --ink: #14161b; --paper: #eef1f2; --surface: #ffffff; --surface-2: #e6e9eb;
    --text: #14161b; --text-soft: #565b66; --text-faint: #8b92a1;
    --line: #dbdfe2; --line-soft: #e8ebed;
    --teal: #176b5e; --teal-soft: #e3f1ee; --teal-line: #bcded6;
    --amber: #a05f10; --amber-soft: #fbeedb; --amber-line: #eccd9a;
    --crimson: #b23a37; --crimson-soft: #fbe6e5; --crimson-line: #edc0be;
    --moss: #2f7a4f; --moss-soft: #e3f3e9; --moss-line: #bfe0cc;
    --display: "Avenir Next", "Century Gothic", "Segoe UI Semibold", ui-sans-serif, system-ui, sans-serif;
    --body: -apple-system, "Segoe UI", "Helvetica Neue", ui-sans-serif, system-ui, sans-serif;
    --mono: "SF Mono", "Roboto Mono", ui-monospace, "Consolas", monospace;
    --radius: 10px;
    --shadow-card: 0 1px 2px rgba(20, 22, 27, 0.04), 0 1px 1px rgba(20, 22, 27, 0.03);
    --shadow-lane-active: 0 10px 28px rgba(20, 22, 27, 0.16), 0 0 0 1px rgba(20, 22, 27, 0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #eef1f2; --paper: #14161b; --surface: #1c1f26; --surface-2: #23272f;
      --text: #eef1f2; --text-soft: #a7adb8; --text-faint: #6b7280;
      --line: #2c313a; --line-soft: #23272f;
      --teal: #4fb3a2; --teal-soft: #1b3733; --teal-line: #2f5850;
      --amber: #e2a34a; --amber-soft: #3a2e18; --amber-line: #5c4826;
      --crimson: #e2635f; --crimson-soft: #3a2220; --crimson-line: #5c3634;
      --moss: #4caf7d; --moss-soft: #1c3324; --moss-line: #2f5439;
      --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 1px 1px rgba(0,0,0,0.2);
      --shadow-lane-active: 0 10px 28px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.07);
    }
  }
  :root[data-theme="dark"] {
    --ink: #eef1f2; --paper: #14161b; --surface: #1c1f26; --surface-2: #23272f;
    --text: #eef1f2; --text-soft: #a7adb8; --text-faint: #6b7280;
    --line: #2c313a; --line-soft: #23272f;
    --teal: #4fb3a2; --teal-soft: #1b3733; --teal-line: #2f5850;
    --amber: #e2a34a; --amber-soft: #3a2e18; --amber-line: #5c4826;
    --crimson: #e2635f; --crimson-soft: #3a2220; --crimson-line: #5c3634;
    --moss: #4caf7d; --moss-soft: #1c3324; --moss-line: #2f5439;
    --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 1px 1px rgba(0,0,0,0.2);
    --shadow-lane-active: 0 10px 28px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.07);
  }
  :root[data-theme="light"] {
    --ink: #14161b; --paper: #eef1f2; --surface: #ffffff; --surface-2: #e6e9eb;
    --text: #14161b; --text-soft: #565b66; --text-faint: #8b92a1;
    --line: #dbdfe2; --line-soft: #e8ebed;
    --teal: #176b5e; --teal-soft: #e3f1ee; --teal-line: #bcded6;
    --amber: #a05f10; --amber-soft: #fbeedb; --amber-line: #eccd9a;
    --crimson: #b23a37; --crimson-soft: #fbe6e5; --crimson-line: #edc0be;
    --moss: #2f7a4f; --moss-soft: #e3f3e9; --moss-line: #bfe0cc;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { background: var(--paper); color: var(--text); font-family: var(--body); -webkit-font-smoothing: antialiased; }
  h1, h2, h3 { font-family: var(--display); margin: 0; }
  button, input, select, textarea { font: inherit; color: inherit; }

  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--line); background: var(--surface); flex-wrap: wrap; flex-shrink: 0; }
  .topbar-title { display: flex; align-items: center; gap: 9px; }
  .topbar-title .mark { width: 26px; height: 26px; border-radius: 7px; background: var(--ink); color: var(--paper); display: flex; align-items: center; justify-content: center; }
  .beta-badge { display: inline-block; font-size: 9px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 7px; border-radius: 999px; background: var(--teal-soft); color: var(--teal); border: 1px solid var(--teal-line); vertical-align: middle; margin-left: 6px; }
  .topbar h1 { font-size: 15.5px; font-weight: 700; }
  .topbar p { margin: 1px 0 0; font-size: 11px; color: var(--text-faint); }

  .user-chip { display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600; }
  .user-chip img { width: 24px; height: 24px; border-radius: 50%; }

  .legend { display: flex; gap: 14px; padding: 7px 20px; font-size: 10.5px; color: var(--text-faint); background: var(--surface); border-bottom: 1px solid var(--line); flex-wrap: wrap; flex-shrink: 0; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; }

  .swimlane-wrap { display: flex; overflow-x: auto; align-items: flex-start; flex: 1; min-height: 0; }
  /* flex-grow (not a fixed basis) so the 5 lanes always fill the full row
     width with no trailing white space, whatever the viewport is; the
     active lane's higher grow ratio is what makes it wider than the rest. */
  .lane { flex: 1 1 240px; border-right: 1px solid var(--line); border-top: 3px solid transparent; padding: 18px 16px 40px; overflow-y: auto; height: 100%; position: relative; transition: flex-grow 0.15s ease, background 0.15s ease, box-shadow 0.15s ease; }
  .lane:last-child { border-right: none; }
  .lane.active {
    flex: 1.6 1 280px;
    background: var(--surface);
    border-right-color: transparent;
    border-radius: 12px;
    box-shadow: var(--shadow-lane-active);
    z-index: 1;
  }
  .current-stage-badge { margin-left: auto; font-size: 10px; font-weight: 800; padding: 3px 9px; border-radius: 999px; color: #fff; white-space: nowrap; }
  .lane-header { margin-bottom: 12px; }
  .lane-title-row { display: flex; align-items: center; gap: 10px; }
  .lane-badge { width: 28px; height: 28px; border-radius: 50%; background: var(--ink); color: var(--paper); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12.5px; flex-shrink: 0; font-family: var(--display); }
  .lane-title { font-size: 15px; font-weight: 700; }
  .earned-pill { margin-left: auto; font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 999px; background: var(--moss-soft); color: var(--moss); border: 1px solid var(--moss-line); white-space: nowrap; cursor: pointer; }
  .earned-pill.pending { background: var(--amber-soft); color: var(--amber); border-color: var(--amber-line); cursor: default; }
  .project-info-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px 20px; padding: 12px 20px; border-bottom: 1px solid var(--line); background: var(--surface-2); flex-shrink: 0; }
  .project-info-bar:empty { display: none; }
  .project-info-name { font-size: 16px; font-weight: 800; cursor: pointer; }
  .project-info-name-input { font-size: 16px; font-weight: 800; padding: 2px 8px; width: 280px; }
  .project-info-meta { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; font-size: 11.5px; color: var(--text-faint); }
  .project-info-meta strong { color: var(--text-soft); font-weight: 700; }
  .project-stage-pill { display: inline-flex; align-items: center; justify-content: center; min-width: 62px; font-size: 10.5px; font-weight: 800; padding: 4px 10px; border-radius: 999px; background: var(--ink); color: var(--paper); white-space: nowrap; }
  .project-stage-pill.completed { background: var(--moss-soft); color: var(--moss); border: 1px solid var(--moss-line); }
  .project-earned-pill { display: inline-flex; align-items: center; justify-content: center; min-width: 122px; font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 999px; background: var(--moss-soft); color: var(--moss); border: 1px solid var(--moss-line); white-space: nowrap; }
  .project-earned-pill.lg { font-size: 16px; padding: 7px 16px; }
  .project-pending-pill { display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 999px; background: var(--amber-soft); color: var(--amber); border: 1px solid var(--amber-line); white-space: nowrap; }
  .lane-desc { font-size: 11px; color: var(--text-faint); margin: 6px 0 0 38px; line-height: 1.4; }

  .trail-accordion { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 12px; overflow: hidden; background: var(--surface); }
  .trail-summary-head { display: flex; align-items: center; gap: 6px; padding: 8px 10px; cursor: pointer; font-size: 10.5px; font-weight: 600; color: var(--text-soft); }
  .trail-summary-head:hover { background: var(--surface-2); }
  .trail-summary-head .trail-chain { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .trail-summary-head .trail-arrow { font-size: 10px; color: var(--text-faint); transition: transform 0.15s; flex-shrink: 0; }
  .trail-accordion.expanded .trail-arrow { transform: rotate(90deg); }
  .trail-accordion.expanded .trail-summary-head { border-bottom: 1px solid var(--line-soft); }
  .chip-trail { display: none; flex-direction: column; gap: 5px; padding: 8px; }
  .trail-accordion.expanded .chip-trail { display: flex; }
  .stage-chip { border: 1px solid var(--line-soft); border-radius: 6px; background: var(--surface-2); }
  .stage-chip-head { display: flex; align-items: center; gap: 6px; padding: 6px 8px; cursor: pointer; font-size: 10.5px; font-weight: 600; }
  .chip-detail { display: none; padding: 0 8px 7px; font-size: 10.5px; color: var(--text-faint); line-height: 1.5; }
  .stage-chip.expanded .chip-detail { display: block; }

  .global-pin-row { display: flex; gap: 6px; flex-wrap: wrap; background: var(--surface-2); border: 1px dashed var(--line); border-radius: 8px; padding: 7px 9px; margin-bottom: 12px; }
  .global-pin-item { display: flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 600; color: var(--text-soft); background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 3px 8px 3px 3px; }
  .pin-swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.15); }

  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow-card); padding: 18px; margin-bottom: 14px; }
  .section-head-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .section-num { width: 28px; height: 28px; border-radius: 50%; background: var(--ink); color: var(--paper); display: flex; align-items: center; justify-content: center; font-size: 12.5px; font-weight: 700; flex-shrink: 0; font-family: var(--display); }
  .section-title { font-size: 15px; font-weight: 700; }
  .section-subtitle { font-size: 12px; color: var(--text-faint); margin: 2px 0 12px; }
  .section-desc { margin: 0 0 14px 38px; font-size: 11.5px; color: var(--text-faint); max-width: 60ch; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 5px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 640px) { .row2 { grid-template-columns: 1fr; } }
  input[type="text"], input[type="number"], select, textarea {
    width: 100%; border: 1px solid var(--line); background: var(--surface); border-radius: 8px; padding: 8px 10px; font-size: 13.5px;
  }
  textarea { resize: vertical; min-height: 64px; line-height: 1.5; }

  .pill-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .pill { border: 1px solid var(--line); background: var(--surface); color: var(--text-soft); padding: 7px 12px; border-radius: 999px; font-size: 12.5px; cursor: pointer; }
  .pill.selected { background: var(--ink); border-color: var(--ink); color: var(--paper); }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600; margin-bottom: 6px; }
  .checkbox-row input { width: auto; }

  .swatch-row { display: flex; gap: 8px; align-items: center; }
  .swatch-box { position: relative; width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--line); flex-shrink: 0; }
  .swatch-native { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .swatch-hex { width: 90px; font-size: 12px; padding: 7px 8px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); }

  .btn { display: inline-flex; align-items: center; gap: 6px; border-radius: 8px; padding: 7px 12px; font-size: 12.5px; font-weight: 600; cursor: pointer; border: 1px solid var(--line); background: var(--surface); color: var(--text); }
  .btn:hover { border-color: var(--text-faint); }
  .btn-primary { background: var(--teal); border-color: var(--teal); color: #f0f6f4; }
  .btn-sm { padding: 5px 9px; font-size: 11.5px; }
  .btn-danger { color: var(--crimson); }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
  /* Looks disabled but is NOT the native [disabled] attribute — used for the
     "previous stage isn't locked yet" guard rail, where clicking should still
     fire so the handler can explain why via a toast. A real [disabled]
     button never dispatches a click event at all, which is why those guards
     went silent. */
  .btn.btn-guard-disabled { opacity: 0.5; cursor: not-allowed; }

  .list-label-row { display: flex; align-items: center; justify-content: space-between; margin: 14px 0 8px; }
  .list-label-row span { font-size: 11px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.03em; }
  .list-label-row:first-child { margin-top: 2px; }

  .item-row { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 8px; overflow: hidden; background: var(--surface); }
  .item-row-head { display: flex; align-items: center; gap: 7px; padding: 10px 11px; cursor: pointer; }
  .item-row-head:hover { background: var(--surface-2); }
  .item-num { font-size: 11px; font-weight: 700; color: var(--text-faint); width: 14px; flex-shrink: 0; }
  .item-thumb { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; background: var(--surface-2); }
  .item-name { flex: 1; font-size: 13px; font-weight: 700; min-width: 0; }
  .item-rename-btn { background: none; border: none; cursor: pointer; font-size: 11px; opacity: 0.45; padding: 0 4px; flex-shrink: 0; }
  .item-rename-btn:hover { opacity: 1; }
  .item-name-input { flex: 1; min-width: 0; font-size: 13px; font-weight: 700; padding: 2px 6px; }
  .version-badge { font-size: 9.5px; font-weight: 700; padding: 2px 7px; border-radius: 999px; background: var(--moss-soft); color: var(--moss); white-space: nowrap; }
  .chevron { color: var(--text-faint); font-size: 11px; transition: transform 0.15s; }
  .item-row.expanded .chevron { transform: rotate(90deg); }
  .item-body { display: none; padding: 0 11px 13px; border-top: 1px solid var(--line-soft); }
  .item-row.expanded .item-body { display: block; padding-top: 11px; }
  .story-card .item-row-head:hover { background: none; }
  .story-step { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line-soft); }
  .story-step:last-child { border-bottom: none; padding-bottom: 0; }
  .story-step-num { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: var(--surface-2); color: var(--text); font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
  .story-step-body { flex: 1; min-width: 0; }
  .story-step-note { font-size: 12px; color: var(--text-faint); line-height: 1.5; }
  .icon-btn { background: none; border: 1px solid var(--line); border-radius: 6px; cursor: pointer; font-size: 12px; padding: 4px 7px; flex-shrink: 0; }
  .icon-btn:hover { background: var(--surface-2); }
  .icon-select { background: none; border: 1px solid var(--line); border-radius: 6px; cursor: pointer; font-size: 12px; padding: 4px 7px; flex-shrink: 0; }
  .icon-select:hover { background: var(--surface-2); }

  .brief-section { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 10px; overflow: hidden; background: var(--surface); }
  .brief-section-head { display: flex; align-items: center; justify-content: space-between; gap: 7px; padding: 11px 12px; cursor: pointer; font-weight: 700; font-size: 13px; }
  .brief-section-head:hover { filter: brightness(0.97); }
  .brief-section-body { display: none; padding: 2px 12px 14px; border-top: 1px solid var(--line-soft); }
  .brief-section.expanded .brief-section-body { display: block; padding-top: 10px; }
  .brief-plusminus { font-size: 15px; font-weight: 700; line-height: 1; width: 16px; text-align: center; flex-shrink: 0; }
  /* Each Stage 1 section gets its own tint so Brand/Strategy/Story read as
     distinct blocks at a glance, not one long uniform list. */
  .brief-section-brand .brief-section-head { background: var(--teal-soft); color: var(--teal); border-bottom: 1px solid var(--teal-line); }
  .brief-section-strategy .brief-section-head { background: var(--amber-soft); color: var(--amber); border-bottom: 1px solid var(--amber-line); }
  .brief-section-story .brief-section-head { background: var(--moss-soft); color: var(--moss); border-bottom: 1px solid var(--moss-line); }
  .brief-section:not(.expanded) .brief-section-head { border-bottom: none; }

  .stale-banner { display: flex; align-items: center; gap: 6px; font-size: 10.5px; font-weight: 600; line-height: 1.4; background: var(--amber-soft); color: var(--amber); border: 1px solid var(--amber-line); border-radius: 7px; padding: 6px 9px; margin-bottom: 9px; }

  .version-tab-row { display: flex; gap: 6px; margin: 9px 0; flex-wrap: wrap; }
  .version-tab { display: flex; align-items: center; gap: 4px; font-size: 10.5px; font-weight: 700; padding: 4px 9px; border-radius: 999px; border: 1px solid var(--line); background: var(--surface); cursor: pointer; color: var(--text-soft); }
  .version-tab.active { border-color: var(--teal); background: var(--teal-soft); color: var(--teal); }

  .row-actions { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 8px; }
  .prompt-box { width: 100%; min-height: 78px; font-size: 12px; line-height: 1.5; border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; background: var(--surface-2); resize: vertical; }
  .prompt-actions { display: flex; gap: 7px; margin: 7px 0; }

  .attach-list { margin-top: 9px; }
  .attach-list-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--crimson); margin-bottom: 5px; display: flex; align-items: center; gap: 4px; }
  .attach-chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .attach-chip { display: flex; align-items: center; gap: 5px; background: var(--crimson-soft); border: 1px solid var(--crimson-line); color: var(--crimson); font-size: 10.5px; font-weight: 600; padding: 3px 8px; border-radius: 999px; }
  .attach-chip a { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-faint); margin: 0 0 6px; }
  .deliverable-card { margin-top: 12px; padding: 10px 11px; border: 1px solid var(--teal-line); background: var(--teal-soft); border-radius: 8px; }
  .deliverable-card .card-section-label { color: var(--teal); }

  .media-slot { width: 100%; min-height: 54px; border: 1.5px dashed var(--line); border-radius: 8px; display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--surface-2); font-size: 11.5px; color: var(--text-faint); margin-top: 8px; }
  .media-slot input[type="text"] { flex: 1; background: var(--surface); }
  .media-slot-multi { width: 100%; border: 1.5px dashed var(--line); border-radius: 8px; padding: 9px 10px; background: var(--surface-2); margin-top: 8px; }
  .media-slot-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-faint); margin-bottom: 7px; }

  .refs-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .refs-chip { display: flex; align-items: center; gap: 6px; border: 1px solid var(--line); background: var(--surface); color: var(--text-soft); font-size: 11.5px; font-weight: 600; padding: 4px 10px 4px 4px; border-radius: 999px; cursor: pointer; }
  .refs-chip.selected { border-color: var(--teal); background: var(--teal-soft); color: var(--teal); }
  .refs-chip-thumb { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .refs-chip-thumb-fallback { width: 26px; height: 26px; border-radius: 50%; background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(10,11,14,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal-card { background: var(--surface); border-radius: 12px; width: 520px; max-width: 100%; max-height: 86vh; overflow-y: auto; padding: 22px; }
  .modal-card.generate-modal-card { width: 920px; max-width: 96vw; }
  .generate-modal-body { display: flex; gap: 18px; margin-top: 14px; }
  .generate-modal-left { flex: 0 0 280px; max-height: 62vh; overflow-y: auto; padding-right: 4px; }
  .generate-modal-right { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .generate-modal-textarea { flex: 1; min-height: 420px; font-size: 15.5px; line-height: 1.7; padding: 16px; }
  @media (max-width: 720px) { .generate-modal-body { flex-direction: column; } .generate-modal-left { flex: none; max-height: none; } }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .modal-head strong { font-size: 15.5px; }
  .modal-close { border: none; background: none; font-size: 19px; cursor: pointer; color: var(--text-faint); }
  .modal-sub { font-size: 12px; color: var(--text-faint); margin: 0 0 16px; }

  .media-viewer-overlay { z-index: 1100; }
  .media-viewer-card { position: relative; background: var(--surface); border-radius: 12px; max-width: 92vw; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.35); }
  .media-viewer-nav { position: absolute; top: 50%; transform: translateY(-50%); border: none; background: rgba(10,11,14,0.55); color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 22px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5; }
  .media-viewer-nav-prev { left: 10px; }
  .media-viewer-nav-next { right: 10px; }
  .media-viewer-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 8px 10px 14px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
  .media-viewer-head strong { font-size: 12.5px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .media-viewer-body { display: flex; align-items: center; justify-content: center; padding: 16px; background: var(--surface-2); overflow: auto; }
  .media-viewer-body img, .media-viewer-body video { max-width: 86vw; max-height: 76vh; border-radius: 6px; display: block; object-fit: contain; }
  .media-viewer-body audio { width: 360px; max-width: 80vw; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }

  .confetti-burst { position: fixed; inset: 0; pointer-events: none; z-index: 2000; overflow: hidden; }
  .confetti-piece { position: absolute; top: -12px; width: 8px; height: 14px; opacity: 0.9; border-radius: 2px; animation: confetti-fall linear forwards; }
  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(540deg); opacity: 0.85; }
  }
  .payment-celebrate-banner { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-16px); background: var(--surface); border: 1px solid var(--moss-line); box-shadow: 0 14px 34px rgba(20,22,27,0.25); border-radius: 14px; padding: 14px 22px; display: flex; align-items: center; gap: 12px; z-index: 2001; opacity: 0; transition: opacity 0.25s ease, transform 0.25s ease; pointer-events: none; }
  .payment-celebrate-banner.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .payment-celebrate-emoji { font-size: 30px; line-height: 1; }
  .payment-celebrate-title { font-size: 13.5px; font-weight: 700; color: var(--text); }
  .payment-celebrate-amount { font-size: 17px; font-weight: 800; color: var(--moss); }
  .affected-list { list-style: none; margin: 0 0 16px; padding: 0; display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; }
  .affected-list li { font-size: 12.5px; font-weight: 600; background: var(--amber-soft); border: 1px solid var(--amber-line); border-radius: 6px; padding: 7px 10px; }
  .confirm-actions button.btn-confirm { background: var(--amber); border-color: var(--amber); color: #2a1600; }

  .empty-note { font-size: 12px; color: var(--text-faint); font-style: italic; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); max-width: min(480px, calc(100vw - 32px)); background: var(--ink); color: var(--paper); padding: 9px 16px; border-radius: 14px; font-size: 12.5px; font-weight: 600; z-index: 2000; box-shadow: var(--shadow-card); text-align: center; }
  .toast.error { background: var(--crimson); color: #fff; }

  .project-list-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; cursor: pointer; background: var(--surface); }
  .project-list-item:hover { border-color: var(--teal-line); background: var(--teal-soft); }
  .container { max-width: 900px; margin: 0 auto; padding: 22px 20px 60px; }

  /* ---------- Public Showcase ---------- */
  .showcase-link-hero { background: var(--teal-soft); border: 1px solid var(--teal-line); border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
  .showcase-link-hero-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--teal); margin-bottom: 8px; }
  .showcase-link-hero-row { display: flex; align-items: center; gap: 8px; }
  .showcase-link-hero-row code { font-size: 13.5px; font-weight: 700; color: var(--ink); background: var(--surface); border: 1px solid var(--teal-line); padding: 9px 12px; border-radius: 8px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .showcase-field-section { margin-bottom: 16px; }
  .showcase-field-label { font-size: 11px; font-weight: 700; color: var(--text-soft); margin-bottom: 6px; }
  .showcase-field-row { display: flex; align-items: center; gap: 8px; }
  .showcase-field-note { margin: 6px 0 0; font-size: 11px; color: var(--text-faint); }
  .input-with-prefix { display: flex; align-items: center; flex: 1; min-width: 0; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); }
  .input-with-prefix .input-prefix { padding-left: 10px; font-size: 12px; color: var(--text-faint); white-space: nowrap; }
  .input-with-prefix input { flex: 1; min-width: 0; border: none; background: transparent; padding: 9px 10px; font-size: 12.5px; color: var(--text); }
  .input-with-prefix input:focus { outline: none; }
  .showcase-field-row > input[type="text"] { flex: 1; min-width: 0; font-size: 12.5px; }
  .btn-saved { background: var(--moss) !important; border-color: var(--moss) !important; color: #fff !important; }
  .showcase-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .showcase-tile { position: relative; }
  .showcase-tile img, .showcase-tile video { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; display: block; background: var(--surface-2); }
  .showcase-file-tile { width: 100%; height: 140px; border-radius: 8px; background: var(--surface-2); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; }
  .showcase-tile-remove { position: absolute; top: 6px; right: 6px; border: none; border-radius: 999px; width: 22px; height: 22px; background: rgba(10,11,14,0.7); color: #f0f6f4; cursor: pointer; font-size: 13px; line-height: 1; }
  .showcase-tile-badge { position: absolute; top: 6px; left: 6px; background: rgba(23,107,94,0.9); color: #f0f6f4; font-size: 9px; font-weight: 700; letter-spacing: 0.02em; padding: 2px 7px; border-radius: 999px; pointer-events: none; }
  .showcase-tile-name { margin: 4px 0 0; font-size: 10.5px; color: var(--text-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .showcase-candidate-add { width: 100%; justify-content: center; margin-top: 4px; }
  .showcase-project-card { border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; background: var(--surface); }
  .showcase-project-card-title { font-size: 15px; font-weight: 800; margin: -14px -16px 14px; padding: 12px 16px; background: var(--surface-2); border-bottom: 1px solid var(--line); border-radius: 12px 12px 0 0; }
  .showcase-project-columns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 720px) { .showcase-project-columns { grid-template-columns: repeat(2, 1fr); } }
  .showcase-project-column-title { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin: 0 0 8px; }
  .showcase-project-column-body { display: flex; flex-direction: column; gap: 10px; max-height: 340px; overflow-y: auto; padding-right: 4px; }
  .showcase-project-column-body .showcase-tile img,
  .showcase-project-column-body .showcase-tile video { height: 90px; }
  /* Full-width portfolio layout — deliberately not .pay-page/.pay-card
     (those are a narrow, centered payment receipt; a gallery needs the
     screen's actual width, especially on mobile where every extra px of
     padding eats into the carousels below). */
  .showcase-page { min-height: 100vh; background: var(--paper); padding: 20px 16px 56px; }
  .showcase-page-inner { max-width: 900px; margin: 0 auto; }
  .showcase-page-brand { display: flex; align-items: center; gap: 8px; color: var(--text); margin-bottom: 22px; }

  /* ---------- Moodboard (internal, fullscreen project snapshot) ---------- */
  .moodboard-page { min-height: 100vh; background: var(--paper); padding: 20px 24px 48px; overflow-y: auto; }
  .moodboard-header { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
  .moodboard-header h1 { margin: 0; font-size: 21px; font-family: var(--display); }
  .moodboard-brief { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; max-width: 900px; }
  .moodboard-brief h2 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-soft); }
  .moodboard-brief p { margin: 0; font-size: 13.5px; line-height: 1.6; }
  .moodboard-section { border: 2px solid; border-radius: 12px; padding: 18px; margin-bottom: 20px; max-width: 1400px; background: var(--surface); }
  .moodboard-section-title { display: inline-block; font-size: 12px; font-weight: 800; color: #fff; padding: 4px 12px; border-radius: 999px; margin-bottom: 14px; }
  .moodboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .moodboard-tile img, .moodboard-tile video { width: 100%; max-height: 260px; object-fit: cover; border-radius: 8px; display: block; background: var(--surface-2); }
  .moodboard-tile-caption { margin: 6px 0 0; font-size: 11.5px; color: var(--text-faint); }
  .public-showcase-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .public-showcase-avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: var(--surface-2); flex-shrink: 0; }
  .public-showcase-category { margin-bottom: 22px; }
  .public-showcase-category-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-soft); margin: 0 0 10px; }
  /* Casual-deterrent only (not real protection — anyone using dev tools or
     a screenshot can still get the file either way): blocks the obvious
     right-click "Save as"/iOS long-press "Save Image", scoped to the public
     showcase page only — the designer's own authenticated tool still gets
     normal right-click on its own previews. */
  .showcase-page img, .showcase-page video { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  /* Swipeable, mobile-native row per category — native touch scrolling plus
     scroll-snap gives the "flick through cards" feel without any dismiss
     semantics (unlike a Tinder-style stack), and the next card peeking in
     at the edge (tile width < viewport width) signals "swipe for more"
     with no extra affordance needed. */
  .showcase-carousel { display: flex; gap: 12px; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; padding-bottom: 6px; scrollbar-width: none; }
  .showcase-carousel::-webkit-scrollbar { display: none; }
  .showcase-carousel .showcase-tile { flex: 0 0 min(220px, 72vw); scroll-snap-align: start; }

  /* ---------- Goal Tracker (responsive by default: flex/%, no fixed widths) ---------- */
  .goal-tracker-card .icon-btn { font-size: 11.5px; }
  .goal-range-toggle { display: flex; gap: 6px; margin: 10px 0 10px; }
  .goal-range-toggle button { flex: 1; padding: 7px 8px; font-size: 12px; font-weight: 700; border: 1px solid var(--line); background: var(--surface); border-radius: 8px; cursor: pointer; color: var(--text); }
  .goal-range-toggle button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .item-mode-toggle { display: flex; gap: 2px; margin-bottom: 12px; background: var(--surface-2); border-radius: 999px; padding: 3px; width: fit-content; max-width: 100%; }
  .item-mode-toggle button { padding: 6px 14px; font-size: 11.5px; font-weight: 700; border: none; background: transparent; border-radius: 999px; cursor: pointer; color: var(--text-soft); transition: background 0.15s, color 0.15s; white-space: nowrap; }
  .item-mode-toggle button.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-card); }
  .goal-past-total { font-size: 24px; font-weight: 800; margin: 2px 0 14px; }
  .goal-past-total span { font-size: 12px; font-weight: 700; color: var(--text-faint); margin-left: 6px; }
  .trend-chart-wrap { width: 100%; margin-bottom: 16px; }
  .trend-svg { width: 100%; height: auto; display: block; }
  .goal-future { border-top: 1px solid var(--line-soft); padding-top: 16px; }
  .goal-future-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; font-weight: 700; }
  .goal-future-head strong { color: var(--teal); font-size: 16px; }
  #goalSlider { width: 100%; }
  .goal-progress-bar { height: 9px; border-radius: 999px; background: var(--surface-2); overflow: hidden; margin-top: 14px; }
  .goal-progress-fill { height: 100%; background: var(--moss); border-radius: 999px; transition: width 0.2s; }
  .goal-progress-note { font-size: 12px; color: var(--text-faint); margin-top: 7px; }
  /* Goal strip — a glanceable reminder at the top of the projects list, not
     a second dashboard. Clicking anywhere on it jumps to the full Goal
     Tracker; the bar itself mirrors the reference: a soft green track with a
     dark fill for progress, and the number pinned to the right. */
  .goal-strip { display: block; text-decoration: none; color: inherit; cursor: pointer; margin-bottom: 16px; }
  .goal-strip-title { font-size: 14.5px; font-weight: 800; }
  .goal-strip-subtitle { font-size: 12px; font-weight: 700; color: var(--moss); margin: 2px 0 10px; }
  .goal-strip-celebrate { font-size: 16px; font-weight: 800; color: var(--moss); margin: 4px 0 10px; }
  .goal-strip-sub { font-size: 14px; font-weight: 800; color: var(--ink); margin-top: 4px; }
  .goal-strip-note { font-size: 10.5px; color: var(--text-faint); margin: 4px 0 12px; font-style: italic; }
  .goal-strip-row { display: flex; align-items: center; gap: 12px; }
  .goal-strip-track { position: relative; flex: 1; height: 34px; border-radius: 999px; background: var(--moss-soft); border: 1px solid var(--moss-line); overflow: hidden; }
  .goal-strip-fill { position: absolute; inset: 0; width: 0%; background: var(--moss); border-radius: 999px; transition: width 0.2s; }
  .goal-strip-value { flex-shrink: 0; font-size: 15px; font-weight: 800; min-width: 64px; text-align: right; }
  .goal-strip-stages { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--moss-line); }
  .goal-strip-stages-sentence { font-size: 11.5px; color: var(--text-faint); margin-bottom: 6px; }
  .goal-strip-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .goal-strip-pill { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 999px; font-size: 10.5px; font-weight: 700; white-space: nowrap; border: 1px solid transparent; }
  .goal-strip-pill.done { background: var(--moss-soft); color: var(--moss); border-color: var(--moss-line); }
  .goal-strip-pill.pending { background: var(--amber-soft); color: var(--amber); border-color: var(--amber-line); }
  .goal-strip-empty { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; border-radius: 12px; background: var(--moss-soft); border: 1px solid var(--moss-line); }
  .goal-strip-empty strong { display: block; font-size: 13.5px; }
  .goal-strip-empty span { display: block; font-size: 11.5px; color: var(--text-faint); margin-top: 3px; }
  .goal-alloc { border-top: 1px solid var(--line-soft); margin-top: 18px; padding-top: 18px; }
  .goal-alloc-title { font-size: 13px; font-weight: 800; margin-bottom: 10px; }
  .stage-alloc-row { margin-bottom: 12px; padding: 12px; border-radius: 10px; background: var(--surface-2); border-left: 3px solid var(--line); }
  .stage-alloc-name { font-size: 14px; font-weight: 800; margin-bottom: 8px; }
  .stage-alloc-section-label { font-size: 11px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.02em; margin: 8px 0 5px; }
  .stage-alloc-price-pills .pill { padding: 6px 11px; font-size: 12.5px; }
  .stage-alloc-slider { width: 100%; }
  /* Ticks are positioned absolutely, inset by half the (approximate) native
     thumb width from each edge — the same inset the browser itself uses to
     keep the thumb's center from ever reaching past the track's edge. A
     plain flex space-between spaces labels edge-to-edge instead, which is
     why they used to drift out of line with where the thumb actually sits
     at each value, worst at the two ends. */
  .slider-ticks { position: relative; height: 13px; margin-top: 2px; }
  .slider-ticks span { position: absolute; top: 0; transform: translateX(-50%); font-size: 8.5px; color: var(--text-faint); white-space: nowrap; }
  .stage-alloc-calc { text-transform: none; font-weight: 700; font-size: 12.5px; color: var(--text-soft); letter-spacing: normal; }
  .stage-alloc-calc b { font-weight: 800; color: var(--text); }
  .stage-alloc-derived-note { font-size: 11px; color: var(--text-faint); font-weight: 500; text-transform: none; }
  .goal-alloc-total { font-size: 16px; font-weight: 800; margin: 0 0 12px; line-height: 1.4; }
  @media (max-width: 480px) {
    .goal-past-total { font-size: 20px; }
    .stage-alloc-price-pills .pill { padding: 5px 9px; font-size: 12px; }
    .slider-ticks span { font-size: 7.5px; }
  }

  .login-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
  .login-card { text-align: center; max-width: 360px; padding: 32px; }
  .login-card .mark { width: 48px; height: 48px; border-radius: 12px; background: var(--ink); color: var(--paper); display: flex; align-items: center; justify-content: center; font-size: 22px; margin: 0 auto 16px; }
  .google-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 10px 18px; font-size: 13.5px; font-weight: 600; cursor: pointer; text-decoration: none; color: var(--text); margin-top: 16px; }

  /* ---------- Waitlist gate ---------- */
  .waitlist-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .waitlist-card { max-width: 440px; width: 100%; text-align: left; }
  .waitlist-brand { display: flex; align-items: center; gap: 8px; margin-bottom: 22px; }
  .waitlist-brand .mark { width: 36px; height: 36px; border-radius: 10px; background: var(--ink); color: var(--paper); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .waitlist-recap { border: 1px solid var(--line); border-radius: 12px; padding: 4px 16px; margin: 16px 0; }
  .waitlist-recap-row { display: flex; gap: 10px; padding: 10px 0; font-size: 13px; border-bottom: 1px solid var(--line-soft); }
  .waitlist-recap-row:last-child { border-bottom: none; }
  .waitlist-recap-row .label { width: 90px; flex-shrink: 0; color: var(--text-faint); font-weight: 700; }
  .waitlist-recap-row a { color: var(--teal); }

  /* ---------- Admin queue ---------- */
  .admin-page { max-width: 720px; margin: 0 auto; padding: 24px 16px 56px; }
  .admin-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .admin-tabs button { flex: 1; padding: 8px; border: 1px solid var(--line); background: var(--surface); border-radius: 8px; font-size: 12.5px; font-weight: 700; cursor: pointer; color: var(--text); }
  .admin-tabs button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .admin-row { border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; background: var(--surface); }
  .admin-row-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
  .admin-row-meta { font-size: 11.5px; color: var(--text-faint); margin-top: 4px; }
  .admin-row-meta a { color: var(--teal); }

  /* ---------- Buy Income Credits ---------- */
  .credit-pack-row { display: flex; gap: 10px; margin: 12px 0; }
  .credit-pack { flex: 1; border: 1px solid var(--line); background: var(--surface); border-radius: 10px; padding: 14px; text-align: center; cursor: pointer; }
  .credit-pack.selected { border-color: var(--teal); background: var(--teal-soft); }
  .credit-pack .credit-pack-count { font-size: 15px; font-weight: 800; }
  .credit-pack .credit-pack-price { font-size: 12.5px; color: var(--text-faint); margin-top: 2px; }
  .credit-request-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--line-soft); font-size: 12.5px; }
  .credit-request-row:last-child { border-bottom: none; }
  .credit-status { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
  .credit-status.pending { background: var(--amber-soft); color: var(--amber); }
  .credit-status.approved { background: var(--moss-soft); color: var(--moss); }
  .credit-status.rejected { background: var(--crimson-soft); color: var(--crimson); }

  /* ---------- Landing page ---------- */
  .landing { background: var(--paper); }
  .landing-header { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--line); }
  .landing-header .wordmark { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 15px; text-decoration: none; color: var(--text); }
  .landing-header .wordmark .mark { font-size: 18px; }
  .landing-header-tagline { margin: 2px 0 0 26px; font-size: 11px; font-weight: 500; color: var(--text-faint); }
  .landing-lang-switch { display: flex; gap: 2px; background: var(--surface-2); border-radius: 999px; padding: 3px; }

<script>
(function () {
  "use strict";

  // Relative — goes through this Pages project's own /api/* Function proxy
  // to stagepay-api, so the session cookie stays first-party.
  const API_BASE = '';

  // ---------- Option vocabularies (ported verbatim from ugc-vip-6stage.html) ----------
  const GOALS = ['Increase Sales', 'Brand Awareness', 'Drive Inquiries', 'Build Trust', 'Promote New Product', 'Announce Offer'];
  const TARGET_AUDIENCES = ['Families', 'Home / Personal Use', 'Quality-Conscious Buyers', 'Health Conscious', 'Business & Retail Buyers', 'Young Professionals', 'Luxury Buyers', 'Domestic Market', 'Export / International Buyers'];
  const VIDEO_STYLES = ['Tutorial / How-To', 'Before & After', 'Listicle', 'Green Screen', 'Product Feature', 'Trend / Viral', 'Problem → Solution', 'Q&A', 'Mashup', 'Behind the Scenes'];
  const TONES = ['Comedic', 'Warm', 'Dramatic', 'Aspirational', 'Playful'];
  const PLATFORMS = ['Instagram Reels', 'TikTok', 'YouTube Shorts'];
  const DURATIONS = ['15', '30', '60'];
  const LANGUAGES = ['English', 'Hindi', 'Tamil', 'Telugu', 'Kannada', 'Malayalam', 'Bengali', 'Other'];
  // Stage 2-5 field options/schemas now come from the D1-backed stage config
  // (fetched into state.stageConfigs) instead of being hardcoded here.

  const MAX_RECOMMENDED_SCENES = 8;
  // Builds a fully self-contained meta-prompt: every Stage 1 brief field the
  // designer already filled in is baked straight into the text, so ChatGPT
  // never needs anything pasted in separately — it invents/expands the
  // storyline itself and hands back a dialogue-bearing, scene-capped script
  // the designer pastes into the Storyboard/dialogue field below. Keeps
  // Stage 1 data quality high without any AI call of our own.
  function buildStoryboardChatGptPrompt(b) {
    const colors = [b.brand_color_primary, b.brand_color_secondary, b.brand_color_accent].filter(Boolean).join(', ') || '(not given)';
    return `I'm writing the storyline for a ${b.duration || 30}-second UGC-style product ad video for ${b.platform || 'social media'}. Here is everything known about the brand/product/campaign — use ALL of it, don't ask me for anything else, invent anything below marked "(not given)":

Brand/product: ${b.product || '(not given)'}
Product description: ${b.product_description || '(not given)'}
Target audience: ${b.audience || '(not given)'}
Goal: ${b.goal || '(not given)'}
Tone: ${b.tone || '(not given)'}
Video style: ${b.video_style || '(not given)'}
Platform: ${b.platform || '(not given)'}
Duration: ${b.duration || 30} seconds
Language: ${b.language || 'English'}
Hook (opening line/idea): ${b.hook || '(not given — invent one)'}
Call to action: ${b.cta || '(not given)'}
Brand colors: ${colors}
${b.storyboard ? `My rough storyline so far — expand/polish this, keep its core idea:\n${b.storyboard}` : 'I don\'t have a storyline yet — invent one from everything above.'}

Turn this into a storyboard script, formatted EXACTLY like this:

SCENE 1
Location: <short, concrete location>
Time of Day: <Morning / Afternoon / Evening / Night>
Objective: <exactly one of: Hook, Problem, Solution, Proof, Demo, CTA — this scene's narrative role>
Emotion: <exactly one of: Frustrated, Curious, Relieved, Happy, Excited, Confident, Calm — the dominant feeling in this scene>
<what happens, described in one or two sentences> <if a character speaks or on-screen text appears in this scene, include it as: Dialogue: "..." or Text overlay: "...">

SCENE 2
...

Rules:
- Use AT MOST 8 scenes total — fewer is fine, do not pad to reach 8.
- Every scene should be visually distinct (a real beat), not a rephrasing of the previous one.
- Include actual dialogue or on-screen text in at least the scenes where it naturally belongs (e.g. a punchline, a CTA, a key stat) — don't leave every scene silent.
- Objective and Emotion must each be exactly one of the listed options — do not invent your own wording for them.
- Location and Time of Day should stay consistent across scenes unless the story actually moves somewhere else or a real time skip happens.
- Keep it concrete and specific to this exact brand/product — no generic placeholder actions.
- Output ONLY the scenes in that exact format, nothing else before or after.`;
  }

  function countStoryboardScenes(text) {
    if (!text || !text.trim()) return 0;
    const sceneMatches = text.match(/SCENE\s*\d+/gi);
    if (sceneMatches && sceneMatches.length) return new Set(sceneMatches.map(s => s.toUpperCase().replace(/\s+/g, ' '))).size;
    const numberedMatches = text.match(/^\s*\d+[\.\)]/gm);
    if (numberedMatches && numberedMatches.length) return numberedMatches.length;
    return 1;
  }
  function storyboardHasDialogueCue(text) {
    if (!text || !text.trim()) return false;
    return /["“”]|text overlay|on-screen|on screen|caption|voice.?over|\bVO\b|\bsays?\b\s*:/i.test(text);
  }
  function storyboardHintHtml(text) {
    const count = countStoryboardScenes(text);
    const warnings = [];
    if (count > MAX_RECOMMENDED_SCENES) {
      warnings.push(`⚠ ${count} scenes detected — more than ${MAX_RECOMMENDED_SCENES} panels on one storyboard sheet tends to get cramped or illegible. Consider trimming, or splitting into a second storyboard.`);
    }
    if (text && text.trim() && !storyboardHasDialogueCue(text)) {
      warnings.push(`⚠ No dialogue or on-screen text detected in this script — storyboard panels generated from it will have none either.`);
    }
    if (!warnings.length) return '';
    return `<div class="stale-banner" style="margin-top:8px;display:block">${warnings.map(w => esc(w)).join('<br>')}</div>`;
  }

  // Cosmetic only — icons and upload-slot labels/accept types. Not part of
  // the JSON-driven content/instruction config; fine to stay hardcoded.
  const ITEM_THUMBS = {
    story: '📝', character: '👤', property: '📦', sound: '🔊', background: '🏞️',
    scene: '🎬', movie: '🎞️', final_video: '🏆',
  };
  const MEDIA_LABELS = {
    story: 'Storyboard Image', character: 'Character Reference', property: 'Property Reference',
    sound: 'Sound File', background: 'Background Reference', scene: 'Scene Image', movie: 'Scene Video',
    final_video: 'Final Video',
  };
  const MEDIA_ACCEPT = {
    sound: 'audio/*', movie: 'video/*', final_video: 'video/*',
  };
  // Video clips are legitimately much bigger than reference images — every
  // other item type (and Stage 1's logo/product photos) shares one default.
  const DEFAULT_MEDIA_MAX_MB = 20;
  const MEDIA_MAX_MB = { movie: 100 };
  function maxUploadMb(itemKey) { return MEDIA_MAX_MB[itemKey] || DEFAULT_MEDIA_MAX_MB; }
  function checkFileSize(file, maxMb) {
    if (file.size > maxMb * 1024 * 1024) {
      toast(`"${file.name}" is ${(file.size / (1024 * 1024)).toFixed(1)}MB — max allowed is ${maxMb}MB.`);
      return false;
    }
    return true;
  }

  // ---------- API client ----------
  // Gemini calls are the only ones that can genuinely hang (backend itself
  // bounds them at 45s+retry, but if the backend or network stalls before
  // that, this used to just spin the button forever with no error at all).
  // Wraps fetch in a client-side timeout and returns an {error} shaped
  // object on timeout so callers can handle it with their existing
  // `if (result.error)` check instead of a separate code path.
  async function fetchJsonWithTimeout(url, options, timeoutMs) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const r = await fetch(url, { ...options, signal: controller.signal });
      return await r.json();
    } catch (e) {
      if (e.name === 'AbortError') return { error: 'client_timeout', message: `No response after ${timeoutMs / 1000}s — the request may still be running server-side. Try again in a moment.` };
      throw e;
    } finally {
      clearTimeout(timer);
    }
  }

  // Gemini calls can take anywhere from a couple seconds to the better part
  // of a minute (backend retries once on a timeout/empty response, up to
  // ~90s worst case) — a static "Generating…" with no feedback reads as
  // stuck. Rotates through reassuring messages with a live elapsed-seconds
  // counter so a long wait still looks alive, not broken.
  function startWaitTimer(btn, messages) {
    const start = Date.now();
    const render = () => {
      const secs = Math.floor((Date.now() - start) / 1000);
      const idx = Math.min(Math.floor(secs / 8), messages.length - 1);
      btn.textContent = `${messages[idx]} (${secs}s)`;
    };
    render();
    const interval = setInterval(render, 1000);
    return () => clearInterval(interval);
  }
  const SYNC_WAIT_MESSAGES = [
    'Syncing…',
    'Still reading the story…',
    'Extracting characters/props/backgrounds…',
    'Taking a bit longer than usual…',
    'Still going — hang tight…',
  ];

  const api = {
    async me() { const r = await fetch(`${API_BASE}/api/auth/me`, { credentials: 'include' }); return (await r.json()).user; },
    async logout() { return fetch(`${API_BASE}/api/auth/logout`, { method: 'POST', credentials: 'include' }); },
    async listProjects() {
      const r = await fetch(`${API_BASE}/api/projects`, { credentials: 'include' });
      const body = await r.json();
      return { projects: body.projects || [], max: body.max || 50 };
    },
    async createProject(name) {
      const r = await fetch(`${API_BASE}/api/projects`, { method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
      return r.json();
    },
    async getProject(id) {
      const r = await fetch(`${API_BASE}/api/projects/${id}`, { credentials: 'include' });
      if (!r.ok) throw new Error('not_found');
      return r.json();
    },
    async updateProject(id, patch) {
      return fetch(`${API_BASE}/api/projects/${id}`, { method: 'PATCH', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(patch) });
    },
    async deleteProject(id) { return fetch(`${API_BASE}/api/projects/${id}`, { method: 'DELETE', credentials: 'include' }); },
    async updateBrief(id, patch) {
      return fetch(`${API_BASE}/api/projects/${id}/brief`, { method: 'PATCH', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(patch) });
    },
    async unlockBrief(id) {
      return fetch(`${API_BASE}/api/projects/${id}/unlock-brief`, { method: 'POST', credentials: 'include' });
    },
    async createItem(projectId, body) {
      const r = await fetch(`${API_BASE}/api/projects/${projectId}/items`, { method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      return r.json();
    },
    async updateItem(itemId, patch) {
      return fetch(`${API_BASE}/api/items/${itemId}`, { method: 'PATCH', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(patch) });
    },

  // A compact one-line summary of a Character/Property/Sound/Background's
  // own Setup values — reused so a Scene doesn't just name its featured
  // items, it repeats their actual details as text too. The attached
  // reference image carries the visual; this is the textual backup, so
  // Flow isn't relying on a static picture alone to avoid mismatched
  // characters/props across scenes.
  function describeItemForRef(refItem) {
    const rf = theVersion(refItem).fields || {};
    switch (refItem.item_key) {
      case 'character':
      case 'property':
      case 'background':
      case 'sound':
        // These four types have no Setup fields anymore — the only text
        // available is the one-line description Story's auto-populate sync
        // wrote when this item was created (see the auto-populate confirm
        // handler). An item created manually via "+ Add X" has none, so fall
        // back to pointing at the attached reference file itself.
        return rf.description || 'the approved reference — replicate it exactly, do not redesign or reinterpret it';
      case 'story':
        // Story has no Setup fields of its own (it's compiled straight from
        // the locked Stage 1 brief) — so unlike the other types, there's no
        // per-field fact to summarize. Used as a scene reference for overall
        // visual continuity, not itemized details.
        return 'the overall storyboard reference — follow its established visual style, sequence, and shot flow';
      default:
        return '';
    }
  }

  // ---------- Prompt compilers (deterministic, Manual-mode default) ----------
  function compilePrompt(item, fieldsOverride) {
    const f = fieldsOverride || theVersion(item).fields || {};
    let base;
    switch (item.item_key) {
      case 'story': {
        const b = state.brief;
        const colors = [b.brand_color_primary, b.brand_color_secondary, b.brand_color_accent].filter(Boolean).join(', ');
        const instruction = `Generate ONE combined storyboard reference image (not separate images) from the story direction below, composed as a sequential multi-panel layout (comic-strip/contact-sheet style) covering the key beats. Render as real photography — not an illustration, sketch, or cartoon.${colors ? ` Grade it in the brand colors (${colors}).` : ''} Embed the logo and product photos naturally into whichever panels they belong in (packaging, signage, a phone screen, etc.), not pasted on as separate graphics.`;
        base = `${instruction}\n\n${b.tone || '(tone)'} storyline: ${b.storyboard || '(storyboard)'}`;
        break;
      }
      // Character/Property/Background/Sound no longer generate anything via
      // Flow (upload-only now) — compilePrompt is never called for them.
      case 'scene': {
        const refItems = (f.refs || []).map(r => itemById(r)).filter(Boolean);
        const refLine = refItems.length
          ? ` Featuring (already approved and locked — replicate their appearance exactly as described, do not redesign or reinterpret them): ${refItems.map(it => `${it.name} (${describeItemForRef(it)})`).join('; ')}.`
          : '';
        base = `${f.location || '(location)'}. ${f.action || '(action)'} Emotion: ${f.emotion || '(emotion)'}. Dialogue: "${f.dialogue || '(no dialogue)'}".${refLine} Shot: ${f.type || '(shot type)'} on ${f.camera || '(camera)'}, ${f.lens || '(lens)'} lens, ${f.camera_angle || '(camera angle)'}.`;
        break;
      }
      case 'movie':
        base = `Animate the approved shot into a ${f.duration || 8}-second clip: ${f.direction || '(direction)'}.${f.broll && f.broll !== 'None' ? ` B-roll: ${f.broll}.` : ''} Transition: ${f.transition || 'Hard Cut'}.`;
        break;
      default:
        base = '';
    }
    // Naming the exact attached file(s) in the prompt text itself is what
    // lets Google Flow actually use them, not just have them sitting attached.
    const files = mustAttachFiles(item, f);
    const refLine = files.length ? ` Reference images: ${files.map(x => x.fileName).join(', ')}.` : '';
    return `${base}${refLine}`;
  }
  // Manual mode's real on-ramp to ChatGPT — every item type, not just Story
  // (which already had its own dedicated template). Reuses compilePrompt's
  // per-type Setup-field description as the raw material, so it's always in
  // sync with whatever schema that item type actually has, and bundles in
  // the Stage 1 brief + attached reference file names + this item's own
  // output template, so ChatGPT gets the same context Gemini's own
  // "Generate with AI" call would — the whole point being that Manual mode
  // (no Gemini cost) can still produce AI-agent-quality prompts by routing
  // through a designer's own ChatGPT instead.
  function buildItemChatGptPrompt(item, fields) {
    const ic = itemConfigFor(item);
    const master = ic && ic.outputInstructions && ic.outputInstructions.length
      ? (ic.outputInstructions.find(o => o.default) || ic.outputInstructions[0]).text
      : '';
    const contentDescription = compilePrompt(item, fields);
    const files = mustAttachFiles(item, fields);
    const fileNames = files.length ? files.map(f => f.fileName).join(', ') : '(none attached yet)';
    return `I'm producing a "${itemLabel(item.stage, item.item_key)}" reference image for a UGC-style product ad video. Use everything below — don't ask me for anything else, invent anything shown as a blank placeholder in parentheses like "(gender)" using good judgement for this brand:

Campaign brief: ${briefSummaryPrompt()}

This item's own details (from my Setup form):
${contentDescription || '(nothing filled in yet)'}

Reference files I already have attached, that Flow will see: ${fileNames}

Base creative direction to follow:
${master || '(no template for this item type — just write a clean, concrete visual description)'}

Write the final, ready-to-use image-generation prompt for Google Flow — concrete and specific, no placeholders left unfilled, following the structure/overlays implied above if any are shown. Output ONLY the prompt text, nothing else before or after.`;
  }
  function briefSummaryPrompt() {
    const b = state.brief;
    if (!b) return '';
    return `A ${b.duration}-second ${b.platform || '(platform)'} UGC ad for ${b.product || '(product)'}, targeting ${b.audience || '(audience)'}. Goal: ${b.goal || '(goal)'}. Format: ${b.video_style || '(style)'}. Opens with "${b.hook || '(hook)'}" and closes on "${b.cta || '(CTA)'}". Dialogue in ${b.language || '(language)'}.`;
  }
  // Same required-field list as the backend's lock-time check — mirrored
  // here purely for instant feedback before making the round trip.
  const REQUIRED_BRIEF_FIELDS = [
    ['product', 'Product / brand'], ['product_description', 'Product description'], ['goal', 'Goal'],
    ['video_style', 'Video Style'], ['tone', 'Tone'], ['audience', 'Target Audience'], ['platform', 'Platform'],
    ['language', 'Language'], ['hook', 'Hook'], ['storyboard', 'Story+Scene+Dialogues'], ['cta', 'Call to action'],
    ['brand_color_primary', 'Primary color'], ['brand_color_secondary', 'Secondary color'],
  ];
  function briefMissingFields() {
    const b = state.brief;
    const missing = REQUIRED_BRIEF_FIELDS.filter(([key]) => !b[key]).map(([, label]) => label);
    if (!b.logo_media || !b.logo_media.key) missing.push('Logo');
    if (!b.product_photos || !b.product_photos.length) missing.push('Product photos');
    return missing;
  }

  // ---------- Generic field renderers ----------
  function renderFieldControl(def, value, path) {
    const id = 'f' + Math.random().toString(36).slice(2, 9);
    if (def.type === 'pill') {
      // Optional per-option hover tooltip (native title attribute — what it
      // is, when to use it, an example) for fields where the option names
      // alone don't make the choice obvious. Only set where the config
      // actually provides it (e.g. Movie's B-roll/Transition).
      return `<div class="field"><label>${esc(def.label)}</label><div class="pill-row">
        ${def.options.map(o => `<button type="button" class="pill ${o === value ? 'selected' : ''}" data-field-pick="${path}" data-value="${esc(o)}"${def.optionHelp && def.optionHelp[o] ? ` title="${esc(def.optionHelp[o])}"` : ''}>${esc(o)}</button>`).join('')}
      </div></div>`;
    }
    if (def.type === 'checkbox') {
      return `<div class="checkbox-row"><input type="checkbox" data-field-check="${path}" ${value ? 'checked' : ''}> ${esc(def.label)}</div>`;
    }
    if (def.type === 'list') {
      const arr = Array.isArray(value) ? value : [];
      return `<div class="field"><label>${esc(def.label)}</label>
        <div data-field-list="${path}">
          ${arr.map((v, i) => `<div style="display:flex;gap:8px;margin-bottom:6px">
            <input type="text" value="${esc(v)}" data-list-item="${path}" data-index="${i}">
            <button type="button" class="btn btn-sm btn-danger" data-list-remove="${path}" data-index="${i}">Remove</button>
          </div>`).join('')}
        </div>
        <button type="button" class="btn btn-sm" data-list-add="${path}">+ Add rule</button>
      </div>`;
    }
    if (def.type === 'textarea') {
      const maxLen = 1000;
      // Optional quick-start phrases (e.g. Movie's Animation direction) —
      // clicking one appends it rather than replacing whatever's already
      // typed, so it's a starting point, not a forced overwrite.
      const presetsHtml = def.presets && def.presets.length
        ? `<div class="pill-row" style="margin-bottom:6px">${def.presets.map(p => `<button type="button" class="pill" data-field-preset="${path}" data-value="${esc(p)}">${esc(p)}</button>`).join('')}</div>`
        : '';
      return `<div class="field"><label for="${id}">${esc(def.label)}</label>
        ${presetsHtml}
        <textarea id="${id}" data-field-text="${path}" maxlength="${maxLen}">${esc(value || '')}</textarea>
        <p class="story-step-note" style="margin-top:4px">Max ${maxLen} characters.</p>
      </div>`;
    }
    const inputType = def.type === 'number' ? 'number' : 'text';
    return `<div class="field"><label for="${id}">${esc(def.label)}</label><input id="${id}" type="${inputType}" value="${esc(value ?? '')}" data-field-text="${path}" ${inputType === 'text' ? 'maxlength="150"' : ''}></div>`;
  }
  // Shared by the full Setup form and the standalone refs-only modal (for
  // Scene items in Upload mode, where nothing else in Setup matters — see
  // openSceneRefsModal below) so the two never drift apart.
  function sceneRefsPickerHtml(refs, toggleAttr) {
    // Storyboard included as a candidate too — a scene following its layout
    // is a common case.
    const candidates = [...itemsFor(2, 'story'), ...itemsFor(3, 'character'), ...itemsFor(3, 'property'), ...itemsFor(3, 'background')];
    if (!candidates.length) return '<span class="empty-note">Add a Storyboard image or Characters/Properties/Backgrounds in Stage 3 first.</span>';
    // Real thumbnails (not just a name in a text chip) so picking who/what
    // is in a scene is a visual decision, not something easy to skip past.
    return candidates.map((it) => {
      const thumbFile = itemMediaFiles(it)[0];
      const thumb = thumbFile
        ? `<img src="${esc(api.mediaUrl(thumbFile.key))}" alt="" class="refs-chip-thumb">`
        : `<span class="refs-chip-thumb-fallback">${ITEM_THUMBS[it.item_key] || ''}</span>`;
      return `<button type="button" class="refs-chip ${refs.includes(it.id) ? 'selected' : ''}" ${toggleAttr}="${it.id}">${thumb}<span>${esc(it.name)}</span></button>`;
    }).join('');
  }
  // A Scene in Upload mode skips Flow generation entirely — its Location/
  // Action/Dialogue/Emotion and shot/camera fields are only ever consumed by
  // the compiled Flow prompt, so they have no effect here. "Featured in this
  // scene" is the one thing that still matters (Stage 5's Movie reads it to
  // auto-attach the right reference images), so this is a standalone, much
  // smaller modal instead of opening the full Setup form for fields that
  // would just be dead weight in this mode.
  let sceneRefsDraft = null;
  function openSceneRefsModal(item) {
    const version = theVersion(item);
    const refs = Array.isArray((version.fields || {}).refs) ? version.fields.refs : [];
    sceneRefsDraft = { item, refs: [...refs] };
    renderSceneRefsModal();
  }
  function closeSceneRefsModal() {
    sceneRefsDraft = null;
    const root = document.getElementById('modalRoot');
    if (root) root.innerHTML = '';
  }
  function renderSceneRefsModal() {
    const root = document.getElementById('modalRoot');
    if (!root || !sceneRefsDraft) { if (root) root.innerHTML = ''; return; }
    const { item, refs } = sceneRefsDraft;
    root.innerHTML = `
      <div class="modal-overlay" id="sceneRefsModalOverlay">
        <div class="modal-card" style="max-width:440px">
          <div class="modal-head"><strong>Featured in this scene — ${esc(item.name || 'Scene')}</strong><button class="modal-close" id="sceneRefsModalCloseBtn">×</button></div>
          <p class="modal-sub">You're uploading your own scene image, so there's nothing to generate here — just confirm who/what is in this scene so the Final Movie step attaches the right reference images.</p>
          <div class="field"><div class="refs-picker">${sceneRefsPickerHtml(refs, 'data-scene-ref-toggle')}</div></div>
          <div class="modal-footer">
            <button class="btn" id="sceneRefsCancelBtn">Cancel</button>
            <button class="btn btn-primary" id="sceneRefsSaveBtn">Save</button>
          </div>
        </div>
      </div>`;
    document.getElementById('sceneRefsModalCloseBtn').addEventListener('click', closeSceneRefsModal);
    document.getElementById('sceneRefsModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'sceneRefsModalOverlay') closeSceneRefsModal(); });
    document.getElementById('sceneRefsCancelBtn').addEventListener('click', closeSceneRefsModal);
    document.querySelectorAll('[data-scene-ref-toggle]').forEach(el => el.addEventListener('click', () => {
      const id = el.getAttribute('data-scene-ref-toggle');
      sceneRefsDraft.refs = sceneRefsDraft.refs.includes(id) ? sceneRefsDraft.refs.filter(r => r !== id) : [...sceneRefsDraft.refs, id];
      renderSceneRefsModal();
    }));
    document.getElementById('sceneRefsSaveBtn').addEventListener('click', async () => {
      const { item: it, refs: selectedRefs } = sceneRefsDraft;
      const version = theVersion(it);
      version.fields = { ...(version.fields || {}), refs: selectedRefs };
      await api.updateVersion(it.id, { fields: version.fields });
      closeSceneRefsModal();
      renderTool();
      toast('Saved');
    });
  }
  function renderFieldsForm(item, fields) {
    const ic = itemConfigFor(item);
    const schema = (ic && ic.content && ic.content.fieldsSchema) || [];
    let html = '';
    // Location/Action/Dialogue/Emotion below were pre-filled straight from
    // Stage 1 (via the Story sync) — showing this scene's own content
    // read-only up top, same style as Movie's block, makes it obvious the
    // shot/camera fields below are additive, not a rewrite of what's
    // already been decided. Scoped to just this scene (not the whole
    // storyboard) to match Movie's modal — for now; easy to widen back out
    // to the full story later if that cross-check value is missed.
    if (item.item_key === 'scene') {
      const sceneSummary = [fields.location, fields.action].filter(Boolean).join(' — ') || '—';
      const dialogueLine = fields.dialogue ? `\nDialogue: "${fields.dialogue}"` : '';
      html += `<div class="field"><label>This scene's content (Stage 1, locked)</label>
        <p style="margin:0;font-size:12px;line-height:1.5;white-space:pre-wrap;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:8px">${esc(sceneSummary + dialogueLine)}</p>
      </div>`;
    }
    // Scenes get an extra "featured items" picker driving the must-attach
    // list — shown next, before the shot-specific fields below, since who/
    // what is actually in the scene is the foundational context a designer
    // should see (and auto-suggested picks confirm/adjust) before anything else.
    if (item.item_key === 'scene') {
      const refs = Array.isArray(fields.refs) ? fields.refs : [];
      html += `<div class="field"><label>Featured in this scene</label><div class="refs-picker">${sceneRefsPickerHtml(refs, 'data-ref-toggle')}</div></div>`;
    }
    // Movie is scoped to one specific Scene (not the whole story) — showing
    // that Scene's own already-locked Location/Action/Dialogue here is more
    // precise than the full Stage 1 storyboard, and for the same reason as
    // Scene's own block above: makes clear the Animation direction below is
    // additive, not a rewrite of what this clip needs to depict.
    if (item.item_key === 'movie') {
      const scene = itemById(item.parent_item_id);
      const sf = scene ? (theVersion(scene).fields || {}) : {};
      const sceneSummary = [sf.location, sf.action].filter(Boolean).join(' — ') || '—';
      const dialogueLine = sf.dialogue ? `\nDialogue: "${sf.dialogue}"` : '';
      html += `<div class="field"><label>This scene's content (Stage 1, locked)</label>
        <p style="margin:0;font-size:12px;line-height:1.5;white-space:pre-wrap;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:8px">${esc(sceneSummary + dialogueLine)}</p>
      </div>`;
    }
    html += schema.map(def => renderFieldControl(def, fields[def.key], def.key)).join('');
    // Story has no editable fields — the customer already decided the story,
    // dialogue, and tone in the locked Stage 1 brief; show it read-only so
    // the designer sees exactly what they're compiling from.
    if (item.item_key === 'story') {
      const b = state.brief;
      html += `<div class="field"><label>Tone (Stage 1, locked)</label><p style="margin:0;font-size:13px">${esc(b.tone || '—')}</p></div>
        <div class="field"><label>Story+Scene+Dialogues (Stage 1, locked)</label>
          <p style="margin:0;font-size:12px;line-height:1.5;white-space:pre-wrap;max-height:240px;overflow-y:auto;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:8px">${esc(b.storyboard || '—')}</p>
        </div>`;
    }
    return html;
  }

  // ---------- Generate modal (Setup + Generate + review, one place) ----------
  // Replaces the old separate Setup / Compile / Generate-with-AI / Review
  // buttons with a single "Generate {Type}" entry point: Setup fields on the
  // left, the resulting prompt as one big editable textarea on the right.
  let genModalDraft = null;
  let typingAnimId = null;
  function animateTypingInto(textarea, fullText) {
    if (typingAnimId) cancelAnimationFrame(typingAnimId);
    if (!textarea) return;
    const duration = Math.min(1400, Math.max(300, fullText.length * 4));
    const start = performance.now();
    function step(now) {
      const frac = Math.min(1, (now - start) / duration);
      textarea.value = fullText.slice(0, Math.floor(fullText.length * frac));
      if (frac < 1) { typingAnimId = requestAnimationFrame(step); }
      else { textarea.value = fullText; typingAnimId = null; }
    }
    typingAnimId = requestAnimationFrame(step);
  }
  function openGenerateModal(item) {

    renderGenerateModal();
  }
  function closeGenerateModal() {
    if (typingAnimId) { cancelAnimationFrame(typingAnimId); typingAnimId = null; }
    genModalDraft = null;
    document.getElementById('modalRoot').innerHTML = '';
  }
  function renderGenerateModal() {
    const root = document.getElementById('modalRoot');
    if (!genModalDraft) { root.innerHTML = ''; return; }

    const hasEditableFields = ((itemConfigFor(item) || {}).content || {}).fieldsSchema?.length > 0;
    const refFiles = mustAttachFiles(item, genModalDraft.fields);
    // _chatgpt_snapshot is stamped when "Open in ChatGPT" builds the meta-
    // prompt; if Setup changes after that, the copied prompt no longer
    // reflects the current fields, so warn (not block — they may have
    // already re-pasted an updated result manually).
    const chatgptStale = hasEditableFields && !!genModalDraft.fields._chatgpt_snapshot && genModalDraft.fields._chatgpt_snapshot !== fieldsSignature(genModalDraft.fields);
    root.innerHTML = `
      <div class="modal-overlay" id="genModalOverlay">

          <div class="generate-modal-body">

            </div>

                <button class="btn btn-sm" id="genModalChatGptBtn">Open in ChatGPT</button>
              </div>
              ${item.item_key === 'story' ? `<p class="story-step-note" style="margin:0 0 6px">Read-only — this is generated from Stage 1's locked storyboard. To change it, edit Stage 1 and regenerate here, so the two stages never drift apart.</p>` : ''}
              <div id="genModalChatGptStaleness">${chatgptStale ? `<p class="story-step-note" style="margin:0 0 6px;color:var(--crimson)">⚠ Setup changed since you built this ChatGPT prompt — click "Open in ChatGPT" again and paste its updated reply before saving.</p>` : ''}</div>

  function wireGenModalFieldControls() {

  // Re-renders only the left fields pane (plus the Generate button's

  function refreshGenModalFields() {

    const hasEditableFields = ((itemConfigFor(genModalDraft.item) || {}).content || {}).fieldsSchema?.length > 0;
