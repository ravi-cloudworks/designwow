                  ? `<p class="story-step-note">✅ Paid ${formatRupees(amountEntry.amountPaise)}${amountEntry.paidAt ? ` on ${esc(formatIST(amountEntry.paidAt))}` : ''}</p>`
                  : `<button type="button" class="btn btn-sm" id="storyConfirmPaidBtn" ${dis}>✅ Confirm payment received</button>`)
              : `<p class="story-step-note">Set an amount first.</p>`}
          </div>
        </div>
        <div class="story-step">
          <span class="story-step-num">${nextStepStart + 2}</span>
          <div class="story-step-body">
            ${isLocked
              ? `<div class="stale-banner" style="background:var(--moss-soft);color:var(--moss);border-color:var(--moss-line)">🔒 Validated with customer<button type="button" class="btn btn-sm" id="storyUnlockBtn" style="margin-left:auto">🔓 Unlock to edit</button></div>`
              : `<button class="btn btn-primary" id="storyLockBtn" style="width:100%">✅ Lock this stage</button>`}
          </div>
        </div>
      </div>
    </div>`;
  }
  function wireStoryCard() {
    const story = itemsFor(2, 'story')[0];
    if (!story) { wireStoryPlaceholderCard(); return; }
    wireItemRename(story);
    document.querySelectorAll(`[data-item-mode-btn][data-item-id="${story.id}"]`).forEach(el => el.addEventListener('click', async () => {
      const mode = el.getAttribute('data-item-mode-btn');
      state.itemCardMode[story.id] = mode;
      const version = theVersion(story);
      version.fields = { ...(version.fields || {}), _uiMode: mode };
      renderTool();
      await api.updateVersion(story.id, { fields: version.fields });
    }));
    const openGenBtn = document.querySelector(`[data-open-generate="${story.id}"]`);
    if (openGenBtn) openGenBtn.addEventListener('click', () => openGenerateModal(story));
    const copyBtn = document.querySelector(`[data-copy-prompt="${story.id}"]`);
    if (copyBtn) copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(theVersion(story).prompt || '').then(() => toast('Copied'));
    });
    const downloadBtn = document.querySelector(`[data-download-item="${story.id}"]`);
    if (downloadBtn) downloadBtn.addEventListener('click', () => downloadItemPackage(story, downloadBtn));
    const uploadBtn = document.querySelector(`[data-media-upload-btn="${story.id}"]`);
    const uploadInput = document.querySelector(`[data-media-upload-input="${story.id}"]`);
    if (uploadBtn && uploadInput) {
      uploadBtn.addEventListener('click', () => uploadInput.click());
      uploadInput.addEventListener('change', async () => {
        const files = Array.from(uploadInput.files);
        if (!files.length) return;
        const oversized = files.find(f => !checkFileSize(f, DEFAULT_MEDIA_MAX_MB));
        if (oversized) { uploadInput.value = ''; return; }
        uploadBtn.disabled = true; uploadBtn.textContent = 'Uploading…';
        const version = theVersion(story);
        const mediaFiles = version.media_files ? [...version.media_files] : [];
        for (const file of files) {
          const kind = file.type.startsWith('video') ? 'video' : file.type.startsWith('audio') ? 'audio' : 'image';
          const cleanName = cleanUploadFileName(story, file.name, mediaFiles.length);
          const uploaded = await api.uploadMedia(state.project.id, file, cleanName);
          mediaFiles.push({ key: uploaded.key, fileName: uploaded.fileName, kind });
        }
        version.media_files = mediaFiles;
        await api.updateVersion(story.id, { mediaFiles });
        uploadInput.value = '';
        uploadBtn.disabled = false; uploadBtn.textContent = '+ Upload file';
        renderTool();
        toast('Saved');
      });
    }
    document.querySelectorAll(`[data-remove-media="${story.id}"]`).forEach(el => el.addEventListener('click', async () => {
      const idx = Number(el.getAttribute('data-index'));
      const version = theVersion(story);
      const mediaFiles = (version.media_files || []).filter((_, i) => i !== idx);
      version.media_files = mediaFiles;
      await api.updateVersion(story.id, { mediaFiles });
      renderTool();
      toast('Saved');
    }));
    const amountBtn = document.getElementById('storyAmountBtn');
    if (amountBtn) amountBtn.addEventListener('click', () => openStageAmountModal(2));
    const confirmPaidBtn = document.getElementById('storyConfirmPaidBtn');
    // Same double-click confirmation as the shared stage payment card — this
    // button only ever renders while paid is still false, so every click
    // here is before the customer has confirmed anything on their own link.
    let confirmArmed = false;
    if (confirmPaidBtn) confirmPaidBtn.addEventListener('click', async () => {
      if (!confirmArmed) {
        confirmArmed = true;
        toast("Customer hasn't confirmed payment on their link yet — click again to confirm anyway");
        return;
      }
      confirmPaidBtn.disabled = true; confirmPaidBtn.textContent = 'Saving…';
      const res = await api.confirmPaid(state.project.id, 2);
      if (res.ok) {
        const entry = state.paymentLinks.find(l => l.stage === 2);
        markPaymentLinkPaid(2, res.paidAt);
        renderTool();
        renderProjectInfoBar();
        toast('Marked as paid');
        if (entry) celebratePayment(entry.amountPaise);
      } else {
        confirmArmed = false;
        confirmPaidBtn.disabled = false; confirmPaidBtn.textContent = '✅ Confirm payment received';
      }
    });
    const lockBtn = document.getElementById('storyLockBtn');
    if (lockBtn) lockBtn.addEventListener('click', async () => {
      const mediaFiles = theVersion(story).media_files || [];
      const amountEntry = state.paymentLinks.find(l => l.stage === 2) || null;
      const missing = [];
      if (!mediaFiles.length) missing.push('upload a file');
      if (!amountEntry) missing.push('set an amount');
      else if (!amountEntry.paid) missing.push('confirm payment received');
      if (missing.length) { toast(`Before locking: ${missing.join(', ')}`); return; }
      lockBtn.disabled = true;
      const res = await api.lockStage(state.project.id, 2);
      if (res.ok) {
        const others = state.stageLocks.filter(l => l.stage !== 2);
        state.stageLocks = [...others, { stage: 2, locked: true, lockedAt: new Date().toISOString() }];
        renderTool();
        toast('Stage 2 validated with customer');
      } else {
        const body = await res.json().catch(() => ({}));
        toast(body.message || 'Could not lock stage');
        lockBtn.disabled = false;
      }
    });
    const unlockBtn = document.getElementById('storyUnlockBtn');
    if (unlockBtn) unlockBtn.addEventListener('click', async () => {
      if (!(await showUnlockWarningModal([3, 4, 5]))) return;
      unlockBtn.disabled = true; unlockBtn.textContent = 'Unlocking…';
      const res = await api.unlockStage(state.project.id, 2);
      if (res.ok) {
        state.stageLocks = state.stageLocks.filter(l => l.stage < 2);
        state.paymentLinks = state.paymentLinks.filter(l => l.stage <= 2);
        const full = await api.getProject(state.project.id);
        state.items = full.items;
        renderTool();
        renderProjectInfoBar();
        toast('Stage 2 unlocked — Stage 3-5 cleared');
      } else {
        unlockBtn.disabled = false; unlockBtn.textContent = '🔓 Unlock to edit';
      }
    });
  }

  // ---------- Lane 3: Visual & Music ----------
  // Two-tier, unlike Stage 2: per-item cards keep steps 1-4 (Generate/
  // Download/Flow/Upload), and steps 5-7 (Amount/Paid/Lock) live once in a
  // shared card at the bottom — duplicating "set amount" per character would
  // be wrong. The top card, freed up by moving amount down, now holds the
  // decoupled auto-populate sync instead.
  function renderLane3() {
    return `
      <div class="lane-header">
        <div class="lane-title-row"><span class="lane-badge">3</span><span class="lane-title">Visual &amp; Music</span>${earnedPillHtml(3)}${pendingPillHtml(3)}</div>
        <p class="lane-desc">Characters, properties, backgrounds, sounds — add as many as the story needs.</p>
        ${stageItemCapReached(3) ? `<p class="lane-desc" style="color:var(--amber);font-weight:600">⚠ ${esc(stageItemCapMessage(3))}</p>` : ''}
        </div>
      ${renderAutoPopulateCardHtml()}
      ${renderStage3RepeatableList('CHARACTERS', '+ Add character', 'character', 3)}
      ${renderStage3RepeatableList('PROPERTY', '+ Add property', 'property', 3)}
      ${renderStage3RepeatableList('BACKGROUND', '+ Add background', 'background', 3)}
      ${renderStage3RepeatableList('SOUND', '+ Add sound', 'sound', 3)}
      ${renderStagePaymentCardHtml(3)}`;
  }
  function wireLane3() {
    wireAutoPopulateCard();
    ['character', 'property', 'background', 'sound'].forEach(key => itemsFor(3, key).forEach(it => wireItemCard(it)));
    wireAddRepeatable('lane3');
    wireStagePaymentCard('lane3', 3);
  }
  function renderStage3RepeatableList(label, addLabel, itemKey, stage) {
    const list = itemsFor(stage, itemKey);
    const lock = stageLockFor(stage);
    const capReached = stageItemCapReached(stage);
    const hardDis = (lock && lock.locked) || capReached ? 'disabled' : '';
    const guardClass = previousStageLocked(stage) ? '' : ' btn-guard-disabled';
    const titleAttr = capReached ? ` title="${esc(stageItemCapMessage(stage))}"` : '';
    return `<div class="list-label-row"><span>${esc(label)}</span><button class="btn btn-sm${guardClass}" data-add-repeatable="${itemKey}" data-stage="${stage}" ${hardDis}${titleAttr}>${esc(addLabel)}</button></div>
      ${list.length ? list.map(it => renderNumberedItemCard(it, { deletable: true })).join('') : '<p class="empty-note">None yet.</p>'}`;
  }

  // ---------- Auto-populate sync (decoupled from Story's own Generate) ----------
  function renderAutoPopulateCardHtml() {
    const allowed = previousStageLocked(3);
    const lock = stageLockFor(3);
    const hardDis = lock && lock.locked ? 'disabled' : '';
    return `<div class="deliverable-card" style="margin-bottom:14px">
      <div class="card-section-label">👥 Characters from the Story</div>
      <button type="button" class="btn btn-sm btn-primary${allowed ? '' : ' btn-guard-disabled'}" id="syncAutoPopulateBtn" ${hardDis}>🔄 Sync Characters/Props/Backgrounds/Sounds from Story</button>
      <p class="story-step-note" style="margin-top:6px">Re-reads Stage 1's locked storyboard/dialogue and drafts fresh matches here for you to review.</p>
      ${previousStageGuardNote(3)}
    </div>`;
  }
  function wireAutoPopulateCard() {
    const btn = document.getElementById('syncAutoPopulateBtn');
    if (!btn) return;
    btn.addEventListener('click', async () => {
      if (!previousStageLocked(3)) { toast('Lock Stage 2 first — paid and approved by the customer — before syncing Stage 3'); return; }
      const lock3 = stageLockFor(3);
      if (lock3 && lock3.locked) { toast('Stage 3 is locked — unlock it first before syncing new items.'); return; }
      // Checked before spending a Gemini credit, not after — same reasoning
      // as the backend's own check in suggest.ts.
      if (stageItemCapReached(3)) { toast(stageItemCapMessage(3)); return; }
      const story = itemsFor(2, 'story')[0];
      // Reads Stage 1's locked storyboard directly, not Stage 2's composed
      // prompt — that text is wrapped in Flow-only image-styling
      // instructions with no narrative content, and (now read-only) can't
      // drift out of sync the way an editable field could.
      const sourceText = (state.brief && state.brief.storyboard) || '';
      if (!story) { toast('Validate the Stage 1 brief to create the Story item first'); return; }
      if (!sourceText) { toast('Add Story+Scene+Dialogues in Stage 1 first'); return; }
      btn.disabled = true;
      const stopWaitTimer = startWaitTimer(btn, SYNC_WAIT_MESSAGES);
      try {
        const result = await api.autoPopulateFromText(2, 'story', sourceText, ['characters', 'properties', 'backgrounds', 'sounds'], state.project.id);
        logDebugEntry(story, result);
        if (result.error) { toast(result.message || `Sync failed: ${result.error}`); return; }
        const hasAny = result.autoPopulate && Object.values(result.autoPopulate).some(arr => Array.isArray(arr) && arr.length);
        if (!hasAny) { toast('No characters/props/backgrounds/sounds found in the current story'); return; }
        if (result.warning) toast(result.warning);
        openAutoPopulateModal(story, result.autoPopulate);
      } catch (e) {
        toast('Sync failed — check your connection');
      } finally {
        stopWaitTimer();
        btn.disabled = false; btn.textContent = '🔄 Sync Characters/Props/Backgrounds/Sounds from Story';
      }
    });
  }

  // Stage 4's own sync button — separate from Stage 3's (which deliberately
  // excludes scenes) because scenes reference Characters/Properties/
  // Backgrounds by name, so syncing them before that cast is settled risks
  // creating scenes against names that get renamed/deleted later. Designer
  // runs this once Stage 3 is in good shape.
  function renderScenesSyncCardHtml() {
    const lock = stageLockFor(4);
    const hardDis = lock && lock.locked ? 'disabled' : '';
    const guardClass = previousStageLocked(4) ? '' : ' btn-guard-disabled';
    return `<div class="deliverable-card" style="margin-bottom:14px">
      <div class="card-section-label">🎬 Scenes from Story</div>
      <button type="button" class="btn btn-sm btn-primary${guardClass}" id="syncScenesBtn" ${hardDis}>🔄 Sync Scenes from Story</button>
      <p class="story-step-note" style="margin-top:6px">Re-reads Stage 1's locked storyboard and drafts one scene per beat for you to review — existing scenes (matched by name) are skipped.</p>
      ${previousStageGuardNote(4)}
    </div>`;
  }
  function wireScenesSyncCard() {
    const btn = document.getElementById('syncScenesBtn');
    if (!btn) return;
    btn.addEventListener('click', async () => {
      if (!previousStageLocked(4)) { toast('Lock Stage 3 first — paid and approved by the customer — before syncing Stage 4'); return; }
      const lock4 = stageLockFor(4);
      if (lock4 && lock4.locked) { toast('Stage 4 is locked — unlock it first before syncing new items.'); return; }
      if (stageItemCapReached(4)) { toast(stageItemCapMessage(4)); return; }
      const story = itemsFor(2, 'story')[0];
      const sourceText = (state.brief && state.brief.storyboard) || '';
      if (!story) { toast('Validate the Stage 1 brief to create the Story item first'); return; }
      if (!sourceText) { toast('Add Story+Scene+Dialogues in Stage 1 first'); return; }
      btn.disabled = true;
      const stopWaitTimer = startWaitTimer(btn, SYNC_WAIT_MESSAGES);
      try {
        const result = await api.autoPopulateFromText(2, 'story', sourceText, ['scenes'], state.project.id);
        logDebugEntry(story, result);
        if (result.error) { toast(result.message || `Sync failed: ${result.error}`); return; }
        const hasAny = result.autoPopulate && Object.values(result.autoPopulate).some(arr => Array.isArray(arr) && arr.length);
        if (!hasAny) { toast('No scenes found in the current story'); return; }
        if (result.warning) toast(result.warning);
        openAutoPopulateModal(story, result.autoPopulate);
      } catch (e) {
        toast('Sync failed — check your connection');
      } finally {
        stopWaitTimer();
        btn.disabled = false; btn.textContent = '🔄 Sync Scenes from Story';
      }
    });
  }

  // ---------- Shared stage-level payment card (steps 5-7: Amount/Paid/Lock) ----------
  function renderStagePaymentCardHtml(stage) {
    const lock = stageLockFor(stage);
    const isLocked = !!(lock && lock.locked);
    const hardDis = isLocked ? 'disabled' : '';
    // Soft-disabled (CSS only, still clickable) rather than the native
    // [disabled] attribute — a real disabled button never fires a click at
    // all, so the "lock the previous stage first" toast in the handler below
    // would never actually show. Once the current stage is itself locked
    // there's a separate, real reason to hard-disable (nothing left to
    // change), so that case still uses [disabled].
    const guardClass = previousStageLocked(stage) ? '' : ' btn-guard-disabled';
    const amountEntry = state.paymentLinks.find(l => l.stage === stage) || null;
    return `<div class="deliverable-card" style="margin-top:14px">
      <div class="story-step">
        <span class="story-step-num">5</span>
        <div class="story-step-body">
          <button type="button" class="btn btn-sm${guardClass}" data-stage-amount-btn ${hardDis}>💰 ${amountEntry ? 'Update Income' : 'Set Income'}</button>
          ${amountEntry ? `<span class="story-step-note">${formatRupees(amountEntry.amountPaise)}</span>` : ''}
        </div>
      </div>
      <div class="story-step">
        <span class="story-step-num">6</span>
        <div class="story-step-body">
          ${amountEntry
            ? (amountEntry.paid
                ? `<p class="story-step-note">✅ Paid ${formatRupees(amountEntry.amountPaise)}${amountEntry.paidAt ? ` on ${esc(formatIST(amountEntry.paidAt))}` : ''}</p>`
                : `<button type="button" class="btn btn-sm${guardClass}" data-stage-confirm-paid-btn ${hardDis}>✅ Confirm payment received</button>`)
            : `<p class="story-step-note">Set an amount first.</p>`}
        </div>
      </div>
      <div class="story-step">
        <span class="story-step-num">7</span>
        <div class="story-step-body">
          ${isLocked
            ? `<div class="stale-banner" style="background:var(--moss-soft);color:var(--moss);border-color:var(--moss-line)">${stage === 5 ? '🎉 Project completed' : '🔒 Validated with customer'}<button type="button" class="btn btn-sm" data-stage-unlock-btn style="margin-left:auto">🔓 Unlock to edit</button></div>`
            : `<button class="btn btn-primary${guardClass}" data-stage-lock-btn style="width:100%">${stage === 5 ? '🎉 Complete Project' : '✅ Lock this stage'}</button>`}
        </div>
      </div>
      ${previousStageGuardNote(stage)}
    </div>`;
  }
  function wireStagePaymentCard(laneId, stage) {
    const amountBtn = document.querySelector(`#${laneId} [data-stage-amount-btn]`);
    if (amountBtn) amountBtn.addEventListener('click', () => {
      if (!previousStageLocked(stage)) { toast(`Lock Stage ${stage - 1} first — paid and approved by the customer — before setting an amount here`); return; }
      const emptyItems = emptyItemsForStage(stage);
      if (emptyItems.length) { openEmptyItemsModal(stage, emptyItems, openStageAmountModal); return; }
      openStageAmountModal(stage);
    });
    const confirmPaidBtn = document.querySelector(`#${laneId} [data-stage-confirm-paid-btn]`);
    // This button only ever renders while paid is still false, so every
    // click here is, by definition, before the customer has confirmed
    // anything on their own public link — require a second click so a
    // designer doesn't mark a stage paid by an accidental single tap.
    let confirmArmed = false;
    if (confirmPaidBtn) confirmPaidBtn.addEventListener('click', async () => {
      if (!previousStageLocked(stage)) { toast(`Lock Stage ${stage - 1} first — paid and approved by the customer — before confirming payment here`); return; }
      if (!confirmArmed) {
        confirmArmed = true;
        toast("Customer hasn't confirmed payment on their link yet — click again to confirm anyway");
        return;
      }
      confirmPaidBtn.disabled = true; confirmPaidBtn.textContent = 'Saving…';
      const res = await api.confirmPaid(state.project.id, stage);
      if (res.ok) {
        const entry = state.paymentLinks.find(l => l.stage === stage);
        markPaymentLinkPaid(stage, res.paidAt);
        renderTool();
        renderProjectInfoBar();
        toast('Marked as paid');
        if (entry) celebratePayment(entry.amountPaise);
      } else {
        confirmArmed = false;
        confirmPaidBtn.disabled = false; confirmPaidBtn.textContent = '✅ Confirm payment received';
      }
    });
    const lockBtn = document.querySelector(`#${laneId} [data-stage-lock-btn]`);
    if (lockBtn) lockBtn.addEventListener('click', async () => {
      if (!previousStageLocked(stage)) { toast(`Lock Stage ${stage - 1} first — paid and approved by the customer — before locking this stage`); return; }
      const stageItems = state.items.filter(i => i.stage === stage);
      const missing = [];
      // Stage 3 specifically needs at least one Character — Properties,
      // Backgrounds, and Sounds stay fully optional (a project may
      // legitimately have none of those), so no minimum-count check for them.
      if (stage === 3 && !stageItems.some(i => i.item_key === 'character')) missing.push('add at least one Character');
      // Every item that DOES exist needs its own upload — previously this
      // only checked that SOME item in the stage had one, so locking with
      // (say) 4 of 5 characters missing their reference image went
      // unnoticed. Named explicitly so it's obvious which ones are missing.
      // (Stage 5's scene clips are excluded — see emptyItemsForStage.)
      const itemsMissingUpload = emptyItemsForStage(stage);
      if (itemsMissingUpload.length) {
        missing.push(`upload a file for ${itemsMissingUpload.map(i => `"${i.name || itemLabel(i.stage, i.item_key)}"`).join(', ')}`);
      }
      const amountEntry = state.paymentLinks.find(l => l.stage === stage) || null;
      if (!amountEntry) missing.push('set an amount');
      else if (!amountEntry.paid) missing.push('confirm payment received');
      if (missing.length) { toast(`Before locking: ${missing.join('; ')}`); return; }
      lockBtn.disabled = true;
      const res = await api.lockStage(state.project.id, stage);
      if (res.ok) {
        const others = state.stageLocks.filter(l => l.stage !== stage);
        state.stageLocks = [...others, { stage, locked: true, lockedAt: new Date().toISOString() }];
        // A Scene's Movie item is only ever created once the Scene is truly
        // final — not at Scene-creation time (that let designers start
        // editing an "approved" clip before Stage 4 was actually locked,
        // and left orphaned Scenes with no Movie pair after an unlock/edit/
        // re-lock cycle, since nothing else ever (re-)created them). Locking
        // Stage 4 is the one place that ensures every Scene has its pair.
        if (stage === 4) {
          const scenes = state.items.filter(i => i.stage === 4 && i.item_key === 'scene');
          for (const scene of scenes) {
            if (!movieFor(scene.id)) {
              await api.createItem(state.project.id, { stage: 5, itemKey: 'movie', name: `${scene.name || 'Scene'} — Final Clip`, parentItemId: scene.id });
            }
          }
          // One per project, not per scene — the designer stitches every
          // approved clip together externally and uploads the one finished
          // result here. Guarded the same way as the Movie pairing above so
          // a later unlock/edit/re-lock cycle never creates a second one.
          if (!state.items.some(i => i.stage === 5 && i.item_key === 'final_video')) {
            await api.createItem(state.project.id, { stage: 5, itemKey: 'final_video', name: 'Final Video' });
          }
          const full = await api.getProject(state.project.id);
          state.items = full.items;
        }
        renderTool();
        toast(stage === 5 ? '🎉 Project completed!' : `Stage ${stage} validated with customer`);
      } else {
        const body = await res.json().catch(() => ({}));
        toast(body.message || 'Could not lock stage');
        lockBtn.disabled = false;
      }
    });
    const unlockBtn = document.querySelector(`#${laneId} [data-stage-unlock-btn]`);
    if (unlockBtn) unlockBtn.addEventListener('click', async () => {
      // Unlocking only ever deletes stages strictly AFTER this one (never
      // this stage itself) — so unlocking Stage 5 deletes nothing at all
      // (there's no Stage 6), and shouldn't warn as if it did.
      const stagesToDelete = Array.from({ length: Math.max(0, 5 - stage) }, (_, i) => stage + 1 + i);
      if (!(await showUnlockWarningModal(stagesToDelete))) return;
      unlockBtn.disabled = true; unlockBtn.textContent = 'Unlocking…';
      const res = await api.unlockStage(state.project.id, stage);
      if (res.ok) {
        state.stageLocks = state.stageLocks.filter(l => l.stage < stage);
        state.paymentLinks = state.paymentLinks.filter(l => l.stage <= stage);
        const full = await api.getProject(state.project.id);
        state.items = full.items;
        renderTool();
        renderProjectInfoBar();
        toast(stagesToDelete.length ? `Stage ${stage} unlocked — Stage ${stagesToDelete[0]}-${stagesToDelete[stagesToDelete.length - 1]} cleared` : `Stage ${stage} unlocked`);
      } else {
        unlockBtn.disabled = false; unlockBtn.textContent = '🔓 Unlock to edit';
      }
    });
  }

  // ---------- Lane 4: Scene Blueprint (content + camera/shot fields merged) ----------
  function renderLane4() {
    const scenes = itemsFor(4, 'scene');
    const lock = stageLockFor(4);
    const capReached4 = stageItemCapReached(4);
    const addHardDis = (lock && lock.locked) || capReached4 ? 'disabled' : '';
    const addGuardClass = previousStageLocked(4) ? '' : ' btn-guard-disabled';
    const addTitleAttr = capReached4 ? ` title="${esc(stageItemCapMessage(4))}"` : '';
    return `
      <div class="lane-header">
        <div class="lane-title-row"><span class="lane-badge">4</span><span class="lane-title">Scene Blueprint</span>${earnedPillHtml(4)}${pendingPillHtml(4)}</div>
        <p class="lane-desc">Add a scene for every beat in your storyboard — content and camera/shot direction together.</p>
        ${capReached4 ? `<p class="lane-desc" style="color:var(--amber);font-weight:600">⚠ ${esc(stageItemCapMessage(4))}</p>` : ''}
        </div>
      ${renderScenesSyncCardHtml()}
      <div class="list-label-row"><span>SCENES</span><button class="btn btn-sm${addGuardClass}" id="addSceneBtn" ${addHardDis}${addTitleAttr}>+ Add scene</button></div>
      ${scenes.length ? scenes.map(s => renderNumberedItemCard(s, { deletable: true })).join('') : '<p class="empty-note">No scenes yet.</p>'}
      ${renderStagePaymentCardHtml(4)}`;
  }
  function wireLane4() {
    wireScenesSyncCard();
    const scenes = itemsFor(4, 'scene');
    scenes.forEach(s => wireItemCard(s));
    const addBtn = document.getElementById('addSceneBtn');
    if (addBtn) addBtn.addEventListener('click', async () => {
      if (!previousStageLocked(4)) { toast('Lock Stage 3 first — paid and approved by the customer — before adding scenes'); return; }
      if (stageItemCapReached(4)) { toast(stageItemCapMessage(4)); return; }
      const name = prompt('Scene name?', `Scene ${scenes.length + 1}`);
      if (!name) return;
      const created = await api.createItem(state.project.id, { stage: 4, itemKey: 'scene', name, orderIndex: scenes.length });
      if (created && created.error) { toast(created.message || 'Could not add — stage is at its item limit.'); return; }
      // No paired Movie item yet — this scene isn't final until Stage 4 is
      // locked, so its Movie item only gets created at that point (see
      // wireStagePaymentCard's lockBtn handler for stage 4).
      // Nothing but the name to match against yet at this point, but it
      // costs nothing to check — same default-picking behavior as the sync
      // flow, just usually a smaller/weaker match since there's no
      // location/action/dialogue text yet.
      const candidates = [...itemsFor(3, 'character'), ...itemsFor(3, 'property'), ...itemsFor(3, 'background')];
      const matchedRefs = suggestSceneRefs(name, candidates);
      if (matchedRefs.length) await api.updateVersion(created.id, { fields: { refs: matchedRefs } });
      const full = await api.getProject(state.project.id);
      state.items = full.items;
      renderTool();
    });
    wireStagePaymentCard('lane4', 4);
  }

  // ---------- Lane 5: Final Movie ----------
  function movieFor(sceneId) { return state.items.find(i => i.item_key === 'movie' && i.parent_item_id === sceneId); }
  function renderLane5() {
    const scenes = itemsFor(4, 'scene');
    const movies = scenes.map(s => movieFor(s.id)).filter(Boolean);
    const finalVideoItem = itemsFor(5, 'final_video')[0];
    // Movie items (and the Final Video slot) only get created once Stage 4
    // actually locks (see wireStagePaymentCard's lockBtn) — so scenes
    // existing but nothing paired yet just means Stage 4 isn't locked yet,
    // not "nothing to see," and needs its own message instead of blank space.
    let body;
    if (!scenes.length) {
      body = '<p class="empty-note">Add scenes in Stage 4 first.</p>';
    } else if (!movies.length && !finalVideoItem) {
      body = '<p class="empty-note">Lock Stage 4 first — paid and approved by the customer — before Final Movie clips appear here.</p>';
    } else {
      // Final Video is the one thing the customer's public link actually
      // downloads for this stage (see pay.ts) — shown first and clearly
      // labeled so it reads as the headline deliverable, not just another
      // item in the list. The per-scene clips below it are the designer's
      // own production reference for stitching it together, not something
      // the customer needs to see individually.
      body = `
        ${finalVideoItem ? `<div class="list-label-row"><span>🏆 Final Video — for the customer</span></div>${renderNumberedItemCard(finalVideoItem, {})}` : ''}
        <div class="list-label-row"><span>Scene clips — your own production reference</span></div>
        ${scenes.map(s => { const m = movieFor(s.id); return m ? renderNumberedItemCard(m, {}) : ''; }).join('')}
      `;
    }
    return `
      <div class="lane-header">
        <div class="lane-title-row"><span class="lane-badge">5</span><span class="lane-title">Final Movie</span>${earnedPillHtml(5)}${pendingPillHtml(5)}</div>
        <p class="lane-desc">Stitch the approved scene clips into one finished video — that's the only thing the customer downloads.</p>
        </div>
      ${body}
      ${renderStagePaymentCardHtml(5)}`;
  }
  function wireLane5() {
    const finalVideoItem = itemsFor(5, 'final_video')[0];
    if (finalVideoItem) wireItemCard(finalVideoItem);
    itemsFor(4, 'scene').forEach(s => { const m = movieFor(s.id); if (m) wireItemCard(m); });
    wireStagePaymentCard('lane5', 5);
  }

  // ---------- Minimal ZIP writer (stored/no compression, no external lib) ----------
  function crc32(data) {
    let crc = ~0;
    for (let i = 0; i < data.length; i++) {
      crc ^= data[i];
      for (let j = 0; j < 8; j++) crc = (crc >>> 1) ^ (0xEDB88320 & -(crc & 1));
    }
    return (~crc) >>> 0;
  }
  function dosDateTime() {
    const d = new Date();
    const time = ((d.getHours() << 11) | (d.getMinutes() << 5) | (d.getSeconds() >> 1)) & 0xFFFF;
    const date = (((d.getFullYear() - 1980) << 9) | ((d.getMonth() + 1) << 5) | d.getDate()) & 0xFFFF;
    return { time, date };
  }
  function buildZip(entries) {
    const encoder = new TextEncoder();
    const parts = [];
    const central = [];
    let offset = 0;
    const { time, date } = dosDateTime();
    entries.forEach(entry => {
      const nameBytes = encoder.encode(entry.name);
      const data = entry.data;
      const crc = crc32(data);
      const local = new Uint8Array(30 + nameBytes.length);
      const lv = new DataView(local.buffer);
      lv.setUint32(0, 0x04034b50, true);
      lv.setUint16(6, 0, true);
      lv.setUint16(8, 0, true);
      lv.setUint16(10, time, true);
      lv.setUint16(12, date, true);
      lv.setUint32(14, crc, true);
      lv.setUint32(18, data.length, true);
      lv.setUint32(22, data.length, true);
      lv.setUint16(26, nameBytes.length, true);
      local.set(nameBytes, 30);
      parts.push(local, data);

      const centralHeader = new Uint8Array(46 + nameBytes.length);
      const cv = new DataView(centralHeader.buffer);
      cv.setUint32(0, 0x02014b50, true);
      cv.setUint16(4, 20, true);  // version made by
      cv.setUint16(6, 20, true);  // version needed to extract
      cv.setUint16(8, 0, true);   // general purpose flag
      cv.setUint16(10, 0, true);  // compression method (0 = stored)
      cv.setUint16(12, time, true);
      cv.setUint16(14, date, true);
      cv.setUint32(16, crc, true);
      cv.setUint32(20, data.length, true);
      cv.setUint32(24, data.length, true);
      cv.setUint16(28, nameBytes.length, true);
      cv.setUint32(42, offset, true);
      centralHeader.set(nameBytes, 46);
      central.push(centralHeader);

      offset += local.length + data.length;
    });
    const centralSize = central.reduce((s, c) => s + c.length, 0);
    const end = new Uint8Array(22);
    const ev = new DataView(end.buffer);
    ev.setUint32(0, 0x06054b50, true);
    ev.setUint16(8, entries.length, true);
    ev.setUint16(10, entries.length, true);
    ev.setUint32(12, centralSize, true);
    ev.setUint32(16, offset, true);
    return new Blob([...parts, ...central, end], { type: 'application/zip' });
  }

  // ---------- Package download ----------
  function slugify(s) { return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, ''); }
  // Per-item download — this item's own prompt + this item's own must-attach
  // reference files (not its already-uploaded output, and not other items'
  // data). This is the designer's own generation tool: grab exactly what's
  // needed for this one Character/Scene/etc., go generate it in Flow, then
  // upload the result back — one item at a time, matching how it's actually used.
  async function downloadItemPackage(item, btn) {
    if (btn) { btn.disabled = true; btn.textContent = 'Building…'; }
    try {
      const version = theVersion(item);
      const fields = version.fields || {};
      const promptText = version.prompt || composeFinalPrompt(item, compilePrompt(item, fields)) || '(not generated yet)';
      const files = mustAttachFiles(item, fields);
      const entries = [{ name: 'prompt.txt', data: new TextEncoder().encode(promptText) }];
      const usedNames = new Set(['prompt.txt']);
      for (const f of files) {
        try {
          const r = await fetch(api.mediaUrl(f.key), { credentials: 'include' });
          if (!r.ok) continue;
          let name = f.fileName;
          let n = 2;
          while (usedNames.has(name)) { name = `${n}-${f.fileName}`; n++; }
          usedNames.add(name);
          entries.push({ name, data: new Uint8Array(await r.arrayBuffer()) });
        } catch (e) { /* skip a file that failed to fetch, don't block the rest */ }
      }
      const blob = buildZip(entries);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${slugify(state.project.name)}-${slugify(item.name || itemLabel(item.stage, item.item_key))}.zip`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      toast('Downloaded');
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '⬇ Download'; }
    }
  }
  // ---------- Stage amount modal (per stage — no link/URL here, that's project-level now) ----------
  // A real modal, not native prompt()/alert() — those get silently blocked by
  // several browsers when called after an await (lost user-activation).
  let stageAmountDraft = null;
  function stageHasDeliverable(stage) {
    return state.items.some(i => i.stage === stage && (theVersion(i).media_files || []).length > 0);
  }
  // Items with no file at all — no point pricing a stage that still has
  // these sitting in it, since there's nothing there to actually deliver.
  function emptyItemsForStage(stage) {
    // Stage 5's per-scene clips are the designer's own production reference
    // for stitching — the customer only ever downloads the Final Video, so
    // that's the only thing that actually needs to exist here; scene clips
    // stay optional (every other stage still requires 100% of its items,
    // since those genuinely are the deliverable there).
    return state.items.filter(i => i.stage === stage && !(stage === 5 && i.item_key === 'movie') && (theVersion(i).media_files || []).length === 0);
  }
  // Same rule the item card itself uses to decide whether its "×" delete
  // button shows (renderNumberedItemCard's opts.deletable) — Story/Movie/
  // Final Video are never deletable there, so this modal must never offer
  // to delete them either, even though they can still show up as "empty."
  function isItemDeletable(item) {
    return ['character', 'property', 'background', 'sound', 'scene'].includes(item.item_key);
  }
  // A real modal (not a toast) listing every empty item by name. Deletable
  // ones (cascades to a Scene's paired Movie via the DB's own ON DELETE
  // CASCADE) get a delete-or-cancel choice; non-deletable ones (Final
  // Video) are just shown as "still needs uploading," with no way to
  // remove them and no path to proceed until they're filled in.
  let emptyItemsDraft = null;
  function openEmptyItemsModal(stage, items, onProceed) {
    const deletable = items.filter(isItemDeletable);
    const mandatory = items.filter((i) => !isItemDeletable(i));
    emptyItemsDraft = { stage, deletable, mandatory, onProceed };
    renderEmptyItemsModal();
  }
  function closeEmptyItemsModal() {
    emptyItemsDraft = null;
    const root = document.getElementById('modalRoot');
    if (root) root.innerHTML = '';
  }
  function renderEmptyItemsModal() {
    const root = document.getElementById('modalRoot');
    if (!root || !emptyItemsDraft) { if (root) root.innerHTML = ''; return; }
    const { deletable, mandatory } = emptyItemsDraft;
    const itemLine = (i) => `<li style="display:flex;align-items:center;gap:8px;background:var(--amber-soft);border-color:var(--amber-line)">
      <span>${ITEM_THUMBS[i.item_key] || '📄'} <strong>${esc(i.name || itemLabel(i.stage, i.item_key))}</strong> <span style="color:var(--text-faint);font-weight:400">(${esc(itemLabel(i.stage, i.item_key))})</span></span>
    </li>`;
    const mandatorySection = mandatory.length ? `
      <p class="modal-sub">These still need to be uploaded before you can set an amount — they can't be removed:</p>
      <ul class="affected-list">${mandatory.map(itemLine).join('')}</ul>
    ` : '';
    const deletableSection = deletable.length ? `
      <p class="modal-sub">${mandatory.length ? 'These also have no file yet — delete them now, or cancel and upload for them first:' : "These items have no file uploaded yet — there's no point setting a price for a stage that still has empty items sitting in it. Delete them now (you can always add them back later), or cancel and upload for them first."}</p>
      <ul class="affected-list">${deletable.map(itemLine).join('')}</ul>
    ` : '';
    const footer = deletable.length
      ? `<div class="modal-footer confirm-actions">
          <button class="btn" id="emptyItemsCancelBtn">Cancel — I'll upload</button>
          <button class="btn btn-danger" id="emptyItemsDeleteBtn">Delete ${deletable.length} empty item${deletable.length === 1 ? '' : 's'}${mandatory.length ? '' : ' & continue'}</button>
        </div>`
      : `<div class="modal-footer"><button class="btn btn-primary" id="emptyItemsCancelBtn">Got it</button></div>`;
    root.innerHTML = `
      <div class="modal-overlay" id="emptyItemsModalOverlay">
        <div class="modal-card" style="max-width:440px">
          <div class="modal-head"><strong>⚠ Empty items in this stage</strong><button class="modal-close" id="emptyItemsModalCloseBtn">×</button></div>
          ${mandatorySection}
          ${deletableSection}
          ${footer}
        </div>
      </div>`;
    document.getElementById('emptyItemsModalCloseBtn').addEventListener('click', closeEmptyItemsModal);
    document.getElementById('emptyItemsModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'emptyItemsModalOverlay') closeEmptyItemsModal(); });
    document.getElementById('emptyItemsCancelBtn').addEventListener('click', closeEmptyItemsModal);
    const deleteBtn = document.getElementById('emptyItemsDeleteBtn');
    if (deleteBtn) deleteBtn.addEventListener('click', async () => {
      const { stage, deletable: toDelete, mandatory: stillMandatory, onProceed } = emptyItemsDraft;
      deleteBtn.disabled = true; deleteBtn.textContent = 'Deleting…';
      for (const it of toDelete) { await api.deleteItem(it.id); }
      const full = await api.getProject(state.project.id);
      state.items = full.items;
      closeEmptyItemsModal();
      renderTool();
      toast(`Removed ${toDelete.length} empty item${toDelete.length === 1 ? '' : 's'}`);
      if (!stillMandatory.length) onProceed(stage);
    });
  }
  function openStageAmountModal(stage) {
    if (!stageHasDeliverable(stage)) {
      toast('Amount cannot be set for this stage — no deliverable uploaded yet');
      return;
    }
    if (!state.user || !state.user.upi_id) {
      toast('Add your UPI ID first — opening Settings', true);
      openSettingsModal();
      return;
    }
    const existing = state.paymentLinks.find(l => l.stage === stage) || null;
    stageAmountDraft = { stage, entry: existing };
    renderStageAmountModal();
  }
  function closeStageAmountModal() {
    stageAmountDraft = null;
    const root = document.getElementById('modalRoot');
    if (root) root.innerHTML = '';
  }
  // A glanceable "is this still set, and roughly right" check right where a
  // designer is about to price a stage — never the full value, same
  // reasoning as the Show/Hide toggle in Settings.
  function maskUpiId(upi) {
    if (!upi) return '';
    const at = upi.indexOf('@');
    if (at === -1) return upi.length <= 2 ? upi : `${upi.slice(0, 2)}${'•'.repeat(Math.max(upi.length - 2, 3))}`;
    const id = upi.slice(0, at);
    const bank = upi.slice(at);
    const visible = id.slice(0, Math.min(3, id.length));
    return `${visible}${'•'.repeat(Math.max(id.length - visible.length, 3))}${bank}`;
  }
  function renderStageAmountModal() {
    const root = document.getElementById('modalRoot');
    if (!root || !stageAmountDraft) { if (root) root.innerHTML = ''; return; }
    const { stage, entry } = stageAmountDraft;
    // Goal Tracker context, if a goal/allocation has ever been set — this
    // modal is the moment a designer is actually pricing a stage, so it's
    // the natural place to surface "what do I usually charge" and "how far
    // am I from my goal" instead of making them go check the Goals screen.
    const summary = state.earningsSummary;
    const usualPaise = summary ? (summary.stagePricesPaise || {})[stage] || 0 : 0;
    const progress = summary ? goalProgress(summary) : null;
    const gapPaise = progress ? Math.max(0, summary.goalAmountPaise - progress.earnedSince) : null;
    const goalNote = progress
      ? (gapPaise > 0
          ? `🎯 ${formatRupees(gapPaise)} more to hit your 3-month goal (${progress.pct}% there, ${progress.daysLeft} day${progress.daysLeft === 1 ? '' : 's'} left).`
          : `🎉 You've already hit your 3-month goal of ${formatRupees(summary.goalAmountPaise)}!`)
      : '';
    // Same rule as the backend: a credit is only ever needed to open a new
    // receivable (no entry yet, or the last round was already paid) — a
    // plain renegotiation of a still-open, unpaid amount is always free.
    const credits = (state.user && state.user.free_credits_remaining) || 0;
    const isNewReceivable = !entry || !!entry.paid;
    const blocked = isNewReceivable && credits <= 0;
    const creditColor = credits <= 0 ? 'var(--crimson)' : credits <= 2 ? 'var(--amber)' : 'var(--teal)';
    const maskedUpi = maskUpiId(state.user && state.user.upi_id);
    root.innerHTML = `
      <div class="modal-overlay" id="stageAmountModalOverlay">
        <div class="modal-card" style="max-width:400px">
          <div class="modal-head"><strong>💰 Your Income — Stage ${stage}</strong><button class="modal-close" id="stageAmountModalCloseBtn">×</button></div>
          <div style="padding:16px">
            <p style="font-size:11.5px;color:var(--text-faint);margin:0 0 14px">${maskedUpi ? `Your income goes to this UPI ID: <strong style="color:var(--text)">${esc(maskedUpi)}</strong>` : '⚠ No UPI ID set'}</p>
            ${blocked ? `
              <p style="font-size:13px;margin-bottom:14px">You're out of income credits — buy more to price this stage.</p>
              <button class="btn btn-primary" id="stageAmountBuyCreditsBtn" style="width:100%">Buy Income Credits</button>
            ` : `
              ${usualPaise > 0 ? `<div class="pill-row" style="margin-bottom:10px">
                <button type="button" class="pill" data-amount-pill="${usualPaise}">Usual for this stage — ${formatRupees(usualPaise)}</button>
              </div>` : ''}
              <div class="field">
                <label for="stageAmountInput">Amount to charge (₹)</label>
                <input id="stageAmountInput" type="number" min="1" step="0.01" value="${entry ? (entry.amountPaise / 100) : ''}" placeholder="e.g. 1500">
              </div>
              ${entry ? `<p style="font-size:12.5px;color:var(--text-faint);margin:6px 0 4px">${entry.paid ? `✅ Marked as paid${entry.paidAt ? ` on ${esc(formatIST(entry.paidAt))}` : ''}` : 'Not marked paid yet'}</p>` : ''}
              ${goalNote ? `<p class="story-step-note" style="margin-top:6px">${goalNote}</p>` : ''}
              <p style="font-size:11px;color:var(--text-faint);margin-top:8px">${isNewReceivable ? 'Setting this amount uses 1 income credit — used once you set the price, whether or not the customer actually pays it.' : "Renegotiating this still-open amount doesn't use another credit."}</p>
              ${isNewReceivable && credits > 0 && credits <= 2 ? `<p style="font-size:11px;color:var(--amber);margin-top:4px">⚠ Only ${credits} credit${credits === 1 ? '' : 's'} left — buy more before you run out.</p>` : ''}
              <button class="btn btn-primary" id="stageAmountSaveBtn" style="width:100%;margin-top:8px">${entry ? 'Update Income' : 'Set Income'}</button>
            `}
            <p style="font-size:11px;font-weight:700;color:${creditColor};text-align:right;margin:14px 0 0">💳 ${credits} income credit${credits === 1 ? '' : 's'} remaining</p>
          </div>
        </div>
      </div>`;
    document.getElementById('stageAmountModalCloseBtn').addEventListener('click', closeStageAmountModal);
    document.getElementById('stageAmountModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'stageAmountModalOverlay') closeStageAmountModal(); });
    if (blocked) {
      document.getElementById('stageAmountBuyCreditsBtn').addEventListener('click', () => {
        closeStageAmountModal();
        openBuyCreditsModal();
      });
      return;
    }
    document.querySelectorAll('[data-amount-pill]').forEach(el => el.addEventListener('click', () => {
      document.getElementById('stageAmountInput').value = (Number(el.getAttribute('data-amount-pill')) / 100).toString();
    }));
    document.getElementById('stageAmountSaveBtn').addEventListener('click', async () => {
      const amountRupees = parseFloat(document.getElementById('stageAmountInput').value);
      if (!amountRupees || amountRupees <= 0) { toast('Enter a valid amount', true); return; }
      const saveBtn = document.getElementById('stageAmountSaveBtn');
      saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
      const amountPaise = Math.round(amountRupees * 100);
      const res = await api.setStageAmount(state.project.id, stage, amountPaise);
      if (res.amountPaise === undefined) {
        toast(res.message || 'Could not save amount', true);
        saveBtn.disabled = false; saveBtn.textContent = entry ? 'Update Income' : 'Set Income';
        if (res.error === 'out_of_credits') renderStageAmountModal();
        return;
      }
      if (state.user) state.user.free_credits_remaining = res.freeCreditsRemaining;
      const wasResetPaid = entry && entry.paid && !res.paid;
      const others = state.paymentLinks.filter(l => l.stage !== stage);
      // Repricing never touches earnings_log, so any earlier rounds for this
      // stage are carried over untouched — only the current round's amount
      // and paid-flag actually change.
      state.paymentLinks = [...others, {
        stage, amountPaise, paid: !!res.paid, paidAt: res.paidAt || null,
        totalPaidPaise: entry ? (entry.totalPaidPaise || 0) : 0,
        payments: entry ? (entry.payments || []) : [],
      }];
      closeStageAmountModal();
      renderTool();
      renderProjectInfoBar();
      toast(wasResetPaid ? 'Amount updated — paid status reset, customer needs to reconfirm' : (entry ? 'Amount updated' : 'Amount set'));
    });
  }

  // ---------- Project-level payment link modal (one link, always exists) ----------
  // One click, not a modal detour: opens the customer's payment page
  // directly in a new tab (also copies the URL, so it's on the clipboard
  // ready to paste into a message to the customer if that's the actual goal).
  function openCustomerPaymentLink() {
    if (!state.user || !state.user.upi_id) {
      toast('Add your UPI ID first — opening Settings', true);
      openSettingsModal();
      return;
    }
    if (!state.paymentLink) { toast('No payment link for this project yet'); return; }
    navigator.clipboard.writeText(state.paymentLink.url).catch(() => {});
    window.open(state.paymentLink.url, '_blank', 'noopener');
    toast('Opened the customer payment link (also copied to clipboard)');
  }

  // ---------- Top-level render ----------
  async function renderTool() {
    const wrap = document.getElementById('swimlaneWrap');
    // Rebuilding innerHTML resets scroll position on every affected element —
    // snapshot before, restore after, so picking a color/pill mid-scroll
    // doesn't snap the view back to the top of the lane (or back to lane 1).
    const prevWrapScroll = wrap.scrollLeft;
    const prevLaneScroll = {};
    for (let n = 1; n <= 5; n++) {
      const el = document.getElementById('lane' + n);
      if (el) prevLaneScroll[n] = el.scrollTop;
    }

    const activeStage = currentActiveStage();
    wrap.innerHTML = [1, 2, 3, 4, 5].map(n => `<div class="lane${n === activeStage ? ' active' : ''}" id="lane${n}" style="${n === activeStage ? `border-top-color:${STAGE_COLORS[n]}` : ''}"></div>`).join('');
    document.getElementById('lane1').innerHTML = renderLane1(); wireLane1();
    document.getElementById('lane2').innerHTML = renderLane2(); wireLane2();
    document.getElementById('lane3').innerHTML = renderLane3(); wireLane3();
    document.getElementById('lane4').innerHTML = renderLane4(); wireLane4();
    document.getElementById('lane5').innerHTML = renderLane5(); wireLane5();
    // Badge injected post-render rather than threaded through each
    // renderLaneN's return value — every lane already renders its own
    // ".lane-title-row" independently, so this is the one shared place that
    // knows which stage is actually active.
    const activeTitleRow = document.querySelector(`#lane${activeStage} .lane-title-row`);
    if (activeTitleRow) {
      // The earned-pill (stages 2-5) already carries margin-left:auto to
      // push itself flush right — a second auto margin on this badge would
      // split the free space between the two instead of just sitting next
      // to it, so only fall back to auto when there's no earned-pill.
      const margin = activeTitleRow.querySelector('.earned-pill') ? '6px' : 'auto';
      activeTitleRow.insertAdjacentHTML('beforeend', `<span class="current-stage-badge" style="background:${STAGE_COLORS[activeStage]};margin-left:${margin}">● Current</span>`);
    }

    wrap.scrollLeft = prevWrapScroll;
    for (let n = 1; n <= 5; n++) {
      const el = document.getElementById('lane' + n);
      if (el && prevLaneScroll[n]) el.scrollTop = prevLaneScroll[n];
    }
    // One delegated wiring for all 5 lanes' earned-pills, rather than
    // repeating it inside each wireLaneN — the pill's own click just opens
    // the payment history for whichever stage it's on.
    document.querySelectorAll('[data-stage-earned-pill]').forEach(el => el.addEventListener('click', (e) => {
      e.stopPropagation();
      showStagePaymentHistoryModal(Number(el.getAttribute('data-stage-earned-pill')));
    }));
  }

  function goToGoalsScreen() {
    // ?screen=goals (not a bare pathname reset) so a refresh on this page
    // reopens Goals instead of falling through boot()'s projects-list default.
    history.replaceState(null, '', `${location.pathname}?screen=goals`);
    state.screen = 'goals';
    renderApp();
  }
  function goToProjectsScreen() {
    history.replaceState(null, '', location.pathname);
    state.screen = 'projects';
    renderApp();
  }
  function goToShowcaseScreen() {
    // ?screen=showcase (not a bare pathname reset) so a refresh on this page
    // reopens Showcase instead of falling through boot()'s projects-list default.
    history.replaceState(null, '', `${location.pathname}?screen=showcase`);
    state.screen = 'showcase';
    renderApp();
  }
  function renderTopbar() {
    // Contextual: show "🎯 Goals" everywhere EXCEPT on the Goals screen
    // itself, where it'd be a no-op link back to the page you're already
    // on — show "All Projects" there instead, same as the in-project view.
    const goalsOrHomeBtn = state.screen === 'goals'
      ? `<button class="btn btn-sm" id="goalsHomeBtn">All Projects</button>`
      : `<button class="btn btn-sm" id="goalsNavBtn">💰 Income Tracker</button>`;
    // Same contextual pattern for the Showcase screen.
    const showcaseOrHomeBtn = state.screen === 'showcase'
      ? `<button class="btn btn-sm" id="showcaseHomeBtn">All Projects</button>`
      : `<button class="btn btn-sm" id="showcaseNavBtn">🖼 Showcase</button>`;
    document.getElementById('topbar').innerHTML = `
      <div class="topbar-title" id="topbarHomeLink" style="cursor:pointer">
        <span class="mark">💸</span>
        <div><h1>StagePay <span class="beta-badge">Beta</span></h1><p>Get paid every stage. Never work for free.</p></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        ${state.project ? `<button class="btn btn-sm" id="backToProjectsBtn">All Projects</button>` : ''}
        ${state.user ? `${goalsOrHomeBtn}${showcaseOrHomeBtn}<button class="btn btn-sm" id="settingsBtn">⚙ Settings</button><div class="user-chip">${state.user.avatar_url ? `<img src="${esc(state.user.avatar_url)}">` : ''}<span>${esc(state.user.name)}</span></div><button class="btn btn-sm" id="logoutBtn">Log out</button>` : ''}
      </div>`;
    const topbarHomeLink = document.getElementById('topbarHomeLink');
    if (topbarHomeLink && state.user) topbarHomeLink.addEventListener('click', goToProjectsScreen);
    const goalsNavBtn = document.getElementById('goalsNavBtn');
    if (goalsNavBtn) goalsNavBtn.addEventListener('click', goToGoalsScreen);
    const goalsHomeBtn = document.getElementById('goalsHomeBtn');
    if (goalsHomeBtn) goalsHomeBtn.addEventListener('click', goToProjectsScreen);
    const showcaseNavBtn = document.getElementById('showcaseNavBtn');
    if (showcaseNavBtn) showcaseNavBtn.addEventListener('click', goToShowcaseScreen);
    const showcaseHomeBtn = document.getElementById('showcaseHomeBtn');
    if (showcaseHomeBtn) showcaseHomeBtn.addEventListener('click', goToProjectsScreen);
    if (state.project) {
      document.getElementById('backToProjectsBtn').addEventListener('click', goToProjectsScreen);
    }
    if (state.user) {
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await api.logout();
        // state.project (and everything scoped to it) was never cleared here —
        // renderTopbar() only keys off state.project, not state.user, so the
        // "All Projects" button kept showing after logout even with no user
        // at all. Full reset, not just the user.
        state.user = null;
        state.project = null;
        state.brief = null;
        state.items = [];
        state.stageConfigs = {};
        state.paymentLink = null;
        state.stageLocks = [];
        state.paymentLinks = [];
        history.replaceState(null, '', location.pathname);
        state.screen = 'login';
        renderApp();
      });
      document.getElementById('settingsBtn').addEventListener('click', openSettingsModal);
    }
  }

  // ---------- Project info bar (name/dates/total earned — distinct from the app-level topbar) ----------
  // Server-computed from earnings_log, not derived from state.paymentLinks —
  // this must keep counting money already earned even after an earlier
  // stage gets unlocked and payment_link_stages resets for everything after
  // it. See pay.ts's logEarning/earnings_log for why.
  function totalEarnedPaise() {
    return (state.paymentLink && state.paymentLink.totalEarnedPaise) || 0;
  }
  function renderProjectInfoBar() {
    const root = document.getElementById('projectInfoBar');
    if (!root) return;
    if (!state.project) { root.innerHTML = ''; return; }
    const p = state.project;
    const total = totalEarnedPaise();
    root.innerHTML = `
      <div>
        ${state.renamingProject
          ? `<input type="text" id="projectInfoNameInput" class="project-info-name-input" value="${esc(p.name)}">`
          : `<span class="project-info-name" id="projectInfoNameLabel" title="Click to rename">${esc(p.name)}</span><button type="button" class="item-rename-btn" id="projectInfoRenameBtn" title="Rename">✏️</button>`}
      </div>
      <div class="project-info-meta">
        <span>Created: <strong>${formatISTWithRelative(p.created_at)}</strong></span>
        <span>Updated: <strong>${formatISTWithRelative(p.updated_at)}</strong></span>
        ${total > 0 ? `<span class="project-earned-pill lg">💰 ${formatRupees(total)} earned</span>` : ''}
        <button type="button" class="btn btn-sm" id="projectInfoMoodboardBtn">🖼 Moodboard</button>
        <button type="button" class="btn btn-sm btn-primary" id="projectInfoPayLinkBtn">💳 Open customer payment link</button>
      </div>`;
    if (state.renamingProject) {
      const input = document.getElementById('projectInfoNameInput');
      input.focus(); input.select();
      const save = async () => {
        if (!state.renamingProject) return;
        state.renamingProject = false;
        const newName = input.value.trim();
        if (newName && newName !== state.project.name) {
          state.project.name = newName;
          await api.updateProject(state.project.id, { name: newName });
        }
        renderProjectInfoBar();
      };
      input.addEventListener('blur', save);
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') input.blur(); });
    } else {
      const startRename = () => { state.renamingProject = true; renderProjectInfoBar(); };
      const label = document.getElementById('projectInfoNameLabel');
      if (label) label.addEventListener('click', startRename);
      const renameBtn = document.getElementById('projectInfoRenameBtn');
      if (renameBtn) renameBtn.addEventListener('click', startRename);
    }
    const payLinkBtn = document.getElementById('projectInfoPayLinkBtn');
    if (payLinkBtn) payLinkBtn.addEventListener('click', openCustomerPaymentLink);
    const moodboardBtn = document.getElementById('projectInfoMoodboardBtn');
    if (moodboardBtn) moodboardBtn.addEventListener('click', () => {
      state.screen = 'moodboard';
      renderApp();
    });
  }

  // ---------- Settings modal (UPI ID, used on every payment link's QR) ----------
  async function openSettingsModal() {
    const root = document.getElementById('modalRoot');
    if (!root) return;
    // Credits can change server-side between page load and now (an admin
    // approving a purchase request, e.g.) — refetch rather than trusting
    // whatever balance was true when the app first booted.
    const fresh = await api.me();
    if (fresh) state.user = fresh;
    root.innerHTML = `
      <div class="modal-overlay" id="settingsModalOverlay">
        <div class="modal-card" style="max-width:420px">
          <div class="modal-head"><strong>⚙ Settings</strong><button class="modal-close" id="settingsModalCloseBtn">×</button></div>
          <div class="field" style="padding:16px 16px 0">
            <label for="settingsName">Your name</label>
            <input id="settingsName" type="text" placeholder="Your name" value="${esc(state.user.name || '')}" maxlength="100">
            <p style="font-size:11.5px;color:var(--text-faint);margin-top:6px">Only ever set once, from your Google account at signup — fix it here if it was wrong or has changed.</p>
          </div>
          <div class="field" style="padding:16px">
            <label for="settingsUpiId">Your UPI ID</label>
            <div style="display:flex;gap:8px">
              <input id="settingsUpiId" type="password" placeholder="yourname@bank" value="${esc(state.user.upi_id || '')}" maxlength="50" style="flex:1">
              <button type="button" class="btn btn-sm" id="settingsUpiRevealBtn">👁 Show</button>
            </div>
            <p style="font-size:11.5px;color:var(--text-faint);margin-top:6px">Used to build the payment QR code on every stage's payment link. One UPI ID per account.</p>
          </div>
          <div class="field" style="padding:0 16px 16px;border-top:1px solid var(--line-soft);padding-top:16px">
            <label>Income Credits</label>
            <p style="font-size:13px;font-weight:700;margin:2px 0 8px">💳 ${state.user.free_credits_remaining ?? 0} remaining</p>
            <button class="btn btn-sm" id="settingsBuyCreditsBtn">Buy more income credits</button>
          </div>
          <div style="display:flex;justify-content:flex-end;gap:8px;padding:0 16px 16px">
            <button class="btn btn-primary" id="settingsSaveBtn">Save</button>
          </div>
        </div>
      </div>`;
    document.getElementById('settingsModalCloseBtn').addEventListener('click', closeSettingsModal);
    document.getElementById('settingsModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'settingsModalOverlay') closeSettingsModal(); });
    document.getElementById('settingsBuyCreditsBtn').addEventListener('click', () => {
      closeSettingsModal();
      openBuyCreditsModal();
    });
    document.getElementById('settingsUpiRevealBtn').addEventListener('click', () => {
      const input = document.getElementById('settingsUpiId');
      const btn = document.getElementById('settingsUpiRevealBtn');
      const revealed = input.type === 'text';
      input.type = revealed ? 'password' : 'text';
      btn.textContent = revealed ? '👁 Show' : '🙈 Hide';
    });
    document.getElementById('settingsSaveBtn').addEventListener('click', async () => {
      const btn = document.getElementById('settingsSaveBtn');
      const name = document.getElementById('settingsName').value.trim();
      const upiId = document.getElementById('settingsUpiId').value.trim();
      if (!name) { toast('Name cannot be empty', true); return; }
      if (!upiId) { toast('UPI ID cannot be empty', true); return; }
      if (!/^[\w.-]{2,256}@[a-zA-Z]{2,64}$/.test(upiId)) {
        toast('That doesn’t look like a valid UPI ID — expected format: name@bank', true);
        return;
      }
      btn.disabled = true; btn.textContent = 'Saving…';
      const res = await api.updateMe({ name, upiId });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        toast(body.message || 'Failed to save settings', true);
        btn.disabled = false; btn.textContent = 'Save';
        return;
      }
      state.user.name = name;
      state.user.upi_id = upiId;
      closeSettingsModal();
      renderTopbar();
      toast('Settings saved');
    });
  }
  function closeSettingsModal() {
    const root = document.getElementById('modalRoot');
    if (root) root.innerHTML = '';
  }

  // StagePay's swimlane/canvas UI genuinely doesn't work at phone widths —
  // rather than ship a half-broken mobile layout, block the actual sign-in
  // and say so plainly. The marketing page above still renders fine on
  // mobile, so only the login action itself is gated, not the whole screen.
  function wireLoginScreen() {
    document.querySelectorAll('[data-login-link]').forEach(link => {
      link.addEventListener('click', (e) => {
        if (window.matchMedia('(max-width: 860px)').matches) {
          e.preventDefault();
          showDesktopOnlyModal();
        }
      });
    });
    document.querySelectorAll('[data-landing-lang]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.landingLang = btn.getAttribute('data-landing-lang');
        try { localStorage.setItem('stagepayLandingLang', state.landingLang); } catch {}
        renderLoginScreen();
      });
    });
  }
  function showDesktopOnlyModal() {
    const root = document.getElementById('modalRoot');
    if (!root) return;

      <div class="modal-overlay" id="desktopOnlyOverlay">

            <button class="btn btn-primary" id="desktopOnlyOkBtn">Got it</button>
          </div>
        </div>
      </div>`;
    const close = () => { root.innerHTML = ''; };
    document.getElementById('desktopOnlyCloseBtn').addEventListener('click', close);

  // ---------- Buy Income Credits modal ----------
  const CREDIT_PACKS = [[5, 24500], [10, 49000]];
  let buyCreditsDraft = null;
  async function openBuyCreditsModal() {
    const data = await api.getCredits();
    buyCreditsDraft = { ...data, selectedPack: null };
    renderBuyCreditsModal();
  }
  function closeBuyCreditsModal() {
    buyCreditsDraft = null;
    const root = document.getElementById('modalRoot');
    if (root) root.innerHTML = '';
  }
  function renderBuyCreditsModal() {
    const root = document.getElementById('modalRoot');
    if (!root || !buyCreditsDraft) { if (root) root.innerHTML = ''; return; }
    const { freeCreditsRemaining, adminUpiId, requests, selectedPack } = buyCreditsDraft;
    root.innerHTML = `
      <div class="modal-overlay" id="buyCreditsOverlay">
        <div class="modal-card" style="max-width:420px">
          <div class="modal-head"><strong>💳 Buy Income Credits</strong><button class="modal-close" id="buyCreditsCloseBtn">×</button></div>
          <div style="padding:16px">
            <p style="font-size:13px;margin:0 0 12px">You have <strong>${freeCreditsRemaining}</strong> credit${freeCreditsRemaining === 1 ? '' : 's'} remaining.</p>
            <div class="credit-pack-row">
              ${CREDIT_PACKS.map(([count, paise]) => `
                <div class="credit-pack ${selectedPack === count ? 'selected' : ''}" data-credit-pack="${count}">
                  <div class="credit-pack-count">${count} credits</div>
                  <div class="credit-pack-price">₹${(paise / 100).toFixed(0)}</div>
                </div>`).join('')}
            </div>
            ${selectedPack ? `
              <div style="border-top:1px solid var(--line-soft);padding-top:14px;margin-top:6px">
                <p style="font-size:13px;margin:0 0 10px">Pay ₹${(CREDIT_PACKS.find((p) => p[0] === selectedPack)[1] / 100).toFixed(0)} to this UPI ID:</p>
                <div id="buyCreditsQrWrap" style="text-align:center;margin-bottom:10px"><p>Generating QR…</p></div>
                <p style="text-align:center;font-size:13px;font-weight:700">${esc(adminUpiId || 'UPI ID not set up yet')}</p>
                <div class="field" style="margin-top:14px">
                  <label for="buyCreditsUtr">UTR / reference number</label>
                  <input id="buyCreditsUtr" type="text" placeholder="e.g. 402913887561" maxlength="100">
                </div>
                <button class="btn btn-primary" id="buyCreditsSubmitBtn" style="width:100%">Submit for Verification</button>
              </div>` : ''}
            ${requests.length ? `
              <div style="border-top:1px solid var(--line-soft);padding-top:14px;margin-top:14px">
                <p style="font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.04em;margin:0 0 6px">Your requests</p>
                ${requests.map((r) => `
                  <div class="credit-request-row">
                    <span>${r.pack_size} credits · ₹${(r.amount_paise / 100).toFixed(0)}</span>
                    <span class="credit-status ${r.status}">${esc(r.status)}</span>
                  </div>`).join('')}
              </div>` : ''}
          </div>
        </div>
      </div>`;
    document.getElementById('buyCreditsCloseBtn').addEventListener('click', closeBuyCreditsModal);
    document.getElementById('buyCreditsOverlay').addEventListener('click', (e) => { if (e.target.id === 'buyCreditsOverlay') closeBuyCreditsModal(); });
    document.querySelectorAll('[data-credit-pack]').forEach((el) => el.addEventListener('click', () => {
      buyCreditsDraft.selectedPack = Number(el.getAttribute('data-credit-pack'));
      renderBuyCreditsModal();
    }));
    if (!selectedPack) return;
    const amountRupees = CREDIT_PACKS.find((p) => p[0] === selectedPack)[1] / 100;
    const qrWrap = document.getElementById('buyCreditsQrWrap');
    if (qrWrap && adminUpiId) {
      const upiLink = buildUpiLink({ upiId: adminUpiId, payeeName: 'StagePay', amountRupees, note: `${selectedPack} income credits` });
      import('https://cdn.jsdelivr.net/npm/qrcode@1.5.4/+esm')
        .then(({ default: QRCode }) => QRCode.toDataURL(upiLink, { width: 200, margin: 1 }))
        .then((dataUrl) => { qrWrap.innerHTML = `<img src="${dataUrl}" width="200" height="200" alt="UPI payment QR code">`; })
        .catch(() => { qrWrap.innerHTML = '<p>Could not generate QR code.</p>'; });
    } else if (qrWrap) {
      qrWrap.innerHTML = '<p>Admin UPI ID not set up yet — contact support directly.</p>';
    }
    document.getElementById('buyCreditsSubmitBtn').addEventListener('click', async () => {
      const utr = document.getElementById('buyCreditsUtr').value.trim();
      if (!utr) { toast('Enter your UTR / reference number', true); return; }
      const btn = document.getElementById('buyCreditsSubmitBtn');
      btn.disabled = true; btn.textContent = 'Submitting…';
      const { ok, body } = await api.requestCreditPurchase(selectedPack, utr);
      if (!ok) {
        toast(body.message || 'Could not submit request', true);
        btn.disabled = false; btn.textContent = 'Submit for Verification';
        return;
      }
      toast('Submitted — usually verified within a few hours');
      const fresh = await api.getCredits();
      buyCreditsDraft = { ...fresh, selectedPack: null };
      renderBuyCreditsModal();
    });
  }

  // ---------- Projects screen ----------
  // ---------- Goal Tracker (projects screen — across all projects, not per-project) ----------
  function monthsAgoDate(n) {
    const d = new Date();
    d.setMonth(d.getMonth() - n);
    return d;
  }
  function parseUtc(sqliteUtcString) {
    return new Date(sqliteUtcString.replace(' ', 'T') + 'Z');
  }
  function earningsInRange(entries, months) {
    const cutoff = monthsAgoDate(months);
    return entries.filter(e => parseUtc(e.paidAt) >= cutoff).reduce((sum, e) => sum + e.amountPaise, 0);
  }
  // Oldest-first monthly buckets for the last N calendar months, for the
  // simple bar chart — zero-filled for months with no earnings at all.
  function monthlyBuckets(entries, months) {
    const now = new Date();
    const buckets = [];
    for (let i = months - 1; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      buckets.push({ label: d.toLocaleDateString('en-US', { month: 'short' }), key: `${d.getFullYear()}-${d.getMonth()}`, paise: 0 });
    }
    const byKey = new Map(buckets.map(b => [b.key, b]));
    for (const e of entries) {
      const d = parseUtc(e.paidAt);
      const bucket = byKey.get(`${d.getFullYear()}-${d.getMonth()}`);
      if (bucket) bucket.paise += e.amountPaise;
    }
    return buckets;
  }
  // Same monthly buckets as above, but split by stage — which stage earned
  // what in a given month, not just the month's total.
  function monthlyStageBuckets(entries, months) {
    const now = new Date();
    const buckets = [];
    for (let i = months - 1; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      buckets.push({ label: d.toLocaleDateString('en-US', { month: 'short' }), key: `${d.getFullYear()}-${d.getMonth()}`, byStage: { 2: 0, 3: 0, 4: 0, 5: 0 }, total: 0 });
    }
    const byKey = new Map(buckets.map(b => [b.key, b]));
    for (const e of entries) {
      const d = parseUtc(e.paidAt);
      const bucket = byKey.get(`${d.getFullYear()}-${d.getMonth()}`);
      if (bucket && bucket.byStage[e.stage] !== undefined) {
        bucket.byStage[e.stage] += e.amountPaise;
        bucket.total += e.amountPaise;
      }
    }
    return buckets;
  }
  // Default slider position when no goal has been set yet — based on the
  // last 3 months' actual pace, rounded to a clean number; a sensible flat
  // default when there's no history at all yet to base a suggestion on.
  function suggestedGoalPaise(entries) {
    const last3 = earningsInRange(entries, 3);
    if (last3 > 0) return Math.max(500, Math.round((last3 / 100) / 500) * 500) * 100;
    return 500000;
  }
  // Progress is always measured from goalSetAt (rolling 3-month window that
  // restarts whenever the goal is changed) — null if no goal has ever been set.
  function goalProgress(summary) {
    if (!summary.goalAmountPaise || !summary.goalSetAt) return null;
    const setAt = parseUtc(summary.goalSetAt);
    const earnedSince = summary.entries.filter(e => parseUtc(e.paidAt) >= setAt).reduce((sum, e) => sum + e.amountPaise, 0);
    const deadline = new Date(setAt.getTime() + 90 * 24 * 60 * 60 * 1000);
    const daysLeft = Math.max(0, Math.ceil((deadline - new Date()) / (24 * 60 * 60 * 1000)));
    const pct = Math.min(100, Math.round((earnedSince / summary.goalAmountPaise) * 100));
    return { earnedSince, pct, daysLeft };
  }
  // The one goal-related thing shown outside the Goals screen itself — a
  // glanceable strip at the top of the projects list, not a second

  function renderGoalStrip(summary) {
    const progress = goalProgress(summary);
    if (!progress) {
      return `<a class="goal-strip" href="#" id="goalStripLink">

    const goalReached = progress.pct >= 100;
