  // ---------- Minimal ZIP writer (stored/no compression, no external lib) ----------
  function crc32(data) {
    let crc = ~0;
    for (let i = 0; i < data.length; i++) {
      crc ^= data[i];
      for (let j = 0; j < 8; j++) crc = (crc >>> 1) ^ (0xEDB88320 & -(crc & 1));
    }
    return (~crc) >>> 0;
  }
  function dosDateTime() {
    const d = new Date();
    const time = ((d.getHours() << 11) | (d.getMinutes() << 5) | (d.getSeconds() >> 1)) & 0xFFFF;
    const date = (((d.getFullYear() - 1980) << 9) | ((d.getMonth() + 1) << 5) | d.getDate()) & 0xFFFF;
    return { time, date };
  }
  function buildZip(entries) {
    const encoder = new TextEncoder();
    const parts = [];
    const central = [];
    let offset = 0;
    const { time, date } = dosDateTime();
    entries.forEach(entry => {
      const nameBytes = encoder.encode(entry.name);
      const data = entry.data;
      const crc = crc32(data);
      const local = new Uint8Array(30 + nameBytes.length);
      const lv = new DataView(local.buffer);
      lv.setUint32(0, 0x04034b50, true);
      lv.setUint16(6, 0, true);
      lv.setUint16(8, 0, true);
      lv.setUint16(10, time, true);
      lv.setUint16(12, date, true);
      lv.setUint32(14, crc, true);
      lv.setUint32(18, data.length, true);
      lv.setUint32(22, data.length, true);
      lv.setUint16(26, nameBytes.length, true);
      local.set(nameBytes, 30);
      parts.push(local, data);

      const centralHeader = new Uint8Array(46 + nameBytes.length);
      const cv = new DataView(centralHeader.buffer);
      cv.setUint32(0, 0x02014b50, true);
      cv.setUint16(4, 20, true);  // version made by
      cv.setUint16(6, 20, true);  // version needed to extract
      cv.setUint16(8, 0, true);   // general purpose flag
      cv.setUint16(10, 0, true);  // compression method (0 = stored)
      cv.setUint16(12, time, true);
      cv.setUint16(14, date, true);
      cv.setUint32(16, crc, true);
      cv.setUint32(20, data.length, true);
      cv.setUint32(24, data.length, true);
      cv.setUint16(28, nameBytes.length, true);
      cv.setUint32(42, offset, true);
      centralHeader.set(nameBytes, 46);
      central.push(centralHeader);

      offset += local.length + data.length;
    });
    const centralSize = central.reduce((s, c) => s + c.length, 0);
    const end = new Uint8Array(22);
    const ev = new DataView(end.buffer);
    ev.setUint32(0, 0x06054b50, true);
    ev.setUint16(8, entries.length, true);
    ev.setUint16(10, entries.length, true);
    ev.setUint32(12, centralSize, true);
    ev.setUint32(16, offset, true);
    return new Blob([...parts, ...central, end], { type: 'application/zip' });
  }

  // ---------- Stage prompt + package download ----------
  function slugify(s) { return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, ''); }
  function stagePromptText(stage, laneTitle) {
    // Stage 1 has no items/prompts of its own — use the exact same full
    // markdown as "Copy as Markdown" (every field, not the one-paragraph
    // summary used to feed other prompts) so the downloaded package actually
    // has everything the client gave, matching what the button implies.
    if (stage === 1) return briefMarkdown();
    const items = state.items.filter(i => i.stage === stage);
    if (!items.length) return `${laneTitle}\n\n(No items yet.)`;
    const sections = items.map(it => `## ${it.name || itemLabel(it.stage, it.item_key)}\n${theVersion(it).prompt || composeFinalPrompt(it, compilePrompt(it))}`);
    return `${laneTitle}\n\n${sections.join('\n\n')}`;
  }
  function stageMediaFiles(stage) {
    if (stage === 1) {
      const b = state.brief;
      const files = [];
      if (b.logo_media && b.logo_media.key) files.push(b.logo_media);
      (b.product_photos || []).forEach(p => files.push(p));
      return files;
    }
    const files = [];
    const seenKeys = new Set();
    const add = (f) => { if (f && f.key && !seenKeys.has(f.key)) { seenKeys.add(f.key); files.push(f); } };
    state.items.filter(i => i.stage === stage).forEach(it => {
      const fields = theVersion(it).fields || {};
      // Both the item's own uploaded output AND whatever it must attach from
      // earlier stages — the same file set mustAttachHtml shows as red chips,
      // so the package actually has everything needed to regenerate this in Flow.
      mustAttachFiles(it, fields).forEach(add);
      (theVersion(it).media_files || []).forEach(add);
    });
    return files;
  }
  async function downloadStagePackage(stage, laneTitle, btn) {
    if (btn) { btn.disabled = true; btn.textContent = 'Building…'; }
    try {
      const promptText = stagePromptText(stage, laneTitle);
      const promptFileName = stage === 1 ? 'brief.md' : 'prompt.txt';
      const files = stageMediaFiles(stage);
      const entries = [{ name: promptFileName, data: new TextEncoder().encode(promptText) }];
      const usedNames = new Set([promptFileName]);
      for (const f of files) {
        try {
          const r = await fetch(api.mediaUrl(f.key), { credentials: 'include' });
          if (!r.ok) continue;
          let name = f.fileName;
          let n = 2;
          while (usedNames.has(name)) { name = `${n}-${f.fileName}`; n++; }
          usedNames.add(name);
          entries.push({ name, data: new Uint8Array(await r.arrayBuffer()) });
        } catch (e) { /* skip a file that failed to fetch, don't block the rest */ }
      }
      const blob = buildZip(entries);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `stage${stage}-${slugify(laneTitle)}.zip`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      toast('Downloaded');
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '⬇ Download stage package'; }
    }
  }
  // Per-item download — this item's own prompt + this item's own must-attach
  // reference files (not its already-uploaded output, and not other items'
  // data). This is the designer's own generation tool: grab exactly what's
  // needed for this one Character/Scene/etc., go generate it in Flow, then
  // upload the result back — one item at a time, matching how it's actually used.
  async function downloadItemPackage(item, btn) {
    if (btn) { btn.disabled = true; btn.textContent = 'Building…'; }
    try {
      const version = theVersion(item);
      const fields = version.fields || {};
      const promptText = version.prompt || composeFinalPrompt(item, compilePrompt(item, fields)) || '(not generated yet)';
      const files = mustAttachFiles(item, fields);
      const entries = [{ name: 'prompt.txt', data: new TextEncoder().encode(promptText) }];
      const usedNames = new Set(['prompt.txt']);
      for (const f of files) {
        try {
          const r = await fetch(api.mediaUrl(f.key), { credentials: 'include' });
          if (!r.ok) continue;
          let name = f.fileName;
          let n = 2;
          while (usedNames.has(name)) { name = `${n}-${f.fileName}`; n++; }
          usedNames.add(name);
          entries.push({ name, data: new Uint8Array(await r.arrayBuffer()) });
        } catch (e) { /* skip a file that failed to fetch, don't block the rest */ }
      }
      const blob = buildZip(entries);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${slugify(item.name || itemLabel(item.stage, item.item_key))}.zip`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      toast('Downloaded');
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '⬇ Download'; }
    }
  }
  function downloadBtnHtml() {
    return `<button type="button" class="btn btn-sm btn-primary" data-download-stage>⬇ Download stage package</button>`;
  }
  function wireDownloadBtn(laneId, stage, laneTitle) {
    const btn = document.querySelector(`#${laneId} [data-download-stage]`);
    if (btn) btn.addEventListener('click', () => downloadStagePackage(stage, laneTitle, btn));
  }
  // ---------- Stage amount modal (per stage — no link/URL here, that's project-level now) ----------
  // A real modal, not native prompt()/alert() — those get silently blocked by
  // several browsers when called after an await (lost user-activation).
  let stageAmountDraft = null;
  function stageHasDeliverable(stage) {
    return state.items.some(i => i.stage === stage && (theVersion(i).media_files || []).length > 0);
  }
  function openStageAmountModal(stage) {
    if (!stageHasDeliverable(stage)) {
      toast('Amount cannot be set for this stage — no deliverable uploaded yet');
      return;
    }
    const existing = state.paymentLinks.find(l => l.stage === stage) || null;
    stageAmountDraft = { stage, entry: existing };
    renderStageAmountModal();
  }
  function closeStageAmountModal() {
    stageAmountDraft = null;
    const root = document.getElementById('modalRoot');
    if (root) root.innerHTML = '';
  }
  function renderStageAmountModal() {
    const root = document.getElementById('modalRoot');
    if (!root || !stageAmountDraft) { if (root) root.innerHTML = ''; return; }
    const { stage, entry } = stageAmountDraft;
    root.innerHTML = `
      <div class="modal-overlay" id="stageAmountModalOverlay">
        <div class="modal-card" style="max-width:400px">
          <div class="modal-head"><strong>💰 Amount — Stage ${stage}</strong><button class="modal-close" id="stageAmountModalCloseBtn">×</button></div>

            <div class="field">
              <label for="stageAmountInput">Amount to charge (₹)</label>
              <input id="stageAmountInput" type="number" min="1" step="0.01" value="${entry ? (entry.amountPaise / 100) : ''}" placeholder="e.g. 1500">
            </div>
            ${entry ? `<p style="font-size:12.5px;color:var(--text-faint);margin:6px 0 4px">${entry.paid ? `✅ Marked as paid${entry.paidAt ? ` on ${esc(formatIST(entry.paidAt))}` : ''}` : 'Not marked paid yet'}</p>` : ''}
            <button class="btn btn-primary" id="stageAmountSaveBtn" style="width:100%;margin-top:8px">${entry ? 'Update amount' : 'Set amount'}</button>
          </div>
        </div>
      </div>`;
    document.getElementById('stageAmountModalCloseBtn').addEventListener('click', closeStageAmountModal);
    document.getElementById('stageAmountModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'stageAmountModalOverlay') closeStageAmountModal(); });
    document.getElementById('stageAmountSaveBtn').addEventListener('click', async () => {
      const amountRupees = parseFloat(document.getElementById('stageAmountInput').value);
      if (!amountRupees || amountRupees <= 0) { toast('Enter a valid amount'); return; }
      const saveBtn = document.getElementById('stageAmountSaveBtn');
      saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
      const amountPaise = Math.round(amountRupees * 100);
      const res = await api.setStageAmount(state.project.id, stage, amountPaise);
      if (res.amountPaise === undefined) { toast('Could not save amount'); saveBtn.disabled = false; saveBtn.textContent = entry ? 'Update amount' : 'Set amount'; return; }
      const wasResetPaid = entry && entry.paid && !res.paid;
      const others = state.paymentLinks.filter(l => l.stage !== stage);
      state.paymentLinks = [...others, { stage, amountPaise, paid: !!res.paid, paidAt: res.paidAt || null }];
      closeStageAmountModal();
      renderTool();
      renderProjectInfoBar();
      toast(wasResetPaid ? 'Amount updated — paid status reset, customer needs to reconfirm' : (entry ? 'Amount updated' : 'Amount set'));
    });
  }

  // ---------- Top-level render ----------
  async function renderTool() {
    const wrap = document.getElementById('swimlaneWrap');
    // Rebuilding innerHTML resets scroll position on every affected element —
    // snapshot before, restore after, so picking a color/pill mid-scroll
    // doesn't snap the view back to the top of the lane (or back to lane 1).
    const prevWrapScroll = wrap.scrollLeft;
    const prevLaneScroll = {};
    for (let n = 1; n <= 5; n++) {
      const el = document.getElementById('lane' + n);
      if (el) prevLaneScroll[n] = el.scrollTop;
    }

    wrap.innerHTML = `
      <div class="lane" id="lane1"></div>
      <div class="lane" id="lane2"></div>
      <div class="lane" id="lane3"></div>
      <div class="lane" id="lane4"></div>
      <div class="lane" id="lane5"></div>`;
    document.getElementById('lane1').innerHTML = renderLane1(); wireLane1();
    document.getElementById('lane2').innerHTML = renderLane2(); wireLane2();
    document.getElementById('lane3').innerHTML = renderLane3(); wireLane3();
    document.getElementById('lane4').innerHTML = renderLane4(); wireLane4();
    document.getElementById('lane5').innerHTML = renderLane5(); wireLane5();

    wrap.scrollLeft = prevWrapScroll;
    for (let n = 1; n <= 5; n++) {
      const el = document.getElementById('lane' + n);
      if (el && prevLaneScroll[n]) el.scrollTop = prevLaneScroll[n];
    }
  }

  // ---------- Projects screen ----------
  // ---------- Goal Tracker (projects screen — across all projects, not per-project) ----------
  function monthsAgoDate(n) {
    const d = new Date();
    d.setMonth(d.getMonth() - n);
    return d;
  }
  function parseUtc(sqliteUtcString) {
    return new Date(sqliteUtcString.replace(' ', 'T') + 'Z');
  }
  function earningsInRange(entries, months) {
    const cutoff = monthsAgoDate(months);
    return entries.filter(e => parseUtc(e.paidAt) >= cutoff).reduce((sum, e) => sum + e.amountPaise, 0);
  }
  // Oldest-first monthly buckets for the last N calendar months, for the
  // simple bar chart — zero-filled for months with no earnings at all.
  function monthlyBuckets(entries, months) {
    const now = new Date();
    const buckets = [];
    for (let i = months - 1; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      buckets.push({ label: d.toLocaleDateString('en-US', { month: 'short' }), key: `${d.getFullYear()}-${d.getMonth()}`, paise: 0 });
    }
    const byKey = new Map(buckets.map(b => [b.key, b]));
    for (const e of entries) {
      const d = parseUtc(e.paidAt);
      const bucket = byKey.get(`${d.getFullYear()}-${d.getMonth()}`);
      if (bucket) bucket.paise += e.amountPaise;
    }
    return buckets;
  }
  // Same monthly buckets as above, but split by stage — which stage earned
  // what in a given month, not just the month's total.
  function monthlyStageBuckets(entries, months) {
    const now = new Date();
    const buckets = [];
    for (let i = months - 1; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      buckets.push({ label: d.toLocaleDateString('en-US', { month: 'short' }), key: `${d.getFullYear()}-${d.getMonth()}`, byStage: { 2: 0, 3: 0, 4: 0, 5: 0 }, total: 0 });
    }
    const byKey = new Map(buckets.map(b => [b.key, b]));
    for (const e of entries) {
      const d = parseUtc(e.paidAt);
      const bucket = byKey.get(`${d.getFullYear()}-${d.getMonth()}`);
      if (bucket && bucket.byStage[e.stage] !== undefined) {
        bucket.byStage[e.stage] += e.amountPaise;
        bucket.total += e.amountPaise;
      }
    }
    return buckets;
  }
  // Default slider position when no goal has been set yet — based on the
  // last 3 months' actual pace, rounded to a clean number; a sensible flat
  // default when there's no history at all yet to base a suggestion on.
  function suggestedGoalPaise(entries) {
    const last3 = earningsInRange(entries, 3);
    if (last3 > 0) return Math.max(500, Math.round((last3 / 100) / 500) * 500) * 100;
    return 500000;
  }
  // Progress is always measured from goalSetAt (rolling 3-month window that
  // restarts whenever the goal is changed) — null if no goal has ever been set.
  function goalProgress(summary) {
    if (!summary.goalAmountPaise || !summary.goalSetAt) return null;
    const setAt = parseUtc(summary.goalSetAt);
    const earnedSince = summary.entries.filter(e => parseUtc(e.paidAt) >= setAt).reduce((sum, e) => sum + e.amountPaise, 0);
    const deadline = new Date(setAt.getTime() + 90 * 24 * 60 * 60 * 1000);
    const daysLeft = Math.max(0, Math.ceil((deadline - new Date()) / (24 * 60 * 60 * 1000)));
    const pct = Math.min(100, Math.round((earnedSince / summary.goalAmountPaise) * 100));
    return { earnedSince, pct, daysLeft };
  }
  // The one goal-related thing shown outside the Goals screen itself — a
  // glanceable strip at the top of the projects list, not a second
  // dashboard. Whole thing is a link into the full Goal Tracker.
  function renderGoalStrip(summary) {
    const progress = goalProgress(summary);
    if (!progress) {
      return `<a class="goal-strip" href="#" id="goalStripLink">
        <div class="goal-strip-empty">
          <div><strong>🎯 Your Goal &amp; Progress</strong><span>Make your money — because you are worth it. →</span></div>
          <span class="btn btn-sm btn-primary">Set a goal</span>
        </div>
      </a>`;
    }
    const setAt = parseUtc(summary.goalSetAt);
    const deadline = new Date(setAt.getTime() + 90 * 24 * 60 * 60 * 1000);
    const dateFmt = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const stagePending = stagePendingSummary(summary);
    return `<a class="goal-strip" href="#" id="goalStripLink">
      <div class="goal-strip-title">🎯 Your Goal &amp; Progress</div>
      <div class="goal-strip-subtitle">Make your money — because you are worth it. →</div>
      <div class="goal-strip-row">
        <div class="goal-strip-track"><div class="goal-strip-fill" style="width:${progress.pct}%"></div></div>
        <div class="goal-strip-value">${progress.pct}%</div>
      </div>
      <div class="goal-strip-sub">${formatRupees(progress.earnedSince)} of ${formatRupees(summary.goalAmountPaise)} · Duration: 3 Months (${esc(dateFmt(setAt))} → ${esc(dateFmt(deadline))}) · ${progress.daysLeft} day${progress.daysLeft === 1 ? '' : 's'} left</div>
      <div class="goal-strip-note">Projects paid before ${esc(dateFmt(setAt))} don't count toward this goal.</div>
      ${stagePending.length ? `<div class="goal-strip-stages">
        <div class="goal-strip-stages-sentence">Here's what's still pending to hit your goal:</div>
        <div class="goal-strip-pills">
          ${stagePending.map(x => `<span class="goal-strip-pill" style="background:${STAGE_COLORS[x.stage]}">Stage ${x.stage} — ${esc(x.name)}: ${x.pending > 0 ? `${x.pending} pending` : '✓ Done'} (${x.done}/${x.target})</span>`).join('')}
        </div>
      </div>` : ''}
    </a>`;
  }
  // How many of each planned stage are still needed to hit the goal —
  // target comes from the "Plan it yourself" allocation (stageTargetCounts),
  // done is how many of that stage actually got paid since the goal
  // started. Only listed for stages the designer has actually set a target
  // for — an unplanned stage has nothing meaningful to compare against.
  function stagePendingSummary(summary) {
    const setAt = parseUtc(summary.goalSetAt);
    const targets = summary.stageTargetCounts || {};
    const done = { 2: 0, 3: 0, 4: 0, 5: 0 };
    summary.entries.forEach(e => {
      if (done[e.stage] !== undefined && parseUtc(e.paidAt) >= setAt) done[e.stage]++;
    });
    return STAGE_ORDER
      .filter(s => (targets[s] || 0) > 0)
      .map(s => ({ stage: s, name: STAGE_NAMES[s], target: targets[s], done: done[s], pending: Math.max(0, targets[s] - done[s]) }));
  }
  // A project belongs in "In goal period" if it earned anything since the
  // goal started, OR it's been created/touched since then (still-unpaid,
  // actively-worked-on projects shouldn't feel exiled to "Others" just
  // because they haven't been paid yet) — otherwise it's "Others". Only

  function splitProjectsByGoalPeriod(projects, summary) {
    const setAt = parseUtc(summary.goalSetAt);
    const paidSinceProjectIds = new Set(
      summary.entries.filter(e => parseUtc(e.paidAt) >= setAt).map(e => e.projectId)

    const inPeriod = [], others = [];
    for (const p of projects) {
      const activeSince = parseUtc(p.created_at) >= setAt || parseUtc(p.updated_at) >= setAt;

  // Per-stage historical average and mix — the raw material both the "2
  // possibilities" comparison line and the month-by-month blueprint are
  // built from. Returns null if there's not enough history yet.
  function stageStatsFromEntries(entries) {
    if (!entries.length) return null;
    const byStage = new Map();
    for (const e of entries) {
      const s = byStage.get(e.stage) || { count: 0, total: 0 };
      s.count++; s.total += e.amountPaise;
      byStage.set(e.stage, s);
    }
    const totalCount = entries.length;
    const totalAmount = entries.reduce((sum, e) => sum + e.amountPaise, 0);
    const stages = [...byStage.entries()]
      .map(([stage, s]) => ({ stage, count: s.count, avg: s.total / s.count, share: s.count / totalCount }))
      .sort((a, b) => a.stage - b.stage);
    return { totalCount, avgPerCompletion: totalAmount / totalCount, stages };

  // "Get this many projects/stages in month 1, this many in month 2..." —
  // translates the abstract ₹ goal into concrete, actionable units, using
  // this designer's own historical average revenue per stage-completion and
  // their own historical mix of which stages they typically get paid for.
  // Not a guarantee — a rough guide clearly labeled as such.
  function buildBlueprint(effectiveGoalPaise, earnedSoFar, entries) {
    const stats = stageStatsFromEntries(entries);
    if (!stats || !stats.avgPerCompletion) return null;
    const remaining = Math.max(0, effectiveGoalPaise - earnedSoFar);
    const neededCompletions = remaining > 0 ? Math.ceil(remaining / stats.avgPerCompletion) : 0;
    if (!neededCompletions) return { stats, months: [[], [], []], neededCompletions: 0 };

    const base = Math.floor(neededCompletions / 3);
    const extra = neededCompletions % 3;
    const perMonthCounts = [base + (extra > 0 ? 1 : 0), base + (extra > 1 ? 1 : 0), base];

    // Largest-remainder rounding so each month's stage-type counts add up
    // exactly to that month's total, split proportional to historical mix.
    const months = perMonthCounts.map((monthTotal) => {
      if (!monthTotal) return [];
      const raw = stats.stages.map((s) => ({ stage: s.stage, avg: s.avg, exact: s.share * monthTotal }));
      const floors = raw.map((r) => Math.floor(r.exact));
      const remainder = monthTotal - floors.reduce((a, b) => a + b, 0);
      const order = raw.map((r, i) => ({ i, frac: r.exact - floors[i] })).sort((a, b) => b.frac - a.frac);
      const counts = floors.slice();
      for (let k = 0; k < remainder; k++) counts[order[k % counts.length].i]++;
      return raw.map((r, i) => ({ stage: r.stage, avg: r.avg, count: counts[i] })).filter((x) => x.count > 0);
    });
    return { stats, months, neededCompletions };

  // Short axis labels ("₹5k", "₹1.2L") — the full formatRupees() output is

  function formatCompactRupees(paise) {

  // Picks a "nice" round step (1/2/5 × a power of 10) for Y-axis gridlines,
  // the way any normal charting library would, instead of arbitrary
  // fractions of the raw max — e.g. steps of ₹2,000 or ₹5,000, not ₹1,847.
  function niceAxisScale(maxVal, tickCount) {
    const rawStep = maxVal / tickCount;
    const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep || 1)));

  // ---------- Stage-level manual allocation: price + count slider per stage.

  const GOAL_STEP_PAISE = 500000; // ₹5,000 — the goal slider only ever lands on this grid

    const columnCount = segments.length + 2; // Goal + Actual + 4 stages
    const slot = plotW / columnCount;
    const barW = Math.min(52, slot * 0.55);
    const labelY1 = H - 26, labelY2 = H - 13;
    const barLabels = (x, l1, l2) => `
      <text x="${x.toFixed(1)}" y="${labelY1}" font-size="10" font-weight="700" fill="#565b66" text-anchor="middle">${esc(l1)}</text>
      <text x="${x.toFixed(1)}" y="${labelY2}" font-size="8.5" fill="#8b92a1" text-anchor="middle">${esc(l2)}</text>`;
    const standaloneBar = (index, value, color, label) => {
      const x = PAD_L + slot * index + slot / 2;
      const y = PAD_T + plotH - (Math.min(value, niceMax) / niceMax) * plotH;
      const h = Math.max(2, PAD_T + plotH - y);
      return `<rect x="${(x - barW / 2).toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" rx="4" fill="${color}"/>
              ${barLabels(x, label, formatCompactRupees(value))}`;
    };
    const goalBar = standaloneBar(0, goalPaise, '#b23a37', 'Goal');
    const plannedBar = standaloneBar(1, total, total > goalPaise ? '#a05f10' : total === goalPaise && goalPaise ? '#2f7a4f' : '#565b66', 'Planned');
    const floatBars = segments.map((seg, i) => {
      const index = i + 2;
      const x = PAD_L + slot * index + slot / 2;
      const yTop = PAD_T + plotH - (seg.end / niceMax) * plotH;
      const yBottom = PAD_T + plotH - (seg.start / niceMax) * plotH;
      const h = Math.max(2, yBottom - yTop);
      const sub = seg.count && seg.price ? `${seg.count}×${formatCompactRupees(seg.price)}=${formatCompactRupees(seg.value)}` : '—';
      return `<rect x="${(x - barW / 2).toFixed(1)}" y="${yTop.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" rx="4" fill="${colors[seg.stage]}"/>
              ${barLabels(x, `Stage ${seg.stage}`, sub)}`;
    }).join('');
    const connectors = segments.slice(0, -1).map((seg, i) => {
      const index1 = i + 2, index2 = i + 3;
      const x1 = PAD_L + slot * index1 + slot / 2 + barW / 2;
      const x2 = PAD_L + slot * index2 + slot / 2 - barW / 2;
      const y = PAD_T + plotH - (seg.end / niceMax) * plotH;
      return `<line x1="${x1.toFixed(1)}" y1="${y.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#dbdfe2" stroke-width="1" stroke-dasharray="2,3"/>`;
    }).join('');
    return `<svg viewBox="0 0 ${W} ${H}" class="trend-svg" preserveAspectRatio="xMidYMid meet">${grid}${goalBar}${plannedBar}${connectors}${floatBars}</svg>`;
  }
  function renderStageAllocationSection(summary, goalPaise) {
    const { prices, counts } = stageAllocationDraft(summary);
    // Normalize on load only — guards against stale saved data from before
    // the funnel rule existed. Not a budget clamp: carrying the max count
    // seen so far from Stage 5 up to Stage 2 just enforces 2≥3≥4≥5.
    let carry = 0;
    for (let i = STAGE_ORDER.length - 1; i >= 0; i--) {
      const s = STAGE_ORDER[i];
      carry = Math.max(carry, counts[s] || 0);
      counts[s] = carry;
    }
    const total = stageAllocationTotal(prices, counts);
    const stage1Count = counts[2] || 0;

    // Pills instead of a textbox — typing a rupee amount on a phone
    // keyboard turned out to be the actual friction point, not the layout.
    // Picking from common per-stage prices is one tap and needs no keyboard.
    const priceOptions = [500, 1000, 2000, 5000, 10000];
    const pricePill = (stage, rupees) => {
      const paise = rupees * 100;
      const selected = (prices[stage] || 0) === paise;
      return `<button type="button" class="pill ${selected ? 'selected' : ''}" data-stage-price-pill="${stage}" data-price-paise="${paise}">₹${rupees}</button>`;

        <div class="stage-alloc-section-label">Your price</div>

        <div class="stage-alloc-section-label">Number of deliverables <span class="stage-alloc-calc">— <b id="stageCount-${stage}">${count}</b> = <b id="stageSubtotal-${stage}">${esc(price && count ? formatRupees(price * count) : '₹0')}</b></span></div>
        <input type="range" class="stage-alloc-slider" id="stageSlider-${stage}" data-stage-count="${stage}" min="0" max="${max}" step="1" value="${count}" list="stageAllocTicks" ${!price ? 'disabled title="Pick a price first"' : ''}>
        ${stageTickHtml}
      </div>`;
    };

    const stageTickValues = Array.from({ length: STAGE_SLIDER_MAX + 1 }, (_, i) => i);
    const ticks = stageTickValues.map(i => `<option value="${i}"></option>`).join('');
    const stageTickHtml = renderSliderTicks(0, STAGE_SLIDER_MAX, stageTickValues, (i) => i);

    return `<div class="goal-alloc">
      <datalist id="stageAllocTicks">${ticks}</datalist>
      <div class="goal-alloc-title">🎚 Plan it yourself</div>
      <div class="trend-chart-wrap" id="waterfallChartWrap">${renderWaterfallSvg(prices, counts, goalPaise)}</div>
      <div class="goal-alloc-total" id="stageAllocTotal">${allocationStatusText(total, goalPaise)}</div>
      <div class="stage-alloc-row" style="border-left-color:${STAGE_COLORS[1]}">
        <div class="stage-alloc-name">Stage 1 — ${esc(STAGE_NAMES[1])}</div>
        <div class="stage-alloc-section-label">Your price — always ₹0, never billed</div>
        <div class="stage-alloc-section-label">Number of deliverables <span class="stage-alloc-calc">— <b id="stage1DerivedCount">${stage1Count}</b> <span class="stage-alloc-derived-note">(same as Stage 2)</span></span></div>
      </div>
      ${STAGE_ORDER.map(stageRow).join('')}
      <button class="btn btn-sm btn-primary" id="stageAllocSaveBtn">Save my plan</button>
    </div>`;
  }
  function wireStageAllocationSection(goalPaise) {
    const summary = state.earningsSummary;
    const { prices, counts } = stageAllocationDraft(summary);

    function refreshLiveBits(activeStage) {
      const total = stageAllocationTotal(prices, counts);
      const totalEl = document.getElementById('stageAllocTotal');
      if (totalEl) totalEl.textContent = allocationStatusText(total, goalPaise);
      const stage1El = document.getElementById('stage1DerivedCount');
      if (stage1El) stage1El.textContent = counts[2] || 0;
      STAGE_ORDER.forEach(s => {
        const price = prices[s] || 0, count = counts[s] || 0;
        const slider = document.getElementById(`stageSlider-${s}`);
        if (slider) {
          if (s !== activeStage) slider.value = count; // never touch the one currently under the user's pointer
          slider.disabled = !price;
        }
        const pillsWrap = document.getElementById(`stagePricePills-${s}`);
        if (pillsWrap) pillsWrap.querySelectorAll('[data-price-paise]').forEach(btn => {
          btn.classList.toggle('selected', Number(btn.getAttribute('data-price-paise')) === price);
        });
        const countEl = document.getElementById(`stageCount-${s}`);
        if (countEl) countEl.textContent = count;
        const subtotalEl = document.getElementById(`stageSubtotal-${s}`);
        if (subtotalEl) subtotalEl.textContent = price && count ? formatRupees(price * count) : '₹0';
      });
      const waterfallWrap = document.getElementById('waterfallChartWrap');
      if (waterfallWrap) waterfallWrap.innerHTML = renderWaterfallSvg(prices, counts, goalPaise);
    }

    document.querySelectorAll('[data-stage-count]').forEach(slider => {
      slider.addEventListener('input', () => {
        const stage = Number(slider.getAttribute('data-stage-count'));
        applyFunnelCascade(counts, stage, Number(slider.value));
        refreshLiveBits(stage);
      });
    });
    document.querySelectorAll('[data-stage-price-pill]').forEach(btn => {
      btn.addEventListener('click', () => {
        const stage = Number(btn.getAttribute('data-stage-price-pill'));
        prices[stage] = Number(btn.getAttribute('data-price-paise'));
        refreshLiveBits(null);
      });
    });
    const saveBtn = document.getElementById('stageAllocSaveBtn');
    if (saveBtn) saveBtn.addEventListener('click', async () => {
      saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
      await api.setStagePrices(prices);
      await api.setStageCounts(counts);
      saveBtn.disabled = false; saveBtn.textContent = 'Save my plan';
      toast('Plan saved');
    });
  }
  function renderFutureVisual(summary, effectiveGoalPaise) {
    const progress = goalProgress(summary);
    const earnedSoFar = progress ? progress.earnedSince : 0;
    const previewPct = effectiveGoalPaise ? Math.min(100, Math.round((earnedSoFar / effectiveGoalPaise) * 100)) : 0;
    return `
      <div class="goal-past-total">${previewPct}%<span>of ${formatRupees(effectiveGoalPaise)} goal${progress ? ` — ${progress.daysLeft} day${progress.daysLeft === 1 ? '' : 's'} left` : ' (preview)'}</span></div>`;
  }
  function renderGoalTrackerCard() {
    const summary = state.earningsSummary;
    if (!summary) return '';
    const tab = state.goalTab;
    const months = state.goalPastRangeMonths;
    const pastTotal = earningsInRange(summary.entries, months);
    const suggested = suggestedGoalPaise(summary.entries);
    const currentGoal = summary.goalAmountPaise || suggested;
    // Snapped to the ₹5,000 grid — the slider should only ever land on a
    // tick, never somewhere between two of them.
    const rawSliderValue = state.goalSliderDraft != null ? state.goalSliderDraft : currentGoal;
    const sliderValue = Math.max(GOAL_STEP_PAISE, Math.round(rawSliderValue / GOAL_STEP_PAISE) * GOAL_STEP_PAISE);
    const rawSliderMax = Math.max(sliderValue * 3, suggested * 3, 5000000);
    const sliderMax = Math.ceil(rawSliderMax / GOAL_STEP_PAISE) * GOAL_STEP_PAISE;
    const progress = goalProgress(summary);
    // ₹5,000 → ₹50,000 in ₹5,000 steps — fixed reference ticks so the goal
    // slider reads at a glance, independent of however high sliderMax goes.
    const goalSliderTickValues = Array.from({ length: 10 }, (_, i) => (i + 1) * GOAL_STEP_PAISE);

    return `
      <div class="section-head-row">
        <span class="section-title">🎯 Goal Tracker</span>
        <button class="icon-btn" id="goalShareBtn" title="Download a shareable image">⬇ Share</button>

      ${tab === 'past' ? `
        <div class="goal-switch">
          <button data-goal-range="3" class="${months === 3 ? 'active' : ''}">3 months</button>
          <button data-goal-range="6" class="${months === 6 ? 'active' : ''}">6 months</button>
        </div>
        <div class="goal-past-total">${formatRupees(pastTotal)}<span>earned</span></div>
        <div class="trend-chart-wrap">${renderTrendSvg(months, summary)}</div>
        <div class="goal-alloc-title" style="margin-top:32px">By stage</div>
        <div class="trend-chart-wrap">${renderStageBreakdownSvg(months, summary)}</div>
      ` : `
        <div id="goalFutureVisual">${renderFutureVisual(summary, sliderValue)}</div>
        <div class="goal-future">
          <div class="goal-future-head">
            <span>Next 3 months goal</span>
            <strong id="goalAmountDisplay">${formatRupees(sliderValue)}</strong>
          </div>
          <input type="range" id="goalSlider" min="${GOAL_STEP_PAISE}" max="${sliderMax}" step="${GOAL_STEP_PAISE}" value="${sliderValue}" list="goalSliderTicks">
          <datalist id="goalSliderTicks">${goalSliderTickValues.map(v => `<option value="${v}"></option>`).join('')}</datalist>
          ${renderSliderTicks(GOAL_STEP_PAISE, sliderMax, goalSliderTickValues, (v) => formatCompactRupees(v))}
          <div style="display:flex;gap:6px;margin-top:8px">
            <button class="btn btn-sm btn-primary" id="goalSaveBtn">Set Goal</button>
            ${progress ? `<button class="btn btn-sm" id="goalClearBtn">Clear Goal</button>` : ''}
          </div>
          ${progress
            ? `<div class="goal-progress-bar"><div class="goal-progress-fill" style="width:${progress.pct}%"></div></div>
               <p class="goal-progress-note">${formatRupees(progress.earnedSince)} of ${formatRupees(summary.goalAmountPaise)} earned so far</p>`
            : `<p class="goal-progress-note">Drag the slider and set a goal to start tracking progress.</p>`}
        </div>
        <div id="stageAllocRoot">${renderStageAllocationSection(summary, sliderValue)}</div>
      `}`;
  }
  function renderGoalTrackerCardInto() {
    const root = document.getElementById('goalTrackerRoot');
    if (!root) return;
    root.innerHTML = renderGoalTrackerCard();

  function wireGoalTrackerCard() {
    document.querySelectorAll('[data-goal-tab]').forEach(btn => btn.addEventListener('click', () => {
      state.goalTab = btn.getAttribute('data-goal-tab');
      renderGoalTrackerCardInto();
    }));
    document.querySelectorAll('[data-goal-range]').forEach(btn => btn.addEventListener('click', () => {
      state.goalPastRangeMonths = Number(btn.getAttribute('data-goal-range'));
      renderGoalTrackerCardInto();

    const slider = document.getElementById('goalSlider');
    const display = document.getElementById('goalAmountDisplay');

    if (slider) slider.addEventListener('input', () => {
      state.goalSliderDraft = Number(slider.value);
      if (display) display.textContent = formatRupees(state.goalSliderDraft);
      // Live update — chart/blueprint/allocation only, never the slider
      // itself, so an active drag gesture is never interrupted by its own
      // DOM being rebuilt.
      if (futureVisual) futureVisual.innerHTML = renderFutureVisual(state.earningsSummary, state.goalSliderDraft);
      if (stageAllocRoot) {
        stageAllocRoot.innerHTML = renderStageAllocationSection(state.earningsSummary, state.goalSliderDraft);
        wireStageAllocationSection(state.goalSliderDraft);

    });
    const saveBtn = document.getElementById('goalSaveBtn');
    if (saveBtn) saveBtn.addEventListener('click', async () => {
      const amount = state.goalSliderDraft != null ? state.goalSliderDraft : Number(slider.value);
      saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
      const res = await api.setEarningsGoal(amount);
      state.earningsSummary.goalAmountPaise = res.goalAmountPaise;
      state.earningsSummary.goalSetAt = res.goalSetAt;
      state.goalSliderDraft = null;
      state.stageCountsDraft = null; // the saved plan was for the OLD goal — start a fresh allocation for the new one
      renderGoalTrackerCardInto();
      toast('Goal set — tracking starts now');
    });
    const clearBtn = document.getElementById('goalClearBtn');
    if (clearBtn) clearBtn.addEventListener('click', async () => {
      if (!confirm('Clear your current goal? Your manual stage plan for it will be cleared too.')) return;
      await api.clearEarningsGoal();
      state.earningsSummary.goalAmountPaise = 0;
      state.earningsSummary.goalSetAt = null;
      state.goalSliderDraft = null;
      state.stageCountsDraft = null;
      renderGoalTrackerCardInto();
      toast('Goal cleared');
    });
    const shareBtn = document.getElementById('goalShareBtn');
    if (shareBtn) shareBtn.addEventListener('click', () => {
      downloadGoalShareImage();
    });
    if (state.goalTab === 'future') {
      const summary = state.earningsSummary;
      const suggested = suggestedGoalPaise(summary.entries);
      const currentGoal = summary.goalAmountPaise || suggested;
      const rawSliderValue = state.goalSliderDraft != null ? state.goalSliderDraft : currentGoal;
      const sliderValue = Math.max(GOAL_STEP_PAISE, Math.round(rawSliderValue / GOAL_STEP_PAISE) * GOAL_STEP_PAISE);
      wireStageAllocationSection(sliderValue);
    }
  }

  async function openProject(id) {
    const full = await api.getProject(id);
    state.project = full.project; state.brief = full.brief; state.items = full.items;
    state.expandedItems = {};
    // Story is the one always-exists-exactly-once item — open it by default
    // so a designer lands straight on it in Stage 2 instead of an empty-looking
    // collapsed card.
    const story = state.items.find(i => i.stage === 2 && i.item_key === 'story');
    if (story) state.expandedItems[story.id] = true;
    // Stage configs (fieldsSchema/geminiInstruction/outputInstructions) are
    // D1-backed, not hardcoded — fetch once per project open, before render.
    const configEntries = await Promise.all([2, 3, 4, 5].map(async (stage) => [stage, await api.getStageConfig(stage)]));
    state.stageConfigs = Object.fromEntries(configEntries.filter(([, cfg]) => cfg));
    const paymentLinkRes = await api.getProjectPaymentLink(id);
    state.paymentLink = paymentLinkRes.token ? { token: paymentLinkRes.token, url: paymentLinkRes.url, totalEarnedPaise: paymentLinkRes.totalEarnedPaise || 0 } : null;
    state.paymentLinks = paymentLinkRes.stages || [];
    const stageLocksRes = await api.getStageLocks(id);
    state.stageLocks = stageLocksRes.locks || [];

  // ---------- Public payment page (/pay/:token) — no login, token is the access control ----------

  function buildUpiLink({ upiId, payeeName, amountRupees, note, scheme }) {
    const params = new URLSearchParams({ pa: upiId, pn: payeeName, am: amountRupees.toFixed(2), cu: 'INR', tn: note });

    const app = document.getElementById('app');
    app.innerHTML = `<div class="pay-page"><p>Loading…</p></div>`;
    const r = await fetch(`${API_BASE}/api/pay/${token}`);
    if (!r.ok) {
      app.innerHTML = `<div class="pay-page"><p>This payment link isn't valid or has been removed.</p></div>`;
      return;
    }
    const info = await r.json();
    // Chronological (stage 2 → 5), latest one open by default — everything
    // earlier collapses into a compact summary row, revealed on click.
    const stages = [...info.stages].sort((a, b) => a.stage - b.stage);
    const latestStage = stages.length ? stages[stages.length - 1].stage : null;
    payPageDraft = { token, info, stages, expandedStage: latestStage };
    renderPayPage();
  }
  function renderPayPage() {
    const { token, info, stages, expandedStage } = payPageDraft;
    const app = document.getElementById('app');
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    app.innerHTML = `
      <div class="pay-page">
        <div class="pay-brand-bar"><span class="pay-brand-mark">💸</span><span>StagePay</span></div>
        <div class="pay-card">
          <p class="pay-designer">${esc(info.designerName)}</p>
          <h1>${esc(info.projectName)}</h1>
          ${info.product ? `<p class="pay-sub"><strong>${esc(info.product)}</strong>${info.productDescription ? ` — ${esc(info.productDescription)}` : ''}</p>` : ''}

          <div class="pay-stage-row" style="margin-bottom:14px">
            <div class="pay-stage-head" style="cursor:default">
              <span class="pay-stage-title">📄 Your Brief</span>
              <a class="btn btn-sm" href="${API_BASE}/api/pay/${token}/download/brief">⬇ Download</a>
            </div>
          </div>

          ${stages.length ? `<div class="pay-stage-list">
            ${stages.map(s => payStageRowHtml(s, s.stage === expandedStage, isMobile)).join('')}
          </div>` : `<p class="pay-desc">Nothing to pay yet — the designer hasn't set an amount for any stage.</p>`}
        </div>
      </div>`;

    document.querySelectorAll('[data-pay-stage-head]').forEach(el => el.addEventListener('click', () => {
      const stage = Number(el.getAttribute('data-pay-stage-head'));
      payPageDraft.expandedStage = payPageDraft.expandedStage === stage ? null : stage;
      renderPayPage();
    }));

    const expanded = stages.find(s => s.stage === expandedStage);
    if (expanded && !expanded.paid && info.upiId) wireOpenPayStage(token, info, expanded);
  }
  function payStageRowHtml(s, isExpanded, isMobile) {
    const amountRupees = s.amountPaise / 100;
    return `<div class="pay-stage-row ${isExpanded ? 'expanded' : ''}">
      <div class="pay-stage-head" data-pay-stage-head="${s.stage}">
        <span class="pay-stage-title">Stage ${s.stage} — ${esc(s.stageLabel)}</span>
        <span class="pay-stage-badge ${s.paid ? 'paid' : ''}">${s.paid ? '✅ Paid' : `₹${amountRupees.toFixed(2)}`}</span>
        <span class="chevron">›</span>
      </div>
      <div class="pay-stage-body">
        <a class="btn btn-primary pay-download" href="${API_BASE}/api/pay/${payPageDraft.token}/download/${s.stage}">⬇ Download deliverable</a>
        ${s.paid
          ? `<div class="pay-paid-banner">✅ Paid ₹${amountRupees.toFixed(2)}${s.paidAt ? ` on ${esc(formatIST(s.paidAt))}` : ''}</div>`
          : payStagePayHtml(s, isMobile)}
      </div>
    </div>`;
  }
  function payStagePayHtml(s, isMobile) {
    if (!payPageDraft.info.upiId) return `<p class="pay-desc">The designer hasn't set up a UPI ID yet — contact them directly to pay.</p>`;
    return `
      <div class="pay-amount">₹${(s.amountPaise / 100).toFixed(2)}</div>
      <div id="payQrWrap-${s.stage}" class="pay-qr-wrap"><p>Generating QR…</p></div>
      <p class="pay-qr-hint">Scan with your UPI app on mobile.</p>
      ${isMobile ? `
        <a href="" id="payOpenUpi-${s.stage}" class="pay-open-upi">Open in UPI app</a>
        <div class="pay-app-row">
          <a href="" id="payGpay-${s.stage}" class="pay-app-btn gpay"><span class="pay-app-mark">G</span>Google Pay</a>
          <a href="" id="payPhonepe-${s.stage}" class="pay-app-btn phonepe"><span class="pay-app-mark">P</span>PhonePe</a>
          <a href="" id="payPaytm-${s.stage}" class="pay-app-btn paytm"><span class="pay-app-mark">P</span>Paytm</a>
        </div>` : `<p class="pay-qr-hint">Payment link is only shown on mobile.</p>`}
      <label class="pay-confirm-check">
        <input type="checkbox" id="payConfirmCheckbox-${s.stage}">
        I have paid this amount using UPI
      </label>
      <button class="btn btn-primary" id="markPaidBtn-${s.stage}" style="width:100%;margin-top:8px" disabled>✅ Payment complete</button>
    `;
  }
  function wireOpenPayStage(token, info, s) {
    const linkArgs = {
      upiId: info.upiId,
      payeeName: info.product || info.projectName,
      amountRupees: s.amountPaise / 100,
      note: `Stage ${s.stage} — ${s.stageLabel} — ${info.product || info.projectName}`,
    };
    const upiLink = buildUpiLink(linkArgs);
    const openUpiEl = document.getElementById(`payOpenUpi-${s.stage}`);
    if (openUpiEl) openUpiEl.href = upiLink;
    const gpayEl = document.getElementById(`payGpay-${s.stage}`);
    if (gpayEl) gpayEl.href = buildUpiLink({ ...linkArgs, scheme: 'tez://upi/pay' });
    const phonepeEl = document.getElementById(`payPhonepe-${s.stage}`);
    if (phonepeEl) phonepeEl.href = buildUpiLink({ ...linkArgs, scheme: 'phonepe://pay' });
    const paytmEl = document.getElementById(`payPaytm-${s.stage}`);
    if (paytmEl) paytmEl.href = buildUpiLink({ ...linkArgs, scheme: 'paytmmp://pay' });

    const qrWrap = document.getElementById(`payQrWrap-${s.stage}`);
    // The `qrcode` npm package ships no plain-browser global build (it's
    // CommonJS-only) — jsDelivr's `+esm` endpoint auto-bundles it into a
    // real ES module on the fly, loaded lazily here via dynamic import
    // rather than a <script> tag the whole app would otherwise pay for.
    if (qrWrap) {
      import('https://cdn.jsdelivr.net/npm/qrcode@1.5.4/+esm')
        .then(({ default: QRCode }) => QRCode.toDataURL(upiLink, { width: 220, margin: 1 }))
        .then((dataUrl) => { qrWrap.innerHTML = `<img src="${dataUrl}" width="220" height="220" alt="UPI payment QR code">`; })
        .catch(() => { qrWrap.innerHTML = '<p>Could not generate QR code.</p>'; });
    }

    const confirmCheckbox = document.getElementById(`payConfirmCheckbox-${s.stage}`);
    const markPaidBtn = document.getElementById(`markPaidBtn-${s.stage}`);
    if (confirmCheckbox && markPaidBtn) {
      confirmCheckbox.addEventListener('change', () => { markPaidBtn.disabled = !confirmCheckbox.checked; });
      markPaidBtn.addEventListener('click', async () => {
        markPaidBtn.disabled = true; markPaidBtn.textContent = 'Saving…';
        const res = await fetch(`${API_BASE}/api/pay/${token}/mark-paid/${s.stage}`, { method: 'POST' });
        if (res.ok) {
          s.paid = true; s.paidAt = new Date().toISOString();
          renderPayPage();
        } else {
          markPaidBtn.disabled = false; markPaidBtn.textContent = '✅ Payment complete';
        }
      });
    }
  }

  async function boot() {
    const payMatch = location.pathname.match(/^\/pay\/([^/]+)/);
    if (payMatch) { await renderPublicPayPage(payMatch[1]); return; }
    state.user = await api.me();
    if (!state.user) { state.screen = 'login'; renderApp(); return; }
    const projectId = new URLSearchParams(location.search).get('p');
    if (projectId) {
      try {
        await openProject(projectId);
        return;
      } catch {
        history.replaceState(null, '', location.pathname);
      }
    }
    if (new URLSearchParams(location.search).get('screen') === 'goals') {
      state.screen = 'goals';
      renderApp();
      return;
    }
    state.screen = 'projects';
    renderApp();
  }
  boot();
})();
</script>
