  // How many of each planned stage are still needed to hit the goal —
  // target comes from the "Plan it yourself" allocation (stageTargetCounts),
  // done is how many DISTINCT PROJECTS actually paid that stage since the
  // goal started. Counting distinct projects (not raw earnings_log rows)
  // matters because a single project can legitimately produce more than one
  // row per stage — renegotiating an already-paid stage's price and getting
  // paid again appends a new row without replacing the old one (earnings_log
  // is append-only by design) — so counting rows directly would inflate a
  // stage's done count past its actual number of completed projects. Only
  // listed for stages the designer has actually set a target for — an
  // unplanned stage has nothing meaningful to compare against.
  function stagePendingSummary(summary) {
    const setAt = parseUtc(summary.goalSetAt);
    const targets = summary.stageTargetCounts || {};
    const doneProjects = { 2: new Set(), 3: new Set(), 4: new Set(), 5: new Set() };
    summary.entries.forEach(e => {
      if (doneProjects[e.stage] !== undefined && parseUtc(e.paidAt) >= setAt) doneProjects[e.stage].add(e.projectId);
    });
    const done = { 2: doneProjects[2].size, 3: doneProjects[3].size, 4: doneProjects[4].size, 5: doneProjects[5].size };
    return STAGE_ORDER
      .filter(s => (targets[s] || 0) > 0)
      .map(s => ({ stage: s, name: STAGE_NAMES[s], target: targets[s], done: done[s], pending: Math.max(0, targets[s] - done[s]) }));
  }
  // A project belongs in "In goal period" if it earned anything since the
  // goal started, OR it's been created/touched since then (still-unpaid,
  // actively-worked-on projects shouldn't feel exiled to "Others" just
  // because they haven't been paid yet) — otherwise it's "Others". Only
  // meaningful once a goal actually exists; callers should show a flat list
  // when goalProgress(summary) is null.
  function splitProjectsByGoalPeriod(projects, summary) {
    const setAt = parseUtc(summary.goalSetAt);
    const paidSinceProjectIds = new Set(
      summary.entries.filter(e => parseUtc(e.paidAt) >= setAt).map(e => e.projectId)
    );
    const inPeriod = [], others = [];
    for (const p of projects) {
      const activeSince = parseUtc(p.created_at) >= setAt || parseUtc(p.updated_at) >= setAt;
      (paidSinceProjectIds.has(p.id) || activeSince ? inPeriod : others).push(p);
    }
    return { inPeriod, others };
  }
  // Per-stage historical average and mix — the raw material both the "2
  // possibilities" comparison line and the month-by-month blueprint are
  // built from. Returns null if there's not enough history yet.
  function stageStatsFromEntries(entries) {
    if (!entries.length) return null;
    const byStage = new Map();
    for (const e of entries) {
      const s = byStage.get(e.stage) || { count: 0, total: 0 };
      s.count++; s.total += e.amountPaise;
      byStage.set(e.stage, s);
    }
    const totalCount = entries.length;
    const totalAmount = entries.reduce((sum, e) => sum + e.amountPaise, 0);
    const stages = [...byStage.entries()]
      .map(([stage, s]) => ({ stage, count: s.count, avg: s.total / s.count, share: s.count / totalCount }))
      .sort((a, b) => a.stage - b.stage);
    return { totalCount, avgPerCompletion: totalAmount / totalCount, stages };
  }
  // "Get this many projects/stages in month 1, this many in month 2..." —
  // translates the abstract ₹ goal into concrete, actionable units, using
  // this designer's own historical average revenue per stage-completion and
  // their own historical mix of which stages they typically get paid for.
  // Not a guarantee — a rough guide clearly labeled as such.
  function buildBlueprint(effectiveGoalPaise, earnedSoFar, entries) {
    const stats = stageStatsFromEntries(entries);
    if (!stats || !stats.avgPerCompletion) return null;
    const remaining = Math.max(0, effectiveGoalPaise - earnedSoFar);
    const neededCompletions = remaining > 0 ? Math.ceil(remaining / stats.avgPerCompletion) : 0;
    if (!neededCompletions) return { stats, months: [[], [], []], neededCompletions: 0 };

    const base = Math.floor(neededCompletions / 3);
    const extra = neededCompletions % 3;
    const perMonthCounts = [base + (extra > 0 ? 1 : 0), base + (extra > 1 ? 1 : 0), base];

    // Largest-remainder rounding so each month's stage-type counts add up
    // exactly to that month's total, split proportional to historical mix.
    const months = perMonthCounts.map((monthTotal) => {
      if (!monthTotal) return [];
      const raw = stats.stages.map((s) => ({ stage: s.stage, avg: s.avg, exact: s.share * monthTotal }));
      const floors = raw.map((r) => Math.floor(r.exact));
      const remainder = monthTotal - floors.reduce((a, b) => a + b, 0);
      const order = raw.map((r, i) => ({ i, frac: r.exact - floors[i] })).sort((a, b) => b.frac - a.frac);
      const counts = floors.slice();
      for (let k = 0; k < remainder; k++) counts[order[k % counts.length].i]++;
      return raw.map((r, i) => ({ stage: r.stage, avg: r.avg, count: counts[i] })).filter((x) => x.count > 0);
    });
    return { stats, months, neededCompletions };
  }

  // Canvas re-implementation of renderWaterfallSvg's layout (Goal + Planned

  function drawWaterfallCanvas(ctx, x0, y0, w, h, prices, counts, goalPaise) {
    let cum = 0;
    const segments = STAGE_ORDER.map((s) => {
      const count = counts[s] || 0, price = prices[s] || 0;
      const value = price * count;
      const start = cum; cum += value;
      return { stage: s, start, end: cum, count, price, value };
    });
    const total = cum;
    const { niceMax } = niceAxisScale(Math.max(total, goalPaise, 1), 4);
    const columnCount = segments.length + 2;
    const slot = w / columnCount;
    const barW = Math.min(70, slot * 0.55);
    const plotH = h - 50;
    const labelY1 = y0 + h - 26, labelY2 = y0 + h - 8;
    function barLabels(x, l1, l2) {

      const y = y0 + plotH - barH;

  // Short axis labels ("₹5k", "₹1.2L") — the full formatRupees() output is
  // too wide to sit down the left edge of the chart without crowding it.
  function formatCompactRupees(paise) {
    const rupees = paise / 100;
    if (rupees >= 100000) return `₹${(rupees / 100000).toFixed(rupees % 100000 === 0 ? 0 : 1)}L`;
    if (rupees >= 1000) return `₹${(rupees / 1000).toFixed(rupees % 1000 === 0 ? 0 : 1)}k`;
    return `₹${Math.round(rupees)}`;
  }
  // Picks a "nice" round step (1/2/5 × a power of 10) for Y-axis gridlines,
  // the way any normal charting library would, instead of arbitrary
  // fractions of the raw max — e.g. steps of ₹2,000 or ₹5,000, not ₹1,847.
  function niceAxisScale(maxVal, tickCount) {
    const rawStep = maxVal / tickCount;
    const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep || 1)));
    const residual = rawStep / magnitude;
    const niceResidual = residual > 5 ? 10 : residual > 2 ? 5 : residual > 1 ? 2 : 1;
    const step = niceResidual * magnitude;
    const niceMax = Math.ceil(maxVal / step) * step;
    const ticks = [];
    for (let v = 0; v <= niceMax + 0.001; v += step) ticks.push(v);
    return { niceMax: Math.max(niceMax, step), ticks };
  }
  // Hand-rolled inline SVG — bars for actual months, dashed lines for the

  function renderTrendSvg(months, summary) {

    const plotW = W - PAD_L - PAD_R, plotH = H - PAD_T - PAD_B;
    const { niceMax, ticks } = niceAxisScale(maxPast, 4);

    const barW = Math.min(34, slot * 0.5);
    const points = buckets.map((b, i) => {
      const x = PAD_L + slot * i + slot / 2;
      const y = PAD_T + plotH - (b.paise / niceMax) * plotH;

    }).join('');

    const dots = points.map(p => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="#a05f10"/>`).join('');

    const valueLabels = points.map(p => `<text x="${p.x.toFixed(1)}" y="${(p.y - 8).toFixed(1)}" font-size="9.5" font-weight="700" fill="#565b66" text-anchor="middle">${esc(formatCompactRupees(p.b.paise))}</text>`).join('');
    const labels = points.map(p => `<text x="${p.x.toFixed(1)}" y="${H - 6}" font-size="10" fill="#8b92a1" text-anchor="middle">${esc(p.b.label)}</text>`).join('');
    return `<svg viewBox="0 0 ${W} ${H}" class="trend-svg" preserveAspectRatio="xMidYMid meet">${grid}${bars}${line}${dots}${valueLabels}${labels}</svg>`;
  }
  // Same months as the chart above, but 4 separate bars per month — one per

      // Drawn as a pill (rounded rect behind the text) rather than plain
      // text so it visually stands out from the chart, same as every other
      // pill-styled number elsewhere in the app — width is a rough estimate

      const totalCx = groupStart + groupSlot / 2;

      const totalPillH = 15;
      const totalPillX = totalCx - totalPillW / 2;
      const totalPillY = TOTAL_Y - totalPillH + 4;
      const totalLabel = `<rect x="${totalPillX.toFixed(1)}" y="${totalPillY.toFixed(1)}" width="${totalPillW.toFixed(1)}" height="${totalPillH}" rx="${totalPillH / 2}" fill="#eef1f2" stroke="#d8dce0" stroke-width="1"/><text x="${totalCx.toFixed(1)}" y="${(totalPillY + totalPillH / 2 + 3.3).toFixed(1)}" font-size="9.5" font-weight="700" fill="#565b66" text-anchor="middle">${esc(totalText)}</text>`;
      return rects + monthLabel + totalLabel;
    }).join('');

  }
  // The chart + blueprint together — re-rendered live on every slider drag
  // (via effectiveGoalPaise), separately from the slider element itself so
  // dragging never recreates the <input> mid-gesture.
  // ---------- Stage-level manual allocation: price + count slider per stage.
  // Every paid project necessarily passes through 2 before 3, 3 before 4, 4
  // before 5 (StagePay itself enforces this — a later stage can't even be
  // started until the one before it is locked) — so the counts are NOT
  // independent. They form a funnel: count[2] >= count[3] >= count[4] >=
  // count[5]. Increasing a later stage must pull every earlier stage up to
  // at least that value (those same projects already paid the earlier
  // stages on the way); decreasing an earlier stage must pull every later
  // stage down to at most that value (a later stage can't have MORE
  // completions than an earlier one). Stage 1 is simply the same as Stage 2
  // — every project that pays anything starts by paying Stage 2, so it's
  // not a separate slider or a ratio, it's a direct mirror.
  const STAGE_ORDER = [2, 3, 4, 5];
  // Stage 5 was '#2f7a4f' — a green close enough to Stage 2's teal-green
  // that the two read as the same color at pill/bar size. Blue keeps all
  // four stages (and the waterfall's red "Goal" bar) perceptually distinct.
  // Stage 1 has no earnings of its own (see STAGE_NAMES) so it never needed
  // a chart color until the per-project "current stage" pill did — a
  // neutral gray, distinct from all 4 paid-stage colors.
  const STAGE_COLORS = { 1: '#9aa0ab', 2: '#176b5e', 3: '#a05f10', 4: '#8b5fbf', 5: '#2464b4' };
  // Same names as each lane's own header in the swimlane (renderLane1-5) —
  // "Stage 2" alone doesn't mean anything to the designer day-to-day.
  const STAGE_NAMES = { 1: 'Client Brief', 2: 'Story Board', 3: 'Visual & Music', 4: 'Scene Blueprint', 5: 'Final Movie' };
  const GOAL_STEP_PAISE = 500000; // ₹5,000 — the goal slider only ever lands on this grid
  const WORK_HISTORY_MONTHS = 6; // Work History tab's fixed window — used to be a 3/6-month toggle, now just always 6
  // Positions each label where a native range thumb would actually sit for
  // that value — inset from both edges by half the thumb's width, not
  // spread edge-to-edge — so labels line up with the real tick/thumb
  // position instead of drifting outward at the low and high ends.
  function renderSliderTicks(min, max, values, formatFn) {
    const THUMB_RADIUS = 8; // px, ~half a native range thumb's width
    const span = max - min || 1;
    const items = values.map(v => {
      const pct = ((v - min) / span) * 100;
      return `<span style="left:calc(${THUMB_RADIUS}px + (100% - ${THUMB_RADIUS * 2}px) * ${pct} / 100)">${esc(formatFn(v))}</span>`;
    }).join('');
    return `<div class="slider-ticks">${items}</div>`;
  }
  function stageAllocationDraft(summary) {
    if (!state.stagePricesDraft) {
      const p = summary.stagePricesPaise || {};
      state.stagePricesDraft = { 2: p[2] || 0, 3: p[3] || 0, 4: p[4] || 0, 5: p[5] || 0 };
    }
    if (!state.stageCountsDraft) {
      const c = summary.stageTargetCounts || {};
      state.stageCountsDraft = { 2: c[2] || 0, 3: c[3] || 0, 4: c[4] || 0, 5: c[5] || 0 };
    }
    return { prices: state.stagePricesDraft, counts: state.stageCountsDraft };
  }
  function stageAllocationTotal(prices, counts) {
    return STAGE_ORDER.reduce((sum, s) => sum + (prices[s] || 0) * (counts[s] || 0), 0);
  }
  // Restores the funnel invariant around whichever stage just changed —
  // correct in one pass because the invariant is assumed true beforehand
  // (it's re-applied after every single change, so it never has a chance to
  // drift further out of shape than "one stage just moved").
  function applyFunnelCascade(counts, changedStage, newValue) {
    counts[changedStage] = newValue;
    const idx = STAGE_ORDER.indexOf(changedStage);
    for (let i = idx - 1; i >= 0; i--) { // earlier stages must be >= new value
      const s = STAGE_ORDER[i];
      if (counts[s] < newValue) counts[s] = newValue;
    }
    for (let i = idx + 1; i < STAGE_ORDER.length; i++) { // later stages must be <= new value

      if (counts[s] > newValue) counts[s] = newValue;

  // "must not push the total past the goal" was the bug: raising a later
  // stage forces the cascade to also bump earlier ones, and that combined
  // jump can overshoot the remaining budget by itself, freezing the slider
  // at 0 even though the move is perfectly valid — you're just allowed to
  // plan for more (or less) than the goal, and the status line below says
  // which. A ceiling of 999 was also unrealistic on its own terms: nobody
  // is running 999 of one stage in a 3-month window, so a flat, fixed 15
  // (same for every stage, priced or not) keeps the whole thing planning at
  // a believable scale and lets the same tick marks line up across sliders.
  const STAGE_SLIDER_MAX = 15;

  }

    const verb = diff > 0 ? 'above' : 'below';
    return `Income Goal ${formatRupees(goalPaise)} · Planned ${formatRupees(total)} — ${formatRupees(Math.abs(diff))} ${verb} goal`;
  }
  // Waterfall, left to right: Goal and Actual sit first as two independent
  // full bars (0 to their own value, not floating), then Stage 2-5 follow,
  // floating between the running cumulative total before/after each — so

  // what I actually planned, and here's how that splits across stages."

  function renderWaterfallSvg(prices, counts, goalPaise) {
    const colors = STAGE_COLORS;
    let cum = 0;
    const segments = STAGE_ORDER.map(s => {
      const count = counts[s] || 0, price = prices[s] || 0;
      const value = price * count;
      const start = cum; cum += value;
      return { stage: s, start, end: cum, count, price, value };
    });
    const total = cum;
    const W = 600, H = 196, PAD_L = 46, PAD_R = 14, PAD_T = 20, PAD_B = 42;
    const plotW = W - PAD_L - PAD_R, plotH = H - PAD_T - PAD_B;
    const { niceMax, ticks } = niceAxisScale(Math.max(total, goalPaise, 1), 4);
    const grid = ticks.map(t => {
      const y = PAD_T + plotH - (t / niceMax) * plotH;
      return `<line x1="${PAD_L}" y1="${y.toFixed(1)}" x2="${W - PAD_R}" y2="${y.toFixed(1)}" stroke="#e8ebed" stroke-width="1"/>
              <text x="${(PAD_L - 6).toFixed(1)}" y="${(y + 3).toFixed(1)}" font-size="9.5" fill="#8b92a1" text-anchor="end">${esc(formatCompactRupees(t))}</text>`;
    }).join('');
    const columnCount = segments.length + 2; // Goal + Actual + 4 stages
    const slot = plotW / columnCount;
    const barW = Math.min(52, slot * 0.55);
    const labelY1 = H - 26, labelY2 = H - 13;
    const barLabels = (x, l1, l2) => `
      <text x="${x.toFixed(1)}" y="${labelY1}" font-size="10" font-weight="700" fill="#565b66" text-anchor="middle">${esc(l1)}</text>
      <text x="${x.toFixed(1)}" y="${labelY2}" font-size="8.5" fill="#8b92a1" text-anchor="middle">${esc(l2)}</text>`;
    const standaloneBar = (index, value, color, label) => {
      const x = PAD_L + slot * index + slot / 2;

      const h = Math.max(2, PAD_T + plotH - y);

    const floatBars = segments.map((seg, i) => {
      const index = i + 2;
      const x = PAD_L + slot * index + slot / 2;
      const yTop = PAD_T + plotH - (seg.end / niceMax) * plotH;
      const yBottom = PAD_T + plotH - (seg.start / niceMax) * plotH;
      const h = Math.max(2, yBottom - yTop);

      return `<rect x="${(x - barW / 2).toFixed(1)}" y="${yTop.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" rx="4" fill="${colors[seg.stage]}"/>

      const index1 = i + 2, index2 = i + 3;
      const x1 = PAD_L + slot * index1 + slot / 2 + barW / 2;
      const x2 = PAD_L + slot * index2 + slot / 2 - barW / 2;
      const y = PAD_T + plotH - (seg.end / niceMax) * plotH;
      return `<line x1="${x1.toFixed(1)}" y1="${y.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#dbdfe2" stroke-width="1" stroke-dasharray="2,3"/>`;
    }).join('');
    return `<svg viewBox="0 0 ${W} ${H}" class="trend-svg" preserveAspectRatio="xMidYMid meet">${grid}${goalBar}${plannedBar}${connectors}${floatBars}</svg>`;
  }
  function renderStageAllocationSection(summary, goalPaise) {
    const { prices, counts } = stageAllocationDraft(summary);
    // Normalize on load only — guards against stale saved data from before
    // the funnel rule existed. Not a budget clamp: carrying the max count
    // seen so far from Stage 5 up to Stage 2 just enforces 2≥3≥4≥5.
    let carry = 0;
    for (let i = STAGE_ORDER.length - 1; i >= 0; i--) {

    const priceOptions = [500, 1000, 2000, 5000, 10000];

      return `<button type="button" class="pill ${selected ? 'selected' : ''}" data-stage-price-pill="${stage}" data-price-paise="${paise}">₹${rupees}</button>`;
    };

    const stageRow = (stage) => {
      const max = stageSliderCeiling();
      const price = prices[stage] || 0;

  // Images render directly; anything that isn't image/video (PDF etc.) gets
  // a generic file-type tile. Wrapped in the app's existing data-media-preview
  // chip so clicking it opens the shared full-file viewer modal
  // (openMediaViewerModal) — no separate lightbox needed. Videos are handled
  // separately by showcaseMediaHtml below (needs a stored thumbnail, not
  // just a live <video> tag — see its own comment) — this helper is only
  // used for the image/file cases plus candidateMediaHtml's plain video
  // preview (candidates only ever show inside the authenticated, desktop-
  // only management screen, so a live <video> tag there is fine).
  function mediaPreviewTileHtml(fileUrl, isVideo, isImage, fileName) {
    if (isImage) {
      return `<a href="${esc(fileUrl)}" data-media-preview data-media-name="${esc(fileName)}" data-media-kind="image"><img src="${esc(fileUrl)}" alt="${esc(fileName)}" loading="lazy" draggable="false"></a>`;
    }
    if (isVideo) {
      return `<a href="${esc(fileUrl)}" data-media-preview data-media-name="${esc(fileName)}" data-media-kind="video"><video src="${esc(fileUrl)}" muted playsinline preload="metadata" draggable="false" disablepictureinpicture></video></a>`;
    }
    return `<a href="${esc(fileUrl)}" data-media-preview data-media-name="${esc(fileName)}" data-media-kind="file" class="showcase-file-tile"><span>${(fileName || '').toLowerCase().endsWith('.pdf') ? 'PDF' : 'File'}</span></a>`;
  }
  // Already-showcased items (shown on both the management grid and the
  // PUBLIC /showcase/:userId page). Both images and videos render a stored,
  // downsized JPEG (captured client-side right after adding — see
  // captureImageThumbnail/captureVideoThumbnail below), falling back to the
  // full-size original (image) or a raw <video preload="metadata"> tag
  // (video) only if no thumbnail was ever generated. Two reasons this
  // matters, not just one: a live <video> tag alone frequently paints
  // nothing at all on mobile browsers, and every project deliverable here
  // is stored at full original resolution (routinely 0.5-2MB+) — loading
  // that in full just to shrink it into a 140px tile is exactly why tiles
  // felt slow to load, especially on mobile data.
  function showcaseMediaHtml(itemId, mimeType, fileName) {
    const fileUrl = api.showcaseFileUrl(itemId);
    const mime = mimeType || '';
    if (mime.startsWith('video/')) {
      return `<a href="${esc(fileUrl)}" data-media-preview data-media-name="${esc(fileName)}" data-media-kind="video">
        <img src="${esc(api.showcaseThumbnailUrl(itemId))}" alt="${esc(fileName)}" loading="lazy" draggable="false" data-showcase-fallback="${esc(fileUrl)}" data-showcase-fallback-kind="video">
      </a>`;
    }
    if (mime.startsWith('image/')) {
      return `<a href="${esc(fileUrl)}" data-media-preview data-media-name="${esc(fileName)}" data-media-kind="image">
        <img src="${esc(api.showcaseThumbnailUrl(itemId))}" alt="${esc(fileName)}" loading="lazy" draggable="false" data-showcase-fallback="${esc(fileUrl)}" data-showcase-fallback-kind="image">
      </a>`;
    }
    return mediaPreviewTileHtml(fileUrl, false, false, fileName);
  }
  // A thumbnail <img> that 404s (no stored JPEG ever generated) swaps itself
  // for the right fallback — the full-size original for an image, a real
  // <video> element for a video — done via a real error listener rather
  // than an inline onerror string so the file URL never has to be escaped
  // twice into an HTML attribute.
  function wireShowcaseThumbFallbacks() {
    document.querySelectorAll('img[data-showcase-fallback]').forEach((img) => {
      img.addEventListener('error', () => {
        const url = img.getAttribute('data-showcase-fallback');
        if (img.getAttribute('data-showcase-fallback-kind') === 'video') {
          const video = document.createElement('video');
          video.src = url;
          video.muted = true; video.playsInline = true; video.preload = 'metadata';
          video.draggable = false;
          video.disablePictureInPicture = true;
          img.replaceWith(video);
        } else {
          img.removeAttribute('data-showcase-fallback');
          img.draggable = false;
          img.src = url;
        }
      }, { once: true });
    });
  }
  // Captures a single JPEG frame from a video — always called against the
  // PUBLIC /showcase-items/:id/file URL (after the item has already been
  // added to showcase), so a plain crossOrigin='anonymous' load is enough
  // to avoid tainting the canvas — no cookies needed since that route
  // requires no auth. (The earlier version of this tried to capture from
  // the authenticated /api/media/:key route pre-add and never set
  // crossOrigin at all, so it silently failed every single time.)
  function captureVideoThumbnail(url) {
    return new Promise((resolve, reject) => {
      const video = document.createElement('video');
      video.crossOrigin = 'anonymous';
      video.muted = true; video.playsInline = true; video.preload = 'auto';
      video.src = url;
      video.addEventListener('loadeddata', () => { video.currentTime = Math.min(1, (video.duration || 0) / 2); }, { once: true });
      video.addEventListener('seeked', () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        if (!ctx) { reject(new Error('no_canvas_context')); return; }
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error('capture_failed')), 'image/jpeg', 0.8);
      }, { once: true });
      video.addEventListener('error', () => reject(new Error('video_load_failed')), { once: true });
    });
  }
  // Same idea as captureVideoThumbnail, for images — downsizes to a max of
  // 480px on the longest side, well past what a 140px tile ever needs to
  // show, while the tile's own click-through still opens the full-size
  // original (this only ever affects the grid thumbnail, never the file
  // that's actually served for viewing/download).
  function captureImageThumbnail(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const maxDim = 480;
        const scale = Math.min(1, maxDim / Math.max(img.naturalWidth, img.naturalHeight));
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.naturalWidth * scale);
        canvas.height = Math.round(img.naturalHeight * scale);
        const ctx = canvas.getContext('2d');
        if (!ctx) { reject(new Error('no_canvas_context')); return; }
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error('capture_failed')), 'image/jpeg', 0.8);
      };
      img.onerror = () => reject(new Error('image_load_failed'));
      img.src = url;
    });
  }
  // Shared by both the "add from delivered work" and "upload a promo file"
  // handlers below — captures + stores a thumbnail for whichever media kind
  // was just added, best-effort (a failure just leaves the existing
  // fallback in place, never blocks the add/upload itself).
  async function captureAndStoreShowcaseThumbnail(showcaseItemId, kind) {
    if (kind !== 'video' && kind !== 'image') return;
    try {
      const blob = kind === 'video'
        ? await captureVideoThumbnail(api.showcaseFileUrl(showcaseItemId))
        : await captureImageThumbnail(api.showcaseFileUrl(showcaseItemId));
      await api.uploadShowcaseThumbnail(showcaseItemId, blob);
    } catch { /* best-effort */ }
  }
  // Not-yet-showcased candidates (source project item: served from the
  // authenticated /api/media/:key route, since there's no showcase_items row
  // yet — fine here since only the logged-in designer ever sees this list).
  function candidateMediaHtml(c) {

      <button type="button" class="showcase-tile-remove" data-remove-showcase="${esc(item.id)}" title="Remove from showcase">×</button>

  // every tile — most useful in the Stage 3 column, which mixes four

  function showcaseCandidateTileHtml(c) {
    return `<div class="showcase-tile">

  // Project → Stage (2-5) — same stage grouping as everywhere else in the
  // app (STAGE_NAMES/STAGE_COLORS), since this is a working/management view
  // for the designer, not the public-facing page (which groups by the finer
  // item-type category instead — different audience, different framing).
  function groupCandidatesByProjectAndStage(candidates) {
    const byProject = new Map();
    for (const c of candidates) {
      const projectKey = c.projectName || '(untitled project)';
      if (!byProject.has(projectKey)) byProject.set(projectKey, { 2: [], 3: [], 4: [], 5: [] });
      const byStage = byProject.get(projectKey);
      if (byStage[c.stage]) byStage[c.stage].push(c);

  // One card per project, 4 columns (Stage 2-5) inside — each column has a
  // capped height with its own internal scroll, so a stage with many items
  // (Stage 3 especially, which mixes Characters/Props/Backgrounds/Music)
  // never stretches the card or leaves the other columns half-empty next
  // to it; every project's card stays the same shape regardless of how
  // lopsided its item counts are.
  function showcaseCandidatesHtml(candidates) {
    const grouped = groupCandidatesByProjectAndStage(candidates);
    let html = '';
    for (const [projectName, byStage] of grouped) {
      html += `<div class="showcase-project-card">

              <div class="showcase-project-column-body">

  // The two contact-link inputs (custom URL vs. WhatsApp number) both save
  // into the same contact_link column — this just recognizes a wa.me link

  function whatsappNumberFromLink(link) {
    const match = /^https:\/\/wa\.me\/(\d+)$/.exec(link || '');
    return match ? match[1] : null;
  }
  function renderShowcaseCard() {
    const publicUrl = `${location.origin}/showcase/${state.user.showcase_slug || state.user.id}`;

            <input type="text" id="showcaseSlugInput" placeholder="your-name" value="${esc(state.user.showcase_slug || '')}" maxlength="30">
          </div>
          <button class="btn btn-sm" id="showcaseSlugSaveBtn">Save</button>
        </div>
        <p class="showcase-field-note">3-30 lowercase letters, numbers, or hyphens. Leave blank to use the default link above.</p>
      </div>

      ${(() => {
        const waNumber = whatsappNumberFromLink(state.user.contact_link);
        const customValue = waNumber ? '' : (state.user.contact_link || '');
        return `
      <div class="showcase-field-section">
        <div class="showcase-field-label">"Get in touch" button (optional)</div>
        <div class="showcase-field-row">
          <input type="text" id="showcaseContactInput" placeholder="https://instagram.com/you" value="${esc(customValue)}" maxlength="300">
          <button class="btn btn-sm" id="showcaseContactSaveBtn">Save</button>
        </div>
        <p class="showcase-field-note">Your Instagram, LinkedIn, or website profile URL. Leave blank to hide the button entirely.</p>
        <div class="showcase-field-row" style="margin-top:8px">
          <div class="input-with-prefix">
            <span class="input-prefix">or WhatsApp:</span>
            <input type="text" id="showcaseWhatsappInput" placeholder="919876543210" value="${esc(waNumber || '')}" maxlength="15" inputmode="numeric">
          </div>
          <button class="btn btn-sm" id="showcaseWhatsappSaveBtn">Save</button>
        </div>
        <p class="showcase-field-note">Just the digits, country code first — no +, spaces, or dashes. Builds a wa.me link for you.</p>
      </div>`;
      })()}

      ${items.length
        ? `<div class="showcase-grid" style="margin-bottom:18px">${items.map(showcaseTileHtml).join('')}</div>`
        : '<p class="empty-note" style="margin-bottom:18px">Nothing showcased yet.</p>'}

      <div style="margin-bottom:18px">
        <input type="file" id="showcasePromoInput" accept="image/png,image/jpeg,video/mp4,video/quicktime" style="display:none">
        <button class="btn" id="showcasePromoBtn">Upload your Creative Portfolio</button>
        <p style="margin:6px 0 0;font-size:11.5px;color:var(--text-faint)">Not a client deliverable? Add photos or a demo reel to your "Creative Portfolio" section — one reel video max (remove it to replace), images unlimited, up to 50MB each.</p>

      ${candidates.length
        ? `<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;flex-wrap:wrap">
             <p style="margin:0;font-size:11.5px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.04em">Add from your delivered work</p>
             <input type="text" id="showcaseCandidateSearchInput" placeholder="🔍 Search by project name…" value="${esc(state.showcaseCandidateSearch)}" style="max-width:220px;font-size:12.5px">

  }
  // Client-side only — everything's already loaded, filtering is just an
  // array filter + re-render of the list container (never the search input
  // itself, so typing never loses focus/cursor position).
  function filteredShowcaseCandidates(candidates) {
    const term = (state.showcaseCandidateSearch || '').trim().toLowerCase();
    if (!term) return candidates;
    return candidates.filter((c) => (c.projectName || '').toLowerCase().includes(term));
  }
  function renderShowcaseCandidateList(candidates) {
    const filtered = filteredShowcaseCandidates(candidates);
    return filtered.length ? showcaseCandidatesHtml(filtered) : '<p class="empty-note">No projects match your search.</p>';
  }
  // Extracted so the search filter can re-wire just the candidate list's
  // "+ Add" buttons after replacing its innerHTML, without re-running (and
  // double-binding) every other handler in wireShowcaseCard.
  function wireShowcaseCandidateButtons() {
    document.querySelectorAll('[data-add-showcase]').forEach((btn) => btn.addEventListener('click', async () => {
      const sourceItemId = btn.getAttribute('data-add-showcase');
      const key = btn.getAttribute('data-key');
      const fileName = btn.getAttribute('data-filename');
      btn.disabled = true; btn.textContent = 'Adding…';
      const result = await api.addShowcase(sourceItemId, key, fileName);
      if (result.error) {
        toast(result.error === 'showcase_limit_reached' ? `Showcase is full (max ${result.max})` : 'Failed to add to showcase', true);
        btn.disabled = false; btn.textContent = '+ Add';
        return;
      }
      toast('Added to your showcase');
      const candidate = state.showcaseCandidates.find((c) => c.itemId === sourceItemId && c.key === key);
      if (candidate) await captureAndStoreShowcaseThumbnail(result.id, candidate.kind);
      await refreshShowcaseScreen();
    }));
  }
  function wireShowcaseCard() {
    wireShowcaseThumbFallbacks();
    document.getElementById('showcaseCopyLinkBtn').addEventListener('click', () => {
      const publicUrl = `${location.origin}/showcase/${state.user.showcase_slug || state.user.id}`;
      navigator.clipboard.writeText(publicUrl).then(() => toast('Link copied'), () => toast('Failed to copy link', true));
    });
    // Flashes the button green with a checkmark before the card re-renders,
    // so a save gives visible confirmation beyond the toast alone.
    function flashSaved(btn, rerender) {
      btn.disabled = true;
      btn.textContent = '✓ Saved';
      btn.classList.add('btn-saved');
      setTimeout(rerender, 700);
    }
    const slugInput = document.getElementById('showcaseSlugInput');
    slugInput.addEventListener('input', () => {
      const cleaned = slugInput.value.toLowerCase().replace(/[^a-z0-9-]/g, '');
      if (cleaned !== slugInput.value) slugInput.value = cleaned;
    });
    document.getElementById('showcaseSlugSaveBtn').addEventListener('click', async () => {
      const input = document.getElementById('showcaseSlugInput');
      const btn = document.getElementById('showcaseSlugSaveBtn');
      const value = input.value.trim().toLowerCase();
      if (value && (value.length < 3 || value.length > 30)) {
        toast('Use 3-30 lowercase letters, numbers, or hyphens.', true);
        return;
      }
      btn.disabled = true; btn.textContent = 'Saving…';
      const res = await api.updateMe({ showcaseSlug: value });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        toast(body.message || 'Failed to save link', true);
        btn.disabled = false; btn.textContent = 'Save';
        return;
      }
      state.user.showcase_slug = value || null;
      toast(value ? 'Public link updated' : 'Reverted to your default link');
      flashSaved(btn, () => {
        document.getElementById('showcaseCardRoot').innerHTML = renderShowcaseCard();
        wireShowcaseCard();
      });
    });
    document.getElementById('showcaseContactSaveBtn').addEventListener('click', async () => {
      const input = document.getElementById('showcaseContactInput');
      const btn = document.getElementById('showcaseContactSaveBtn');
      const value = input.value.trim();
      btn.disabled = true; btn.textContent = 'Saving…';
      const res = await api.updateMe({ contactLink: value });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        toast(body.message || 'Failed to save contact link', true);
        btn.disabled = false; btn.textContent = 'Save';
        return;
      }
      state.user.contact_link = value || null;
      toast(value ? 'Contact link updated' : 'Contact button removed from your public page');
      flashSaved(btn, () => {
        document.getElementById('showcaseCardRoot').innerHTML = renderShowcaseCard();
        wireShowcaseCard();
      });
    });
    const whatsappInput = document.getElementById('showcaseWhatsappInput');
    whatsappInput.addEventListener('input', () => {
      const cleaned = whatsappInput.value.replace(/\D/g, '');
      if (cleaned !== whatsappInput.value) whatsappInput.value = cleaned;
    });
    document.getElementById('showcaseWhatsappSaveBtn').addEventListener('click', async () => {
      const input = document.getElementById('showcaseWhatsappInput');
      const btn = document.getElementById('showcaseWhatsappSaveBtn');
      const digits = input.value.replace(/\D/g, '');
      if (digits && digits.length < 8) { toast('That number looks too short — include the country code, e.g. 91 for India.', true); return; }
      const value = digits ? `https://wa.me/${digits}` : '';
      btn.disabled = true; btn.textContent = 'Saving…';
      const res = await api.updateMe({ contactLink: value });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        toast(body.message || 'Failed to save WhatsApp link', true);
        btn.disabled = false; btn.textContent = 'Save';
        return;
      }
      state.user.contact_link = value || null;
      toast(value ? 'WhatsApp link updated' : 'Contact button removed from your public page');
      flashSaved(btn, () => {
        document.getElementById('showcaseCardRoot').innerHTML = renderShowcaseCard();
        wireShowcaseCard();
      });
    });
    document.querySelectorAll('[data-remove-showcase]').forEach((btn) => btn.addEventListener('click', async () => {
      btn.disabled = true;
      await api.removeShowcase(btn.getAttribute('data-remove-showcase'));
      toast('Removed from your showcase');
      await refreshShowcaseScreen();
    }));
    wireShowcaseCandidateButtons();
    const searchInput = document.getElementById('showcaseCandidateSearchInput');
    if (searchInput) {
      searchInput.addEventListener('input', () => {
        state.showcaseCandidateSearch = searchInput.value;
        const candidates = state.showcaseCandidates.filter((c) => !c.isShowcased);
        document.getElementById('showcaseCandidateList').innerHTML = renderShowcaseCandidateList(candidates);
        wireShowcaseCandidateButtons();
      });
    }
    const promoBtn = document.getElementById('showcasePromoBtn');
    const promoInput = document.getElementById('showcasePromoInput');
    promoBtn.addEventListener('click', () => promoInput.click());
    promoInput.addEventListener('change', async () => {
      const file = promoInput.files[0];
      promoInput.value = '';
      if (!file) return;
      if (!['image/png', 'image/jpeg', 'video/mp4', 'video/quicktime'].includes(file.type)) {
        toast('Please choose a PNG, JPG, or MP4/MOV.');
        return;
      }
      // Only one portfolio-reel VIDEO — a promo image can still be added
      // freely, but a second reel video would just be confusing on the
      // public page's "Creative Portfolio" section (it's meant to be one
      // highlight reel, not a growing pile of clips).
      const hasPromoVideo = state.showcaseItems.some((it) => !it.source_item_id && (it.mime_type || '').startsWith('video/'));
      if (file.type.startsWith('video/') && hasPromoVideo) {
        toast('Only one portfolio reel video allowed — remove the existing one first.');
        return;
      }
      if (!checkFileSize(file, 50)) return;
      promoBtn.disabled = true; promoBtn.textContent = 'Uploading…';
      const result = await api.uploadShowcasePromo(file);
      if (result.error) {
        toast(result.error === 'showcase_limit_reached' ? `Showcase is full (max ${result.max})` : 'Upload failed', true);
        promoBtn.disabled = false; promoBtn.textContent = 'Upload your Creative Portfolio';
        return;
      }
      toast('Added to your showcase');
      const promoKind = file.type.startsWith('video/') ? 'video' : file.type.startsWith('image/') ? 'image' : null;
      if (promoKind) await captureAndStoreShowcaseThumbnail(result.id, promoKind);
      promoBtn.disabled = false; promoBtn.textContent = 'Upload your Creative Portfolio';
      await refreshShowcaseScreen();
    });
  }

  function renderProjectListHtml(projects) {
    return projects.length
      ? projects.map(p => {
          const stage = p.current_stage || 1;
          return `<div class="project-list-item" data-open-project="${p.id}">
          <div><strong>${esc(p.name)}</strong><div style="font-size:11.5px;color:var(--text-faint)">updated ${esc(p.updated_at)}</div></div>
          <div style="display:flex;align-items:center;gap:10px">
            ${p.completed
              ? `<span class="project-stage-pill completed" title="All 5 stages locked and paid">✅ Completed</span>`
              : `<span class="project-stage-pill" title="${esc(STAGE_NAMES[stage])}">Stage ${stage}</span>`}
            ${p.earned_paise > 0 ? `<span class="project-earned-pill">💰 ${formatRupees(p.earned_paise)} earned (${p.earned_count})</span>` : `<span class="project-earned-pill" style="visibility:hidden"></span>`}
            ${p.pending_paise > 0 ? `<span class="project-pending-pill">⏳ ${formatRupees(p.pending_paise)} pending (${p.pending_count})</span>` : ''}
            <button class="btn btn-sm btn-danger" data-delete-project="${p.id}">Delete</button>
          </div>
        </div>`;
        }).join('')
      : '<p class="empty-note">No projects yet — create your first one above.</p>';
  }
  // The In-goal-period/Others tabs only appear once a goal actually exists —
  // with no goal set there's no period to split by, so it stays a flat list.
  function renderProjectsListCard() {
    const progress = goalProgress(state.earningsSummary);
    const split = progress ? splitProjectsByGoalPeriod(state.projects, state.earningsSummary) : null;
    const activeList = split ? (state.projectsTab === 'others' ? split.others : split.inPeriod) : state.projects;
    return `
      <div class="section-head-row" style="justify-content:space-between">
        <span class="section-title">Your projects</span>
        <span style="font-size:11.5px;font-weight:700;color:${state.projects.length >= state.projectsMax ? 'var(--crimson)' : 'var(--text-faint)'}">${state.projects.length} / ${state.projectsMax}</span>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <input type="text" id="newProjectName" placeholder="Customer Name - Project Name" maxlength="100" style="flex:1">
        <button class="btn btn-primary" id="createProjectBtn">+ Create</button>
      </div>
      ${split ? `<div class="goal-range-toggle">
        <button data-projects-tab="in-period" class="${state.projectsTab === 'others' ? '' : 'active'}">In goal period (${split.inPeriod.length})</button>
        <button data-projects-tab="others" class="${state.projectsTab === 'others' ? 'active' : ''}">Other projects (${split.others.length})</button>
      </div>` : ''}
      <div id="projectList">${renderProjectListHtml(activeList)}</div>`;
  }
  function renderProjectsListCardInto() {
    const root = document.getElementById('projectsListCardRoot');
    if (!root) return;
    root.innerHTML = renderProjectsListCard();
    wireProjectsListCard();
  }
  function wireProjectsListCard() {
    document.querySelectorAll('[data-projects-tab]').forEach(btn => btn.addEventListener('click', () => {
      state.projectsTab = btn.getAttribute('data-projects-tab');
      renderProjectsListCardInto();
    }));
    document.querySelectorAll('[data-open-project]').forEach(el => el.addEventListener('click', (e) => {
      if (e.target.closest('[data-delete-project]')) return;
      openProject(el.getAttribute('data-open-project'));
    }));
    document.querySelectorAll('[data-delete-project]').forEach(el => el.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = el.getAttribute('data-delete-project');
      const project = state.projects.find(p => p.id === id);
      if (!(await showDeleteProjectModal(project ? project.name : 'this project'))) return;
      el.disabled = true; el.textContent = 'Deleting…';
      await api.deleteProject(id);
      renderProjectsScreen();
    }));
    const createBtn = document.getElementById('createProjectBtn');
    if (createBtn) createBtn.addEventListener('click', async () => {
      const nameInput = document.getElementById('newProjectName');
      const name = nameInput.value.trim();
      if (!name) { toast('Enter Customer Name - Project Name'); nameInput.focus(); return; }
      createBtn.disabled = true; createBtn.textContent = 'Creating…';
      const created = await api.createProject(name);
      if (created.error) {
        toast(created.message || (created.error === 'project_limit_reached' ? `You've reached the ${created.max}-project limit — delete an old one first.` : 'Failed to create project'));
        createBtn.disabled = false; createBtn.textContent = '+ Create';
        return;
      }
      openProject(created.id);
    });
  }
  async function renderProjectsScreen() {
    const projectList = await api.listProjects();
    state.projects = projectList.projects;
    state.projectsMax = projectList.max;
    state.earningsSummary = await api.getEarningsSummary();
    document.getElementById('app').innerHTML = `
      <div id="topbar" class="topbar"></div>
      <div class="container">
        ${renderGoalStrip(state.earningsSummary)}
        <div class="card" id="projectsListCardRoot">${renderProjectsListCard()}</div>
      </div>
      <div id="modalRoot"></div>`;
    renderTopbar();
    const goalStripLink = document.getElementById('goalStripLink');
    if (goalStripLink) goalStripLink.addEventListener('click', (e) => { e.preventDefault(); goToGoalsScreen(); });
    wireProjectsListCard();
  }

  async function openProject(id) {
    const full = await api.getProject(id);
    state.project = full.project; state.brief = full.brief; state.items = full.items;
    state.expandedItems = {};
    state.briefSampleKey = '';
    // Story is the one always-exists-exactly-once item — open it by default
    // so a designer lands straight on it in Stage 2 instead of an empty-looking
    // collapsed card.
    const story = state.items.find(i => i.stage === 2 && i.item_key === 'story');
    if (story) state.expandedItems[story.id] = true;
    // Stage configs (fieldsSchema/geminiInstruction/outputInstructions) are
    // D1-backed, not hardcoded — fetch once per project open, before render.
    const configEntries = await Promise.all([2, 3, 4, 5].map(async (stage) => [stage, await api.getStageConfig(stage)]));
    state.stageConfigs = Object.fromEntries(configEntries.filter(([, cfg]) => cfg));
    const paymentLinkRes = await api.getProjectPaymentLink(id);
    state.paymentLink = paymentLinkRes.token ? { token: paymentLinkRes.token, url: paymentLinkRes.url, totalEarnedPaise: paymentLinkRes.totalEarnedPaise || 0 } : null;
    state.paymentLinks = paymentLinkRes.stages || [];
    if (state.user && paymentLinkRes.freeCreditsRemaining !== undefined) state.user.free_credits_remaining = paymentLinkRes.freeCreditsRemaining;
    const stageLocksRes = await api.getStageLocks(id);
    state.stageLocks = stageLocksRes.locks || [];
    // Goal Tracker data — used by the Set Amount modal to suggest this
    // designer's own usual price for the stage and show progress toward
    // their goal, not just fetched lazily inside that modal.
    state.earningsSummary = await api.getEarningsSummary();
    state.screen = 'tool';
    // Puts the project id in the URL so a page refresh reopens the same
    // project instead of always landing back on the projects list.
    history.replaceState(null, '', `?p=${id}`);
    renderApp();
  }

  async function renderApp() {
    const app = document.getElementById('app');
    if (state.screen === 'login') { app.style.cssText = ''; renderLoginScreen(); return; }
    if (state.screen === 'waitlist') { app.style.cssText = ''; await renderWaitlistScreen(); return; }
    if (state.screen === 'admin') { app.style.cssText = ''; await renderAdminScreen(); return; }
    if (state.screen === 'projects') { app.style.cssText = ''; await renderProjectsScreen(); return; }
    if (state.screen === 'goals') { app.style.cssText = ''; await renderGoalsScreen(); return; }
    if (state.screen === 'showcase') { app.style.cssText = ''; await renderShowcaseScreen(); return; }
    if (state.screen === 'moodboard') { app.style.cssText = ''; renderMoodboardScreen(); return; }
    // Fixed-height flex column so the swimlane is the only thing that ever
    // scrolls — topbar/project-info-bar/legend size themselves naturally and
    // never move, instead of relying on a hardcoded "subtract N px" height
    // that silently breaks (page-level scroll, header drifts away) every
    // time something above the swimlane changes height.
    app.style.cssText = 'display:flex;flex-direction:column;height:100vh;overflow:hidden';
    app.innerHTML = `
      <div id="topbar" class="topbar"></div>
      <div id="projectInfoBar" class="project-info-bar"></div>
      <div class="legend">
        <span>🎨 = persistent Stage 1 asset</span>
      </div>
      <div id="swimlaneWrap" class="swimlane-wrap"></div>
      <div id="modalRoot"></div>
      <div id="debugPanelRoot"></div>`;
    renderTopbar();
    renderProjectInfoBar();
    await renderTool();
    renderDebugPanel();
  }

  // ---------- Moodboard (fullscreen, internal-only, one-page project snapshot) ----------
  // Not a new route/page — just a fullscreen state.screen swap over the same
  // already-loaded state.project/items/brief, so "back" is just returning to
  // state.screen = 'tool'. Deliberately simple (project name + Stage 1's
  // Story+Scene+Dialogues up top, then every uploaded file from Stages 2-5
  // in one plain grid) — for the designer's own review/internal
  // presentation, not a customer-facing or shareable page.
  function renderMoodboardScreen() {
    const app = document.getElementById('app');
    const b = state.brief || {};
    function tilesForItems(items) {
      return items.flatMap((item) => {
        const files = theVersion(item).media_files || [];
        return files.map((f) => {
          const url = api.mediaUrl(f.key);
          const media = f.kind === 'video'
            ? `<video src="${esc(url)}" controls></video>`
            : f.kind === 'audio'
              ? `<audio src="${esc(url)}" controls style="width:100%"></audio>`
              : `<img src="${esc(url)}" alt="${esc(f.fileName)}">`;
          return `<div class="moodboard-tile">
            ${media}
            <p class="moodboard-tile-caption">${esc(MEDIA_LABELS[item.item_key] || item.item_key)}${item.name ? ' — ' + esc(item.name) : ''}</p>
          </div>`;
        });
      });
    }
    const stageGroups = [
      { stage: 2, items: itemsFor(2, 'story') },
      { stage: 3, items: [...itemsFor(3, 'character'), ...itemsFor(3, 'property'), ...itemsFor(3, 'background'), ...itemsFor(3, 'sound')] },
      { stage: 4, items: itemsFor(4, 'scene') },
      { stage: 5, items: [...itemsFor(5, 'movie'), ...itemsFor(5, 'final_video')] },
    ]
      .map(({ stage, items }) => ({ stage, tiles: tilesForItems(items) }))
      .filter((g) => g.tiles.length);
    app.innerHTML = `
      <div class="moodboard-page">
        <div class="moodboard-header">
          <button class="btn btn-sm" id="moodboardBackBtn">← Back to project</button>
          <h1>${esc(state.project.name)}</h1>
        </div>
        ${b.storyboard ? `<div class="moodboard-brief">
          <h2>Story+Scene+Dialogues (Stage 1)</h2>
          <p>${esc(b.storyboard).replace(/\n/g, '<br>')}</p>
        </div>` : ''}
        ${stageGroups.length
          ? stageGroups.map(({ stage, tiles }) => `
              <div class="moodboard-section" style="border-color:${STAGE_COLORS[stage]}">
                <div class="moodboard-section-title" style="background:${STAGE_COLORS[stage]}">Stage ${stage} — ${esc(STAGE_NAMES[stage])}</div>
                <div class="moodboard-grid">${tiles.join('')}</div>
              </div>`).join('')
          : '<p class="empty-note">No uploaded files yet.</p>'}
      </div>`;
    document.getElementById('moodboardBackBtn').addEventListener('click', () => {
      state.screen = 'tool';
      renderApp();
    });
  }

  // ---------- Public payment page (/pay/:token) — no login, token is the access control ----------
  // `scheme` defaults to the NPCI-mandated generic `upi://pay` (guaranteed to
  // work with any UPI app). App-specific schemes (tez://, phonepe://,
  // paytmmp://) are unofficial/undocumented conveniences for one-tap opening
  // a particular app — they can change without notice, unlike the generic one.
  function buildUpiLink({ upiId, payeeName, amountRupees, note, scheme }) {
    const params = new URLSearchParams({ pa: upiId, pn: payeeName, am: amountRupees.toFixed(2), cu: 'INR', tn: note });
    return `${scheme || 'upi://pay'}?${params.toString()}`;
  }
  let payPageDraft = null;
  async function renderPublicPayPage(token) {
    const app = document.getElementById('app');
    app.innerHTML = `<div class="pay-page"><p>Loading…</p></div>`;
    const r = await fetch(`${API_BASE}/api/pay/${token}`);
    if (!r.ok) {
      app.innerHTML = `<div class="pay-page"><p>This payment link isn't valid or has been removed.</p></div>`;
      return;
    }
    const info = await r.json();
    // Chronological (stage 2 → 5), latest one open by default — everything
    // earlier collapses into a compact summary row, revealed on click.
    const stages = [...info.stages].sort((a, b) => a.stage - b.stage);
    const latestStage = stages.length ? stages[stages.length - 1].stage : null;
    payPageDraft = { token, info, stages, expandedStage: latestStage };
    renderPayPage();
  }
  function renderPayPage() {
    const { token, info, stages, expandedStage } = payPageDraft;
    const app = document.getElementById('app');
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    app.innerHTML = `
      <div class="pay-page">
        <div class="pay-brand-bar"><span class="pay-brand-mark">💸</span><div class="pay-brand-text"><span class="pay-brand-name">StagePay <span class="beta-badge">Beta</span></span><span class="pay-brand-tagline">Get paid every stage. Never work for free.</span></div></div>
        <div class="pay-card">
          <p class="pay-designer">${esc(info.designerName)}</p>
          <h1>${esc(info.projectName)}</h1>
          ${info.product ? `<p class="pay-sub"><strong>${esc(info.product)}</strong>${info.productDescription ? ` — ${esc(info.productDescription)}` : ''}</p>` : ''}

          <div class="pay-stage-row" style="margin-bottom:14px">
            <div class="pay-stage-head" style="cursor:default">
              <span class="pay-stage-title">📄 Your Brief</span>
              <a class="btn btn-sm" href="${API_BASE}/api/pay/${token}/download/brief">⬇ Download</a>
            </div>
          </div>

          ${stages.length ? `<div class="pay-stage-list">
            ${stages.map(s => payStageRowHtml(s, s.stage === expandedStage, isMobile)).join('')}
          </div>` : `<p class="pay-desc">Nothing to pay yet — the designer hasn't set an amount for any stage.</p>`}
        </div>
      </div>`;

    document.querySelectorAll('[data-pay-stage-head]').forEach(el => el.addEventListener('click', () => {
      const stage = Number(el.getAttribute('data-pay-stage-head'));
      payPageDraft.expandedStage = payPageDraft.expandedStage === stage ? null : stage;
      renderPayPage();
    }));

    const expanded = stages.find(s => s.stage === expandedStage);
    if (expanded && !expanded.paid && info.upiId) wireOpenPayStage(token, info, expanded);
  }
  function payStageRowHtml(s, isExpanded, isMobile) {
    const amountRupees = s.amountPaise / 100;
    return `<div class="pay-stage-row ${isExpanded ? 'expanded' : ''}">
      <div class="pay-stage-head" data-pay-stage-head="${s.stage}">
        <span class="pay-stage-title">Stage ${s.stage} — ${esc(s.stageLabel)}</span>
        <span class="pay-stage-badge ${s.paid ? 'paid' : ''}">${s.paid ? '✅ Paid' : `₹${amountRupees.toFixed(2)}`}</span>
        <span class="chevron">›</span>
      </div>
      <div class="pay-stage-body">
        <a class="btn btn-primary pay-download" href="${API_BASE}/api/pay/${payPageDraft.token}/download/${s.stage}">⬇ Download deliverable</a>
        ${s.priorPayments && s.priorPayments.length ? `<div class="pay-prior-payments">
          ${s.priorPayments.map(p => `<div class="pay-prior-payment">✓ Previously paid ₹${(p.amountPaise / 100).toFixed(2)} on ${esc(formatIST(p.paidAt))}</div>`).join('')}
        </div>` : ''}
        ${s.paid
          ? `<div class="pay-paid-banner">✅ Paid ₹${amountRupees.toFixed(2)}${s.paidAt ? ` on ${esc(formatIST(s.paidAt))}` : ''}</div>`
          : payStagePayHtml(s, isMobile)}
      </div>
    </div>`;
  }
  function payStagePayHtml(s, isMobile) {
    if (!payPageDraft.info.upiId) return `<p class="pay-desc">The designer hasn't set up a UPI ID yet — contact them directly to pay.</p>`;
    return `
      <div class="pay-amount">₹${(s.amountPaise / 100).toFixed(2)}</div>
      <div id="payQrWrap-${s.stage}" class="pay-qr-wrap"><p>Generating QR…</p></div>
      <p class="pay-qr-hint">Scan with your UPI app on mobile.</p>
      ${isMobile ? `
        <a href="" id="payOpenUpi-${s.stage}" class="pay-open-upi">Open in UPI app</a>
        <div class="pay-app-row">
          <a href="" id="payGpay-${s.stage}" class="pay-app-btn gpay"><span class="pay-app-mark">G</span>Google Pay</a>
          <a href="" id="payPhonepe-${s.stage}" class="pay-app-btn phonepe"><span class="pay-app-mark">P</span>PhonePe</a>
          <a href="" id="payPaytm-${s.stage}" class="pay-app-btn paytm"><span class="pay-app-mark">P</span>Paytm</a>
        </div>` : `<p class="pay-qr-hint">Payment link is only shown on mobile.</p>`}
      <label class="pay-confirm-check">
        <input type="checkbox" id="payConfirmCheckbox-${s.stage}">
        I have paid this amount using UPI
      </label>
      <button class="btn btn-primary" id="markPaidBtn-${s.stage}" style="width:100%;margin-top:8px" disabled>✅ Payment complete</button>
    `;
  }
  function wireOpenPayStage(token, info, s) {
    const linkArgs = {
      upiId: info.upiId,
      payeeName: info.product || info.projectName,
      amountRupees: s.amountPaise / 100,
      note: `Stage ${s.stage} — ${s.stageLabel} — ${info.product || info.projectName}`,
    };
    const upiLink = buildUpiLink(linkArgs);
    const openUpiEl = document.getElementById(`payOpenUpi-${s.stage}`);
    if (openUpiEl) openUpiEl.href = upiLink;
    const gpayEl = document.getElementById(`payGpay-${s.stage}`);
    if (gpayEl) gpayEl.href = buildUpiLink({ ...linkArgs, scheme: 'tez://upi/pay' });
    const phonepeEl = document.getElementById(`payPhonepe-${s.stage}`);
    if (phonepeEl) phonepeEl.href = buildUpiLink({ ...linkArgs, scheme: 'phonepe://pay' });
    const paytmEl = document.getElementById(`payPaytm-${s.stage}`);
    if (paytmEl) paytmEl.href = buildUpiLink({ ...linkArgs, scheme: 'paytmmp://pay' });

    const qrWrap = document.getElementById(`payQrWrap-${s.stage}`);
    // The `qrcode` npm package ships no plain-browser global build (it's
    // CommonJS-only) — jsDelivr's `+esm` endpoint auto-bundles it into a
    // real ES module on the fly, loaded lazily here via dynamic import
    // rather than a <script> tag the whole app would otherwise pay for.
    if (qrWrap) {
      import('https://cdn.jsdelivr.net/npm/qrcode@1.5.4/+esm')
        .then(({ default: QRCode }) => QRCode.toDataURL(upiLink, { width: 220, margin: 1 }))
        .then((dataUrl) => { qrWrap.innerHTML = `<img src="${dataUrl}" width="220" height="220" alt="UPI payment QR code">`; })
        .catch(() => { qrWrap.innerHTML = '<p>Could not generate QR code.</p>'; });
    }

    const confirmCheckbox = document.getElementById(`payConfirmCheckbox-${s.stage}`);
    const markPaidBtn = document.getElementById(`markPaidBtn-${s.stage}`);
    if (confirmCheckbox && markPaidBtn) {
      confirmCheckbox.addEventListener('change', () => { markPaidBtn.disabled = !confirmCheckbox.checked; });
      markPaidBtn.addEventListener('click', async () => {
        markPaidBtn.disabled = true; markPaidBtn.textContent = 'Saving…';
        const res = await fetch(`${API_BASE}/api/pay/${token}/mark-paid/${s.stage}`, { method: 'POST' });
        if (res.ok) {
          s.paid = true; s.paidAt = new Date().toISOString();
          renderPayPage();
        } else {
          markPaidBtn.disabled = false; markPaidBtn.textContent = '✅ Payment complete';
        }
      });
    }
  }

  // ---------- Public Showcase page (/showcase/:userId) — no login, purely read-only ----------
  // Public showcase groups by category in a fixed, portfolio-friendly order
  // — movie (per-scene clip) and final_video (the stitched result) collapse
  // into one "Final Film" bucket since a visitor doesn't care about that
  // internal distinction. Standalone promo uploads have no source item (so
  // no item_key at all) and land in "Creative Portfolio" — first in the
  // order (leads with the designer's own curated highlight, when they have
  // one) but only actually shown once it has something in it, same as
  // every other category.
  const PUBLIC_SHOWCASE_CATEGORY_ORDER = [null, 'story', 'character', 'property', 'background', 'sound', 'scene', 'movie', 'final_video'];
  const PUBLIC_SHOWCASE_CATEGORY_LABELS = {
    story: 'Storyboard', character: 'Characters', property: 'Props', background: 'Backgrounds',
    sound: 'Music', scene: 'Scenes', movie: 'Final Film', final_video: 'Final Film',
  };
  const PORTFOLIO_CATEGORY_LABEL = 'Creative Portfolio';
  function groupPublicShowcaseItems(items) {
    const groups = new Map();
    for (const key of PUBLIC_SHOWCASE_CATEGORY_ORDER) {
      const label = key ? PUBLIC_SHOWCASE_CATEGORY_LABELS[key] : PORTFOLIO_CATEGORY_LABEL;
      if (!groups.has(label)) groups.set(label, []);
    }
    for (const it of items) {
      const label = it.item_key ? (PUBLIC_SHOWCASE_CATEGORY_LABELS[it.item_key] || PORTFOLIO_CATEGORY_LABEL) : PORTFOLIO_CATEGORY_LABEL;
      groups.get(label).push(it);
    }
    for (const [label, arr] of groups) if (!arr.length) groups.delete(label);
    return groups;
  }
  // Its own layout, not borrowed from the payment page — .pay-card was
  // built for a short, narrow, centered "receipt" (max-width:440px, heavy
  // padding), which left barely any usable width for a portfolio's
  // horizontally-scrolling carousels on a small phone screen.
  async function renderPublicShowcasePage(userId) {
    const app = document.getElementById('app');
    app.innerHTML = `<div class="showcase-page"><p>Loading…</p></div>`;
    let data;
    try {
      data = await api.getPublicShowcase(userId);
    } catch {
      app.innerHTML = `<div class="showcase-page"><p>This showcase isn't available.</p></div>`;
      return;
    }
    if (data.unavailable) {
      app.innerHTML = `<div class="showcase-page"><div class="showcase-page-inner" style="text-align:center;padding-top:60px">
        <a class="showcase-page-brand" href="https://stagepay.pages.dev/" style="text-decoration:none;color:inherit;justify-content:center"><span class="pay-brand-mark">💸</span><div class="pay-brand-text"><span class="pay-brand-name">StagePay <span class="beta-badge">Beta</span></span></div></a>
        <p style="color:var(--text-faint)">Portfolio temporarily unavailable — check back soon.</p>
      </div></div>`;
      return;
    }
    const { profile, items } = data;
    const grouped = groupPublicShowcaseItems(items);
    app.innerHTML = `
      <div class="showcase-page">
        <div class="showcase-page-inner">
          <a class="showcase-page-brand" href="https://stagepay.pages.dev/" style="text-decoration:none;color:inherit"><span class="pay-brand-mark">💸</span><div class="pay-brand-text"><span class="pay-brand-name">StagePay <span class="beta-badge">Beta</span></span><span class="pay-brand-tagline">Get paid every stage. Never work for free.</span></div></a>
          <div class="public-showcase-header">
            ${profile.avatar_url ? `<img class="public-showcase-avatar" src="${esc(profile.avatar_url)}" alt="">` : ''}
            <div>
              <h1 style="margin:0">${esc(profile.name)}</h1>
              ${profile.contact_link ? `<a class="btn btn-sm btn-primary" href="${esc(profile.contact_link)}" target="_blank" rel="noopener" style="text-decoration:none;margin-top:8px;display:inline-flex">${whatsappNumberFromLink(profile.contact_link) ? '💬 WhatsApp' : '🔗 Get in touch'}</a>` : ''}
            </div>
          </div>
          ${items.length
            ? [...grouped.entries()].map(([label, groupItems]) => `
                <div class="public-showcase-category">
                  <h2 class="public-showcase-category-title">${esc(label)}</h2>
                  <div class="showcase-carousel">${groupItems.map((it) => `
                    <div class="showcase-tile">
                      ${showcaseMediaHtml(it.id, it.mime_type, it.file_name)}
                      ${it.caption ? `<p class="showcase-tile-name">${esc(it.caption)}</p>` : ''}
                    </div>`).join('')}</div>
                </div>`).join('')
            : '<p class="empty-note">No showcased work yet.</p>'}
        </div>
      </div>`;
    wireShowcaseThumbFallbacks();
  }

  async function boot() {
    const payMatch = location.pathname.match(/^\/pay\/([^/]+)/);
    if (payMatch) { await renderPublicPayPage(payMatch[1]); return; }
    const showcaseMatch = location.pathname.match(/^\/showcase\/([^/]+)/);
    if (showcaseMatch) { await renderPublicShowcasePage(showcaseMatch[1]); return; }
    state.user = await api.me();
    if (!state.user) { state.screen = 'login'; renderApp(); return; }
    if (new URLSearchParams(location.search).get('screen') === 'admin') {
      state.screen = 'admin';
      renderApp();
      return;
    }
    // Gated before anything else — a not-yet-approved account can't reach
    // any project, goal, or showcase content regardless of the URL.
    if (state.user.status !== 'approved') {
      state.screen = 'waitlist';
      renderApp();
      return;
    }
    const projectId = new URLSearchParams(location.search).get('p');
    if (projectId) {
      try {
        await openProject(projectId);
        return;
      } catch {
        history.replaceState(null, '', location.pathname);
      }
    }
    if (new URLSearchParams(location.search).get('screen') === 'goals') {
      state.screen = 'goals';
      renderApp();
      return;
    }
    if (new URLSearchParams(location.search).get('screen') === 'showcase') {
      state.screen = 'showcase';
      renderApp();
      return;
    }
    state.screen = 'projects';
    renderApp();
  }
  // Blocks the right-click "Save image/video as..." context menu, scoped to
  // the public showcase page only (checked by pathname, not DOM containment,
  // so it also covers the media-viewer modal popped up from there — that
  // modal appends to document.body, outside .showcase-page's own subtree).
  // Deterrent only, not real protection — anyone using dev tools or a
  // screenshot can still get the file regardless; the designer's own
  // authenticated tool is untouched, right-click still works normally there.
  document.addEventListener('contextmenu', (e) => {
    if (!location.pathname.match(/^\/showcase\//)) return;
    if (e.target.closest('img, video')) e.preventDefault();
  });
  // One delegated listener (rather than re-wiring after every renderTool()
  // rebuild) catches every file chip across brief assets, item uploads, and
  // must-attach references alike. Modified clicks (ctrl/cmd/shift/middle)
  // fall through to the real href so "open in new tab" still works.
  document.addEventListener('click', (e) => {
    const link = e.target.closest('[data-media-preview]');
    if (!link) return;
    if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return;
    e.preventDefault();
    // Prev/next only makes sense inside a showcase carousel/grid row — every
    // other data-media-preview chip in the app is a standalone reference,
    // not part of a browsable series.
    let gallery = null;
    const galleryRoot = link.closest('.showcase-carousel, .showcase-grid');
    if (galleryRoot) {
      const links = Array.from(galleryRoot.querySelectorAll('[data-media-preview]'));
      const index = links.indexOf(link);
      if (links.length > 1 && index !== -1) {
        gallery = {
          index,
          items: links.map((el) => ({
            url: el.getAttribute('href'),
            fileName: el.getAttribute('data-media-name'),
            kind: el.getAttribute('data-media-kind') || 'image',
          })),
        };
      }
    }
    openMediaViewerModal(link.getAttribute('href'), link.getAttribute('data-media-name'), link.getAttribute('data-media-kind') || 'image', gallery);
  });

  boot();
})();
</script>
