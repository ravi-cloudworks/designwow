  }
  function wireGenerateModal() {
    document.getElementById('genModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'genModalOverlay') closeGenerateModal(); });
    document.getElementById('genModalCloseBtn').addEventListener('click', closeGenerateModal);
    document.getElementById('genModalCancelBtn').addEventListener('click', closeGenerateModal);
    wireGenModalFieldControls();
    const genBtn = document.getElementById('genModalGenerateBtn');
    genBtn.addEventListener('click', () => {
      const item = genModalDraft.item;
      const textarea = document.getElementById('genModalPromptArea');
      const composed = composeFinalPrompt(item, compilePrompt(item, genModalDraft.fields));
      genModalDraft.prompt = composed;
      animateTypingInto(textarea, composed);
    });
    document.getElementById('genModalCopyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('genModalPromptArea').value).then(() => toast('Copied'));
    });
    document.getElementById('genModalChatGptBtn').addEventListener('click', () => {
      const item = genModalDraft.item;
      // A rich, item-specific meta-prompt (Setup values + brief + attached
      // file names + this item's own output template) — not just whatever
      // happened to already be in the textarea, which is often still empty
      // at this point. This is Manual mode's real substitute for the
      // in-app "Generate with AI" call: no Gemini cost, same context.
      const metaPrompt = buildItemChatGptPrompt(item, genModalDraft.fields);
      navigator.clipboard.writeText(metaPrompt).catch(() => {}); // silent fallback copy, same as Stage 1's template button
      window.open(`https://chatgpt.com/?q=${encodeURIComponent(metaPrompt)}`, '_blank', 'noopener');
      toast('Opened in ChatGPT with this item\'s details already filled in — copy its reply back into the box here');
      genModalDraft.fields._chatgpt_snapshot = fieldsSignature(genModalDraft.fields);
      refreshGenModalFields();
    });
    document.getElementById('genModalSaveBtn').addEventListener('click', async () => {
      const item = genModalDraft.item;
      const promptVal = trimBlankLines(document.getElementById('genModalPromptArea').value);
      // Generate mode has nothing to show downstream (Stage 4/5 references,
      // your own review) without a real prompt — Upload mode is exempt,
      // since that path deliberately never needs one (see itemCardMode).
      const cardMode = state.itemCardMode[item.id] || (theVersion(item).fields || {})._uiMode || 'generate';
      if (cardMode !== 'upload' && item.item_key !== 'story' && !promptVal.trim()) {
        toast('Write or generate a prompt first — an empty one leaves nothing for Flow (or later stages referencing this) to use.');
        return;
      }
      // Setup fields can carry stray blank lines/whitespace in from a paste
      // (ChatGPT output, Word, etc) — clean up every free-text value here,
      // at Save, rather than per-keystroke so typing itself is never disturbed.
      Object.keys(genModalDraft.fields).forEach((k) => {
        if (typeof genModalDraft.fields[k] === 'string') genModalDraft.fields[k] = trimBlankLines(genModalDraft.fields[k]);
      });
      const version = theVersion(item);
      version.fields = genModalDraft.fields;
      version.prompt = promptVal;
      await api.updateVersion(item.id, { fields: version.fields, prompt: promptVal });
      closeGenerateModal();
      renderTool();
      toast('Saved');
    });
  }

  // ---------- Auto-populate confirmation (Story -> Visual & Music / Scene Blueprint) ----------
  // Gemini's Story generation can return structured arrays (characters,
  // properties, backgrounds, sounds, scenes) so one generation drafts the
  // whole downstream skeleton instead of the designer re-typing every cast
  // member by hand — but creating items silently would be surprising and
  // could duplicate on every regeneration, hence the confirmation.
  let autoPopulateDraft = null;
  function existingNamesFor(stage, itemKey) {
    return new Set(itemsFor(stage, itemKey).map(i => (i.name || '').trim().toLowerCase()));
  }
  // Plain substring name-matching (no Gemini call) — a scene's "Featured in
  // this scene" starts pre-picked with whichever Stage 3 Character/Property/
  // Background is actually named in its own text, so a designer verifies/
  // adjusts a sensible default instead of starting from a blank picker.
  function suggestSceneRefs(text, candidates) {
    const lower = (text || '').toLowerCase();
    if (!lower) return [];
    return candidates.filter(it => it.name && lower.includes(it.name.trim().toLowerCase())).map(it => it.id);
  }
  function openAutoPopulateModal(sourceItem, autoPopulate) {
    const sourceConfig = itemConfigFor(sourceItem);
    const fieldDefs = (sourceConfig && sourceConfig.content.autoPopulate && sourceConfig.content.autoPopulate.geminiResponseFields) || [];
    const groups = fieldDefs.map(def => {
      const entries = autoPopulate[def.key] || [];
      const existing = def.createsItemsIn ? existingNamesFor(def.createsItemsIn.stage, def.createsItemsIn.itemKey) : new Set();
      // Every field beyond "name" — most types return just {name, description},
      // but Scene returns several structured fields (location/action/dialogue/
      // emotion) that each map straight onto that item's own Setup fields.
      const secondaryKeys = Object.keys(entries[0] || {}).filter(k => k !== 'name');
      return {
        key: def.key,
        itemKey: def.createsItemsIn && def.createsItemsIn.itemKey,
        stage: def.createsItemsIn && def.createsItemsIn.stage,
        secondaryKeys,
        entries: entries.map(e => ({ ...e, alreadyExists: existing.has((e.name || '').trim().toLowerCase()) })),
      };
    }).filter(g => g.entries.length);

    // All groups in one sync batch share the same target stage (Stage 3's
    // sync always returns characters/properties/backgrounds/sounds together,
    // Stage 4's sync always returns scenes alone) — the prompt already asks
    // Gemini to respect the remaining headroom, but LLMs aren't perfectly
    // reliable at obeying a numeric limit, so anything beyond what actually
    // fits gets marked here and shown as disabled/unchecked with a clear
    // reason, rather than being silently rejected mid-creation-loop later.
    const targetStage = groups.find(g => g.stage)?.stage;
    const cap = stageItemCap(targetStage);
    if (cap) {
      let remaining = Math.max(0, cap - state.items.filter(i => i.stage === targetStage).length);
      for (const g of groups) {
        for (const e of g.entries) {
          if (e.alreadyExists) continue;
          if (remaining > 0) remaining--;
          else e.overLimit = true;
        }
      }
    }
    autoPopulateDraft = { sourceItem, groups };
    renderAutoPopulateModal();
  }
  function closeAutoPopulateModal() { autoPopulateDraft = null; document.getElementById('modalRoot').innerHTML = ''; }
  function renderAutoPopulateModal() {
    const root = document.getElementById('modalRoot');
    if (!autoPopulateDraft) { root.innerHTML = ''; return; }
    const { groups } = autoPopulateDraft;
    const totalNew = groups.reduce((n, g) => n + g.entries.filter(e => !e.alreadyExists && !e.overLimit).length, 0);
    const overLimitCount = groups.reduce((n, g) => n + g.entries.filter(e => e.overLimit).length, 0);
    const targetStage = groups.find(g => g.stage)?.stage;
    root.innerHTML = `
      <div class="modal-overlay" id="apModalOverlay">
        <div class="modal-card" style="width:460px">
          <div class="modal-head"><strong>Create the rest of the cast from this story?</strong>
            <button class="modal-close" id="apModalCloseBtn">×</button></div>
          <p class="modal-sub">Found in the story — uncheck anything you don't want created. Already-existing items (matched by name) are skipped automatically. We'll set these up and fill them in for you — no need to spend the next several minutes doing it by hand.</p>
          ${overLimitCount ? `<p class="modal-sub" style="color:var(--amber);font-weight:700">⚠ ${overLimitCount} of these won't be created — ${esc(stageItemCapMessage(targetStage))}</p>` : ''}
          <ul class="affected-list">
            ${groups.map(g => g.entries.map((e, i) => `
              <li style="display:flex;align-items:flex-start;gap:8px;background:${e.alreadyExists || e.overLimit ? 'var(--surface-2)' : 'var(--amber-soft)'};border-color:${e.alreadyExists || e.overLimit ? 'var(--line)' : 'var(--amber-line)'}">
                <input type="checkbox" data-ap-check data-group="${g.key}" data-index="${i}" ${e.alreadyExists || e.overLimit ? 'disabled' : 'checked'} style="margin-top:2px">
                <span><strong>${esc(e.name)}</strong> <span style="font-weight:400;color:var(--text-faint)">(${esc(g.itemKey)})</span>${e.alreadyExists ? ' — already exists, skipping' : e.overLimit ? ' — stage is full, not created' : `<br><span style="font-weight:400">${esc(g.secondaryKeys.map(k => e[k]).filter(Boolean).join(' · ').slice(0, 140))}</span>`}</span>
              </li>`).join('')).join('')}
          </ul>
          <div class="modal-footer confirm-actions">
            <button class="btn" id="apModalCancelBtn">Skip</button>
            <button class="btn btn-confirm" id="apModalConfirmBtn">Create ${totalNew} item${totalNew === 1 ? '' : 's'}</button>
          </div>
        </div>
      </div>`;
    wireAutoPopulateModal();
  }
  function wireAutoPopulateModal() {
    document.getElementById('apModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'apModalOverlay') closeAutoPopulateModal(); });
    document.getElementById('apModalCloseBtn').addEventListener('click', closeAutoPopulateModal);
    document.getElementById('apModalCancelBtn').addEventListener('click', closeAutoPopulateModal);
    const confirmBtn = document.getElementById('apModalConfirmBtn');
    // The button's count was only ever computed once at render time — it
    // never reflected unchecking an item, even though the create action
    // itself already respected the checkbox correctly.
    document.querySelectorAll('[data-ap-check]').forEach(cb => cb.addEventListener('change', () => {
      const checkedCount = document.querySelectorAll('[data-ap-check]:checked').length;
      confirmBtn.textContent = `Create ${checkedCount} item${checkedCount === 1 ? '' : 's'}`;
    }));
    confirmBtn.addEventListener('click', async () => {
      const { groups } = autoPopulateDraft;
      const cancelBtn = document.getElementById('apModalCancelBtn');
      const closeBtn = document.getElementById('apModalCloseBtn');
      // Flatten the checked work up front so the button can show real
      // progress ("Creating X… (2/6)") instead of a generic spinner — this
      // used to just sit on "Create N items" with no feedback while it did
      // several sequential API round-trips, which read as stuck.
      const toCreate = [];
      for (const g of groups) {
        if (!g.itemKey) continue;
        for (let i = 0; i < g.entries.length; i++) {
          const e = g.entries[i];
          if (e.alreadyExists) continue;
          const checkbox = document.querySelector(`[data-ap-check][data-group="${g.key}"][data-index="${i}"]`);
          if (!checkbox || !checkbox.checked) continue;
          toCreate.push({ g, e });
        }
      }
      if (!toCreate.length) { closeAutoPopulateModal(); return; }
      confirmBtn.disabled = true;
      if (cancelBtn) cancelBtn.disabled = true;
      if (closeBtn) closeBtn.disabled = true;
      // A single confirm can create Characters/Properties/Backgrounds AND
      // Scenes together (Story's autoPopulate returns all of them at once) —
      // state.items only refreshes after the whole loop finishes, so a scene
      // processed later in this same batch wouldn't see characters created
      // earlier in it. Track those locally so ref-matching sees them too.
      const createdThisBatch = [];
      for (let n = 0; n < toCreate.length; n++) {
        const { g, e } = toCreate[n];
        confirmBtn.textContent = `Creating ${e.name}… (${n + 1}/${toCreate.length})`;
        const created = await api.createItem(state.project.id, { stage: g.stage, itemKey: g.itemKey, name: e.name });
        if (created && created.id) {
          const newFields = {};
          // Scene's autoPopulate keys already match its own Setup field names
          // (location/action/dialogue/emotion) — every other type still
          // collapses its single secondary value into a generic "description"
          // field, same as before.
          g.secondaryKeys.forEach(k => { if (e[k]) newFields[g.itemKey === 'scene' ? k : 'description'] = e[k]; });
          if (g.itemKey === 'scene') {
            const sceneText = [newFields.location, newFields.action, newFields.dialogue].filter(Boolean).join(' ');
            const candidates = [
              ...itemsFor(3, 'character'), ...itemsFor(3, 'property'), ...itemsFor(3, 'background'),
              ...createdThisBatch.filter(c => ['character', 'property', 'background'].includes(c.item_key)),
            ];
            const matchedRefs = suggestSceneRefs(sceneText, candidates);
            if (matchedRefs.length) newFields.refs = matchedRefs;
          }
          if (Object.keys(newFields).length) await api.updateVersion(created.id, { fields: newFields });
          createdThisBatch.push({ item_key: g.itemKey, name: e.name, id: created.id });
        }
        // Movie items are no longer paired here — a Scene isn't final until
        // Stage 4 is locked, so its Movie item only gets created at that
        // point (see wireStagePaymentCard's lockBtn handler for stage 4),
        // not the moment the Scene itself is created.
      }
      const full = await api.getProject(state.project.id);
      state.items = full.items;
      renderTool();
      showAutoPopulateDoneScreen(toCreate.length);
    });
  }
  // A little empathy for what is genuinely painstaking manual work when done
  // by hand (naming, describing, and wiring up every character/prop/scene
  // one at a time) — tell the designer how much of that we just did for
  // them, and give them explicit permission to step away for a minute.
  function showAutoPopulateDoneScreen(count) {
    const estMinutes = Math.max(5, count * 3);
    const root = document.getElementById('modalRoot');
    root.innerHTML = `
      <div class="modal-overlay" id="apDoneOverlay">
        <div class="modal-card" style="width:420px;text-align:center">
          <div style="font-size:38px;margin:8px 0 2px">🌿</div>
          <strong style="font-size:16px">All set — ${count} item${count === 1 ? '' : 's'} created for you</strong>
          <p class="modal-sub" style="margin-top:8px">That's roughly ${estMinutes} minutes of manual setup you just got back. You've been deep in the creative work — take a minute, grab a coffee or some fresh air. You've earned it.</p>
          <div class="modal-footer confirm-actions" style="justify-content:center">
            <button class="btn btn-confirm" id="apDoneCloseBtn">Nice, thanks!</button>
          </div>
        </div>
      </div>`;
    document.getElementById('apDoneCloseBtn').addEventListener('click', closeAutoPopulateModal);
    document.getElementById('apDoneOverlay').addEventListener('click', (e) => { if (e.target.id === 'apDoneOverlay') closeAutoPopulateModal(); });
  }

  // ---------- Must-attach: what an item needs from earlier stages ----------
  // A compiled prompt alone isn't enough to get a correct Google Flow result —
  // brand/product consistency has to come from attached reference images too.
  // Per item type, what actually has to be attached:
  //   story     -> Logo + Product photos (Stage 1) — the pitch sketch must show the real product/brand
  //   character -> Logo (branded outfit/props stay consistent)
  //   property  -> Logo + Product photos — a Property is very often the product/packaging itself
  //   background-> Logo
  //   sound     -> nothing (audio only, no image generation)
  //   scene     -> Logo + the approved image of every Character/Property/Background it's featuring (via refs) — carries its own camera/shot fields now too
  //   movie     -> its own Scene's approved image + every approved Sound (continuity into the final clip)
  // A clickable chip when a real file key exists (every attach source is a
  // real R2-backed upload now), plain text otherwise.
  function attachChip(icon, name, key, kind) {
    const label = `${icon} ${esc(name)}`;
    return key ? `<a class="attach-chip" href="${esc(api.mediaUrl(key))}" data-media-preview data-media-name="${esc(name)}" data-media-kind="${esc(kind || 'image')}" rel="noopener">${label}</a>` : `<span class="attach-chip">${label}</span>`;
  }
  // Clicking an uploaded file used to just pop a plain browser tab — an
  // in-app viewer feels more polished and keeps the designer in flow.
  // Appended straight to <body> (not the shared #modalRoot every other
  // modal uses) so it can stack on top of an already-open Generate/Setup
  // modal without clobbering it.
  // Set only when opened from a showcase carousel/grid row (see the
  // delegated click listener at the bottom of the file, which builds this
  // from the clicked link's siblings) — every other data-media-preview chip
  // in the app (a single reference-image chip on an item card, a brief
  // asset, etc.) has no "row" to step through, so prev/next stays absent
  // there rather than showing controls that jump to unrelated files.
  let mediaViewerGallery = null;
  function openMediaViewerModal(url, fileName, kind, gallery) {
    closeMediaViewerModal();
    mediaViewerGallery = gallery || null;
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay media-viewer-overlay';
    overlay.id = 'mediaViewerOverlay';
    overlay.innerHTML = `<div class="media-viewer-card">
      <div class="media-viewer-head"><strong id="mediaViewerFileName"></strong><button type="button" class="modal-close" id="mediaViewerCloseBtn">×</button></div>
      <div class="media-viewer-body" id="mediaViewerBody"></div>
      ${mediaViewerGallery ? `
        <button type="button" class="media-viewer-nav media-viewer-nav-prev" id="mediaViewerPrevBtn" aria-label="Previous">‹</button>
        <button type="button" class="media-viewer-nav media-viewer-nav-next" id="mediaViewerNextBtn" aria-label="Next">›</button>
      ` : ''}
    </div>`;
    document.body.appendChild(overlay);
    renderMediaViewerBody(url, fileName, kind);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeMediaViewerModal(); });
    document.getElementById('mediaViewerCloseBtn').addEventListener('click', closeMediaViewerModal);
    document.addEventListener('keydown', mediaViewerKeyHandler);
    if (mediaViewerGallery) {
      document.getElementById('mediaViewerPrevBtn').addEventListener('click', () => stepMediaViewer(-1));
      document.getElementById('mediaViewerNextBtn').addEventListener('click', () => stepMediaViewer(1));
    }
  }
  // playsinline (+ the legacy webkit- prefix) keeps the video playing inside
  // this modal on iOS Safari instead of iOS forcing it into native
  // fullscreen — without it, prev/next (and everything else on screen)
  // gets covered by the OS's own fullscreen video player.
  function renderMediaViewerBody(url, fileName, kind) {
    const body = document.getElementById('mediaViewerBody');
    document.getElementById('mediaViewerFileName').textContent = fileName;
    body.innerHTML = kind === 'video'
      ? `<video src="${esc(url)}" controls autoplay playsinline webkit-playsinline="true" controlslist="nodownload" disablepictureinpicture draggable="false"></video>`
      : kind === 'audio'
        ? `<audio src="${esc(url)}" controls autoplay></audio>`
        : `<img src="${esc(url)}" alt="${esc(fileName)}" draggable="false">`;
  }
  function stepMediaViewer(delta) {
    if (!mediaViewerGallery) return;
    const { items } = mediaViewerGallery;
    mediaViewerGallery.index = (mediaViewerGallery.index + delta + items.length) % items.length;
    const item = items[mediaViewerGallery.index];
    renderMediaViewerBody(item.url, item.fileName, item.kind);
  }
  function closeMediaViewerModal() {
    const el = document.getElementById('mediaViewerOverlay');
    if (el) el.remove();
    mediaViewerGallery = null;
    document.removeEventListener('keydown', mediaViewerKeyHandler);
  }
  function mediaViewerKeyHandler(e) {
    if (e.key === 'Escape') closeMediaViewerModal();
    else if (e.key === 'ArrowLeft') stepMediaViewer(-1);
    else if (e.key === 'ArrowRight') stepMediaViewer(1);
  }
  // All of an item's own uploaded media files — an item can carry more than
  // one now (e.g. a Story's several storyboard frames).
  function itemMediaFiles(item) { return item ? (theVersion(item).media_files || []) : []; }
  function withIcon(files, icon) { return files.map(f => ({ ...f, icon })); }
  // Single source of truth for "what files does this item depend on from
  // earlier stages" — reused by the on-screen chips, the compiled/AI prompt's
  // file-reference line, and the ZIP download, so none of them can drift out
  // of sync with each other.
  function mustAttachFiles(item, fields) {
    const b = state.brief;
    const logoFiles = () => (b.logo_media && b.logo_media.key ? [{ ...b.logo_media, icon: '🏷️' }] : []);
    const productFiles = () => (b.product_photos || []).map(p => ({ ...p, icon: '📷' }));

    if (item.item_key === 'story') return [...logoFiles(), ...productFiles()];
    if (item.item_key === 'character') return logoFiles();
    if (item.item_key === 'property') return [...logoFiles(), ...productFiles()];
    if (item.item_key === 'background') return logoFiles();
    if (item.item_key === 'scene') {
      const refIds = Array.isArray(fields.refs) ? fields.refs : [];
      const refFiles = refIds.flatMap(id => { const ref = itemById(id); return ref ? withIcon(itemMediaFiles(ref), ITEM_THUMBS[ref.item_key] || '') : []; });
      return [...refFiles, ...logoFiles()];
    }
    if (item.item_key === 'movie') {
      const scene = itemById(item.parent_item_id);
      const sceneFields = scene ? (theVersion(scene).fields || {}) : {};
      const refIds = Array.isArray(sceneFields.refs) ? sceneFields.refs : [];
      // The scene blueprint image already shows these visually, but the master
      // prompt explicitly claims to follow the Character/Prop Sheets too — this
      // makes that true, giving the video model the original clean reference
      // images as grounding, not just however well the blueprint replicated them.
      const refFiles = refIds.flatMap(id => { const ref = itemById(id); return ref ? withIcon(itemMediaFiles(ref), ITEM_THUMBS[ref.item_key] || '') : []; });
      const soundFiles = itemsFor(3, 'sound').flatMap(s => withIcon(itemMediaFiles(s), '🔊'));
      return [...withIcon(itemMediaFiles(scene), '🎬'), ...refFiles, ...soundFiles];
    }
    return [];
  }

  // Google Flow's own downloaded filenames are long, timestamp-heavy, and
  // ugly to hand to a customer (e.g. "Storyboard_for_VitaBoost_adverti…_
  // 202607142339.jpeg") — rename to something clean at upload time instead
  // of just truncating the display, since these end up in the customer's
  // deliverable zip too, not just the on-screen chip.
  function cleanUploadFileName(item, originalFileName, existingCount) {
    const extMatch = originalFileName.match(/\.([a-zA-Z0-9]+)$/);
    const ext = extMatch ? extMatch[1].toLowerCase() : 'dat';
    const base = (item.name || itemLabel(item.stage, item.item_key))
      .replace(/[^a-zA-Z0-9]+/g, '-')
      .replace(/(^-|-$)/g, '') || 'file';
    const suffix = existingCount > 0 ? `-${existingCount + 1}` : '';
    return `${base}${suffix}.${ext}`;
  }
  // Same idea as cleanUploadFileName, but for Stage 1's logo/product photos,
  // which aren't "items" — logo is always singular (logo.png), product
  // photos are always numbered from 1 (product-1.png, product-2.png, ...)
  // since unlike a Character/Scene there's no name to base a filename on.
  function cleanBriefFileName(baseName, originalFileName, number) {
    const extMatch = originalFileName.match(/\.([a-zA-Z0-9]+)$/);
    const ext = extMatch ? extMatch[1].toLowerCase() : 'dat';
    const suffix = number != null ? `-${number}` : '';
    return `${baseName}${suffix}.${ext}`;
  }

  // ---------- Item card ----------
  // Numbered-steps per-item card (Generate/Download/Flow/Upload only — no
  // amount/paid/lock here, those live once in the shared stage-level card
  // below the item list). Shared by Stage 3's repeatable lists, Stage 4's
  // scene list, and Stage 5's movie list.
  function renderNumberedItemCard(item, opts) {
    opts = opts || {};
    const isExpanded = !!state.expandedItems[item.id];
    const version = theVersion(item);
    const mediaFiles = version.media_files || [];
    const mediaLabel = MEDIA_LABELS[item.item_key] || 'File';
    const mediaAccept = MEDIA_ACCEPT[item.item_key] || 'image/*';
    const lock = stageLockFor(item.stage);
    const isLocked = !!(lock && lock.locked);
    const dis = isLocked ? 'disabled' : '';
    // Upload already worked standalone (nothing required steps 1-3 first) —
    // this toggle just makes that an explicit up-front choice instead of
    // something you had to notice you were allowed to skip to.
    // state.itemCardMode is only ever populated by a click this session — a
    // fresh page load falls through to fields._uiMode, the persisted choice
    // (see wireItemCard's toggle handler), so the toggle survives a reload.
    const mode = state.itemCardMode[item.id] || (version.fields || {})._uiMode || 'generate';
    // Character/Property/Background/Sound no longer generate anything via
    // Flow — Gemini can't reliably infer visual specifics for an ambiguous
    // character ("grandma", "a kid"), and designers already have their own
    // reference libraries. These four types are upload-only: name + file,
    // no mode toggle, no Setup, no Generate step at all. Final Video is the
    // same for a different reason — it's stitched together externally from
    // the approved per-scene clips, so there's nothing for Flow to generate.
    const isUploadOnlyType = ['character', 'property', 'background', 'sound', 'final_video'].includes(item.item_key);
    // Exactly one file per item (every label in MEDIA_LABELS is singular —
    // "Character Reference", "Scene Video", never plural) — so no `multiple`,
    // and the upload button itself hides once a file exists rather than
    // silently accepting a second one to replace it.
    const hasFile = mediaFiles.length > 0;
    const hasPrompt = !!(version.prompt && version.prompt.trim());
    // In Generate mode there's nothing to have generated a result FROM
    // until step 1 has actually produced a prompt — soft-disabled (CSS
    // only, like the rest of this app's guard rails) rather than a real
    // [disabled] attribute, so the click still fires and can explain why.
    // Spelling out exactly what kind of file goes here AND which specific
    // item it's for (not just the type) — a list of several near-identical
    // Character/Scene/etc. cards otherwise has every upload button reading
    // the same generic text, easy to lose track of which is which.
    const UPLOAD_LABEL_PHRASE = {
      character: 'reference image',
      property: 'reference image',
      background: 'reference image',
      sound: 'sound file',
      scene: 'scene image',
      movie: 'video',
    };

    const generateSteps = `
      <div class="story-step">
        <span class="story-step-num">1</span>
        <div class="story-step-body">
          <div style="display:flex;gap:6px;align-items:center">
            <button class="btn btn-sm btn-primary" data-open-generate="${item.id}" ${dis}>✨ Generate ${esc(itemLabel(item.stage, item.item_key))}</button>
            <button type="button" class="icon-btn" data-copy-prompt="${item.id}" title="Copy prompt">📋</button>
          </div>
          <textarea class="prompt-box" readonly placeholder="Click Generate above...">${esc(version.prompt || '')}</textarea>
        </div>
      </div>
      <div class="story-step">
        <span class="story-step-num">2</span>
        <div class="story-step-body">
          <button type="button" class="btn btn-sm${hasPrompt ? '' : ' btn-guard-disabled'}" data-download-item="${item.id}" data-requires-prompt="true" ${dis}>⬇ Download artifacts</button>
          ${hasPrompt ? '' : `<p class="story-step-note" style="margin-top:4px">Generate a prompt first (step 1) — there's nothing to download yet.</p>`}

    // Uploading your own image only skips the Flow-generation steps
    // (prompt/download/paste-into-Flow) — the Setup details (gender/age/
    // outfit etc.) still matter regardless of where the image came from,
    // since Stage 4/5 pull from those fields (not the image) to describe
    // this character/prop/background consistently in later scene prompts.
    // Setup lives in the same modal as Generate — reused as-is here rather
    // than duplicated, so nothing new crowds the swimlane card itself.
    // A Scene skipping Flow generation has nothing to gain from the full
    // Setup form (its content/shot fields only ever feed the compiled Flow
    // prompt) — only "Featured in this scene" still matters here, so it
    // gets its own small standalone modal instead (see openSceneRefsModal).
    const uploadOnlyStep = `
      <div class="story-step">
        <span class="story-step-num">1</span>
        <div class="story-step-body">
          ${item.item_key === 'scene'
            ? `<button class="btn btn-sm" data-open-scene-refs="${item.id}" ${dis}>📋 Featured in this scene</button>
               <p class="story-step-note" style="margin-top:6px">Pick who/what is in this scene so the Final Movie step attaches the right reference images.</p>`
            : `<button class="btn btn-sm" data-open-generate="${item.id}" ${dis}>📋 ${esc(itemLabel(item.stage, item.item_key))} Details</button>
               <p class="story-step-note" style="margin-top:6px">Fill in the details above so later scenes can describe this consistently.</p>`}
        </div>
      </div>
      <div class="story-step">
        <span class="story-step-num">2</span>
        <div class="story-step-body">
          <p class="story-step-note">Upload your own ${esc(mediaLabel.toLowerCase())} — no Flow generation needed.</p>
          ${buildUploadWidget(false)}
        </div>
      </div>`;
    // Character/Property/Background/Sound: just the upload widget, nothing
    // else — no name-your-mode toggle, no Setup modal, no Generate step.
    const assetOnlyStep = `
      <div class="story-step">
        <span class="story-step-num">1</span>
        <div class="story-step-body">${buildUploadWidget(false)}</div>
      </div>`;
    return `
      <div class="item-row ${isExpanded ? 'expanded' : ''}" data-item-row="${item.id}">
        <div class="item-row-head" data-toggle-item="${item.id}">
          <span class="item-thumb">${ITEM_THUMBS[item.item_key] || '📄'}</span>
          ${state.renamingItemId === item.id
            ? `<input type="text" class="item-name-input" data-rename-item="${item.id}" value="${esc(item.name || itemLabel(item.stage, item.item_key))}" maxlength="60">`
            : `<span class="item-name">${esc(item.name || itemLabel(item.stage, item.item_key))}</span>${isLocked ? '' : `<button type="button" class="item-rename-btn" data-rename-btn="${item.id}" title="Rename">✏️</button>`}`}
          ${opts.deletable && !isLocked ? `<button class="btn btn-sm btn-danger" data-delete-item="${item.id}" title="Remove">×</button>` : ''}
          <span class="chevron">›</span>
        </div>
        <div class="item-body">
          ${isUploadOnlyType
            ? assetOnlyStep
            : `${hasFile ? '' : `<div class="item-mode-toggle">
                <button type="button" class="${mode === 'generate' ? 'active' : ''}" data-item-mode-btn="generate" data-item-id="${item.id}">✨ Generate</button>
                <button type="button" class="${mode === 'upload' ? 'active' : ''}" data-item-mode-btn="upload" data-item-id="${item.id}">📤 Upload my own</button>
              </div>`}
              ${mode === 'upload' ? uploadOnlyStep : generateSteps}`}
        </div>
      </div>`;
  }
  function wireItemRename(item) {
    const renameBtn = document.querySelector(`[data-rename-btn="${item.id}"]`);
    if (renameBtn) renameBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      state.renamingItemId = item.id;
      renderTool();
    });
    const renameInput = document.querySelector(`[data-rename-item="${item.id}"]`);
    if (renameInput) {
      renameInput.focus(); renameInput.select();
      renameInput.addEventListener('click', (e) => e.stopPropagation());
      const saveRename = async () => {
        if (state.renamingItemId !== item.id) return;
        state.renamingItemId = null;
        const newName = renameInput.value.trim();
        if (newName && newName !== item.name) {
          item.name = newName;
          await api.updateItem(item.id, { name: newName });
        }
        renderTool();
      };
      renameInput.addEventListener('blur', saveRename);
      renameInput.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') renameInput.blur(); });
    }
  }
  function wireItemCard(item) {
    document.querySelectorAll(`[data-toggle-item="${item.id}"]`).forEach(el => el.addEventListener('click', (e) => {
      if (e.target.closest('[data-delete-item]') || e.target.closest('[data-rename-btn]') || e.target.closest('[data-rename-item]')) return;
      state.expandedItems[item.id] = !state.expandedItems[item.id];
      renderTool();
    }));
    wireItemRename(item);
    document.querySelectorAll(`[data-item-mode-btn][data-item-id="${item.id}"]`).forEach(el => el.addEventListener('click', async () => {
      const mode = el.getAttribute('data-item-mode-btn');
      state.itemCardMode[item.id] = mode;
      const version = theVersion(item);
      // Persisted to fields._uiMode (not just kept in memory) so the choice
      // survives a reload — the backend replaces `fields` wholesale, so the
      // existing fields have to be spread back in, not just this one key.
      version.fields = { ...(version.fields || {}), _uiMode: mode };
      renderTool();
      await api.updateVersion(item.id, { fields: version.fields });
    }));
    const openGenBtn = document.querySelector(`[data-open-generate="${item.id}"]`);
    if (openGenBtn) openGenBtn.addEventListener('click', () => openGenerateModal(item));
    const openSceneRefsBtn = document.querySelector(`[data-open-scene-refs="${item.id}"]`);
    if (openSceneRefsBtn) openSceneRefsBtn.addEventListener('click', () => openSceneRefsModal(item));
    const downloadItemBtn = document.querySelector(`[data-download-item="${item.id}"]`);
    if (downloadItemBtn) downloadItemBtn.addEventListener('click', () => {
      const version = theVersion(item);
      const requiresPrompt = downloadItemBtn.getAttribute('data-requires-prompt') === 'true';
      if (requiresPrompt && !(version.prompt && version.prompt.trim())) {
        toast('Generate a prompt first (step 1) — there\'s nothing to download yet.');
        return;
      }
      downloadItemPackage(item, downloadItemBtn);
    });
    const copyBtn = document.querySelector(`[data-copy-prompt="${item.id}"]`);
    if (copyBtn) copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(theVersion(item).prompt || '').then(() => toast('Copied'));
    });
    const uploadBtn = document.querySelector(`[data-media-upload-btn="${item.id}"]`);
    const uploadInput = document.querySelector(`[data-media-upload-input="${item.id}"]`);
    if (uploadBtn && uploadInput) {
      uploadBtn.addEventListener('click', () => {
        const version = theVersion(item);
        const requiresPrompt = uploadBtn.getAttribute('data-requires-prompt') === 'true';
        if (requiresPrompt && !(version.prompt && version.prompt.trim())) {
          toast('Generate a prompt first (step 1) — there\'s nothing to upload a result for yet.');
          return;
        }
        uploadInput.click();
      });
      uploadInput.addEventListener('change', async () => {
        const files = Array.from(uploadInput.files);
        if (!files.length) return;
        const version = theVersion(item);
        // The button itself already hides once a file exists, but guard
        // here too — one file per item, no silent second upload.
        if ((version.media_files || []).length > 0) {
          toast(`This item already has a file — remove "${version.media_files[0].fileName}" first before uploading another.`);
          uploadInput.value = '';
          return;
        }
        const file = files[0];
        if (!checkFileSize(file, maxUploadMb(item.item_key))) { uploadInput.value = ''; return; }
        uploadBtn.disabled = true; uploadBtn.textContent = 'Uploading…';
        const mediaFiles = [];
        const kind = file.type.startsWith('video') ? 'video' : file.type.startsWith('audio') ? 'audio' : 'image';
        const cleanName = cleanUploadFileName(item, file.name, 0);
        const uploaded = await api.uploadMedia(state.project.id, file, cleanName);
        mediaFiles.push({ key: uploaded.key, fileName: uploaded.fileName, kind });
        version.media_files = mediaFiles;
        const patch = { mediaFiles };
        // Uploading your own file replaces what a Generate-flow prompt would
        // have produced — that old prompt is now stale/unrelated, so clear
        // it (Setup field values are left alone, in case of switching back).
        const currentMode = state.itemCardMode[item.id] || (version.fields || {})._uiMode;
        if (currentMode === 'upload' && version.prompt) {
          version.prompt = '';
          patch.prompt = '';
        }
        await api.updateVersion(item.id, patch);
        uploadInput.value = '';
        uploadBtn.disabled = false; uploadBtn.textContent = '+ Choose file(s)';
        renderTool();
        toast(patch.prompt !== undefined ? 'Cleared the previous prompt — this item now uses your uploaded file directly.' : 'Saved');
      });
    }
    document.querySelectorAll(`[data-remove-media="${item.id}"]`).forEach(el => el.addEventListener('click', async () => {
      const idx = Number(el.getAttribute('data-index'));
      const version = theVersion(item);
      const mediaFiles = (version.media_files || []).filter((_, i) => i !== idx);
      version.media_files = mediaFiles;
      const patch = { mediaFiles };
      // Deleting the LAST upload while in "Upload my own" mode releases the
      // persisted choice — otherwise the item would stay stuck showing an
      // empty upload-only view with no obvious way back to Generate.
      const currentMode = state.itemCardMode[item.id] || (version.fields || {})._uiMode;
      if (currentMode === 'upload' && !mediaFiles.length) {
        delete state.itemCardMode[item.id];
        const { _uiMode, ...restFields } = version.fields || {};
        version.fields = restFields;
        patch.fields = restFields;
      }
      await api.updateVersion(item.id, patch);
      renderTool();
      toast('Saved');
    }));
    const deleteBtn = document.querySelector(`[data-delete-item="${item.id}"]`);
    if (deleteBtn) deleteBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm(`Remove "${item.name}"?`)) return;
      await api.deleteItem(item.id);
      state.items = state.items.filter(i => i.id !== item.id && i.parent_item_id !== item.id);
      renderTool();
    });
  }

  // ---------- Debug console (Gemini request/response log, in-memory only) ----------
  function logDebugEntry(item, result) {
    const d = result.debug || {};
    state.debugLog.unshift({
      id: 'dbg' + Math.random().toString(36).slice(2, 9),
      itemLabel: `${itemLabel(item.stage, item.item_key)} — ${item.name || ''}`,
      time: d.requestedAt || new Date().toISOString(),
      model: d.model || '—',
      finishReason: d.finishReason || '',
      retried: !!d.retried,
      requestPrompt: d.requestPrompt || '',
      rawResponse: d.rawResponse || '',
      error: result.error || null,
      errorMessage: result.message || d.parseError || '',
      warning: result.warning || '',
    });
    if (state.debugLog.length > 20) state.debugLog.length = 20;
    renderDebugPanel();
  }
  function debugEntryFullText(e) {
    return `${e.itemLabel} — ${e.time}
Model: ${e.model}${e.finishReason ? ` (finishReason: ${e.finishReason})` : ''}${e.retried ? ' [retried]' : ''}
${e.error ? `Error: ${e.error}${e.errorMessage ? ` — ${e.errorMessage}` : ''}\n` : ''}${e.warning ? `Warning: ${e.warning}\n` : ''}
--- Request sent to Gemini ---
${e.requestPrompt || '—'}

--- Raw response ---
${e.rawResponse || '—'}`;
  }
  function debugEntryHtml(e) {
    const expanded = !!state.debugExpanded[e.id];
    return `<div class="debug-entry ${expanded ? 'expanded' : ''}" data-debug-key="${e.id}">
      <div class="debug-entry-head">
        <span class="${e.error ? 'debug-badge-error' : e.warning ? 'debug-badge-error' : 'debug-badge-ok'}">${e.error ? '✗' : e.warning ? '⚠' : '✓'}</span>
        <span style="flex:1">${esc(e.itemLabel)}</span>
        <span class="debug-model">${esc(e.model)}${e.finishReason ? ` · ${esc(e.finishReason)}` : ''}${e.retried ? ' · retried' : ''}</span>
        <button type="button" class="icon-btn" data-debug-copy="${e.id}" title="Copy full request + response">📋</button>
      </div>
      <div class="debug-entry-body">
        <div class="debug-time">${esc(e.time)}</div>
        ${e.error ? `<div class="debug-error-line">Error: ${esc(e.error)}${e.errorMessage ? ` — ${esc(e.errorMessage)}` : ''}</div>` : ''}
        ${e.warning ? `<div class="debug-error-line">⚠ ${esc(e.warning)}</div>` : ''}
        <div class="debug-label">Request sent to Gemini</div>
        <pre class="debug-pre">${esc(e.requestPrompt || '—')}</pre>
        <div class="debug-label">Raw response</div>
        <pre class="debug-pre">${esc(e.rawResponse || '—')}</pre>
      </div>
    </div>`;
  }
  function renderDebugPanel() {
    const root = document.getElementById('debugPanelRoot');
    if (!root) return;
    const count = state.debugLog.length;
    root.innerHTML = `
      <button class="debug-fab" id="debugToggleBtn">🐞 Debug${count ? ` (${count})` : ''}</button>
      ${state.debugPanelOpen ? `
        <div class="debug-drawer">
          <div class="debug-drawer-head"><strong>Gemini call log — this session only</strong>
            <div style="display:flex;gap:6px">
              <button class="btn btn-sm" id="debugClearBtn">Clear</button>
              <button class="modal-close" id="debugCloseBtn">×</button>
            </div>
          </div>
          <div class="debug-entries">
            ${count ? state.debugLog.map(debugEntryHtml).join('') : '<p class="empty-note">No AI calls yet this session.</p>'}
          </div>
        </div>` : ''}`;
    const toggleBtn = document.getElementById('debugToggleBtn');
    if (toggleBtn) toggleBtn.addEventListener('click', () => { state.debugPanelOpen = !state.debugPanelOpen; renderDebugPanel(); });
    const closeBtn = document.getElementById('debugCloseBtn');
    if (closeBtn) closeBtn.addEventListener('click', () => { state.debugPanelOpen = false; renderDebugPanel(); });
    const clearBtn = document.getElementById('debugClearBtn');
    if (clearBtn) clearBtn.addEventListener('click', () => { state.debugLog = []; state.debugExpanded = {}; renderDebugPanel(); });
    document.querySelectorAll('[data-debug-key]').forEach(el => el.querySelector('.debug-entry-head').addEventListener('click', (ev) => {
      if (ev.target.closest('[data-debug-copy]')) return;
      const key = el.getAttribute('data-debug-key');
      state.debugExpanded[key] = !state.debugExpanded[key];
      renderDebugPanel();
    }));
    document.querySelectorAll('[data-debug-copy]').forEach(btn => btn.addEventListener('click', async (ev) => {
      ev.stopPropagation();
      const key = btn.getAttribute('data-debug-copy');
      const entry = state.debugLog.find(e => e.id === key);
      if (!entry) return;
      const original = btn.textContent;
      try {
        await navigator.clipboard.writeText(debugEntryFullText(entry));
        btn.textContent = '✓';
        toast('Copied full request + response');
      } catch {
        toast('Could not copy — clipboard access denied');
      }
      setTimeout(() => { btn.textContent = original; }, 1600);
    }));
  }

  function renderLane1() {

  function wireLane1() {
    document.querySelectorAll('[data-brief-section]').forEach(el => el.addEventListener('click', () => {
      const key = el.getAttribute('data-brief-section');
      state.briefOpenSection = state.briefOpenSection === key ? null : key;
      renderTool();
    }));
    const sampleSelect = document.getElementById('sampleBriefSelect');
    if (sampleSelect) sampleSelect.addEventListener('change', async () => {
      const key = sampleSelect.value;
      if (!key || !SAMPLE_BRIEFS[key]) return;
      const sample = SAMPLE_BRIEFS[key];
      Object.assign(state.brief, sample);
      state.briefSampleKey = key;
      const patch = {};
      Object.keys(sample).forEach(k => { patch[k.replace(/_([a-z])/g, (_, c) => c.toUpperCase())] = sample[k]; });
      await api.updateBrief(state.project.id, patch);
      renderTool();
      toast('Sample data loaded — logo/product photos still need a real upload');
    });
    document.querySelectorAll('[data-brief-text]').forEach(el => el.addEventListener('change', async () => {
      const key = el.getAttribute('data-brief-text');
      const val = key === 'duration' ? Number(el.value) : trimBlankLines(el.value);
      el.value = val;
      state.brief[key] = val;
      const camel = key.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
      await api.updateBrief(state.project.id, { [camel]: val });
      if (key === 'storyboard') renderTool();
      toast('Saved');
    }));
    const storyboardTemplateBtn = document.getElementById('storyboardTemplateBtn');
    if (storyboardTemplateBtn) storyboardTemplateBtn.addEventListener('click', () => {

      toast('Opened in ChatGPT with your brand details already filled in — copy the result back here');
    });
    document.querySelectorAll('[data-brief-pick]').forEach(el => el.addEventListener('click', async () => {
      const key = el.getAttribute('data-brief-pick');
      state.brief[key] = el.getAttribute('data-value');
      const camel = key.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
      await api.updateBrief(state.project.id, { [camel]: state.brief[key] });
      renderTool();
      toast('Saved');
    }));
    document.querySelectorAll('[data-brief-color], [data-brief-hex]').forEach(el => el.addEventListener('change', async () => {
      const key = el.getAttribute('data-brief-color') || el.getAttribute('data-brief-hex');
      state.brief[key] = el.value;
      const camel = key.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
      await api.updateBrief(state.project.id, { [camel]: el.value });
      renderTool();
      toast('Saved');
    }));
    const logoInput = document.getElementById('logoFileInput');
    const chooseLogoBtn = document.getElementById('chooseLogoBtn');
    if (chooseLogoBtn) chooseLogoBtn.addEventListener('click', () => logoInput.click());
    if (logoInput) logoInput.addEventListener('change', async () => {
      const file = logoInput.files[0];
      if (!file) return;
      if (!checkFileSize(file, DEFAULT_MEDIA_MAX_MB)) { logoInput.value = ''; return; }
      chooseLogoBtn.disabled = true; chooseLogoBtn.textContent = 'Uploading…';
      const uploaded = await api.uploadMedia(state.project.id, file, cleanBriefFileName('logo', file.name));
      state.brief.logo_media = { key: uploaded.key, fileName: uploaded.fileName };
      await api.updateBrief(state.project.id, { logoMedia: state.brief.logo_media });
      chooseLogoBtn.disabled = false; chooseLogoBtn.textContent = '+ Choose file';
      renderTool();
      toast('Saved');

    const photosInput = document.getElementById('productPhotosInput');
    const choosePhotosBtn = document.getElementById('chooseProductPhotosBtn');
    if (choosePhotosBtn) choosePhotosBtn.addEventListener('click', () => photosInput.click());
    if (photosInput) photosInput.addEventListener('change', async () => {
      const files = Array.from(photosInput.files);
      if (!files.length) return;
      const oversized = files.find(f => !checkFileSize(f, DEFAULT_MEDIA_MAX_MB));
      if (oversized) { photosInput.value = ''; return; }
      choosePhotosBtn.disabled = true; choosePhotosBtn.textContent = 'Uploading…';
      const photos = [...(state.brief.product_photos || [])];
      for (const file of files) {
        const uploaded = await api.uploadMedia(state.project.id, file, cleanBriefFileName('product', file.name, photos.length + 1));
        photos.push({ key: uploaded.key, fileName: uploaded.fileName });

      const res = await api.updateBrief(state.project.id, { lock: true });
      if (!res.ok) {

      state.brief.locked = false;

  // Stage 3 (Characters/Properties/Backgrounds/Sounds — one shared budget,
  // not 15 of each) and Stage 4 (Scenes) each cap at 15 total items. Mirrors
  // the same cap the backend enforces (items.ts) — checked here too so the
  // "+ Add" buttons disable themselves and the prompt() never even opens,
  // rather than only failing after a round trip.
  const STAGE_ITEM_CAPS = { 3: 15, 4: 15 };
  function stageItemCap(stage) { return STAGE_ITEM_CAPS[stage]; }
  function stageItemCapReached(stage) {
    const cap = stageItemCap(stage);
    return cap != null && state.items.filter(i => i.stage === stage).length >= cap;
  }
  function stageItemCapMessage(stage) {
    const cap = stageItemCap(stage);
    return stage === 3
      ? `Stage 3 already has the maximum of ${cap} items (Characters/Properties/Backgrounds/Sounds combined) — remove one to add another.`
      : `Stage 4 already has the maximum of ${cap} scenes — remove one to add another.`;
  }
  function wireAddRepeatable(laneId) {
    document.querySelectorAll(`#${laneId} [data-add-repeatable]`).forEach(el => el.addEventListener('click', async () => {
      const itemKey = el.getAttribute('data-add-repeatable');
      const stage = Number(el.getAttribute('data-stage'));
      if (!previousStageLocked(stage)) { toast(`Lock Stage ${stage - 1} first — paid and approved by the customer — before adding here`); return; }
      if (stageItemCapReached(stage)) { toast(stageItemCapMessage(stage)); return; }
      const name = prompt(`Name for the new ${itemLabel(stage, itemKey).toLowerCase()}?`);
      if (!name) return;
      const created = await api.createItem(state.project.id, { stage, itemKey, name });
      if (created && created.error) { toast(created.message || 'Could not add — stage is at its item limit.'); return; }
      const full = await api.getProject(state.project.id);
      state.items = full.items;
      renderTool();
    }));
