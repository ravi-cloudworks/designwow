<title>StagePay — Get Paid Every Stage. Never Waste AI Credits.</title>
<style>
  :root {
    --ink: #14161b; --paper: #eef1f2; --surface: #ffffff; --surface-2: #e6e9eb;
    --text: #14161b; --text-soft: #565b66; --text-faint: #8b92a1;
    --line: #dbdfe2; --line-soft: #e8ebed;
    --teal: #176b5e; --teal-soft: #e3f1ee; --teal-line: #bcded6;
    --amber: #a05f10; --amber-soft: #fbeedb; --amber-line: #eccd9a;
    --crimson: #b23a37; --crimson-soft: #fbe6e5; --crimson-line: #edc0be;
    --moss: #2f7a4f; --moss-soft: #e3f3e9; --moss-line: #bfe0cc;
    --display: "Avenir Next", "Century Gothic", "Segoe UI Semibold", ui-sans-serif, system-ui, sans-serif;
    --body: -apple-system, "Segoe UI", "Helvetica Neue", ui-sans-serif, system-ui, sans-serif;
    --mono: "SF Mono", "Roboto Mono", ui-monospace, "Consolas", monospace;
    --radius: 10px;
    --shadow-card: 0 1px 2px rgba(20, 22, 27, 0.04), 0 1px 1px rgba(20, 22, 27, 0.03);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #eef1f2; --paper: #14161b; --surface: #1c1f26; --surface-2: #23272f;
      --text: #eef1f2; --text-soft: #a7adb8; --text-faint: #6b7280;
      --line: #2c313a; --line-soft: #23272f;
      --teal: #4fb3a2; --teal-soft: #1b3733; --teal-line: #2f5850;
      --amber: #e2a34a; --amber-soft: #3a2e18; --amber-line: #5c4826;
      --crimson: #e2635f; --crimson-soft: #3a2220; --crimson-line: #5c3634;
      --moss: #4caf7d; --moss-soft: #1c3324; --moss-line: #2f5439;
      --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 1px 1px rgba(0,0,0,0.2);
    }
  }
  :root[data-theme="dark"] {
    --ink: #eef1f2; --paper: #14161b; --surface: #1c1f26; --surface-2: #23272f;
    --text: #eef1f2; --text-soft: #a7adb8; --text-faint: #6b7280;
    --line: #2c313a; --line-soft: #23272f;
    --teal: #4fb3a2; --teal-soft: #1b3733; --teal-line: #2f5850;
    --amber: #e2a34a; --amber-soft: #3a2e18; --amber-line: #5c4826;
    --crimson: #e2635f; --crimson-soft: #3a2220; --crimson-line: #5c3634;
    --moss: #4caf7d; --moss-soft: #1c3324; --moss-line: #2f5439;
  }
  :root[data-theme="light"] {
    --ink: #14161b; --paper: #eef1f2; --surface: #ffffff; --surface-2: #e6e9eb;
    --text: #14161b; --text-soft: #565b66; --text-faint: #8b92a1;
    --line: #dbdfe2; --line-soft: #e8ebed;
    --teal: #176b5e; --teal-soft: #e3f1ee; --teal-line: #bcded6;
    --amber: #a05f10; --amber-soft: #fbeedb; --amber-line: #eccd9a;
    --crimson: #b23a37; --crimson-soft: #fbe6e5; --crimson-line: #edc0be;
    --moss: #2f7a4f; --moss-soft: #e3f3e9; --moss-line: #bfe0cc;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { background: var(--paper); color: var(--text); font-family: var(--body); -webkit-font-smoothing: antialiased; }
  h1, h2, h3 { font-family: var(--display); margin: 0; }
  button, input, select, textarea { font: inherit; color: inherit; }

  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--line); background: var(--surface); flex-wrap: wrap; flex-shrink: 0; }
  .topbar-title { display: flex; align-items: center; gap: 9px; }
  .topbar-title .mark { width: 26px; height: 26px; border-radius: 7px; background: var(--ink); color: var(--paper); display: flex; align-items: center; justify-content: center; }
  .topbar h1 { font-size: 15.5px; font-weight: 700; }
  .topbar p { margin: 1px 0 0; font-size: 11px; color: var(--text-faint); }

  .mode-toggle { display: flex; background: var(--surface-2); border-radius: 999px; padding: 3px; gap: 2px; }
  .mode-toggle button { border: none; background: none; padding: 7px 14px; border-radius: 999px; font-size: 12.5px; font-weight: 700; cursor: pointer; color: var(--text-faint); }
  .mode-toggle button.active.manual { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-card); }
  .mode-toggle button.active.agent { background: var(--teal); color: #f0f6f4; }

  .user-chip { display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600; }
  .user-chip img { width: 24px; height: 24px; border-radius: 50%; }

  .legend { display: flex; gap: 14px; padding: 7px 20px; font-size: 10.5px; color: var(--text-faint); background: var(--surface); border-bottom: 1px solid var(--line); flex-wrap: wrap; flex-shrink: 0; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; }

  .swimlane-wrap { display: flex; overflow-x: auto; align-items: flex-start; flex: 1; min-height: 0; }
  .lane { flex: 0 0 320px; border-right: 1px solid var(--line); padding: 18px 16px 40px; overflow-y: auto; height: 100%; }
  .lane:last-child { border-right: none; }
  .lane-header { margin-bottom: 12px; }
  .lane-title-row { display: flex; align-items: center; gap: 10px; }
  .lane-badge { width: 28px; height: 28px; border-radius: 50%; background: var(--ink); color: var(--paper); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12.5px; flex-shrink: 0; font-family: var(--display); }
  .lane-title { font-size: 15px; font-weight: 700; }
  .earned-pill { margin-left: auto; font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 999px; background: var(--moss-soft); color: var(--moss); border: 1px solid var(--moss-line); white-space: nowrap; }
  .project-info-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px 20px; padding: 12px 20px; border-bottom: 1px solid var(--line); background: var(--surface-2); flex-shrink: 0; }
  .project-info-bar:empty { display: none; }
  .project-info-name { font-size: 16px; font-weight: 800; cursor: pointer; }
  .project-info-name-input { font-size: 16px; font-weight: 800; padding: 2px 8px; width: 280px; }
  .project-info-meta { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; font-size: 11.5px; color: var(--text-faint); }
  .project-info-meta strong { color: var(--text-soft); font-weight: 700; }
  .project-stage-pill { font-size: 10.5px; font-weight: 800; padding: 4px 10px; border-radius: 999px; color: #fff; white-space: nowrap; }
  .project-earned-pill { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 999px; background: var(--moss-soft); color: var(--moss); border: 1px solid var(--moss-line); white-space: nowrap; }
  .project-earned-pill.lg { font-size: 16px; padding: 7px 16px; }
  .lane-tamil { font-size: 11px; color: var(--text-faint); margin: 3px 0 0 38px; }
  .lane-desc { font-size: 11px; color: var(--text-faint); margin: 6px 0 0 38px; line-height: 1.4; }

  .trail-accordion { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 12px; overflow: hidden; background: var(--surface); }
  .trail-summary-head { display: flex; align-items: center; gap: 6px; padding: 8px 10px; cursor: pointer; font-size: 10.5px; font-weight: 600; color: var(--text-soft); }
  .trail-summary-head:hover { background: var(--surface-2); }
  .trail-summary-head .trail-chain { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .trail-summary-head .trail-arrow { font-size: 10px; color: var(--text-faint); transition: transform 0.15s; flex-shrink: 0; }
  .trail-accordion.expanded .trail-arrow { transform: rotate(90deg); }
  .trail-accordion.expanded .trail-summary-head { border-bottom: 1px solid var(--line-soft); }
  .chip-trail { display: none; flex-direction: column; gap: 5px; padding: 8px; }
  .trail-accordion.expanded .chip-trail { display: flex; }
  .stage-chip { border: 1px solid var(--line-soft); border-radius: 6px; background: var(--surface-2); }
  .stage-chip-head { display: flex; align-items: center; gap: 6px; padding: 6px 8px; cursor: pointer; font-size: 10.5px; font-weight: 600; }
  .chip-detail { display: none; padding: 0 8px 7px; font-size: 10.5px; color: var(--text-faint); line-height: 1.5; }
  .stage-chip.expanded .chip-detail { display: block; }

  .global-pin-row { display: flex; gap: 6px; flex-wrap: wrap; background: var(--surface-2); border: 1px dashed var(--line); border-radius: 8px; padding: 7px 9px; margin-bottom: 12px; }
  .global-pin-item { display: flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 600; color: var(--text-soft); background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 3px 8px 3px 3px; }
  .pin-swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.15); }

  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow-card); padding: 18px; margin-bottom: 14px; }
  .section-head-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .section-num { width: 28px; height: 28px; border-radius: 50%; background: var(--ink); color: var(--paper); display: flex; align-items: center; justify-content: center; font-size: 12.5px; font-weight: 700; flex-shrink: 0; font-family: var(--display); }
  .section-title { font-size: 15px; font-weight: 700; }
  .section-subtitle { font-size: 12px; color: var(--text-faint); margin: 2px 0 12px; }
  .section-desc { margin: 0 0 14px 38px; font-size: 11.5px; color: var(--text-faint); max-width: 60ch; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 5px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 640px) { .row2 { grid-template-columns: 1fr; } }
  input[type="text"], input[type="number"], select, textarea {
    width: 100%; border: 1px solid var(--line); background: var(--surface); border-radius: 8px; padding: 8px 10px; font-size: 13.5px;
  }
  textarea { resize: vertical; min-height: 64px; line-height: 1.5; }

  .pill-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .pill { border: 1px solid var(--line); background: var(--surface); color: var(--text-soft); padding: 7px 12px; border-radius: 999px; font-size: 12.5px; cursor: pointer; }
  .pill.selected { background: var(--ink); border-color: var(--ink); color: var(--paper); }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600; margin-bottom: 6px; }
  .checkbox-row input { width: auto; }

  .swatch-row { display: flex; gap: 8px; align-items: center; }
  .swatch-box { position: relative; width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--line); flex-shrink: 0; }
  .swatch-native { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .swatch-hex { width: 90px; font-size: 12px; padding: 7px 8px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); }

  .btn { display: inline-flex; align-items: center; gap: 6px; border-radius: 8px; padding: 7px 12px; font-size: 12.5px; font-weight: 600; cursor: pointer; border: 1px solid var(--line); background: var(--surface); color: var(--text); }
  .btn:hover { border-color: var(--text-faint); }
  .btn-primary { background: var(--teal); border-color: var(--teal); color: #f0f6f4; }
  .btn-sm { padding: 5px 9px; font-size: 11.5px; }
  .btn-danger { color: var(--crimson); }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
  /* Looks disabled but is NOT the native [disabled] attribute — used for the
     "previous stage isn't locked yet" guard rail, where clicking should still
     fire so the handler can explain why via a toast. A real [disabled]
     button never dispatches a click event at all, which is why those guards
     went silent. */
  .btn.btn-guard-disabled { opacity: 0.5; cursor: not-allowed; }

  .list-label-row { display: flex; align-items: center; justify-content: space-between; margin: 14px 0 8px; }
  .list-label-row span { font-size: 11px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.03em; }
  .list-label-row:first-child { margin-top: 2px; }

  .item-row { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 8px; overflow: hidden; background: var(--surface); }
  .item-row-head { display: flex; align-items: center; gap: 7px; padding: 10px 11px; cursor: pointer; }
  .item-row-head:hover { background: var(--surface-2); }
  .item-num { font-size: 11px; font-weight: 700; color: var(--text-faint); width: 14px; flex-shrink: 0; }
  .item-thumb { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; background: var(--surface-2); }
  .item-name { flex: 1; font-size: 13px; font-weight: 700; min-width: 0; }
  .item-rename-btn { background: none; border: none; cursor: pointer; font-size: 11px; opacity: 0.45; padding: 0 4px; flex-shrink: 0; }
  .item-rename-btn:hover { opacity: 1; }
  .item-name-input { flex: 1; min-width: 0; font-size: 13px; font-weight: 700; padding: 2px 6px; }
  .version-badge { font-size: 9.5px; font-weight: 700; padding: 2px 7px; border-radius: 999px; background: var(--moss-soft); color: var(--moss); white-space: nowrap; }
  .chevron { color: var(--text-faint); font-size: 11px; transition: transform 0.15s; }
  .item-row.expanded .chevron { transform: rotate(90deg); }
  .item-body { display: none; padding: 0 11px 13px; border-top: 1px solid var(--line-soft); }
  .item-row.expanded .item-body { display: block; padding-top: 11px; }
  .story-card .item-row-head:hover { background: none; }
  .story-step { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line-soft); }
  .story-step:last-child { border-bottom: none; padding-bottom: 0; }
  .story-step-num { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: var(--surface-2); color: var(--text); font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
  .story-step-body { flex: 1; min-width: 0; }
  .story-step-note { font-size: 12px; color: var(--text-faint); line-height: 1.5; }
  .icon-btn { background: none; border: 1px solid var(--line); border-radius: 6px; cursor: pointer; font-size: 12px; padding: 4px 7px; flex-shrink: 0; }
  .icon-btn:hover { background: var(--surface-2); }
  .icon-select { background: none; border: 1px solid var(--line); border-radius: 6px; cursor: pointer; font-size: 12px; padding: 4px 7px; flex-shrink: 0; }
  .icon-select:hover { background: var(--surface-2); }

  .brief-section { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 10px; overflow: hidden; background: var(--surface); }
  .brief-section-head { display: flex; align-items: center; justify-content: space-between; gap: 7px; padding: 11px 12px; cursor: pointer; font-weight: 700; font-size: 13px; }
  .brief-section-head:hover { filter: brightness(0.97); }
  .brief-section-body { display: none; padding: 2px 12px 14px; border-top: 1px solid var(--line-soft); }
  .brief-section.expanded .brief-section-body { display: block; padding-top: 10px; }
  .brief-plusminus { font-size: 15px; font-weight: 700; line-height: 1; width: 16px; text-align: center; flex-shrink: 0; }
  /* Each Stage 1 section gets its own tint so Brand/Strategy/Story read as
     distinct blocks at a glance, not one long uniform list. */
  .brief-section-brand .brief-section-head { background: var(--teal-soft); color: var(--teal); border-bottom: 1px solid var(--teal-line); }
  .brief-section-strategy .brief-section-head { background: var(--amber-soft); color: var(--amber); border-bottom: 1px solid var(--amber-line); }
  .brief-section-story .brief-section-head { background: var(--moss-soft); color: var(--moss); border-bottom: 1px solid var(--moss-line); }
  .brief-section:not(.expanded) .brief-section-head { border-bottom: none; }

  .stale-banner { display: flex; align-items: center; gap: 6px; font-size: 10.5px; font-weight: 600; line-height: 1.4; background: var(--amber-soft); color: var(--amber); border: 1px solid var(--amber-line); border-radius: 7px; padding: 6px 9px; margin-bottom: 9px; }

  .version-tab-row { display: flex; gap: 6px; margin: 9px 0; flex-wrap: wrap; }
  .version-tab { display: flex; align-items: center; gap: 4px; font-size: 10.5px; font-weight: 700; padding: 4px 9px; border-radius: 999px; border: 1px solid var(--line); background: var(--surface); cursor: pointer; color: var(--text-soft); }
  .version-tab.active { border-color: var(--teal); background: var(--teal-soft); color: var(--teal); }

  .row-actions { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 8px; }
  .prompt-box { width: 100%; min-height: 78px; font-size: 12px; line-height: 1.5; border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; background: var(--surface-2); resize: vertical; }
  .prompt-actions { display: flex; gap: 7px; margin: 7px 0; }

  .attach-list { margin-top: 9px; }
  .attach-list-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--crimson); margin-bottom: 5px; display: flex; align-items: center; gap: 4px; }
  .attach-chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .attach-chip { display: flex; align-items: center; gap: 5px; background: var(--crimson-soft); border: 1px solid var(--crimson-line); color: var(--crimson); font-size: 10.5px; font-weight: 600; padding: 3px 8px; border-radius: 999px; }
  .attach-chip a { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-faint); margin: 0 0 6px; }
  .deliverable-card { margin-top: 12px; padding: 10px 11px; border: 1px solid var(--teal-line); background: var(--teal-soft); border-radius: 8px; }
  .deliverable-card .card-section-label { color: var(--teal); }

  .media-slot { width: 100%; min-height: 54px; border: 1.5px dashed var(--line); border-radius: 8px; display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--surface-2); font-size: 11.5px; color: var(--text-faint); margin-top: 8px; }
  .media-slot input[type="text"] { flex: 1; background: var(--surface); }
  .media-slot-multi { width: 100%; border: 1.5px dashed var(--line); border-radius: 8px; padding: 9px 10px; background: var(--surface-2); margin-top: 8px; }
  .media-slot-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-faint); margin-bottom: 7px; }

  .refs-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .refs-chip { display: flex; align-items: center; gap: 5px; border: 1px solid var(--line); background: var(--surface); color: var(--text-soft); font-size: 11.5px; font-weight: 600; padding: 5px 10px; border-radius: 999px; cursor: pointer; }
  .refs-chip.selected { border-color: var(--teal); background: var(--teal-soft); color: var(--teal); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(10,11,14,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal-card { background: var(--surface); border-radius: 12px; width: 520px; max-width: 100%; max-height: 86vh; overflow-y: auto; padding: 22px; }
  .modal-card.generate-modal-card { width: 920px; max-width: 96vw; }
  .generate-modal-body { display: flex; gap: 18px; margin-top: 14px; }
  .generate-modal-left { flex: 0 0 280px; max-height: 62vh; overflow-y: auto; padding-right: 4px; }
  .generate-modal-right { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .generate-modal-textarea { flex: 1; min-height: 420px; font-size: 15.5px; line-height: 1.7; padding: 16px; }
  @media (max-width: 720px) { .generate-modal-body { flex-direction: column; } .generate-modal-left { flex: none; max-height: none; } }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .modal-head strong { font-size: 15.5px; }
  .modal-close { border: none; background: none; font-size: 19px; cursor: pointer; color: var(--text-faint); }
  .modal-sub { font-size: 12px; color: var(--text-faint); margin: 0 0 16px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
  .affected-list { list-style: none; margin: 0 0 16px; padding: 0; display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; }
  .affected-list li { font-size: 12.5px; font-weight: 600; background: var(--amber-soft); border: 1px solid var(--amber-line); border-radius: 6px; padding: 7px 10px; }
  .confirm-actions button.btn-confirm { background: var(--amber); border-color: var(--amber); color: #2a1600; }

  .empty-note { font-size: 12px; color: var(--text-faint); font-style: italic; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); max-width: min(480px, calc(100vw - 32px)); background: var(--ink); color: var(--paper); padding: 9px 16px; border-radius: 14px; font-size: 12.5px; font-weight: 600; z-index: 2000; box-shadow: var(--shadow-card); text-align: center; }

  .project-list-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; cursor: pointer; background: var(--surface); }
  .project-list-item:hover { border-color: var(--teal-line); background: var(--teal-soft); }

  async function fetchJsonWithTimeout(url, options, timeoutMs) {

  // D1's datetime('now') returns UTC as "YYYY-MM-DD HH:MM:SS" with no

  // otherwise the browser guesses local time and the displayed time is wrong.
  function formatIST(sqliteUtcString) {
    if (!sqliteUtcString) return '';
    const d = new Date(sqliteUtcString.replace(' ', 'T') + 'Z');
    if (isNaN(d.getTime())) return sqliteUtcString;
    return new Intl.DateTimeFormat('en-IN', {

      hour: 'numeric', minute: '2-digit', hour12: true,

  // UTC ms) so it doesn't drift by one near midnight.
  function formatISTWithRelative(sqliteUtcString) {
    if (!sqliteUtcString) return '';
    const d = new Date(sqliteUtcString.replace(' ', 'T') + 'Z');

    const istDateKey = (dt) => new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Kolkata', year: 'numeric', month: '2-digit', day: '2-digit' }).format(dt);
    const daysDiff = Math.round((Date.parse(istDateKey(new Date())) - Date.parse(istDateKey(d))) / 86400000);
    const rel = daysDiff <= 0 ? 'Today' : daysDiff === 1 ? 'Yesterday' : `${daysDiff}d before`;
    return `${formatIST(sqliteUtcString)} (${rel})`;

      html += `<div class="field"><label>Tone (Stage 1, locked)</label><p style="margin:0;font-size:13px">${esc(b.tone || '—')}</p></div>
        <div class="field"><label>Storyboard / Dialogue (Stage 1, locked)</label>
          <p style="margin:0;font-size:12px;line-height:1.5;white-space:pre-wrap;max-height:240px;overflow-y:auto;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:8px">${esc(b.storyboard || '—')}</p>
        </div>`;
    }
    // Scenes get an extra "featured items" picker driving the must-attach list.
    if (item.item_key === 'scene') {
      const candidates = [...itemsFor(3, 'character'), ...itemsFor(3, 'property'), ...itemsFor(3, 'background')];
      const refs = Array.isArray(fields.refs) ? fields.refs : [];
      html += `<div class="field"><label>Featured in this scene</label><div class="refs-picker">
        ${candidates.length ? candidates.map(it => `<button type="button" class="refs-chip ${refs.includes(it.id) ? 'selected' : ''}" data-ref-toggle="${it.id}">${ITEM_THUMBS[it.item_key] || ''} ${esc(it.name)}</button>`).join('') : '<span class="empty-note">Add Characters/Properties/Backgrounds in Stage 3 first.</span>'}
      </div></div>`;
    }
    return html;
  }

  // ---------- Generate modal (Setup + Generate + review, one place) ----------
  // Replaces the old separate Setup / Compile / Generate-with-AI / Review
  // buttons with a single "Generate {Type}" entry point: Setup fields on the
  // left, the resulting prompt as one big editable textarea on the right.
  let genModalDraft = null;
  let typingAnimId = null;
  function animateTypingInto(textarea, fullText) {
    if (typingAnimId) cancelAnimationFrame(typingAnimId);
    if (!textarea) return;
    const duration = Math.min(1400, Math.max(300, fullText.length * 4));
    const start = performance.now();
    function step(now) {
      const frac = Math.min(1, (now - start) / duration);
      textarea.value = fullText.slice(0, Math.floor(fullText.length * frac));
      if (frac < 1) { typingAnimId = requestAnimationFrame(step); }
      else { textarea.value = fullText; typingAnimId = null; }
    }
    typingAnimId = requestAnimationFrame(step);
  }
  function openGenerateModal(item) {
    const version = theVersion(item);
    genModalDraft = { item, fields: JSON.parse(JSON.stringify(version.fields || {})), prompt: version.prompt || '' };
    renderGenerateModal();
  }
  function closeGenerateModal() {
    if (typingAnimId) { cancelAnimationFrame(typingAnimId); typingAnimId = null; }
    genModalDraft = null;
    document.getElementById('modalRoot').innerHTML = '';
  }
  function renderGenerateModal() {
    const root = document.getElementById('modalRoot');
    if (!genModalDraft) { root.innerHTML = ''; return; }
    const { item, prompt } = genModalDraft;
    const isAgentMode = state.project.mode === 'agent';
    // If this item type has no editable fields (Story — everything comes
    // from the locked Stage 1 brief instead), there's nothing whose change
    // the guard can key off, so it would otherwise disable the button
    // forever after one generation. Skip the guard entirely in that case.
    const hasEditableFields = ((itemConfigFor(item) || {}).content || {}).fieldsSchema?.length > 0;
    const unchangedSinceAI = hasEditableFields && !!genModalDraft.fields._ai_snapshot && genModalDraft.fields._ai_snapshot === fieldsSignature(genModalDraft.fields);
    const genDisabled = isAgentMode && unchangedSinceAI;
    const genLabel = isAgentMode ? (unchangedSinceAI ? '✓ AI draft up to date' : '✨ Generate with AI') : '⚙ Generate';
    const refFiles = mustAttachFiles(item, genModalDraft.fields);
    root.innerHTML = `
      <div class="modal-overlay" id="genModalOverlay">
        <div class="modal-card generate-modal-card">
          <div class="modal-head"><strong>Generate — ${esc(item.name || itemLabel(item.stage, item.item_key))}</strong>
            <button class="modal-close" id="genModalCloseBtn">×</button></div>
          ${refFiles.length ? `<div class="attach-list"><div class="attach-list-label">🔴 Must attach these images</div><div class="attach-chip-row">${refFiles.map(f => attachChip(f.icon || '', f.fileName, f.key)).join('')}</div></div>` : ''}
          <div class="generate-modal-body">
            <div class="generate-modal-left">
              <div id="genModalFields">${renderFieldsForm(item, genModalDraft.fields)}</div>
              <button class="btn btn-primary" id="genModalGenerateBtn" ${genDisabled ? 'disabled' : ''} style="width:100%;margin-top:4px">${genLabel}</button>
            </div>
            <div class="generate-modal-right">
              <div class="prompt-actions" style="justify-content:flex-end;margin:0 0 6px">
                <button class="btn btn-sm" id="genModalCopyBtn">Copy</button>
                <button class="btn btn-sm" id="genModalChatGptBtn">Open in ChatGPT</button>
              </div>
              ${item.item_key === 'story' ? `<p class="story-step-note" style="margin:0 0 6px">Read-only — this is generated from Stage 1's locked storyboard. To change it, edit Stage 1 and regenerate here, so the two stages never drift apart.</p>` : ''}
              <textarea id="genModalPromptArea" class="prompt-box generate-modal-textarea" placeholder="Click Generate, or write your own..." ${item.item_key === 'story' ? 'readonly' : ''}>${esc(prompt)}</textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn" id="genModalCancelBtn">Cancel</button>
            <button class="btn btn-primary" id="genModalSaveBtn">Save</button>
          </div>
        </div>
      </div>`;
    wireGenerateModal();
  }
  function wireGenModalFieldControls() {
    document.querySelectorAll('#genModalFields [data-field-pick]').forEach(el => el.addEventListener('click', () => {
      genModalDraft.fields[el.getAttribute('data-field-pick')] = el.getAttribute('data-value');
      refreshGenModalFields();
    }));
    document.querySelectorAll('#genModalFields [data-field-check]').forEach(el => el.addEventListener('change', () => {
      genModalDraft.fields[el.getAttribute('data-field-check')] = el.checked;
    }));
    document.querySelectorAll('#genModalFields [data-field-text]').forEach(el => el.addEventListener('input', () => {
      const key = el.getAttribute('data-field-text');
      genModalDraft.fields[key] = el.type === 'number' ? Number(el.value) : el.value;
    }));
    document.querySelectorAll('#genModalFields [data-ref-toggle]').forEach(el => el.addEventListener('click', () => {
      const id = el.getAttribute('data-ref-toggle');
      const refs = Array.isArray(genModalDraft.fields.refs) ? genModalDraft.fields.refs : [];
      genModalDraft.fields.refs = refs.includes(id) ? refs.filter(r => r !== id) : [...refs, id];
      refreshGenModalFields();
    }));
    document.querySelectorAll('#genModalFields [data-list-add]').forEach(el => el.addEventListener('click', () => {
      const key = el.getAttribute('data-list-add');
      if (!Array.isArray(genModalDraft.fields[key])) genModalDraft.fields[key] = [];
      genModalDraft.fields[key].push('');
      refreshGenModalFields();
    }));
    document.querySelectorAll('#genModalFields [data-list-remove]').forEach(el => el.addEventListener('click', () => {
      const key = el.getAttribute('data-list-remove');
      genModalDraft.fields[key].splice(Number(el.getAttribute('data-index')), 1);
      refreshGenModalFields();
    }));
    document.querySelectorAll('#genModalFields [data-list-item]').forEach(el => el.addEventListener('input', () => {
      const key = el.getAttribute('data-list-item');
      genModalDraft.fields[key][Number(el.getAttribute('data-index'))] = el.value;
    }));
  }
  // Re-renders only the left fields pane (plus the Generate button's
  // disabled/label state) — never touches the right-side textarea, so an
  // in-progress typing animation or a manual edit there is never disturbed.
  function refreshGenModalFields() {
    document.getElementById('genModalFields').innerHTML = renderFieldsForm(genModalDraft.item, genModalDraft.fields);
    const isAgentMode = state.project.mode === 'agent';
    const hasEditableFields = ((itemConfigFor(genModalDraft.item) || {}).content || {}).fieldsSchema?.length > 0;
    const unchangedSinceAI = hasEditableFields && !!genModalDraft.fields._ai_snapshot && genModalDraft.fields._ai_snapshot === fieldsSignature(genModalDraft.fields);
    const genBtn = document.getElementById('genModalGenerateBtn');
    if (genBtn) {
      genBtn.disabled = isAgentMode && unchangedSinceAI;
      genBtn.textContent = isAgentMode ? (unchangedSinceAI ? '✓ AI draft up to date' : '✨ Generate with AI') : '⚙ Generate';
    }
    wireGenModalFieldControls();
  }
  function wireGenerateModal() {
    document.getElementById('genModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'genModalOverlay') closeGenerateModal(); });
    document.getElementById('genModalCloseBtn').addEventListener('click', closeGenerateModal);
    document.getElementById('genModalCancelBtn').addEventListener('click', closeGenerateModal);
    wireGenModalFieldControls();
    const genBtn = document.getElementById('genModalGenerateBtn');
    genBtn.addEventListener('click', async () => {
      const item = genModalDraft.item;
      const textarea = document.getElementById('genModalPromptArea');
      if (state.project.mode === 'agent') {
        if (!state.brief.language) { toast('Set a Language in Stage 1 before generating with AI'); return; }
        genBtn.disabled = true;
        const stopWaitTimer = startWaitTimer(genBtn, GENERATE_WAIT_MESSAGES);
        try {
          const attachedFileNames = mustAttachFiles(item, genModalDraft.fields).map(f => f.fileName);
          // Refs are just item ids in the fields blob — meaningless to Gemini
          // on their own, so resolve them to name + actual detail summary here
          // rather than sending raw ids the backend has no way to look up.
          const featuredItems = item.item_key === 'scene'
            ? (genModalDraft.fields.refs || []).map(r => itemById(r)).filter(Boolean).map(it => ({ name: it.name, summary: describeItemForRef(it) }))
            : undefined;
          const result = await api.suggest(item.item_key, item.stage, genModalDraft.fields, state.brief, attachedFileNames, featuredItems);
          logDebugEntry(item, result);
          if (result.error) { toast(result.message || `AI suggestion failed: ${result.error}`); return; }
          genModalDraft.fields = { ...result.fields, _ai_snapshot: fieldsSignature(result.fields) };
          genModalDraft.autoPopulate = result.autoPopulate || null;
          const composed = composeFinalPrompt(item, result.prompt);
          genModalDraft.prompt = composed;
          animateTypingInto(textarea, composed);
          refreshGenModalFields();
          if (result.warning) toast(result.warning);
        } catch (e) { toast('AI suggestion failed — check your connection'); }
        finally { stopWaitTimer(); refreshGenModalFields(); }
      } else {
        const composed = composeFinalPrompt(item, compilePrompt(item, genModalDraft.fields));
        genModalDraft.prompt = composed;
        animateTypingInto(textarea, composed);
      }
    });
    document.getElementById('genModalCopyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('genModalPromptArea').value).then(() => toast('Copied'));
    });
    document.getElementById('genModalChatGptBtn').addEventListener('click', () => {
      const text = document.getElementById('genModalPromptArea').value;
      navigator.clipboard.writeText(text).then(() => toast('Copied — paste it into ChatGPT'));
      window.open('https://chatgpt.com/', '_blank', 'noopener');
    });
    document.getElementById('genModalSaveBtn').addEventListener('click', async () => {
      const item = genModalDraft.item;
      const promptVal = document.getElementById('genModalPromptArea').value;
      const autoPopulate = genModalDraft.autoPopulate;
      const version = theVersion(item);
      version.fields = genModalDraft.fields;
      version.prompt = promptVal;
      await api.updateVersion(item.id, { fields: version.fields, prompt: promptVal });
      closeGenerateModal();
      renderTool();
      toast('Saved');
      const hasAutoPopulate = autoPopulate && Object.values(autoPopulate).some(arr => Array.isArray(arr) && arr.length);
      if (hasAutoPopulate) openAutoPopulateModal(item, autoPopulate);
    });
  }

  // ---------- Auto-populate confirmation (Story -> Visual & Music / Scene Blueprint) ----------
  // Gemini's Story generation can return structured arrays (characters,
  // properties, backgrounds, sounds, scenes) so one generation drafts the
  // whole downstream skeleton instead of the designer re-typing every cast
  // member by hand — but creating items silently would be surprising and
  // could duplicate on every regeneration, hence the confirmation.
  let autoPopulateDraft = null;
  function existingNamesFor(stage, itemKey) {
    return new Set(itemsFor(stage, itemKey).map(i => (i.name || '').trim().toLowerCase()));
  }
  function openAutoPopulateModal(sourceItem, autoPopulate) {
    const sourceConfig = itemConfigFor(sourceItem);
    const fieldDefs = (sourceConfig && sourceConfig.content.autoPopulate && sourceConfig.content.autoPopulate.geminiResponseFields) || [];
    const groups = fieldDefs.map(def => {
      const entries = autoPopulate[def.key] || [];
      const existing = def.createsItemsIn ? existingNamesFor(def.createsItemsIn.stage, def.createsItemsIn.itemKey) : new Set();
      const secondaryKey = Object.keys(entries[0] || {}).find(k => k !== 'name') || 'description';
      return {
        key: def.key,
        itemKey: def.createsItemsIn && def.createsItemsIn.itemKey,
        stage: def.createsItemsIn && def.createsItemsIn.stage,
        secondaryKey,
        entries: entries.map(e => ({ ...e, alreadyExists: existing.has((e.name || '').trim().toLowerCase()) })),
      };
    }).filter(g => g.entries.length);
    autoPopulateDraft = { sourceItem, groups };
    renderAutoPopulateModal();
  }
  function closeAutoPopulateModal() { autoPopulateDraft = null; document.getElementById('modalRoot').innerHTML = ''; }
  function renderAutoPopulateModal() {
    const root = document.getElementById('modalRoot');
    if (!autoPopulateDraft) { root.innerHTML = ''; return; }
    const { groups } = autoPopulateDraft;
    const totalNew = groups.reduce((n, g) => n + g.entries.filter(e => !e.alreadyExists).length, 0);
    root.innerHTML = `
      <div class="modal-overlay" id="apModalOverlay">
        <div class="modal-card" style="width:460px">
          <div class="modal-head"><strong>Create the rest of the cast from this story?</strong>
            <button class="modal-close" id="apModalCloseBtn">×</button></div>
          <p class="modal-sub">Found in the story — uncheck anything you don't want created. Already-existing items (matched by name) are skipped automatically. We'll set these up and fill them in for you — no need to spend the next several minutes doing it by hand.</p>
          <ul class="affected-list">
            ${groups.map(g => g.entries.map((e, i) => `
              <li style="display:flex;align-items:flex-start;gap:8px;background:${e.alreadyExists ? 'var(--surface-2)' : 'var(--amber-soft)'};border-color:${e.alreadyExists ? 'var(--line)' : 'var(--amber-line)'}">
                <input type="checkbox" data-ap-check data-group="${g.key}" data-index="${i}" ${e.alreadyExists ? 'disabled' : 'checked'} style="margin-top:2px">
                <span><strong>${esc(e.name)}</strong> <span style="font-weight:400;color:var(--text-faint)">(${esc(g.itemKey)})</span>${e.alreadyExists ? ' — already exists, skipping' : `<br><span style="font-weight:400">${esc((e[g.secondaryKey] || '').slice(0, 100))}</span>`}</span>
              </li>`).join('')).join('')}
          </ul>
          <div class="modal-footer confirm-actions">
            <button class="btn" id="apModalCancelBtn">Skip</button>
            <button class="btn btn-confirm" id="apModalConfirmBtn">Create ${totalNew} item${totalNew === 1 ? '' : 's'}</button>
          </div>
        </div>
      </div>`;
    wireAutoPopulateModal();
  }
  function wireAutoPopulateModal() {
    document.getElementById('apModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'apModalOverlay') closeAutoPopulateModal(); });
    document.getElementById('apModalCloseBtn').addEventListener('click', closeAutoPopulateModal);
    document.getElementById('apModalCancelBtn').addEventListener('click', closeAutoPopulateModal);
    document.getElementById('apModalConfirmBtn').addEventListener('click', async () => {
      const { groups } = autoPopulateDraft;
      const confirmBtn = document.getElementById('apModalConfirmBtn');
      const cancelBtn = document.getElementById('apModalCancelBtn');
      const closeBtn = document.getElementById('apModalCloseBtn');
      // Flatten the checked work up front so the button can show real
      // progress ("Creating X… (2/6)") instead of a generic spinner — this
      // used to just sit on "Create N items" with no feedback while it did
      // several sequential API round-trips, which read as stuck.
      const toCreate = [];
      for (const g of groups) {
        if (!g.itemKey) continue;
        for (let i = 0; i < g.entries.length; i++) {
          const e = g.entries[i];
          if (e.alreadyExists) continue;
          const checkbox = document.querySelector(`[data-ap-check][data-group="${g.key}"][data-index="${i}"]`);
          if (!checkbox || !checkbox.checked) continue;
          toCreate.push({ g, e });
        }
      }
      if (!toCreate.length) { closeAutoPopulateModal(); return; }
      confirmBtn.disabled = true;
      if (cancelBtn) cancelBtn.disabled = true;
      if (closeBtn) closeBtn.disabled = true;
      for (let n = 0; n < toCreate.length; n++) {
        const { g, e } = toCreate[n];
        confirmBtn.textContent = `Creating ${e.name}… (${n + 1}/${toCreate.length})`;
        const created = await api.createItem(state.project.id, { stage: g.stage, itemKey: g.itemKey, name: e.name });
        if (created && created.id && e[g.secondaryKey]) {
          await api.updateVersion(created.id, { fields: { [g.secondaryKey === 'summary' ? 'action' : 'description']: e[g.secondaryKey] } });
        }
        // A Scene always needs its paired Stage 5 Movie item — the manual
        // "+ Add scene" button creates both together; without this, a
        // scene created here would have nowhere for Stage 5 to attach its
        // final clip.
        if (created && created.id && g.itemKey === 'scene') {
          await api.createItem(state.project.id, { stage: 5, itemKey: 'movie', name: `${e.name} — Final Clip`, parentItemId: created.id });
        }
      }
      const full = await api.getProject(state.project.id);
      state.items = full.items;
      renderTool();
      showAutoPopulateDoneScreen(toCreate.length);
    });
  }
  // A little empathy for what is genuinely painstaking manual work when done
  // by hand (naming, describing, and wiring up every character/prop/scene
  // one at a time) — tell the designer how much of that we just did for
  // them, and give them explicit permission to step away for a minute.
  function showAutoPopulateDoneScreen(count) {
    const estMinutes = Math.max(5, count * 3);
    const root = document.getElementById('modalRoot');
    root.innerHTML = `
      <div class="modal-overlay" id="apDoneOverlay">
        <div class="modal-card" style="width:420px;text-align:center">
          <div style="font-size:38px;margin:8px 0 2px">🌿</div>
          <strong style="font-size:16px">All set — ${count} item${count === 1 ? '' : 's'} created for you</strong>
          <p class="modal-sub" style="margin-top:8px">That's roughly ${estMinutes} minutes of manual setup you just got back. You've been deep in the creative work — take a minute, grab a coffee or some fresh air. You've earned it.</p>
          <div class="modal-footer confirm-actions" style="justify-content:center">
            <button class="btn btn-confirm" id="apDoneCloseBtn">Nice, thanks!</button>
          </div>
        </div>
      </div>`;
    document.getElementById('apDoneCloseBtn').addEventListener('click', closeAutoPopulateModal);
    document.getElementById('apDoneOverlay').addEventListener('click', (e) => { if (e.target.id === 'apDoneOverlay') closeAutoPopulateModal(); });
  }

  // ---------- Must-attach: what an item needs from earlier stages ----------
  // A compiled prompt alone isn't enough to get a correct Google Flow result —
  // brand/product consistency has to come from attached reference images too.
  // Per item type, what actually has to be attached:
  //   story     -> Logo + Product photos (Stage 1) — the pitch sketch must show the real product/brand
  //   character -> Logo (branded outfit/props stay consistent)
  //   property  -> Logo + Product photos — a Property is very often the product/packaging itself
  //   background-> Logo
  //   sound     -> nothing (audio only, no image generation)
  //   scene     -> Logo + the approved image of every Character/Property/Background it's featuring (via refs) — carries its own camera/shot fields now too
  //   movie     -> its own Scene's approved image + every approved Sound (continuity into the final clip)
  // A clickable chip when a real file key exists (every attach source is a
  // real R2-backed upload now), plain text otherwise.
  function attachChip(icon, name, key) {
    const label = `${icon} ${esc(name)}`;
    return key ? `<a class="attach-chip" href="${esc(api.mediaUrl(key))}" target="_blank" rel="noopener">${label}</a>` : `<span class="attach-chip">${label}</span>`;
  }
  // All of an item's own uploaded media files — an item can carry more than
  // one now (e.g. a Story's several storyboard frames).
  function itemMediaFiles(item) { return item ? (theVersion(item).media_files || []) : []; }
  function withIcon(files, icon) { return files.map(f => ({ ...f, icon })); }
  // Single source of truth for "what files does this item depend on from
  // earlier stages" — reused by the on-screen chips, the compiled/AI prompt's
  // file-reference line, and the ZIP download, so none of them can drift out
  // of sync with each other.
  function mustAttachFiles(item, fields) {
    const b = state.brief;
    const logoFiles = () => (b.logo_media && b.logo_media.key ? [{ ...b.logo_media, icon: '🏷️' }] : []);
    const productFiles = () => (b.product_photos || []).map(p => ({ ...p, icon: '📷' }));

    if (item.item_key === 'story') return [...logoFiles(), ...productFiles()];
    if (item.item_key === 'character') return logoFiles();
    if (item.item_key === 'property') return [...logoFiles(), ...productFiles()];
    if (item.item_key === 'background') return logoFiles();
    if (item.item_key === 'scene') {
      const refIds = Array.isArray(fields.refs) ? fields.refs : [];
      const refFiles = refIds.flatMap(id => { const ref = itemById(id); return ref ? withIcon(itemMediaFiles(ref), ITEM_THUMBS[ref.item_key] || '') : []; });
      return [...refFiles, ...logoFiles()];
    }
    if (item.item_key === 'movie') {
      const scene = itemById(item.parent_item_id);
      const sceneFields = scene ? (theVersion(scene).fields || {}) : {};
      const refIds = Array.isArray(sceneFields.refs) ? sceneFields.refs : [];
      // The scene blueprint image already shows these visually, but the master
      // prompt explicitly claims to follow the Character/Prop Sheets too — this
      // makes that true, giving the video model the original clean reference
      // images as grounding, not just however well the blueprint replicated them.
      const refFiles = refIds.flatMap(id => { const ref = itemById(id); return ref ? withIcon(itemMediaFiles(ref), ITEM_THUMBS[ref.item_key] || '') : []; });
      const soundFiles = itemsFor(3, 'sound').flatMap(s => withIcon(itemMediaFiles(s), '🔊'));
      return [...withIcon(itemMediaFiles(scene), '🎬'), ...refFiles, ...soundFiles];
    }
    return [];
  }

  // Google Flow's own downloaded filenames are long, timestamp-heavy, and
  // ugly to hand to a customer (e.g. "Storyboard_for_VitaBoost_adverti…_
  // 202607142339.jpeg") — rename to something clean at upload time instead
  // of just truncating the display, since these end up in the customer's
  // deliverable zip too, not just the on-screen chip.
  function cleanUploadFileName(item, originalFileName, existingCount) {
    const extMatch = originalFileName.match(/\.([a-zA-Z0-9]+)$/);
    const ext = extMatch ? extMatch[1].toLowerCase() : 'dat';
    const base = (item.name || itemLabel(item.stage, item.item_key))
      .replace(/[^a-zA-Z0-9]+/g, '-')
      .replace(/(^-|-$)/g, '') || 'file';
    const suffix = existingCount > 0 ? `-${existingCount + 1}` : '';
    return `${base}${suffix}.${ext}`;
  }

  // ---------- Item card ----------
  // Numbered-steps per-item card (Generate/Download/Flow/Upload only — no
  // amount/paid/lock here, those live once in the shared stage-level card
  // below the item list). Shared by Stage 3's repeatable lists, Stage 4's
  // scene list, and Stage 5's movie list.
  function renderNumberedItemCard(item, opts) {
    opts = opts || {};
    const isExpanded = !!state.expandedItems[item.id];
    const version = theVersion(item);
    const mediaFiles = version.media_files || [];
    const mediaLabel = MEDIA_LABELS[item.item_key] || 'File';
    const mediaAccept = MEDIA_ACCEPT[item.item_key] || 'image/*';
    const lock = stageLockFor(item.stage);
    const isLocked = !!(lock && lock.locked);
    const dis = isLocked ? 'disabled' : '';
    return `
      <div class="item-row ${isExpanded ? 'expanded' : ''}" data-item-row="${item.id}">
        <div class="item-row-head" data-toggle-item="${item.id}">
          <span class="item-thumb">${ITEM_THUMBS[item.item_key] || '📄'}</span>
          ${state.renamingItemId === item.id
            ? `<input type="text" class="item-name-input" data-rename-item="${item.id}" value="${esc(item.name || itemLabel(item.stage, item.item_key))}">`
            : `<span class="item-name">${esc(item.name || itemLabel(item.stage, item.item_key))}</span><button type="button" class="item-rename-btn" data-rename-btn="${item.id}" title="Rename">✏️</button>`}
          ${opts.deletable && !isLocked ? `<button class="btn btn-sm btn-danger" data-delete-item="${item.id}" title="Remove">−</button>` : ''}
          <span class="chevron">›</span>
        </div>

  function wireItemRename(item) {
    const renameBtn = document.querySelector(`[data-rename-btn="${item.id}"]`);
    if (renameBtn) renameBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      state.renamingItemId = item.id;
      renderTool();
    });
    const renameInput = document.querySelector(`[data-rename-item="${item.id}"]`);
    if (renameInput) {
      renameInput.focus(); renameInput.select();
      renameInput.addEventListener('click', (e) => e.stopPropagation());
      const saveRename = async () => {
        if (state.renamingItemId !== item.id) return;
        state.renamingItemId = null;
        const newName = renameInput.value.trim();
        if (newName && newName !== item.name) {
          item.name = newName;
          await api.updateItem(item.id, { name: newName });
        }
        renderTool();
      };
      renameInput.addEventListener('blur', saveRename);
      renameInput.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') renameInput.blur(); });
    }
  }
  function wireItemCard(item) {
    document.querySelectorAll(`[data-toggle-item="${item.id}"]`).forEach(el => el.addEventListener('click', (e) => {
      if (e.target.closest('[data-delete-item]') || e.target.closest('[data-rename-btn]') || e.target.closest('[data-rename-item]')) return;
      state.expandedItems[item.id] = !state.expandedItems[item.id];
      renderTool();
    }));
    wireItemRename(item);
    const openGenBtn = document.querySelector(`[data-open-generate="${item.id}"]`);
    if (openGenBtn) openGenBtn.addEventListener('click', () => openGenerateModal(item));
    const downloadItemBtn = document.querySelector(`[data-download-item="${item.id}"]`);
    if (downloadItemBtn) downloadItemBtn.addEventListener('click', () => downloadItemPackage(item, downloadItemBtn));
    const copyBtn = document.querySelector(`[data-copy-prompt="${item.id}"]`);
    if (copyBtn) copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(theVersion(item).prompt || '').then(() => toast('Copied'));
    });
    const uploadBtn = document.querySelector(`[data-media-upload-btn="${item.id}"]`);
    const uploadInput = document.querySelector(`[data-media-upload-input="${item.id}"]`);
    if (uploadBtn && uploadInput) {
      uploadBtn.addEventListener('click', () => uploadInput.click());
      uploadInput.addEventListener('change', async () => {
        const files = Array.from(uploadInput.files);
        if (!files.length) return;
        uploadBtn.disabled = true; uploadBtn.textContent = 'Uploading…';
        const version = theVersion(item);
        const mediaFiles = version.media_files ? [...version.media_files] : [];
        for (const file of files) {
          const kind = file.type.startsWith('video') ? 'video' : file.type.startsWith('audio') ? 'audio' : 'image';
          const cleanName = cleanUploadFileName(item, file.name, mediaFiles.length);
          const uploaded = await api.uploadMedia(state.project.id, file, cleanName);
          mediaFiles.push({ key: uploaded.key, fileName: uploaded.fileName, kind });
        }
        version.media_files = mediaFiles;
        await api.updateVersion(item.id, { mediaFiles });
        uploadInput.value = '';
        uploadBtn.disabled = false; uploadBtn.textContent = '+ Choose file(s)';
        renderTool();
        toast('Saved');
      });
    }
    document.querySelectorAll(`[data-remove-media="${item.id}"]`).forEach(el => el.addEventListener('click', async () => {
      const idx = Number(el.getAttribute('data-index'));
      const version = theVersion(item);
      const mediaFiles = (version.media_files || []).filter((_, i) => i !== idx);
      version.media_files = mediaFiles;
      await api.updateVersion(item.id, { mediaFiles });
      renderTool();
      toast('Saved');
    }));
    const deleteBtn = document.querySelector(`[data-delete-item="${item.id}"]`);
    if (deleteBtn) deleteBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm(`Remove "${item.name}"?`)) return;
      await api.deleteItem(item.id);
      state.items = state.items.filter(i => i.id !== item.id && i.parent_item_id !== item.id);
      renderTool();
    });
  }

  // ---------- Debug console (Gemini request/response log, in-memory only) ----------
  function logDebugEntry(item, result) {
    const d = result.debug || {};
    state.debugLog.unshift({
      id: 'dbg' + Math.random().toString(36).slice(2, 9),
      itemLabel: `${itemLabel(item.stage, item.item_key)} — ${item.name || ''}`,
      time: d.requestedAt || new Date().toISOString(),
      model: d.model || '—',
      finishReason: d.finishReason || '',
      retried: !!d.retried,
      requestPrompt: d.requestPrompt || '',
      rawResponse: d.rawResponse || '',
      error: result.error || null,
      errorMessage: result.message || d.parseError || '',
      warning: result.warning || '',
    });
    if (state.debugLog.length > 20) state.debugLog.length = 20;
    renderDebugPanel();
  }
  function debugEntryFullText(e) {
    return `${e.itemLabel} — ${e.time}
Model: ${e.model}${e.finishReason ? ` (finishReason: ${e.finishReason})` : ''}${e.retried ? ' [retried]' : ''}
${e.error ? `Error: ${e.error}${e.errorMessage ? ` — ${e.errorMessage}` : ''}\n` : ''}${e.warning ? `Warning: ${e.warning}\n` : ''}
--- Request sent to Gemini ---
${e.requestPrompt || '—'}

--- Raw response ---
${e.rawResponse || '—'}`;
  }
  function debugEntryHtml(e) {
    const expanded = !!state.debugExpanded[e.id];
    return `<div class="debug-entry ${expanded ? 'expanded' : ''}" data-debug-key="${e.id}">
      <div class="debug-entry-head">
        <span class="${e.error ? 'debug-badge-error' : e.warning ? 'debug-badge-error' : 'debug-badge-ok'}">${e.error ? '✗' : e.warning ? '⚠' : '✓'}</span>
        <span style="flex:1">${esc(e.itemLabel)}</span>
        <span class="debug-model">${esc(e.model)}${e.finishReason ? ` · ${esc(e.finishReason)}` : ''}${e.retried ? ' · retried' : ''}</span>
        <button type="button" class="icon-btn" data-debug-copy="${e.id}" title="Copy full request + response">📋</button>
      </div>
      <div class="debug-entry-body">
        <div class="debug-time">${esc(e.time)}</div>
        ${e.error ? `<div class="debug-error-line">Error: ${esc(e.error)}${e.errorMessage ? ` — ${esc(e.errorMessage)}` : ''}</div>` : ''}
        ${e.warning ? `<div class="debug-error-line">⚠ ${esc(e.warning)}</div>` : ''}
        <div class="debug-label">Request sent to Gemini</div>
        <pre class="debug-pre">${esc(e.requestPrompt || '—')}</pre>
        <div class="debug-label">Raw response</div>
        <pre class="debug-pre">${esc(e.rawResponse || '—')}</pre>
      </div>
    </div>`;
  }
  function renderDebugPanel() {
    const root = document.getElementById('debugPanelRoot');
    if (!root) return;
    const count = state.debugLog.length;
    root.innerHTML = `
      <button class="debug-fab" id="debugToggleBtn">🐞 Debug${count ? ` (${count})` : ''}</button>
      ${state.debugPanelOpen ? `
        <div class="debug-drawer">
          <div class="debug-drawer-head"><strong>Gemini call log — this session only</strong>
            <div style="display:flex;gap:6px">
              <button class="btn btn-sm" id="debugClearBtn">Clear</button>
              <button class="modal-close" id="debugCloseBtn">×</button>
            </div>
          </div>
          <div class="debug-entries">
            ${count ? state.debugLog.map(debugEntryHtml).join('') : '<p class="empty-note">No AI calls yet this session.</p>'}
          </div>
        </div>` : ''}`;
    const toggleBtn = document.getElementById('debugToggleBtn');
    if (toggleBtn) toggleBtn.addEventListener('click', () => { state.debugPanelOpen = !state.debugPanelOpen; renderDebugPanel(); });
    const closeBtn = document.getElementById('debugCloseBtn');
    if (closeBtn) closeBtn.addEventListener('click', () => { state.debugPanelOpen = false; renderDebugPanel(); });
    const clearBtn = document.getElementById('debugClearBtn');
    if (clearBtn) clearBtn.addEventListener('click', () => { state.debugLog = []; state.debugExpanded = {}; renderDebugPanel(); });
    document.querySelectorAll('[data-debug-key]').forEach(el => el.querySelector('.debug-entry-head').addEventListener('click', (ev) => {
      if (ev.target.closest('[data-debug-copy]')) return;
      const key = el.getAttribute('data-debug-key');
      state.debugExpanded[key] = !state.debugExpanded[key];
      renderDebugPanel();
    }));
    document.querySelectorAll('[data-debug-copy]').forEach(btn => btn.addEventListener('click', async (ev) => {
      ev.stopPropagation();
      const key = btn.getAttribute('data-debug-copy');
      const entry = state.debugLog.find(e => e.id === key);
      if (!entry) return;
      const original = btn.textContent;
      try {
        await navigator.clipboard.writeText(debugEntryFullText(entry));
        btn.textContent = '✓';
        toast('Copied full request + response');
      } catch {
        toast('Could not copy — clipboard access denied');
      }
      setTimeout(() => { btn.textContent = original; }, 1600);
    }));
  }

    document.querySelectorAll('[data-brief-color], [data-brief-hex]').forEach(el => el.addEventListener('change', async () => {

      const camel = key.replace(/_([a-z])/g, (_, c) => c.toUpperCase());

    const logoInput = document.getElementById('logoFileInput');

      const file = logoInput.files[0];
      if (!file) return;
      chooseLogoBtn.disabled = true; chooseLogoBtn.textContent = 'Uploading…';
      const uploaded = await api.uploadMedia(state.project.id, file);

      await api.updateBrief(state.project.id, { logoMedia: state.brief.logo_media });

    const choosePhotosBtn = document.getElementById('chooseProductPhotosBtn');
    if (choosePhotosBtn) choosePhotosBtn.addEventListener('click', () => photosInput.click());
    if (photosInput) photosInput.addEventListener('change', async () => {

      state.brief.product_photos = photos;
      await api.updateBrief(state.project.id, { productPhotos: photos });

    document.querySelectorAll('[data-remove-photo]').forEach(el => el.addEventListener('click', async () => {

      toast('Saved');

    const lockBtn = document.getElementById('lockBriefBtn');
    if (lockBtn) lockBtn.addEventListener('click', async () => {
      const missing = briefMissingFields();
      if (missing.length) { toast(`Fill in before locking: ${missing.join(', ')}`); return; }
      const res = await api.updateBrief(state.project.id, { lock: true });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));

        const full = await api.getProject(state.project.id);
        state.items = full.items;

  function wireAddRepeatable(laneId) {

  // ---------- Lane 2: Story Board ----------
  // Story is always exactly one item, so unlike Stage 3-5 (which stay

  function renderLane2() {
    return `

  function renderStoryPlaceholderCard() {

  }
  function wireStoryPlaceholderCard() {
    document.querySelectorAll('[data-story-placeholder-guard]').forEach(btn => btn.addEventListener('click', () => {
      toast('Lock Stage 1 first — paid and approved by the customer — before you can do that');
    }));
  }
  function renderStoryCard() {
    const story = itemsFor(2, 'story')[0];
    if (!story) return renderStoryPlaceholderCard();
    const version = theVersion(story);
    const mediaFiles = version.media_files || [];
    const lock = stageLockFor(2);
    const isLocked = !!(lock && lock.locked);
    const dis = isLocked ? 'disabled' : '';
    const amountEntry = state.paymentLinks.find(l => l.stage === 2) || null;

    return `<div class="item-row expanded story-card">
      <div class="item-row-head" style="cursor:default">
        <span class="item-thumb">${ITEM_THUMBS.story}</span>
        ${state.renamingItemId === story.id
          ? `<input type="text" class="item-name-input" data-rename-item="${story.id}" value="${esc(story.name || 'Story')}">`
          : `<span class="item-name">${esc(story.name || 'Story')}</span><button type="button" class="item-rename-btn" data-rename-btn="${story.id}" title="Rename">✏️</button>`}
      </div>
      <div class="item-body">
        <div class="story-step">
          <span class="story-step-num">1</span>
          <div class="story-step-body">
            <div style="display:flex;gap:6px;align-items:center">
              <button class="btn btn-sm btn-primary" data-open-generate="${story.id}" ${dis}>✨ Generate Story</button>
              <button type="button" class="icon-btn" data-copy-prompt="${story.id}" title="Copy prompt">📋</button>
            </div>
            <textarea class="prompt-box" readonly placeholder="Click Generate above...">${esc(version.prompt || '')}</textarea>
          </div>
        </div>
        <div class="story-step">
          <span class="story-step-num">2</span>
          <div class="story-step-body">
            <button type="button" class="btn btn-sm" data-download-item="${story.id}" ${dis}>⬇ Download artifacts</button>
          </div>
        </div>
        <div class="story-step">
          <span class="story-step-num">3</span>
          <div class="story-step-body">
            <p class="story-step-note">Paste the prompt and attach the downloaded files into Google Flow to generate the storyboard image.</p>
          </div>
        </div>
        <div class="story-step">
          <span class="story-step-num">4</span>
          <div class="story-step-body">
            <input type="file" accept="image/*" multiple style="display:none" data-media-upload-input="${story.id}" ${dis}>
            <button type="button" class="btn btn-sm" data-media-upload-btn="${story.id}" ${dis}>+ Upload file</button>
            <div class="attach-chip-row" style="margin-top:7px">
              ${mediaFiles.map((f, i) => `<span class="attach-chip" title="${esc(f.fileName)}"><a href="${esc(api.mediaUrl(f.key))}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">${esc(f.fileName)}</a> ${isLocked ? '' : `<button type="button" data-remove-media="${story.id}" data-index="${i}" style="border:none;background:none;cursor:pointer;color:inherit;font-weight:700;padding:0 0 0 3px">×</button>`}</span>`).join('')}
            </div>
          </div>
        </div>
        <div class="story-step">
          <span class="story-step-num">5</span>
          <div class="story-step-body">
            <button type="button" class="btn btn-sm" id="storyAmountBtn" ${dis}>💰 ${amountEntry ? 'Update amount' : 'Set amount'}</button>
            ${amountEntry ? `<span class="story-step-note">${formatRupees(amountEntry.amountPaise)}</span>` : ''}
          </div>
        </div>
        <div class="story-step">
          <span class="story-step-num">6</span>
          <div class="story-step-body">
            ${amountEntry
              ? (amountEntry.paid
                  ? `<p class="story-step-note">✅ Paid ${formatRupees(amountEntry.amountPaise)}${amountEntry.paidAt ? ` on ${esc(formatIST(amountEntry.paidAt))}` : ''}</p>`

              ? `<div class="stale-banner" style="background:var(--moss-soft);color:var(--moss);border-color:var(--moss-line)">🔒 Validated with customer<button type="button" class="btn btn-sm" id="storyUnlockBtn" style="margin-left:auto">🔓 Unlock to edit</button></div>`
              : `<button class="btn btn-primary" id="storyLockBtn" style="width:100%">✅ Lock this stage</button>`}

  function wireStoryCard() {
    const story = itemsFor(2, 'story')[0];
    if (!story) { wireStoryPlaceholderCard(); return; }
    wireItemRename(story);
    const openGenBtn = document.querySelector(`[data-open-generate="${story.id}"]`);
    if (openGenBtn) openGenBtn.addEventListener('click', () => openGenerateModal(story));
    const copyBtn = document.querySelector(`[data-copy-prompt="${story.id}"]`);
    if (copyBtn) copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(theVersion(story).prompt || '').then(() => toast('Copied'));
    });
    const downloadBtn = document.querySelector(`[data-download-item="${story.id}"]`);
    if (downloadBtn) downloadBtn.addEventListener('click', () => downloadItemPackage(story, downloadBtn));
    const uploadBtn = document.querySelector(`[data-media-upload-btn="${story.id}"]`);
    const uploadInput = document.querySelector(`[data-media-upload-input="${story.id}"]`);
    if (uploadBtn && uploadInput) {
      uploadBtn.addEventListener('click', () => uploadInput.click());
      uploadInput.addEventListener('change', async () => {
        const files = Array.from(uploadInput.files);
        if (!files.length) return;
        uploadBtn.disabled = true; uploadBtn.textContent = 'Uploading…';
        const version = theVersion(story);
        const mediaFiles = version.media_files ? [...version.media_files] : [];
        for (const file of files) {
          const kind = file.type.startsWith('video') ? 'video' : file.type.startsWith('audio') ? 'audio' : 'image';
          const cleanName = cleanUploadFileName(story, file.name, mediaFiles.length);
          const uploaded = await api.uploadMedia(state.project.id, file, cleanName);
          mediaFiles.push({ key: uploaded.key, fileName: uploaded.fileName, kind });
        }
        version.media_files = mediaFiles;
        await api.updateVersion(story.id, { mediaFiles });
        uploadInput.value = '';
        uploadBtn.disabled = false; uploadBtn.textContent = '+ Upload file';
        renderTool();
        toast('Saved');
      });
    }
    document.querySelectorAll(`[data-remove-media="${story.id}"]`).forEach(el => el.addEventListener('click', async () => {
      const idx = Number(el.getAttribute('data-index'));
      const version = theVersion(story);
      const mediaFiles = (version.media_files || []).filter((_, i) => i !== idx);
      version.media_files = mediaFiles;
      await api.updateVersion(story.id, { mediaFiles });
      renderTool();
      toast('Saved');
    }));
    const amountBtn = document.getElementById('storyAmountBtn');
    if (amountBtn) amountBtn.addEventListener('click', () => openStageAmountModal(2));
    const confirmPaidBtn = document.getElementById('storyConfirmPaidBtn');
    if (confirmPaidBtn) confirmPaidBtn.addEventListener('click', async () => {
      confirmPaidBtn.disabled = true; confirmPaidBtn.textContent = 'Saving…';
      const res = await api.confirmPaid(state.project.id, 2);
      if (res.ok) {
        const entry = state.paymentLinks.find(l => l.stage === 2);
        if (entry) { entry.paid = true; entry.paidAt = res.paidAt; }
        renderTool();
        renderProjectInfoBar();
        toast('Marked as paid');
      } else {
        confirmPaidBtn.disabled = false; confirmPaidBtn.textContent = '✅ Confirm payment received';
      }
    });
    const lockBtn = document.getElementById('storyLockBtn');
    if (lockBtn) lockBtn.addEventListener('click', async () => {
      const mediaFiles = theVersion(story).media_files || [];
      const amountEntry = state.paymentLinks.find(l => l.stage === 2) || null;
      const missing = [];
      if (!mediaFiles.length) missing.push('upload a file');
      if (!amountEntry) missing.push('set an amount');
      else if (!amountEntry.paid) missing.push('confirm payment received');
      if (missing.length) { toast(`Before locking: ${missing.join(', ')}`); return; }
      lockBtn.disabled = true;
      const res = await api.lockStage(state.project.id, 2);
      if (res.ok) {
        const others = state.stageLocks.filter(l => l.stage !== 2);
        state.stageLocks = [...others, { stage: 2, locked: true, lockedAt: new Date().toISOString() }];
        renderTool();
        toast('Stage 2 validated with customer');
      } else {
        const body = await res.json().catch(() => ({}));
        toast(body.message || 'Could not lock stage');
        lockBtn.disabled = false;
      }
    });
    const unlockBtn = document.getElementById('storyUnlockBtn');
    if (unlockBtn) unlockBtn.addEventListener('click', async () => {
      if (!confirm('This deletes all Stage 3-5 work for this project — you\'ll start over from Stage 3. Continue?')) return;
      const res = await api.unlockStage(state.project.id, 2);
      if (res.ok) {
        state.stageLocks = state.stageLocks.filter(l => l.stage < 2);
        state.paymentLinks = state.paymentLinks.filter(l => l.stage <= 2);
        const full = await api.getProject(state.project.id);
        state.items = full.items;
        renderTool();
        renderProjectInfoBar();
        toast('Stage 2 unlocked — Stage 3-5 cleared');
      }
    });
  }

  // ---------- Lane 3: Visual & Music ----------

  function renderStage3RepeatableList(label, addLabel, itemKey, stage) {

  // ---------- Auto-populate sync (decoupled from Story's own Generate) ----------
  function renderAutoPopulateCardHtml() {
    const allowed = previousStageLocked(3);
    return `<div class="deliverable-card" style="margin-bottom:14px">
      <div class="card-section-label">🎁 Customer Deliverable</div>
      <button type="button" class="btn btn-sm btn-primary${allowed ? '' : ' btn-guard-disabled'}" id="syncAutoPopulateBtn">🔄 Sync Characters/Props/Backgrounds/Sounds from Story</button>
      <p class="story-step-note" style="margin-top:6px">Re-reads Stage 1's locked storyboard/dialogue and drafts fresh matches here for you to review.</p>
      ${previousStageGuardNote(3)}
    </div>`;
  }
  function wireAutoPopulateCard() {
    const btn = document.getElementById('syncAutoPopulateBtn');
    if (!btn) return;
    btn.addEventListener('click', async () => {
      if (!previousStageLocked(3)) { toast('Lock Stage 2 first — paid and approved by the customer — before syncing Stage 3'); return; }
      const story = itemsFor(2, 'story')[0];
      // Reads Stage 1's locked storyboard directly, not Stage 2's composed
      // prompt — that text is wrapped in Flow-only image-styling
      // instructions with no narrative content, and (now read-only) can't
      // drift out of sync the way an editable field could.
      const sourceText = (state.brief && state.brief.storyboard) || '';
      if (!story) { toast('Validate the Stage 1 brief to create the Story item first'); return; }
      if (!sourceText) { toast('Add a Storyboard/dialogue in Stage 1 first'); return; }
      btn.disabled = true;
      const stopWaitTimer = startWaitTimer(btn, SYNC_WAIT_MESSAGES);
      try {
        const result = await api.autoPopulateFromText(2, 'story', sourceText, ['characters', 'properties', 'backgrounds', 'sounds']);
        logDebugEntry(story, result);
        if (result.error) { toast(result.message || `Sync failed: ${result.error}`); return; }
        const hasAny = result.autoPopulate && Object.values(result.autoPopulate).some(arr => Array.isArray(arr) && arr.length);
        if (!hasAny) { toast('No characters/props/backgrounds/sounds found in the current story'); return; }
        if (result.warning) toast(result.warning);
        openAutoPopulateModal(story, result.autoPopulate);
      } catch (e) {
        toast('Sync failed — check your connection');
      } finally {
        stopWaitTimer();
        btn.disabled = false; btn.textContent = '🔄 Sync Characters/Props/Backgrounds/Sounds from Story';
      }
    });
  }

  // Stage 4's own sync button — separate from Stage 3's (which deliberately
  // excludes scenes) because scenes reference Characters/Properties/
  // Backgrounds by name, so syncing them before that cast is settled risks
  // creating scenes against names that get renamed/deleted later. Designer
  // runs this once Stage 3 is in good shape.
  function renderScenesSyncCardHtml() {
    const lock = stageLockFor(4);

      const res = await api.confirmPaid(state.project.id, stage);
      if (res.ok) {

    if (lockBtn) lockBtn.addEventListener('click', async () => {
      if (!previousStageLocked(stage)) { toast(`Lock Stage ${stage - 1} first — paid and approved by the customer — before locking this stage`); return; }
      const hasUpload = state.items.some(i => i.stage === stage && (theVersion(i).media_files || []).length > 0);
      const amountEntry = state.paymentLinks.find(l => l.stage === stage) || null;
      const missing = [];
      if (!hasUpload) missing.push('upload a file');
      if (!amountEntry) missing.push('set an amount');
      else if (!amountEntry.paid) missing.push('confirm payment received');
      if (missing.length) { toast(`Before locking: ${missing.join(', ')}`); return; }
      lockBtn.disabled = true;
      const res = await api.lockStage(state.project.id, stage);
      if (res.ok) {
        const others = state.stageLocks.filter(l => l.stage !== stage);
        state.stageLocks = [...others, { stage, locked: true, lockedAt: new Date().toISOString() }];

        renderProjectInfoBar();
        toast(`Stage ${stage} unlocked — ${downstream} cleared`);
      }
    });
  }
