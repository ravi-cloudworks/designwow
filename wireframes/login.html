<title>Sign in</title>
<style>
  :root {
    --ink: #14161b; --paper: #eef1f2; --surface: #ffffff; --surface-2: #e6e9eb;
    --text: #14161b; --text-soft: #565b66; --text-faint: #8b92a1;
    --line: #dbdfe2;
    --teal: #176b5e; --teal-soft: #e3f1ee;
    --display: "Avenir Next", "Century Gothic", "Segoe UI Semibold", ui-sans-serif, system-ui, sans-serif;
    --body: -apple-system, "Segoe UI", "Helvetica Neue", ui-sans-serif, system-ui, sans-serif;
    --shadow-card: 0 1px 2px rgba(20, 22, 27, 0.04), 0 1px 1px rgba(20, 22, 27, 0.03);
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #eef1f2; --paper: #14161b; --surface: #1c1f26; --surface-2: #23272f;
      --text: #eef1f2; --text-soft: #a7adb8; --text-faint: #6b7280;
      --line: #2c313a;
      --teal: #4fb3a2; --teal-soft: #1b3733;
      --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 1px 1px rgba(0,0,0,0.2);
    }
  }
  :root[data-theme="dark"] {
    --ink: #eef1f2; --paper: #14161b; --surface: #1c1f26; --surface-2: #23272f;
    --text: #eef1f2; --text-soft: #a7adb8; --text-faint: #6b7280;
    --line: #2c313a; --teal: #4fb3a2; --teal-soft: #1b3733;
  }
  :root[data-theme="light"] {
    --ink: #14161b; --paper: #eef1f2; --surface: #ffffff; --surface-2: #e6e9eb;
    --text: #14161b; --text-soft: #565b66; --text-faint: #8b92a1;
    --line: #dbdfe2; --teal: #176b5e; --teal-soft: #e3f1ee;
  }

  * { box-sizing: border-box; } html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--paper); color: var(--text); font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  a { color: inherit; } button { font: inherit; color: inherit; }
  :focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }

  .panel {
    width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow-card); padding: 36px 32px;
    display: flex; flex-direction: column; align-items: center; text-align: center; gap: 22px;
  }
  .mark { width: 44px; height: 44px; border-radius: 11px; background: var(--teal); display: flex; align-items: center; justify-content: center; }

  .heading h1 { font-family: var(--display); font-size: 21px; font-weight: 700; margin: 0 0 6px; }
  .heading p { font-size: 13.5px; color: var(--text-faint); margin: 0; line-height: 1.5; }

  .google-btn {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
    padding: 11px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .google-btn:hover { border-color: var(--text-faint); }

  .footnote { font-size: 11.5px; color: var(--text-faint); line-height: 1.5; }
  .footnote a { text-decoration: underline; }
</style>

<div class="panel">
  <div class="mark"><svg width="20" height="20" viewBox="0 0 14 14" fill="none"><path d="M3.5 2.2v9.6l8-4.8-8-4.8Z" fill="#f0f6f4"/></svg></div>

  <div class="heading">
    <h1>Sign in to continue</h1>
    <p>Track your active request, or manage your queue if you're a designer.</p>
  </div>

  <button class="google-btn">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.9c1.7-1.56 2.7-3.87 2.7-6.6z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.55-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.98v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.67 9c0-.6.1-1.17.28-1.7V4.97H.98A9 9 0 0 0 0 9c0 1.45.35 2.83.98 4.03z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .98 4.97L3.95 7.3C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
    Continue with Google
  </button>

  <p class="footnote">By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
</div>
