<title>UGC VIP — 6-Stage Production Console</title>
<style>
  :root {
    --ink: #14161b; --paper: #eef1f2; --surface: #ffffff; --surface-2: #e6e9eb;
    --text: #14161b; --text-soft: #565b66; --text-faint: #8b92a1;
    --line: #dbdfe2; --line-soft: #e8ebed;
    --teal: #176b5e; --teal-soft: #e3f1ee; --teal-line: #bcded6;
    --amber: #a05f10; --amber-soft: #fbeedb; --amber-line: #eccd9a;
    --crimson: #b23a37; --crimson-soft: #fbe6e5; --crimson-line: #edc0be;
    --moss: #2f7a4f; --moss-soft: #e3f3e9; --moss-line: #bfe0cc;
    --display: "Avenir Next", "Century Gothic", "Segoe UI Semibold", ui-sans-serif, system-ui, sans-serif;
    --body: -apple-system, "Segoe UI", "Helvetica Neue", ui-sans-serif, system-ui, sans-serif;
    --mono: "SF Mono", "Roboto Mono", ui-monospace, "Consolas", monospace;
    --radius: 10px;
    --shadow-card: 0 1px 2px rgba(20, 22, 27, 0.04), 0 1px 1px rgba(20, 22, 27, 0.03);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #eef1f2; --paper: #14161b; --surface: #1c1f26; --surface-2: #23272f;
      --text: #eef1f2; --text-soft: #a7adb8; --text-faint: #6b7280;
      --line: #2c313a; --line-soft: #23272f;
      --teal: #4fb3a2; --teal-soft: #1b3733; --teal-line: #2f5850;
      --amber: #e2a34a; --amber-soft: #3a2e18; --amber-line: #5c4826;
      --crimson: #e2635f; --crimson-soft: #3a2220; --crimson-line: #5c3634;
      --moss: #4caf7d; --moss-soft: #1c3324; --moss-line: #2f5439;
      --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 1px 1px rgba(0,0,0,0.2);
    }
  }
  :root[data-theme="dark"] {
    --ink: #eef1f2; --paper: #14161b; --surface: #1c1f26; --surface-2: #23272f;
    --text: #eef1f2; --text-soft: #a7adb8; --text-faint: #6b7280;
    --line: #2c313a; --line-soft: #23272f;
    --teal: #4fb3a2; --teal-soft: #1b3733; --teal-line: #2f5850;
    --amber: #e2a34a; --amber-soft: #3a2e18; --amber-line: #5c4826;
    --crimson: #e2635f; --crimson-soft: #3a2220; --crimson-line: #5c3634;
    --moss: #4caf7d; --moss-soft: #1c3324; --moss-line: #2f5439;
  }
  :root[data-theme="light"] {
    --ink: #14161b; --paper: #eef1f2; --surface: #ffffff; --surface-2: #e6e9eb;
    --text: #14161b; --text-soft: #565b66; --text-faint: #8b92a1;
    --line: #dbdfe2; --line-soft: #e8ebed;
    --teal: #176b5e; --teal-soft: #e3f1ee; --teal-line: #bcded6;
    --amber: #a05f10; --amber-soft: #fbeedb; --amber-line: #eccd9a;
    --crimson: #b23a37; --crimson-soft: #fbe6e5; --crimson-line: #edc0be;
    --moss: #2f7a4f; --moss-soft: #e3f3e9; --moss-line: #bfe0cc;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--paper); color: var(--text); font-family: var(--body);
    -webkit-font-smoothing: antialiased; overflow-x: hidden;
  }
  h1, h2, h3 { font-family: var(--display); text-wrap: balance; margin: 0; }
  button, input, select, textarea { font: inherit; color: inherit; }
  :focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }
  svg.icon { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  .app { display: flex; flex-direction: column; min-height: 100vh; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 14px 22px; border-bottom: 1px solid var(--line); background: var(--surface);
    flex-wrap: wrap;
  }
  .topbar-title { display: flex; align-items: center; gap: 10px; }
  .topbar-title .mark {
    width: 30px; height: 30px; border-radius: 8px; background: var(--ink); color: var(--paper);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .topbar h1 { font-size: 16px; font-weight: 700; }
  .topbar p { margin: 1px 0 0; font-size: 11.5px; color: var(--text-faint); }
  .topbar-actions { display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--text-faint); }
  .mode-pill {
    display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em; padding: 5px 10px; border-radius: 999px;
    background: var(--amber-soft); color: var(--amber); border: 1px solid var(--amber-line);
  }

  /* ---- Stage tabs: a horizontal pipeline strip, same idea as the
     submitted/in-progress status tracker on the request detail page ---- */
  .stage-tabs {
    display: flex; gap: 4px; overflow-x: auto; padding: 10px 22px; background: var(--surface);
    border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 5;
  }
  .stage-tab {
    display: flex; align-items: center; gap: 8px; padding: 8px 14px 8px 8px; border-radius: 999px;
    border: 1px solid transparent; background: none; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
  .stage-tab:hover { background: var(--surface-2); }
  .stage-tab.active { background: var(--teal-soft); border-color: var(--teal-line); }
  .stage-num {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; font-size: 11.5px; font-weight: 700; font-family: var(--display);
    background: var(--surface-2); color: var(--text-faint);
  }
  .stage-tab.active .stage-num { background: var(--teal); color: #f0f6f4; }
  .stage-tab.status-ready .stage-num { background: var(--moss); color: #f0f6f4; }
  .stage-tab.status-editing .stage-num { background: var(--amber); color: #f0f6f4; }
  .stage-tab.active.status-ready .stage-num,
  .stage-tab.active.status-editing .stage-num { background: var(--teal); }
  .stage-tab .name { font-size: 12.5px; font-weight: 700; color: var(--text); }
  .stage-tab:not(.active) .name { color: var(--text-soft); }

  /* ---- Single scrolling column, matches the real app's Brief/Notes/Storage pages ---- */
  .col-main { flex: 1; max-width: 800px; width: 100%; margin: 0 auto; padding: 22px 22px 60px; }

  /* ---- Section card: matches the real app's numbered-circle Section ---- */
  .card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow-card); padding: 20px; margin-bottom: 14px;
  }
  .section-card .section-head { margin-bottom: 18px; }
  .section-card .section-head-row { display: flex; align-items: center; gap: 14px; }
  .section-card .section-num {
    width: 40px; height: 40px; border-radius: 50%; background: var(--ink); color: var(--paper);
    display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 700;
    flex-shrink: 0; font-family: var(--display);
  }
  .section-card h2 { font-size: 21px; font-weight: 700; }
  .section-card .section-desc { margin: 6px 0 0 54px; font-size: 12.5px; color: var(--text-faint); max-width: 62ch; }
  .section-card .section-body { display: flex; flex-direction: column; gap: 18px; }

  .subhead {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-soft); margin: 0 0 2px; display: flex; align-items: center; gap: 6px;
  }

  .field { }
  .field label { display: block; font-size: 13.5px; font-weight: 600; margin-bottom: 6px; }
  .field .hint { font-size: 11px; color: var(--text-faint); margin: 4px 0 0; }
  .char-counter { display: block; text-align: right; font-size: 11px; color: var(--text-faint); margin-top: 4px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
  .row3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  @media (max-width: 640px) { .row2, .row3 { grid-template-columns: 1fr; } }

  input[type="text"], input[type="number"], select, textarea {
    width: 100%; border: 1px solid var(--line); background: var(--surface); border-radius: 8px;
    padding: 10px 12px; font-size: 14px;
  }
  textarea { resize: vertical; min-height: 84px; font-family: var(--body); line-height: 1.5; }
  select { cursor: pointer; }
  .hidden-file-input { display: none; }

  /* "+ Choose" upload trigger, matches /new's file-picker link style */
  .choose-link {
    display: inline-flex; align-items: center; gap: 4px; border: none; background: none; padding: 0;
    color: var(--teal); font-size: 13.5px; font-weight: 700; cursor: pointer;
  }
  .choose-link:hover { text-decoration: underline; }

  /* Plain pill row — the real app's default single-choice control */
  .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill {
    border: 1px solid var(--line); background: var(--surface); color: var(--text-soft);
    padding: 8px 14px; border-radius: 999px; font-size: 13px; cursor: pointer;
  }
  .pill.selected { background: var(--ink); border-color: var(--ink); color: var(--paper); }

  /* Icon tile grid — Goal / Audience style choice, 3-up like the real app */
  .option-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  @media (max-width: 480px) { .option-grid { grid-template-columns: 1fr 1fr; } }
  .option-tile {
    display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px 8px;
    border: 1.5px solid var(--line); border-radius: 12px; cursor: pointer; background: var(--surface);
    font-size: 12.5px; font-weight: 600; color: var(--text-soft); text-align: center;
  }
  .option-tile.selected { border-color: var(--teal); background: var(--teal-soft); color: var(--teal); }
  .option-tile svg.icon { width: 26px; height: 26px; }

  /* Brand color swatch + hex pair, matches /new's picker */
  .swatch-field { display: flex; flex-direction: column; gap: 6px; }
  .swatch-row { display: flex; gap: 8px; align-items: center; }
  .swatch-box { position: relative; width: 44px; height: 44px; border-radius: 10px; border: 1px solid var(--line); flex-shrink: 0; }
  .swatch-native { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .swatch-pencil {
    position: absolute; bottom: -5px; right: -5px; width: 18px; height: 18px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--line); font-size: 9px; display: flex;
    align-items: center; justify-content: center; pointer-events: none;
  }
  .swatch-hex { width: 116px; font-size: 13px; padding: 10px 11px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); color: var(--text-faint); }
  .swatch-field label { font-size: 12px; font-weight: 600; color: var(--text-soft); margin: 0; }

  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; }
  .checkbox-row input { width: auto; }
  .checkbox-stack { display: flex; flex-direction: column; gap: 10px; }

  /* Real uploaded assets — logo / product photos preview thumbnails */
  .asset-preview { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .asset-preview img { width: 44px; height: 44px; object-fit: cover; border-radius: 8px; border: 1px solid var(--line); }
  .asset-preview span { font-size: 12px; color: var(--text-faint); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .asset-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .asset-thumb { position: relative; width: 64px; height: 64px; }
  .asset-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid var(--line); }
  .thumb-remove, .asset-remove {
    position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%;
    background: var(--ink); color: var(--paper); border: none; font-size: 11px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .asset-remove { position: static; width: auto; height: auto; border-radius: 999px; padding: 4px 10px; font-size: 11px; font-weight: 700; }

  .list-item {
    border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px; background: var(--surface-2);
    display: flex; flex-direction: column; gap: 14px;
  }
  .list-item-head { display: flex; align-items: center; justify-content: space-between; }
  .tag {
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
    background: var(--ink); color: var(--paper); padding: 2px 9px; border-radius: 999px;
  }
  .scene-stack { display: flex; flex-direction: column; gap: 12px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px; border-radius: 8px; padding: 9px 16px;
    font-size: 13.5px; font-weight: 600; cursor: pointer; border: 1px solid var(--line); background: var(--surface);
    color: var(--text);
  }
  .btn:hover { border-color: var(--text-faint); }
  .btn-primary { background: var(--teal); border-color: var(--teal); color: #f0f6f4; }
  .btn-primary:hover { opacity: 0.92; border-color: var(--teal); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-danger { color: var(--crimson); }
  .add-row { display: flex; justify-content: flex-start; }

  .tiny-list { display: flex; flex-direction: column; gap: 8px; }
  .tiny-list .tiny-row { display: flex; gap: 8px; align-items: center; }
  .tiny-list input { flex: 1; }

  .duration-check {
    display: flex; align-items: center; gap: 6px; font-size: 11.5px; padding: 6px 10px; border-radius: 999px;
    background: var(--surface-2); color: var(--text-faint); font-weight: 600; align-self: flex-start;
  }
  .duration-check.ok { background: var(--moss-soft); color: var(--moss); }
  .duration-check.off { background: var(--amber-soft); color: var(--amber); }

  /* ---- Output: lives inside the same stage card, below the fields ---- */
  .output-divider { border-top: 1px solid var(--line-soft); margin: 2px 0 0; padding-top: 18px; }
  .out-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; flex-wrap: wrap; }
  .out-tabs { display: flex; gap: 4px; background: var(--surface-2); border-radius: 999px; padding: 3px; }
  .out-tab {
    border: none; background: none; padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 700;
    cursor: pointer; color: var(--text-faint);
  }
  .out-tab.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-card); }
  .out-panel { display: none; }
  .out-panel.active { display: block; }
  pre.code {
    margin: 0; font-family: var(--mono); font-size: 12px; line-height: 1.6; white-space: pre-wrap;
    word-break: break-word; background: var(--ink); color: var(--paper); border-radius: var(--radius);
    padding: 16px; max-height: 60vh; overflow: auto;
  }
  .prompt-block { background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px; }
  .prompt-block h4 {
    margin: 0 0 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--teal);
  }
  .prompt-block p { margin: 0; font-size: 13px; line-height: 1.6; color: var(--text); font-family: var(--body); }
  .prompt-block.negative h4 { color: var(--crimson); }
  .prompt-block.negative ul { margin: 0; padding-left: 18px; font-size: 13px; line-height: 1.7; }

  .copy-btn {
    display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--line); background: var(--surface);
    border-radius: 8px; padding: 8px 14px; font-size: 12.5px; font-weight: 700; cursor: pointer; color: var(--text-soft);
  }
  .copy-btn.copied { background: var(--moss-soft); border-color: var(--moss-line); color: var(--moss); }

  .empty-note { font-size: 12.5px; color: var(--text-faint); font-style: italic; margin: 0; }

  /* "What to do with this" — action steps + expected outcome, per stage */
  .usage-box { border: 1px solid var(--teal-line); background: var(--teal-soft); border-radius: var(--radius); padding: 14px 16px; margin-top: 14px; }
  .usage-box h4 {
    margin: 0 0 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--teal); display: flex; align-items: center; gap: 6px;
  }
  .usage-box ol { margin: 0 0 10px; padding-left: 18px; font-size: 13px; line-height: 1.6; color: var(--text); }
  .usage-box .outcome { font-size: 13px; line-height: 1.6; margin: 0; color: var(--text); }
  .usage-box .outcome b { color: var(--teal); }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 999px; }
  ::-webkit-scrollbar-track { background: transparent; }

  @media (prefers-reduced-motion: no-preference) {
    .stage-tab, .option-tile, .pill, .copy-btn { transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease; }
  }
</style>

<div class="app">
  <div class="topbar">
    <div class="topbar-title">
      <span class="mark" id="topbarIcon"></span>
      <div>
        <h1>UGC VIP — 6-Stage Production Console</h1>
        <p id="modeSubtitle">Standalone mode — Stage 1 entered manually, same as Stages 2-6</p>
      </div>
    </div>
    <div class="topbar-actions">
      <span class="mode-pill" id="modePill"></span>
    </div>
  </div>
  <nav class="stage-tabs" id="stageTabs"></nav>
  <div class="col-main" id="colMain"></div>
</div>

  function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

  function resolveHexColor(value) {
    if (!value) return null;
    let s = value.trim().replace(/^#/, '');
    if (/^[0-9a-fA-F]{3}$/.test(s)) s = s.split('').map(c => c + c).join('');
    if (!/^[0-9a-fA-F]{6}$/.test(s)) return null;
    return '#' + s.toLowerCase();
  }

  function textField(label, value, onInput, opts) {
    opts = opts || {};
    const id = 'f' + Math.random().toString(36).slice(2, 9);
    const tag = opts.multiline ? 'textarea' : 'input';
    const typeAttr = opts.multiline ? '' : ` type="${opts.number ? 'number' : 'text'}"`;
    const valAttr = opts.multiline ? '' : ` value="${esc(value)}"`;
    const inner = opts.multiline ? esc(value) : '';
    const style = opts.style ? ` style="${opts.style}"` : '';
    const maxAttr = opts.counter ? ` maxlength="${opts.counter}"` : '';
    const labelText = (opts.num ? opts.num + ' ' : '') + label + (opts.required ? ' *' : '');
    const counterHtml = opts.counter ? `<span class="char-counter" data-max="${opts.counter}">${(value || '').length}/${opts.counter}</span>` : '';
    return `<div class="field"><label for="${id}">${esc(labelText)}</label>
      ${opts.hint ? `<p class="hint" style="margin:0 0 8px">${esc(opts.hint)}</p>` : ''}
      <${tag} id="${id}"${typeAttr}${valAttr}${style}${maxAttr} data-bind="${onInput}">${inner}</${tag}>
      ${counterHtml}</div>`;
  }

    return `<div class="field"><label for="${id}">${esc(label)}</label>
      <select id="${id}" data-bind="${onInput}">
        ${options.map(o => `<option value="${esc(o)}" ${o === value ? 'selected' : ''}>${esc(o)}</option>`).join('')}

  }

  // ---------- Stage 3 ----------
  function parseStoryboardIntoScenes() {
    const text = state.stage1.storyboard || '';
    const matches = [...text.matchAll(/Scene\s+(\d+)\s*\((\d+)-(\d+)\s*sec\)\s*\n?Visual:\s*([^\n]*)\n?Dialogue:\s*"?([^\n"]*)"?/gi)];
    if (!matches.length) { toast('No "Scene N (X-Y sec)" pattern found in the Stage 1 storyboard.'); return; }
    state.stage3.scenes = matches.map((m, i) => ({
      scene: i + 1,
      objective: OBJECTIVES[Math.min(i, OBJECTIVES.length - 1)],
      location: state.stage2.background.location || '',
      action: m[4].trim(),
      dialogue: m[5].trim(),
      emotion: state.stage3.scenes[i] ? state.stage3.scenes[i].emotion : EMOTIONS[0],
      duration: Number(m[3]) - Number(m[2]),
      broll: state.stage3.scenes[i] ? state.stage3.scenes[i].broll : BROLL_TYPES[0],
      transition: state.stage3.scenes[i] ? state.stage3.scenes[i].transition : TRANSITIONS[0]
    }));
    render();
  }
  function renderStage3Fields() {
    const scenes = state.stage3.scenes;
    const total = scenes.reduce((a, s) => a + Number(s.duration || 0), 0);
    const target = Number(state.stage1.duration);
    const okDuration = total === target;
    return [{
      title: 'Scene Blueprint', desc: 'Approve the story flow, scene by scene.',
      body: `
        <div class="add-row"><button type="button" class="btn btn-primary btn-sm" data-action="parseStoryboard">${ICON.wand} Parse from Storyboard</button></div>
        <div class="scene-stack">
          ${scenes.map((sc, i) => `
            <div class="list-item">
              <div class="list-item-head"><span class="tag">Scene ${sc.scene}</span>
                <button type="button" class="btn btn-sm btn-danger" data-action="removeScene" data-i="${i}">Remove</button>
              </div>
              <div class="row2">
                ${selectField('Objective', sc.objective, OBJECTIVES, `stage3.scenes.${i}.objective`)}
                ${textField('Duration (sec)', sc.duration, `stage3.scenes.${i}.duration`, { number: true })}
              </div>
              ${textField('Location', sc.location, `stage3.scenes.${i}.location`)}
              ${textField('Action', sc.action, `stage3.scenes.${i}.action`)}
              ${textField('Dialogue', sc.dialogue, `stage3.scenes.${i}.dialogue`, { multiline: true })}
              ${pillRow('Emotion', sc.emotion, EMOTIONS, `stage3.scenes.${i}.emotion`)}
              <div class="row2">
                ${pillRow('B-roll', sc.broll, BROLL_TYPES, `stage3.scenes.${i}.broll`)}
                ${pillRow('Transition', sc.transition, TRANSITIONS, `stage3.scenes.${i}.transition`)}
              </div>
            </div>`).join('')}
        </div>
        <div class="add-row"><button type="button" class="btn btn-sm" data-action="addScene">${ICON.circle} Add scene</button></div>
        <div class="duration-check ${okDuration ? 'ok' : 'off'}" id="durationCheck">${ICON.clock} ${total}s of ${target}s planned ${okDuration ? '— matches Stage 1 duration' : '— adjust to match Stage 1'}</div>
      `
    }];
  }
  function stage3Json() { return { scenes: state.stage3.scenes.map(s => ({ ...s, duration: Number(s.duration) })) }; }
  function stage3Prompt() {
    return state.stage3.scenes.map(s => ({
      h: `Scene ${s.scene} — ${s.objective}`,
      p: `${s.location || '(location)'}. ${s.action || '(action)'} Emotion: ${s.emotion}. Dialogue: "${s.dialogue || '(no dialogue)'}" (${s.duration}s).${s.broll && s.broll !== 'None' ? ` B-roll: ${s.broll}.` : ''} Transition to next scene: ${s.transition}.`
    }));
  }

    const scenes = state.stage3.scenes;

    }
    // One card per scene — mirrors Stage 3's one-topic-per-card scenes, just at shot granularity.
    return scenes.map(sc => {
      const shots = state.stage4.shots[sc.scene] || [];
      return {
        title: `Scene ${sc.scene} Shots`, desc: `Objective: ${sc.objective}.`,
        body: `
          <div class="scene-stack">
            ${shots.map((sh, i) => `
              <div class="list-item">
                <div class="list-item-head"><span class="tag">Shot ${sh.shot}</span>
                  <button type="button" class="btn btn-sm btn-danger" data-action="removeShot" data-scene="${sc.scene}" data-i="${i}">Remove</button>
                </div>
                <div class="row2">
                  ${selectField('Type', sh.type, SHOT_TYPES, `stage4.shots.${sc.scene}.${i}.type`)}

        `
      };
    });

  function stage4Json() {
    const out = [];
    state.stage3.scenes.forEach(sc => {

    const logo = state.assets.logoFile ? state.assets.logoFile.name : null;
    const avatarLine = avatarPhoto ? ` Face identity consistency is critical — the character MUST match the uploaded reference photo "${avatarPhoto}" exactly in every single scene, no substitutions, no drift.` : '';
    const bgLine = bgPhoto ? ` Match the uploaded background reference photo "${bgPhoto}" for the setting in every scene.` : '';

        + ` Camera: ${g.camera}. Color grade: ${g.color_grade}.`

    6: { fields: renderStage6Fields, json: () => ({ '06_Project_Master.json': stage6Json(), '06_GoogleFlow_Scenes.json': stage6ScenesJson() }), prompt: stage6Prompt, promptLabel: 'Summary' }
  };

  // ---------- Zip bundling (no CDN available in an Artifact, so this is a
  // small hand-written store-only — i.e. uncompressed — ZIP writer) ----------
  let crc32Table = null;
  function crc32(bytes) {
    if (!crc32Table) {
      crc32Table = new Uint32Array(256);
      for (let n = 0; n < 256; n++) {
        let c = n;
        for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
        crc32Table[n] = c >>> 0;
      }
    }
    let crc = 0xFFFFFFFF;
    for (let i = 0; i < bytes.length; i++) crc = (crc >>> 8) ^ crc32Table[(crc ^ bytes[i]) & 0xFF];
    return (crc ^ 0xFFFFFFFF) >>> 0;
  }
  function dosDateTime(date) {
    const time = ((date.getHours() & 0x1F) << 11) | ((date.getMinutes() & 0x3F) << 5) | ((date.getSeconds() >> 1) & 0x1F);
    const dt = (((date.getFullYear() - 1980) & 0x7F) << 9) | (((date.getMonth() + 1) & 0xF) << 5) | (date.getDate() & 0x1F);
    return { time, dt };
  }
  function buildZip(entries) {
    const encoder = new TextEncoder();
    const { time, dt } = dosDateTime(new Date());
    const localParts = [], centralParts = [];
    let offset = 0;
    entries.forEach(entry => {
      const nameBytes = encoder.encode(entry.name);
      const data = entry.data;
      const crc = crc32(data);

      const local = new Uint8Array(30 + nameBytes.length);
      const lv = new DataView(local.buffer);
      lv.setUint32(0, 0x04034b50, true);
      lv.setUint16(4, 20, true); lv.setUint16(6, 0, true); lv.setUint16(8, 0, true);
      lv.setUint16(10, time, true); lv.setUint16(12, dt, true);
      lv.setUint32(14, crc, true); lv.setUint32(18, data.length, true); lv.setUint32(22, data.length, true);
      lv.setUint16(26, nameBytes.length, true); lv.setUint16(28, 0, true);
      local.set(nameBytes, 30);
      localParts.push(local, data);

      const central = new Uint8Array(46 + nameBytes.length);
      const cv = new DataView(central.buffer);
      cv.setUint32(0, 0x02014b50, true);
      cv.setUint16(4, 20, true); cv.setUint16(6, 20, true); cv.setUint16(8, 0, true); cv.setUint16(10, 0, true);
      cv.setUint16(12, time, true); cv.setUint16(14, dt, true);
      cv.setUint32(16, crc, true); cv.setUint32(20, data.length, true); cv.setUint32(24, data.length, true);
      cv.setUint16(28, nameBytes.length, true); cv.setUint16(30, 0, true); cv.setUint16(32, 0, true);
      cv.setUint16(34, 0, true); cv.setUint16(36, 0, true); cv.setUint32(38, 0, true);
      cv.setUint32(42, offset, true);
      central.set(nameBytes, 46);
      centralParts.push(central);

      offset += local.length + data.length;
    });
    const centralSize = centralParts.reduce((a, p) => a + p.length, 0);
    const centralOffset = offset;
    const eocd = new Uint8Array(22);
    const ev = new DataView(eocd.buffer);
    ev.setUint32(0, 0x06054b50, true);
    ev.setUint16(4, 0, true); ev.setUint16(6, 0, true);
    ev.setUint16(8, entries.length, true); ev.setUint16(10, entries.length, true);
    ev.setUint32(12, centralSize, true); ev.setUint32(16, centralOffset, true);
    ev.setUint16(20, 0, true);
    return new Blob([...localParts, ...centralParts, eocd], { type: 'application/zip' });
  }

  // Matches the spec's actual output filenames (01_Creative_Brief.json, etc.)
  const STAGE_JSON_FILENAMES = {
    1: '01_Creative_Brief.json', 2: '02_Visual_Lookbook.json',
    3: '03_Scene_Blueprint.json', 4: '04_Director_Shot_List.json', 5: '05_GoogleFlow_Global.json'
  };
  function bundleJsonEntries(n, impl, jsonStr, promptBlocks) {
    if (n === 6) {
      const j = impl.json();
      return Object.entries(j).map(([name, obj]) => ({ name, text: JSON.stringify(obj, null, 2) }));
    }
    const entries = [{ name: STAGE_JSON_FILENAMES[n], text: jsonStr }];
    if (n === 5) {
      entries.push({ name: '05_GoogleFlow_Prompts.txt', text: promptBlocks.map(b => `${b.h}\n${b.list ? b.list.map(x => '- ' + x).join('\n') : b.p}`).join('\n\n') });
    }
    return entries;
  }
  async function handleDownloadBundle() {
    const btn = document.getElementById('downloadBtn');
    if (!btn) return;
    btn.disabled = true;
    btn.innerHTML = `${ICON.box} Zipping…`;
    try {
      const n = state.active;
      const impl = STAGE_IMPL[n];
      const jsonStr = JSON.stringify(impl.json(), null, 2);
      const promptBlocks = impl.prompt();
      const encoder = new TextEncoder();
      const zipEntries = bundleJsonEntries(n, impl, jsonStr, promptBlocks)
        .map(e => ({ name: e.name, data: encoder.encode(e.text) }));

      if (state.assets.logoFile) {
        zipEntries.push({ name: state.assets.logoFile.name, data: new Uint8Array(await state.assets.logoFile.arrayBuffer()) });
      }
      for (const f of state.assets.productPhotoFiles) {
        zipEntries.push({ name: f.name, data: new Uint8Array(await f.arrayBuffer()) });
      }
      if (state.assets.avatarFile) {
        zipEntries.push({ name: state.assets.avatarFile.name, data: new Uint8Array(await state.assets.avatarFile.arrayBuffer()) });
      }
      if (state.assets.backgroundFile) {
        zipEntries.push({ name: state.assets.backgroundFile.name, data: new Uint8Array(await state.assets.backgroundFile.arrayBuffer()) });
      }

      const blob = buildZip(zipEntries);
      const url = URL.createObjectURL(blob);
      const filename = `stage${n}_bundle.zip`;

      // Artifacts run inside a sandboxed iframe, which silently swallows a
      // *synthetic* a.click() download trigger — no error, nothing happens.
      // Swapping the button for a real anchor means the download fires from
      // the user's own click, which sandboxes don't block the same way.
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.target = '_blank';
      a.rel = 'noopener';
      a.className = 'btn btn-sm btn-primary';
      a.textContent = `⬇ Save ${filename}`;
      a.addEventListener('click', () => setTimeout(() => URL.revokeObjectURL(url), 4000));
      btn.replaceWith(a);
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = `${ICON.box} Download bundle`;
      toast('Could not build the zip — please try again.');
    }
  }

  // ---------- Stage tabs (top pipeline strip) ----------
  function renderStageTabs() {
    document.getElementById('stageTabs').innerHTML = STAGES.map(s => {
      const st = status(s.n);
      return `<button type="button" class="stage-tab ${s.n === state.active ? 'active' : ''} status-${st}" data-goto="${s.n}">
        <span class="stage-num">${s.n}</span>
        <span class="name">${esc(s.name)}</span>
      </button>`;
    }).join('');
  }

  // ---------- Single main column: one card per topic, then output ----------
  // /new itself is composed of many separate numbered cards (Brand Details,
  // Campaign Goal, Target Audience, ...), not one big card holding
  // everything — so each stage's fields() returns an array of {title, desc,
  // body} cards, numbered locally within the stage, and we render one
  // <section class="card"> per entry instead of forcing it all into one.
  // Fields and output are rebuilt separately: typing in a field must only
  // refresh the output panel (refreshOutput), never rebuild the fields
  // themselves — replacing a focused input's DOM node on every keystroke is
  // what caused focus loss and the page to visibly jump/shake.
  function renderMain() {
    const n = state.active;
    const impl = STAGE_IMPL[n];
    const cards = impl.fields();

    const cardsHtml = cards.map((c, i) => `
      <section class="card section-card">
        <div class="section-head">
          <div class="section-head-row">
            <span class="section-num">${i + 1}</span>
            <h2>${esc(c.title)}</h2>
          </div>
          ${c.desc ? `<p class="section-desc">${esc(c.desc)}</p>` : ''}
        </div>
        <div class="section-body">${c.body}</div>
      </section>
    `).join('');

    document.getElementById('colMain').innerHTML = cardsHtml + `
      <section class="card">
        <div id="outputArea"></div>
      </section>
    `;
    refreshOutput();
    wireForm();
  }

  function refreshOutput() {
    const n = state.active;
    const impl = STAGE_IMPL[n];
    const tab = state.outTab[n];
    const jsonStr = JSON.stringify(impl.json(), null, 2);
    const promptBlocks = impl.prompt();
    const area = document.getElementById('outputArea');
    if (!area) return;
    area.innerHTML = `
      <div class="out-head">
        <div class="out-tabs">
          <button type="button" class="out-tab ${tab === 'json' ? 'active' : ''}" data-outtab="json">JSON</button>
          <button type="button" class="out-tab ${tab === 'prompt' ? 'active' : ''}" data-outtab="prompt">${esc(impl.promptLabel)}</button>
        </div>
        <button type="button" class="copy-btn" id="copyBtn">${ICON.layers} Copy ${tab === 'json' ? 'JSON' : 'text'}</button>
        <button type="button" class="btn btn-sm" id="downloadBtn">${ICON.box} Download bundle</button>
      </div>
      <div class="out-panel ${tab === 'json' ? 'active' : ''}"><pre class="code">${esc(jsonStr)}</pre></div>
      <div class="out-panel ${tab === 'prompt' ? 'active' : ''}">
        ${promptBlocks.map(b => `<div class="prompt-block ${b.list ? 'negative' : ''}"><h4>${esc(b.h)}</h4>
          ${b.list ? `<ul>${b.list.map(x => `<li>${esc(x)}</li>`).join('')}</ul>` : `<p>${esc(b.p)}</p>`}</div>`).join('')}
      </div>
      <p class="empty-note" style="margin-top:10px">Download bundle zips this stage's JSON (and prompt .txt, where the spec calls for one) together with the real logo/product photo files, under their original filenames.</p>
      <p class="empty-note" style="margin-top:4px">Note: this preview runs inside a sandboxed Artifact, which blocks all file downloads regardless of how they're triggered — the zip-building code itself is correct (verified separately) and will download normally once this is ported into the real app.</p>
      ${STAGE_USAGE[n] ? `
        <div class="usage-box">
          <h4>${ICON.check} What to do with this</h4>
          <ol>${STAGE_USAGE[n].steps.map(s => `<li>${esc(s)}</li>`).join('')}</ol>
          <p class="outcome"><b>Outcome:</b> ${esc(STAGE_USAGE[n].outcome)}</p>
        </div>
      ` : ''}
    `;
    document.getElementById('copyBtn').addEventListener('click', function () {
      const text = tab === 'json' ? jsonStr : promptBlocks.map(b => `${b.h}\n${b.list ? b.list.map(x => '- ' + x).join('\n') : b.p}`).join('\n\n');
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.classList.add('copied'); btn.innerHTML = `${ICON.check} Copied`;
        setTimeout(() => { btn.classList.remove('copied'); refreshOutput(); }, 1400);
      });
    });
    document.getElementById('downloadBtn').addEventListener('click', handleDownloadBundle);
  }

  // Lightweight, non-destructive updates for things that depend on typed
  // values but must not rebuild the input elements the user is typing into.
  function refreshStageTabStatus() {
    STAGES.forEach(s => {
      const tabEl = document.querySelector('.stage-tab[data-goto="' + s.n + '"]');
      if (!tabEl) return;
      tabEl.classList.remove('status-not_started', 'status-editing', 'status-ready');
      tabEl.classList.add('status-' + status(s.n));
    });
  }
  function refreshDurationCheck() {
    if (state.active !== 3) return;
    const el = document.getElementById('durationCheck');
    if (!el) return;
    const total = state.stage3.scenes.reduce((a, s) => a + Number(s.duration || 0), 0);
    const target = Number(state.stage1.duration);
    const ok = total === target;
    el.className = 'duration-check ' + (ok ? 'ok' : 'off');
    el.innerHTML = `${ICON.clock} ${total}s of ${target}s planned ${ok ? '— matches Stage 1 duration' : '— adjust to match Stage 1'}`;
  }

  function getPath(obj, path) { return path.split('.').reduce((o, k) => (o == null ? o : o[k]), obj); }
  function setPath(obj, path, value) {
    const keys = path.split('.'); let o = obj;
    for (let i = 0; i < keys.length - 1; i++) o = o[keys[i]];
    o[keys[keys.length - 1]] = value;
  }

  function wireForm() {
    document.querySelectorAll('[data-bind]').forEach(el => {
      el.addEventListener('input', function () {
        const path = el.getAttribute('data-bind');
        const val = el.type === 'number' ? Number(el.value) : el.value;
        setPath(state, path, val);
        // Never rebuild the fields themselves here — this fires on every
        // keystroke, and replacing a focused input's DOM node mid-typing is
        // what causes focus loss / the page jumping. Only refresh output
        // and the small derived indicators that live outside the field.
        const counterEl = el.closest('.field') ? el.closest('.field').querySelector('.char-counter') : null;
        if (counterEl) counterEl.textContent = `${el.value.length}/${counterEl.getAttribute('data-max')}`;
        refreshOutput();
        refreshStageTabStatus();
        refreshDurationCheck();
      });
    });
    document.querySelectorAll('[data-bind-check]').forEach(el => {
      el.addEventListener('change', function () {
        setPath(state, el.getAttribute('data-bind-check'), el.checked);
        renderMain();
      });
    });
    document.querySelectorAll('[data-pick]').forEach(el => {
      el.addEventListener('click', function () {
        setPath(state, el.getAttribute('data-pick'), el.getAttribute('data-value'));
        renderStageTabs(); renderMain();
      });
    });
    document.querySelectorAll('[data-bind-color]').forEach(el => {
      el.addEventListener('input', function () {
        const path = el.getAttribute('data-bind-color');
        setPath(state, path, el.value);
        const box = el.parentElement;
        if (box) box.style.background = el.value;
        const row = box ? box.parentElement : null;
        const hexInput = row ? row.querySelector('.swatch-hex') : null;
        if (hexInput) hexInput.value = el.value;
        refreshOutput();
      });
    });
    document.querySelectorAll('[data-bind-hex]').forEach(el => {
      el.addEventListener('input', function () {
        setPath(state, el.getAttribute('data-bind-hex'), el.value);
        refreshOutput();
      });
      el.addEventListener('blur', function () {
        const resolved = resolveHexColor(el.value);
        if (resolved) {
          setPath(state, el.getAttribute('data-bind-hex'), resolved);
          el.value = resolved;
          const row = el.closest('.swatch-row');
          const box = row ? row.querySelector('.swatch-box') : null;
          if (box) box.style.background = resolved;
          const native = box ? box.querySelector('.swatch-native') : null;
          if (native) native.value = resolved;
        }
        refreshOutput();
      });
    });
    document.querySelectorAll('[data-trigger]').forEach(el => {
      el.addEventListener('click', function () {
        const target = document.getElementById(el.getAttribute('data-trigger'));
        if (target) target.click();
      });
    });
    const parseBtn = document.querySelector('[data-action="parseStoryboard"]');
    if (parseBtn) parseBtn.addEventListener('click', parseStoryboardIntoScenes);

    const logoInput = document.getElementById('logoInput');
    if (logoInput) logoInput.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      if (state.assets.logoPreviewUrl) URL.revokeObjectURL(state.assets.logoPreviewUrl);
      state.assets.logoFile = file;
      state.assets.logoPreviewUrl = URL.createObjectURL(file);
      render();
    });
    document.querySelectorAll('[data-action="removeLogo"]').forEach(el => el.addEventListener('click', function () {
      if (state.assets.logoPreviewUrl) URL.revokeObjectURL(state.assets.logoPreviewUrl);
      state.assets.logoFile = null;
      state.assets.logoPreviewUrl = null;
      render();
    }));
    const photosInput = document.getElementById('productPhotosInput');
    if (photosInput) photosInput.addEventListener('change', function () {
      Array.from(this.files).forEach(file => {
        state.assets.productPhotoFiles.push(file);
        state.assets.productPhotoPreviewUrls.push(URL.createObjectURL(file));
      });
      this.value = '';
      render();
    });
    document.querySelectorAll('[data-action="removePhoto"]').forEach(el => el.addEventListener('click', function () {
      const i = Number(el.getAttribute('data-i'));
      URL.revokeObjectURL(state.assets.productPhotoPreviewUrls[i]);
      state.assets.productPhotoFiles.splice(i, 1);
      state.assets.productPhotoPreviewUrls.splice(i, 1);
      render();
    }));
    const avatarInput = document.getElementById('avatarInput');
    if (avatarInput) avatarInput.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      if (state.assets.avatarPreviewUrl) URL.revokeObjectURL(state.assets.avatarPreviewUrl);
      state.assets.avatarFile = file;
      state.assets.avatarPreviewUrl = URL.createObjectURL(file);
      render();
    });
    document.querySelectorAll('[data-action="removeAvatar"]').forEach(el => el.addEventListener('click', function () {
      if (state.assets.avatarPreviewUrl) URL.revokeObjectURL(state.assets.avatarPreviewUrl);
      state.assets.avatarFile = null;
      state.assets.avatarPreviewUrl = null;
      render();
    }));
    const backgroundInput = document.getElementById('backgroundInput');
    if (backgroundInput) backgroundInput.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      if (state.assets.backgroundPreviewUrl) URL.revokeObjectURL(state.assets.backgroundPreviewUrl);
      state.assets.backgroundFile = file;
      state.assets.backgroundPreviewUrl = URL.createObjectURL(file);
      render();
    });
    document.querySelectorAll('[data-action="removeBackground"]').forEach(el => el.addEventListener('click', function () {
      if (state.assets.backgroundPreviewUrl) URL.revokeObjectURL(state.assets.backgroundPreviewUrl);
      state.assets.backgroundFile = null;
      state.assets.backgroundPreviewUrl = null;
      render();
    }));

    document.querySelectorAll('[data-action="addScene"]').forEach(el => el.addEventListener('click', function () {
      const n = state.stage3.scenes.length + 1;
      state.stage3.scenes.push({ scene: n, objective: OBJECTIVES[0], location: '', action: '', dialogue: '', emotion: EMOTIONS[0], duration: 6, broll: BROLL_TYPES[0], transition: TRANSITIONS[0] });
      state.stage4.shots[n] = [];
      render();
    }));
    document.querySelectorAll('[data-action="removeScene"]').forEach(el => el.addEventListener('click', function () {
      const i = Number(el.getAttribute('data-i'));
      state.stage3.scenes.splice(i, 1);
      // Shots are keyed by scene number, which is about to shift for every
      // scene after the removed one — rebuild the map from each scene's old
      // number before renumbering, so shots stay attached to the right scene.
      const oldShots = state.stage4.shots;
      const newShots = {};
      state.stage3.scenes.forEach((s, idx) => { newShots[idx + 1] = oldShots[s.scene] || []; });
      state.stage3.scenes.forEach((s, idx) => { s.scene = idx + 1; });
      state.stage4.shots = newShots;
      render();
    }));
    document.querySelectorAll('[data-action="addShot"]').forEach(el => el.addEventListener('click', function () {
      const scene = Number(el.getAttribute('data-scene'));
      const list = state.stage4.shots[scene] || (state.stage4.shots[scene] = []);
      list.push({ shot: list.length + 1, type: SHOT_TYPES[0], camera: 'Handheld', lens: '35mm', movement: 'Static', duration: 3 });
      render();
    }));
    document.querySelectorAll('[data-action="removeShot"]').forEach(el => el.addEventListener('click', function () {
      const scene = Number(el.getAttribute('data-scene')), i = Number(el.getAttribute('data-i'));
      state.stage4.shots[scene].splice(i, 1);
      state.stage4.shots[scene].forEach((s, idx) => { s.shot = idx + 1; });
      render();
    }));
    document.querySelectorAll('[data-action="addNegative"]').forEach(el => el.addEventListener('click', function () {
      state.stage5.negative_prompt.push(''); render();
    }));
    document.querySelectorAll('[data-action="removeNegative"]').forEach(el => el.addEventListener('click', function () {
      state.stage5.negative_prompt.splice(Number(el.getAttribute('data-i')), 1); render();
    }));
  }

  function toast(msg) {
    const t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:9px 16px;border-radius:999px;font-size:12.5px;font-weight:600;z-index:999;box-shadow:var(--shadow-card)';
